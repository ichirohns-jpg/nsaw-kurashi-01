<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 今日のAI秘書
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  color:#223;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #1565c0,
    #0d47a1
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;
}

/* 本体 */

.wrap{
  padding:16px 14px 50px;
}

/* AI */

.ai-box{

  background:#fff;

  border-radius:26px;

  padding:26px;

  margin-bottom:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.ai-title{

  font-size:32px;

  font-weight:900;

  margin-bottom:18px;

  color:#0d47a1;
}

.ai-text{

  font-size:28px;

  line-height:2;

  color:#333;

  white-space:pre-wrap;
}

/* 選択 */

.select-box{

  background:#fff;

  border-radius:26px;

  padding:24px;

  margin-bottom:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.select-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1565c0;
}

.select{

  width:100%;

  padding:22px;

  border-radius:18px;

  border:
  2px solid #dbe3ea;

  font-size:26px;

  font-weight:900;

  background:#fff;
}

/* 音声 */

.voice-btn{

  width:100%;

  border:none;

  background:#1976d2;

  color:#fff;

  border-radius:28px;

  padding:30px 20px;

  font-size:36px;

  font-weight:900;

  margin-bottom:24px;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:24px;

  padding:22px;

  font-size:28px;

  line-height:1.9;

  color:#333;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

/* 今日 */

.today-box{

  background:#fff;

  border-radius:26px;

  padding:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.today-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1565c0;
}

.today-item{

  background:#f5f7fb;

  border-radius:18px;

  padding:20px;

  margin-bottom:16px;

  font-size:28px;

  line-height:1.9;

  border-left:
  8px solid #1976d2;
}

/* 履歴 */

.history{

  background:#fff;

  border-radius:26px;

  padding:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.history-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:20px;

  color:#1565c0;
}

.history-item{

  background:#f5f7fb;

  border-radius:18px;

  padding:18px;

  margin-bottom:16px;

  font-size:24px;

  line-height:1.8;

  border-left:
  8px solid #42a5f5;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;
}

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.ai-title{
  font-size:28px;
}

.ai-text{
  font-size:24px;
}

.select-title{
  font-size:28px;
}

.select{
  font-size:22px;
}

.voice-btn{
  font-size:30px;
}

.status{
  font-size:24px;
}

.today-title{
  font-size:28px;
}

.today-item{
  font-size:24px;
}

.history-title{
  font-size:28px;
}

.history-item{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      今日のAI秘書
    </div>

    <div class="sub">
      今日の予定・ゴミの日・
      家族予定などを、
      AIが毎朝お知らせします。
    </div>

  </div>

</div>

<div class="wrap">

  <div class="ai-box">

    <div class="ai-title">
      今日のAI秘書
    </div>

    <div class="ai-text"
    id="aiText">

    </div>

  </div>

  <div class="select-box">

    <div class="select-title">
      誰の予定ですか？
    </div>

    <select class="select"
    id="personSelect">

      <option value="👤 自分">
      👤 自分
      </option>

      <option value="👩 娘">
      👩 娘
      </option>

      <option value="👨 息子">
      👨 息子
      </option>

      <option value="👨‍⚕️ 訪問看護">
      👨‍⚕️ 訪問看護
      </option>

      <option value="🚐 デイサービス">
      🚐 デイサービス
      </option>

    </select>

  </div>

  <button class="voice-btn"
  onclick="startVoice()">

    🎤 今日の予定を話して登録

  </button>

  <div class="status"
  id="status">

    例：
    「5月28日 14時 歯医者」

  </div>

  <div class="today-box">

    <div class="today-title">
      今日の予定
    </div>

    <div id="todayList">

    </div>

  </div>

  <div class="history">

    <div class="history-title">
      予定履歴
    </div>

    <div id="historyList">

    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

const STORAGE_KEY =
'nsaw_today_schedule';

const WEEK_GOMI = {

'0':'',
'1':'🗑 燃えるごみの日',
'2':'',
'3':'🗑 資源ごみの日',
'4':'🗑 燃えるごみの日',
'5':'',
'6':''

};

function speak(text){

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = 'ja-JP';

  speechSynthesis.speak(msg);

}

function getData(){

  return JSON.parse(
    localStorage.getItem(
      STORAGE_KEY
    ) || '[]'
  );

}

function saveData(data){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(data)
  );

}

function parseDate(text){

  const match =
  text.match(
    /(\d+)月(\d+)/
  );

  if(!match){

    return null;

  }

  const year =
  new Date().getFullYear();

  return {

    month:
    parseInt(match[1]),

    day:
    parseInt(match[2]),

    year:year

  };

}

function isToday(item){

  const date =
  parseDate(item.text);

  if(!date){

    return false;

  }

  const now =
  new Date();

  return (

    now.getMonth()+1
    ===
    date.month

    &&

    now.getDate()
    ===
    date.day

  );

}

function addSchedule(person,text){

  const data =
  getData();

  data.unshift({

    person:person,

    text:text,

    time:
    new Date().toISOString()

  });

  saveData(data);

}

function renderHistory(){

  const list =
  document.getElementById(
    'historyList'
  );

  list.innerHTML = '';

  const data =
  getData();

  data.forEach(function(item){

    const div =
    document.createElement('div');

    div.className =
    'history-item';

    div.innerHTML =

    item.person +

    '<br><br>' +

    '📅 ' +

    item.text;

    list.appendChild(div);

  });

}

function renderToday(){

  const list =
  document.getElementById(
    'todayList'
  );

  list.innerHTML = '';

  const today =
  new Date();

  const week =
  today.getDay();

  const gomi =
  WEEK_GOMI[week];

  if(gomi){

    const div =
    document.createElement('div');

    div.className =
    'today-item';

    div.innerHTML =
    gomi;

    list.appendChild(div);

  }

  const data =
  getData();

  data.forEach(function(item){

    if(!isToday(item)){

      return;

    }

    const div =
    document.createElement('div');

    div.className =
    'today-item';

    div.innerHTML =

    item.person +

    '<br><br>' +

    '📅 ' +

    item.text;

    list.appendChild(div);

  });

}

function renderAI(){

  const today =
  new Date();

  const week =
  today.getDay();

  const gomi =
  WEEK_GOMI[week];

  const data =
  getData();

  let text =
  'おはようございます。';

  if(gomi){

    text +=
    '\n\n' + gomi + 'です。';

  }

  const todayData =
  data.filter(isToday);

  if(todayData.length > 0){

    text +=
    '\n\n本日の予定があります。';

    todayData.forEach(function(item){

      text +=

      '\n\n' +

      item.person +

      'の予定。' +

      item.text;

    });

  }

  if(todayData.length === 0){

    text +=
    '\n\n本日の予定は登録されていません。';

  }

  text +=
  '\n\n今日もお気をつけてお過ごしください。';

  document.getElementById(
    'aiText'
  ).innerHTML = text;

  speak(text);

}

function startVoice(){

  if(
    !('webkitSpeechRecognition' in window)
  ){

    alert(
      'このブラウザは音声入力に対応していません'
    );

    return;

  }

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang = 'ja-JP';

  recognition.interimResults = false;

  recognition.continuous = false;

  const status =
  document.getElementById(
    'status'
  );

  status.innerHTML =
  '🎤 聞いています…';

  recognition.onresult =
  function(event){

    const text =
    event.results[0][0]
    .transcript;

    const person =
    document.getElementById(
      'personSelect'
    ).value;

    addSchedule(
      person,
      text
    );

    renderHistory();

    renderToday();

    renderAI();

    status.innerHTML =

    '予定を登録しました。<br><br>' +

    person +

    '<br><br>' +

    text;

    speak(
      '予定を登録しました'
    );

  };

  recognition.start();

}

renderHistory();

renderToday();

renderAI();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW AI予定秘書
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;

  background:#eef3f8;

  color:#223;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #1565c0,
    #0d47a1
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* 本体 */

.wrap{
  padding:16px 14px 50px;
}

/* AI秘書 */

.ai-box{

  background:#fff;

  border-radius:26px;

  padding:26px;

  margin-bottom:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.ai-title{

  font-size:32px;

  font-weight:900;

  margin-bottom:18px;

  color:#0d47a1;
}

.ai-text{

  font-size:28px;

  line-height:2;

  color:#333;

  white-space:pre-wrap;
}

/* 音声 */

.voice-btn{

  width:100%;

  border:none;

  background:#1976d2;

  color:#fff;

  border-radius:28px;

  padding:30px 20px;

  font-size:36px;

  font-weight:900;

  box-shadow:
  0 10px 26px rgba(0,0,0,.14);

  margin-bottom:24px;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:24px;

  padding:22px;

  font-size:28px;

  line-height:1.9;

  color:#333;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

/* 今日 */

.today-box{

  background:#fff;

  border-radius:26px;

  padding:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.today-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1565c0;
}

.today-item{

  background:#f5f7fb;

  border-radius:18px;

  padding:20px;

  margin-bottom:16px;

  font-size:28px;

  line-height:1.9;

  border-left:
  8px solid #1976d2;
}

/* 履歴 */

.history{

  background:#fff;

  border-radius:26px;

  padding:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.history-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:20px;

  color:#1565c0;
}

.history-item{

  background:#f5f7fb;

  border-radius:18px;

  padding:18px;

  margin-bottom:16px;

  font-size:24px;

  line-height:1.8;

  border-left:
  8px solid #42a5f5;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.ai-title{
  font-size:28px;
}

.ai-text{
  font-size:24px;
}

.voice-btn{
  font-size:30px;
}

.status{
  font-size:24px;
}

.today-title{
  font-size:28px;
}

.today-item{
  font-size:24px;
}

.history-title{
  font-size:28px;
}

.history-item{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      AI予定秘書
    </div>

    <div class="sub">
      病院・歯医者・ゴミの日などを、
      AIがまとめてお知らせします。
    </div>

  </div>

</div>

<div class="wrap">

  <div class="ai-box">

    <div class="ai-title">
      今日のAI秘書
    </div>

    <div class="ai-text"
    id="aiText">

      おはようございます。

      今日は燃えるごみの日です。

      14時から病院の予定があります。

    </div>

  </div>

  <button class="voice-btn"
  onclick="startVoice()">

    🎤 予定を話して登録する

  </button>

  <div class="status"
  id="status">

    例：
    「5月28日 14時 歯医者」

  </div>

  <div class="today-box">

    <div class="today-title">
      今日の予定
    </div>

    <div id="todayList">

      <div class="today-item">

        🗑 燃えるごみの日

      </div>

      <div class="today-item">

        🏥 14:00 ○○病院

      </div>

    </div>

  </div>

  <div class="history">

    <div class="history-title">
      予定履歴
    </div>

    <div id="historyList">

    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

function speak(text){

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = 'ja-JP';

  speechSynthesis.speak(msg);

}

window.onload = function(){

  const text =
  document.getElementById(
    'aiText'
  ).innerText;

  speak(text);

};

function startVoice(){

  if(
    !('webkitSpeechRecognition' in window)
  ){

    alert(
      'このブラウザは音声入力に対応していません'
    );

    return;

  }

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang = 'ja-JP';

  recognition.interimResults = false;

  recognition.continuous = false;

  const status =
  document.getElementById(
    'status'
  );

  status.innerHTML =
  '🎤 聞いています…';

  recognition.onresult =
  function(event){

    const text =
    event.results[0][0].transcript;

    status.innerHTML =

    '予定を登録しました。<br><br>' +

    text;

    addHistory(text);

    addToday(text);

    speak(
      '予定を登録しました'
    );

  };

  recognition.start();

}

function addHistory(text){

  const list =
  document.getElementById(
    'historyList'
  );

  const item =
  document.createElement('div');

  item.className =
  'history-item';

  item.innerHTML =
  text;

  list.prepend(item);

}

function addToday(text){

  const list =
  document.getElementById(
    'todayList'
  );

  const item =
  document.createElement('div');

  item.className =
  'today-item';

  item.innerHTML =
  '📅 ' + text;

  list.prepend(item);

}

</script>

</body>
</html>

<script>

const STORAGE_KEY =
'nsaw_today_schedule';

const WEEK_GOMI = {

'0':'',
'1':'🗑 燃えるごみの日',
'2':'',
'3':'🗑 資源ごみの日',
'4':'🗑 燃えるごみの日',
'5':'',
'6':''

};

function speak(text){

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = 'ja-JP';

  speechSynthesis.speak(msg);

}

function getData(){

  return JSON.parse(
    localStorage.getItem(
      STORAGE_KEY
    ) || '[]'
  );

}

function saveData(data){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(data)
  );

}

function parseDate(text){

  const match =
  text.match(
    /(\d+)月(\d+)/
  );

  if(!match){

    return null;

  }

  return {

    month:
    parseInt(match[1]),

    day:
    parseInt(match[2])

  };

}

/* 時間解析 */

function parseHour(text){

  const match =
  text.match(
    /(\d+)\s*時/
  );

  if(!match){

    return 99;

  }

  return parseInt(match[1]);

}

function isTargetDay(item,offset){

  const date =
  parseDate(item.text);

  if(!date){

    return false;

  }

  const now =
  new Date();

  const target =
  new Date();

  target.setDate(
    now.getDate() + offset
  );

  return (

    target.getMonth()+1
    ===
    date.month

    &&

    target.getDate()
    ===
    date.day

  );

}

function addSchedule(person,text){

  const data =
  getData();

  data.unshift({

    person:person,

    text:text,

    hour:
    parseHour(text)

  });

  saveData(data);

}

function renderHistory(){

  const list =
  document.getElementById(
    'historyList'
  );

  list.innerHTML = '';

  getData().forEach(function(item){

    const div =
    document.createElement('div');

    div.className =
    'history-item';

    div.innerHTML =

    item.person +

    '<br><br>📅 ' +

    item.text;

    list.appendChild(div);

  });

}

function renderDay(targetId,offset,gomiText){

  const list =
  document.getElementById(
    targetId
  );

  list.innerHTML = '';

  if(gomiText){

    const gomi =
    document.createElement('div');

    gomi.className =
    'day-item';

    gomi.innerHTML =
    gomiText;

    list.appendChild(gomi);

  }

  const items =
  getData()
  .filter(
    item => isTargetDay(item,offset)
  )
  .sort(
    (a,b) => a.hour - b.hour
  );

  items.forEach(function(item){

    const div =
    document.createElement('div');

    div.className =
    'day-item';

    div.innerHTML =

    item.person +

    '<br><br>📅 ' +

    item.text;

    list.appendChild(div);

  });

}

function renderAI(){

  const now =
  new Date();

  const todayWeek =
  now.getDay();

  const tomorrow =
  new Date();

  tomorrow.setDate(
    now.getDate()+1
  );

  const tomorrowWeek =
  tomorrow.getDay();

  const todayGomi =
  WEEK_GOMI[todayWeek];

  const tomorrowGomi =
  WEEK_GOMI[tomorrowWeek];

  const todayData =
  getData()
  .filter(
    item => isTargetDay(item,0)
  )
  .sort(
    (a,b)=>a.hour-b.hour
  );

  const tomorrowData =
  getData()
  .filter(
    item => isTargetDay(item,1)
  )
  .sort(
    (a,b)=>a.hour-b.hour
  );

  let text =
  'おはようございます。';

  if(todayGomi){

    text +=
    '\n\n今日は ' +
    todayGomi + 'です。';

  }

  if(todayData.length > 0){

    text +=
    '\n\n今日の予定です。';

    todayData.forEach(function(item){

      text +=

      '\n\n' +

      item.text;

    });

  }

  if(tomorrowGomi){

    text +=
    '\n\n明日は ' +
    tomorrowGomi + 'です。';

  }

  if(tomorrowData.length > 0){

    text +=
    '\n\n明日の予定です。';

    tomorrowData.forEach(function(item){

      text +=

      '\n\n' +

      item.text;

    });

  }

  text +=
  '\n\n今日もお気をつけてお過ごしください。';

  document.getElementById(
    'aiText'
  ).innerHTML = text;

  speak(text);

}

function startVoice(){

  if(
    !('webkitSpeechRecognition' in window)
  ){

    alert(
      '音声入力に対応していません'
    );

    return;

  }

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang = 'ja-JP';

  recognition.interimResults = false;

  recognition.continuous = false;

  const status =
  document.getElementById(
    'status'
  );

  status.innerHTML =
  '🎤 聞いています…';

  recognition.onresult =
  function(event){

    const text =
    event.results[0][0]
    .transcript;

    const person =
    document.getElementById(
      'personSelect'
    ).value;

    addSchedule(
      person,
      text
    );

    renderHistory();

    renderDay(
      'todayList',
      0,
      WEEK_GOMI[
        new Date().getDay()
      ]
    );

    const tomorrow =
    new Date();

    tomorrow.setDate(
      tomorrow.getDate()+1
    );

    renderDay(
      'tomorrowList',
      1,
      WEEK_GOMI[
        tomorrow.getDay()
      ]
    );

    renderAI();

    status.innerHTML =

    '予定を登録しました。<br><br>' +

    person +

    '<br><br>' +

    text;

    speak(
      '予定を登録しました'
    );

  };

  recognition.start();

}

renderHistory();

renderDay(
  'todayList',
  0,
  WEEK_GOMI[
    new Date().getDay()
  ]
);

const tomorrow =
new Date();

tomorrow.setDate(
  tomorrow.getDate()+1
);

renderDay(
  'tomorrowList',
  1,
  WEEK_GOMI[
    tomorrow.getDay()
  ]
);

renderAI();

</script>

<script>

/* 出発支援DX */

function getLeaveTime(hour){

  if(hour === null){

    return '';

  }

  let leaveHour =
  hour;

  let leaveMinute =
  30;

  if(leaveMinute < 0){

    leaveMinute += 60;

    leaveHour -= 1;

  }

  return (
    leaveHour +
    '時' +
    String(leaveMinute)
    .padStart(2,'0') +
    '分ごろ出発'
  );

}

function getRemainingText(hour){

  if(hour === null){

    return '';

  }

  const now =
  new Date();

  const currentHour =
  now.getHours();

  const diff =
  hour - currentHour;

  if(diff <= 0){

    return '⏰ まもなく予定の時間です';

  }

  if(diff === 1){

    return '⏰ あと1時間';

  }

  return '⏰ あと' + diff + '時間';

}

function renderDay(targetId,offset,gomiText){

  const list =
  document.getElementById(
    targetId
  );

  list.innerHTML = '';

  if(gomiText){

    const gomi =
    document.createElement('div');

    gomi.className =
    'day-item';

    gomi.innerHTML =
    gomiText;

    list.appendChild(gomi);

  }

  const items =
  getData()
  .filter(
    item => isTargetDay(item,offset)
  )
  .sort(
    (a,b) => a.hour - b.hour
  );

  items.forEach(function(item){

    const div =
    document.createElement('div');

    div.className =
    'day-item';

    const remain =
    getRemainingText(
      item.hour
    );

    const leave =
    getLeaveTime(
      item.hour
    );

    let html =

    item.person +

    '<br><br>📅 ' +

    item.text +

    '<br><br>' +

    remain;

    if(leave){

      html +=

      '<br><br>🚶 ' +

      leave;

    }

    if(
      item.items &&
      item.items.length > 0
    ){

      html +=
      '<br><br>👜 持ち物';

      item.items.forEach(function(i){

        html +=
        '<br>・' + i;

      });

    }

    div.innerHTML = html;

    list.appendChild(div);

  });

}

function renderAI(){

  const now =
  new Date();

  const todayWeek =
  now.getDay();

  const tomorrow =
  new Date();

  tomorrow.setDate(
    now.getDate()+1
  );

  const tomorrowWeek =
  tomorrow.getDay();

  const todayGomi =
  WEEK_GOMI[todayWeek];

  const tomorrowGomi =
  WEEK_GOMI[tomorrowWeek];

  const todayData =
  getData()
  .filter(
    item => isTargetDay(item,0)
  )
  .sort(
    (a,b)=>a.hour-b.hour
  );

  const tomorrowData =
  getData()
  .filter(
    item => isTargetDay(item,1)
  )
  .sort(
    (a,b)=>a.hour-b.hour
  );

  let text =
  'おはようございます。';

  if(todayGomi){

    text +=
    '\n\n今日は ' +
    todayGomi + 'です。';

  }

  if(todayData.length > 0){

    text +=
    '\n\n今日の予定です。';

    todayData.forEach(function(item){

      const remain =
      getRemainingText(
        item.hour
      );

      const leave =
      getLeaveTime(
        item.hour
      );

      text +=

      '\n\n' +

      item.text +

      '。' +

      remain;

      if(leave){

        text +=

        '\n' +

        leave +

        'です。';

      }

      if(
        item.items &&
        item.items.length > 0
      ){

        text +=
        '\n持ち物は、';

        item.items.forEach(function(i){

          text +=
          i + '、';

        });

        text +=
        'です。';

      }

    });

  }

  if(tomorrowGomi){

    text +=
    '\n\n明日は ' +
    tomorrowGomi + 'です。';

  }

  if(tomorrowData.length > 0){

    text +=
    '\n\n明日の予定があります。';

    tomorrowData.forEach(function(item){

      text +=

      '\n\n' +

      item.text;

    });

  }

  text +=
  '\n\n今日もお気をつけてお過ごしください。';

  document.getElementById(
    'aiText'
  ).innerHTML = text;

  speak(text);

}

</script>

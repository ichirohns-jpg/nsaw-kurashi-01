<script>
const SHEET_ID = '149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME = 'お楽しみ動画';
const PAGE_URL = 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/fun.html';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(row,index){
return row.c[index] ? (row.c[index].f || row.c[index].v || '') : '';
}

function allCellText(row){
let text = '';
(row.c || []).forEach(c=>{
if(c){
text += ' ' + (c.v || '') + ' ' + (c.f || '');
}
});
return text;
}

function findYouTubeUrl(row){
const text = allCellText(row);
const m = text.match(/https?:\/\/[^\s"'<>]*(youtube\.com|youtu\.be)[^\s"'<>]*/);
return m ? m[0] : '';
}

function getYouTubeId(youtubeURL){
if(!youtubeURL) return '';

let m =
youtubeURL.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);

if(m) return m[1];

m =
youtubeURL.match(/([A-Za-z0-9_-]{11})/);

return m ? m[1] : '';
}

function escapeHtml(text){
return String(text || '')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');
}

function makeCard(item,index){

const shareUrl = PAGE_URL + '?fun=' + encodeURIComponent(index + 1);
const safeTitle = escapeHtml(item.title);
const youtubeId = getYouTubeId(item.youtubeURL);

let videoHtml = '';

if(youtubeId){
videoHtml = `
<div class="video">
<iframe
src="https://www.youtube.com/embed/${youtubeId}"
allowfullscreen>
</iframe>
</div>
`;
}

return `
<div class="card">

${videoHtml}

<div class="date">
${escapeHtml(item.date)}
</div>

<div class="title">
${safeTitle}
</div>

<div class="desc">
${escapeHtml(item.desc)}
</div>

<div class="tags">
${escapeHtml(item.tags)}
</div>

<div class="snsGrid">

<button
class="snsBtn facebook"
onclick="shareFacebook('${shareUrl}')">
Facebook
</button>

<button
class="snsBtn line"
onclick="shareLine('${shareUrl}')">
LINE
</button>

<button
class="snsBtn x"
onclick="shareX('${shareUrl}','${safeTitle}')">
X
</button>

<button
class="snsBtn copy"
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>
`;
}

function shareFacebook(shareUrl){
window.open(
'https://www.facebook.com/sharer/sharer.php?u=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function shareLine(shareUrl){
window.open(
'https://social-plugins.line.me/lineit/share?url=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function shareX(shareUrl,title){
window.open(
'https://twitter.com/intent/tweet?text=' +
encodeURIComponent(title) +
'&url=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function copyUrl(shareUrl){
navigator.clipboard.writeText(shareUrl).then(function(){
alert('URLをコピーしました');
}).catch(function(){
alert(shareUrl);
});
}

function toggleArchive(){
const area = document.getElementById('archiveArea');
const btn = document.getElementById('archiveButton');

if(area.classList.contains('hidden')){
area.classList.remove('hidden');
btn.innerHTML = '📕 アーカイブを閉じる';
}else{
area.classList.add('hidden');
btn.innerHTML = '📚 アーカイブを見る';
}
}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json = JSON.parse(text.substr(47).slice(0,-2));
const rows = json.table.rows;

let items = [];

rows.forEach((r, index)=>{

const date = cell(r,0);
const title = cell(r,2) || cell(r,1);
const desc = cell(r,3);
const tags = cell(r,4);
const youtubeURL = findYouTubeUrl(r);

if(!date && !youtubeURL && !title) return;

items.push({
date:date,
youtubeURL:youtubeURL,
title:title,
desc:desc,
tags:tags,
originalIndex:index
});

});

items.reverse();

const funParam =
new URLSearchParams(location.search)
.get("fun");

let latestHtml = '';
let archiveHtml = '';

if (funParam) {
const targetIndex =
parseInt(funParam,10)-1;

const matchedItem =
items.find(
item =>
item.originalIndex === targetIndex
);

if (matchedItem) {
latestHtml =
makeCard(
matchedItem,
matchedItem.originalIndex
);
} else {
latestHtml = '<div class="loading">指定された動画が見つかりません</div>';
}
} else {
items.forEach((item,index)=>{

if(index < 5){
latestHtml += makeCard(item,item.originalIndex);
}else{
archiveHtml += makeCard(item,item.originalIndex);
}

});
}

document.getElementById('latestArea').innerHTML =
latestHtml || '<div class="loading">お楽しみ動画がありません</div>';

document.getElementById('archiveArea').innerHTML =
archiveHtml;

if(archiveHtml && !funParam){
document.getElementById('archiveButton').classList.remove('hidden');
}

})
.catch(err=>{

document.getElementById('latestArea').innerHTML =
'<div class="loading">読み込みに失敗しました</div>';

});
</script>

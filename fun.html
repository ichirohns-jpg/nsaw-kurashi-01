<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ラジオ</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f7fb}
header{background:#1976d2;color:#fff;padding:20px;text-align:center;font-size:24px;font-weight:900}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;margin-bottom:16px;border-radius:12px;overflow:hidden}
img{width:100%;display:block}
.title{font-size:20px;font-weight:900;padding:10px}
.desc{padding:10px}
.date{padding:6px 10px;background:#e3f2fd;margin:10px;border-radius:999px;display:inline-block;font-weight:900}
</style>

</head>
<body>

<header>地域ラジオ</header>
<div class="wrap"><div id="app"></div></div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='地域ラジオ';

const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=out:json';

function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || '') : '';
}

function getImg(r){
if(!r.c) return '';
for(let i=0;i<r.c.length;i++){
const v=r.c[i]?r.c[i].v:'';
if(typeof v==='string' && v.includes('http')) return v;
}
return 'https://ichirohns-jpg/nsaw-kurashi-01/noimage.jpg';
}

fetch(url).then(r=>r.text()).then(t=>{

const json=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));

let rows=json.table.rows||[];

let items=rows.map((r,i)=>({
id:i+1,
title:cell(r,2),
image:getImg(r),
desc:cell(r,4)
})).filter(x=>x.title).reverse();

let html='';

items.forEach(i=>{
html+=`
<div class="card">
<img src="${i.image}">
<div class="title">${i.title}</div>
<div class="desc">${i.desc}</div>
</div>`;
});

document.getElementById('app').innerHTML=html;

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f4f7fb;
color:#1e2a3a;
}

header{
background:#1976d2;
color:#fff;
padding:22px;
text-align:center;
font-size:26px;
font-weight:900;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
margin-bottom:16px;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

img{
width:100%;
display:block;
}

.date{
padding:6px 10px;
margin:10px;
background:#e3f2fd;
border-radius:999px;
display:inline-block;
font-weight:900;
}

.title{
font-size:20px;
font-weight:900;
padding:10px;
}

.desc{
padding:10px;
font-size:15px;
line-height:1.6;
}

.sns{
display:flex;
gap:8px;
padding:10px;
flex-wrap:wrap;
}

.sns button{
border:0;
padding:10px 12px;
border-radius:8px;
color:#fff;
font-weight:900;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#111}
.copy{background:#ff9800}
</style>
</head>

<body>

<header>お楽しみ</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";

/* 画像は行の中から自動取得 */
function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || "") : "";
}

function getImage(r){
if(!r.c) return "";
for(let i=0;i<r.c.length;i++){
let v = r.c[i] ? r.c[i].v : "";
if(typeof v === "string" && v.startsWith("http")){
return v;
}
}
return "";
}

function load(sheet){

const url =
"https://docs.google.com/spreadsheets/d/" +
SHEET_ID +
"/gviz/tq?sheet=" +
encodeURIComponent(sheet) +
"&tqx=out:json";

fetch(url)
.then(r=>r.text())
.then(t=>{

const json = JSON.parse(
t.substring(t.indexOf("{"), t.lastIndexOf("}") + 1)
);

let rows = json.table.rows || [];

let items = rows.map((r,i)=>({

id:i+1,
date:cell(r,0),
title:cell(r,2),
image:getImage(r),
desc:cell(r,4)

})).filter(x=>x.title).reverse();

let html = "";

items.forEach(i=>{
html += `
<div class="card">

<img src="${i.image}">

<div class="date">${i.date}</div>
<div class="title">${i.title}</div>
<div class="desc">${i.desc}</div>

<div class="sns">
<button class="fb" onclick="share('fb','${i.id}')">FB</button>
<button class="line" onclick="share('line','${i.id}')">LINE</button>
<button class="x" onclick="share('x','${i.id}')">X</button>
<button class="copy" onclick="copyUrl('${i.id}')">COPY</button>
</div>

</div>
`;
});

document.getElementById("app").innerHTML = html;

});

}

function share(type,id){
const base = location.href.split("?")[0];
const url = base + "?id=" + id;

if(type==="fb"){
window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url));
}
if(type==="line"){
window.open("https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url));
}
if(type==="x"){
window.open("https://twitter.com/intent/tweet?url="+encodeURIComponent(url));
}
}

function copyUrl(id){
const base = location.href.split("?")[0];
navigator.clipboard.writeText(base+"?id="+id);
}

let page = location.pathname;

if(page.includes("fun")) load("お楽しみ動画");

</script>

</body>
</html>

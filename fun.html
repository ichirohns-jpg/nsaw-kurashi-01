<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:white;
padding:26px;
border-radius:26px;
text-align:center;
font-size:34px;
font-weight:900;
margin-bottom:18px;
box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.card{
background:white;
border-radius:28px;
padding:18px;
margin-bottom:22px;
box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.date{
display:inline-block;
background:#e8f5e9;
color:#2e7d32;
padding:10px 18px;
border-radius:999px;
font-size:18px;
font-weight:900;
margin-bottom:14px;
}

.title{
font-size:28px;
font-weight:900;
line-height:1.4;
margin-bottom:18px;
}

.thumb{
width:100%;
border-radius:18px;
margin-bottom:14px;
display:block;
}

.desc{
font-size:22px;
line-height:1.8;
font-weight:700;
color:#1976d2;
margin:16px 0;
}

.videoBox{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:18px;
margin-top:12px;
margin-bottom:18px;
background:#000;
}

.videoBox iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.sns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:18px;
}

.sns button{
border:0;
border-radius:18px;
padding:18px;
font-size:22px;
font-weight:900;
color:white;
cursor:pointer;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#000}
.copy{background:#ef6c00}

.archive{
background:white;
padding:18px;
border-radius:24px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.archiveTitle{
font-size:28px;
font-weight:900;
margin-bottom:12px;
}

.archive a{
display:block;
padding:14px;
margin-bottom:10px;
background:#f3f6fa;
border-radius:14px;
text-decoration:none;
color:#17324d;
font-size:20px;
font-weight:900;
}

.backBtn{
display:block;
text-align:center;
text-decoration:none;
background:#455a64;
color:white;
padding:16px;
border-radius:18px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
お楽しみ動画
</div>

<div id="app">読み込み中...</div>

</div>

<script>

const SHEET_ID='1vWJ0x5fYVqN9z3rLJm2h0q9N8v0r5cQ7'; 
const SHEET_NAME='お楽しみ動画';

const url=
'https://docs.google.com/spreadsheets/d/'+
SHEET_ID+
'/gviz/tq?sheet='+
encodeURIComponent(SHEET_NAME)+
'&tqx=out:json';

function getCell(row,index){
if(!row.c||!row.c[index]) return '';
return row.c[index].f||row.c[index].v||'';
}

function youtubeId(url){

if(!url) return '';

let m=url.match(/v=([^&]+)/);
if(m) return m[1];

m=url.match(/youtu\.be\/([^?]+)/);
if(m) return m[1];

m=url.match(/embed\/([^?]+)/);
if(m) return m[1];

return '';
}

function shareUrl(id){
return 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-fun.html?id='+id;
}

function openShare(type,id){

const s=shareUrl(id);

if(type==='facebook'){
window.open(
'https://www.facebook.com/sharer/sharer.php?u='+
encodeURIComponent(s)
);
}

if(type==='line'){
window.open(
'https://social-plugins.line.me/lineit/share?url='+
encodeURIComponent(s)
);
}

if(type==='x'){
window.open(
'https://twitter.com/intent/tweet?url='+
encodeURIComponent(s)
);
}

}

function copyUrl(id){

navigator.clipboard.writeText(
shareUrl(id)
);

alert('URLをコピーしました');

}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json=JSON.parse(
t.substring(
t.indexOf('{'),
t.lastIndexOf('}')+1
)
);

let rows=json.table.rows||[];

let items=rows.map((r,i)=>({

id:i+1,
date:getCell(r,0),
videoId:getCell(r,1),
title:getCell(r,2),
thumb:getCell(r,3),
desc:getCell(r,4),
video:getCell(r,5),
bgm:getCell(r,6),
genre:getCell(r,7)

}));

items=items.filter(x=>x.title);

items.reverse();

const params=new URLSearchParams(location.search);
const id=params.get('id');

const app=document.getElementById('app');

if(id){

const item=items[Number(id)-1];

if(!item){
app.innerHTML='記事が見つかりません';
return;
}

const yid=youtubeId(item.video);

app.innerHTML=`

<a class="backBtn" href="fun.html">
一覧へ戻る
</a>

<div class="card">

<div class="date">${item.date}</div>

<div class="title">${item.title}</div>

${item.thumb?`<img class="thumb" src="${item.thumb}">`:''}

<div class="desc">${item.desc}</div>

${yid?`
<div class="videoBox">
<iframe
src="https://www.youtube.com/embed/${yid}"
allowfullscreen>
</iframe>
</div>
`:''}

<div class="sns">
<button class="fb" onclick="openShare('facebook','${id}')">Facebook</button>
<button class="line" onclick="openShare('line','${id}')">LINE</button>
<button class="x" onclick="openShare('x','${id}')">X</button>
<button class="copy" onclick="copyUrl('${id}')">URLコピー</button>
</div>

</div>
`;

return;
}

let html='';

items.slice(0,5).forEach((item,index)=>{

html+=`

<div class="card">

<div class="date">${item.date}</div>

<div class="title">
<a href="fun.html?id=${index+1}" style="text-decoration:none;color:#17324d">
${item.title}
</a>
</div>

${item.thumb?`<img class="thumb" src="${item.thumb}">`:''}

<div class="desc">${item.desc}</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${index+1}')">Facebook</button>
<button class="line" onclick="openShare('line','${index+1}')">LINE</button>
<button class="x" onclick="openShare('x','${index+1}')">X</button>
<button class="copy" onclick="copyUrl('${index+1}')">URLコピー</button>
</div>

</div>

`;

});

if(items.length>5){

html+=`<div class="archive">
<div class="archiveTitle">アーカイブ</div>`;

items.slice(5).forEach((item,index)=>{

html+=`
<a href="fun.html?id=${index+6}">
${item.date}　${item.title}
</a>
`;

});

html+=`</div>`;

}

app.innerHTML=html;

})
.catch(e=>{
document.getElementById('app').innerHTML='読み込み失敗';
});

</script>

</body>
</html>

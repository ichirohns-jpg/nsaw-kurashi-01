<style>

}

<body>

<header>お楽しみ動画</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="お楽しみ動画";

const GVIZ_URL=
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID +
"/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json";

function getCell(row,index){

if(!row || !row.c || !row.c[index]){
return "";
}

const c=row.c[index];

if(c.v!==undefined && c.v!==null){
return c.v;
}

if(c.f!==undefined && c.f!==null){
return c.f;
}

return "";

}

function parseGViz(text){

const match=text.match(/\{[\s\S]*\}/);

if(!match){
throw new Error("GViz取得失敗");
}

return JSON.parse(match[0]);

}

function getYoutubeId(value){

if(!value){
return "";
}

const text=String(value).trim();

let m=text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
if(m){
return m[1];
}

m=text.match(/[?&]v=([a-zA-Z0-9_-]+)/);
if(m){
return m[1];
}

m=text.match(/shorts\/([a-zA-Z0-9_-]+)/);
if(m){
return m[1];
}

m=text.match(/embed\/([a-zA-Z0-9_-]+)/);
if(m){
return m[1];
}

return "";

}

function makeShareUrl(id){

return "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-fun-v2.html?fun="
+ encodeURIComponent(id);

}

function shareFacebook(url){

window.open(
"https://www.facebook.com/sharer/sharer.php?u="
+ encodeURIComponent(url),
"_blank"
);

}

function shareLine(url){

window.open(
"https://social-plugins.line.me/lineit/share?url="
+ encodeURIComponent(url),
"_blank"
);

}

function shareX(url,text){

window.open(
"https://twitter.com/intent/tweet?url="
+ encodeURIComponent(url)
+ "&text="
+ encodeURIComponent(text),
"_blank"
);

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert("URLをコピーしました");

}

fetch(GVIZ_URL)

.then(function(response){

return response.text();

})

.then(function(text){

const json=
parseGViz(text);

const rows=
json.table.rows || [];

let items=[];

for(let i=0;i<rows.length;i++){

const row=rows[i];

const date=
String(getCell(row,0)||"");

const title=
String(getCell(row,2)||"");

const image=
String(getCell(row,3)||"");

const desc=
String(getCell(row,4)||"");

const videoUrl=
getCell(row,5)
||
getCell(row,6)
||
getCell(row,7)
||
"";

const genre=
String(getCell(row,7)||"");

const videoId=
getYoutubeId(videoUrl);

if(
!title &&
!videoUrl &&
!desc
){
continue;
}

items.push({

id:i+1,

date:date,

title:title,

image:image,

desc:desc,

genre:genre,

videoUrl:videoUrl,

videoId:videoId

});

}

items.reverse();

const latest=
items.length
? items[0]
: null;

const archives=
items.slice(1);

let html="";

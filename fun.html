<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#1f2d3d;
}

header{
background:#e53935;
color:#fff;
padding:24px;
text-align:center;
font-size:34px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
margin-bottom:24px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
}

iframe{
width:100%;
height:360px;
border:0;
display:block;
}

.date{
display:inline-block;
margin:16px;
padding:10px 18px;
background:#e3f2fd;
border-radius:999px;
font-size:22px;
font-weight:900;
}

.title{
padding:0 18px 12px;
font-size:34px;
font-weight:900;
line-height:1.4;
}

.desc{
padding:0 18px 18px;
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
}
</style>
</head>

<body>

<header>
お楽しみ動画
</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="お楽しみ動画";

const url=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="
+encodeURIComponent(SHEET_NAME)
+"&tqx=out:json";

function cell(row,index){
return row.c && row.c[index] && row.c[index].v
? row.c[index].v
: "";
}

function parseGViz(text){

let start=text.indexOf("{");
let end=text.lastIndexOf("}");

return JSON.parse(
text.substring(start,end+1)
);

}

fetch(url)
.then(r=>r.text())
.then(text=>{

const json=parseGViz(text);

const rows=json.table.rows || [];

let html="";

for(let i=rows.length-1;i>=0;i--){

let row=rows[i];

let date=cell(row,0);
let videoId=cell(row,1);
let title=cell(row,2);
let desc=cell(row,4);

if(!title) continue;

html+=`

<div class="card">

<iframe
src="https://www.youtube.com/embed/${videoId}"
allowfullscreen>
</iframe>

<div class="date">
${date}
</div>

<div class="title">
${title}
</div>

<div class="desc">
${desc}
</div>

</div>

`;

}

document.getElementById("app").innerHTML=
html || "記事がありません";

})
.catch(err=>{

document.getElementById("app").innerHTML=
"読み込み失敗";

console.error(err);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f4f7fb;
color:#1e2a3a;
}

header{
background:#1976d2;
color:#fff;
padding:22px;
text-align:center;
font-size:26px;
font-weight:900;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
margin-bottom:16px;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

iframe{
width:100%;
height:260px;
border:0;
}

.date{
padding:6px 10px;
margin:10px;
background:#e3f2fd;
border-radius:999px;
display:inline-block;
font-weight:900;
}

.title{
font-size:20px;
font-weight:900;
padding:10px;
}

.desc{
padding:10px;
font-size:15px;
line-height:1.6;
}
</style>

</head>

<body>

<header>お楽しみ動画</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_rfc6LXQgoc";

/* セル取得 */
function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || "") : "";
}

/* YouTube → embed変換（確実版） */
function toEmbed(url){
if(!url) return "";

let id = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{6,})/);

if(id){
return "https://www.youtube.com/embed/" + id[1];
}

return "";
}

/* GViz 安定パース（ここが重要修正） */
function parseGViz(t){
try{
let s = t.indexOf("{");
let e = t.lastIndexOf("}");
return JSON.parse(t.substring(s,e+1));
}catch(e){
console.log("parse error", e);
return {table:{rows:[]}};
}
}

/* 読み込み */
const url =
"https://docs.google.com/spreadsheets/d/" +
SHEET_ID +
"/gviz/tq?sheet=" +
encodeURIComponent("お楽しみ動画") +
"&tqx=out:json";

fetch(url)
.then(r=>r.text())
.then(t=>{

const json = parseGViz(t);

let rows = json.table.rows || [];

let items = rows.map((r,i)=>({

date:cell(r,0),
title:cell(r,2),
video:toEmbed(cell(r,3)),
desc:cell(r,4)

})).filter(x=>x.title && x.video).reverse();

let html = "";

items.forEach(i=>{
html += `
<div class="card">

<iframe src="${i.video}" allowfullscreen></iframe>

<div class="date">${i.date}</div>
<div class="title">${i.title}</div>
<div class="desc">${i.desc}</div>

</div>`;
});

document.getElementById("app").innerHTML = html;

});

</script>

</body>
</html>

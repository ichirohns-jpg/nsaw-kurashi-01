<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSAW</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f7fb;color:#1e2a3a}
header{background:#1976d2;color:#fff;padding:22px;text-align:center;font-size:26px;font-weight:900}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;margin-bottom:16px;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.08)}
img{width:100%;display:block}
.title{font-size:20px;font-weight:900;padding:10px}
.desc{padding:10px;font-size:15px;line-height:1.6}
</style>

</head>

<body>

<header>NSAW</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

/* ★軽量版（GVizやめて直接CSV/JSON方式に寄せる） */
const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_rfc6LXQgoc";

/* ここが重要：ShikiConcierge型（シンプル取得） */
const url =
"https://docs.google.com/spreadsheets/d/" +
SHEET_ID +
"/gviz/tq?tqx=out:json";

/* データ取得 */
fetch(url)
.then(res => res.text())
.then(text => {

let json = JSON.parse(text.substr(47).slice(0, -2));

let rows = json.table.rows;

/* 超シンプル表示（変換なし） */
let html = "";

for(let i=0;i<rows.length;i++){

let r = rows[i].c;

/* 安全取得（全部そのまま） */
let title = r?.[2]?.v || "";
let desc = r?.[3]?.v || "";
let img = r?.[1]?.v || "";

html += `
<div class="card">

<img src="${img}">

<div class="title">${title}</div>
<div class="desc">${desc}</div>

</div>`;
}

document.getElementById("app").innerHTML = html;

});

</script>

</body>
</html>

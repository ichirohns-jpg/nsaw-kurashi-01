<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>お楽しみ動画</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#111827;
padding:12px;
}

.container{
max-width:720px;
margin:auto;
}

header{
background:linear-gradient(
135deg,
#0f172a,
#1d4ed8,
#2563eb
);
color:#fff;
text-align:center;
padding:28px;
border-radius:28px;
font-size:38px;
font-weight:900;
margin-bottom:20px;
}

.home{
width:100%;
border:none;
border-radius:24px;
padding:24px;
margin-bottom:18px;
background:#111827;
color:#fff;
font-size:24px;
font-weight:900;
cursor:pointer;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.12);
margin-bottom:24px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
display:block;
}

.content{
padding:20px;
}

.date{
font-size:18px;
font-weight:900;
color:#64748b;
margin-bottom:10px;
}

.title{
font-size:30px;
font-weight:900;
line-height:1.5;
margin-bottom:14px;
}

.desc{
font-size:22px;
line-height:1.8;
white-space:pre-wrap;
}

.share{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.share button{
width:100%;
border:none;
border-radius:18px;
padding:18px;
font-size:20px;
font-weight:900;
background:#111827;
color:#fff;
cursor:pointer;
}

.loading{
background:#fff;
padding:30px;
border-radius:24px;
text-align:center;
font-size:24px;
font-weight:900;
}

</style>

</head>

<body>

<div class="container">

<header>
🎬 お楽しみ動画
</header>

<button
class="home"
onclick="location.href='index.html'">
🏠 トップへ戻る
</button>

<div id="videos">

<div class="loading">
読込中...
</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const SHEET_NAME =
'お楽しみ動画';

function getVal(cell){

if(!cell)return '';

if(cell.f)return cell.f;
if(cell.v)return cell.v;

return '';

}

function youtubeEmbed(url){

if(!url)return '';

url=String(url);

let id='';

if(url.includes('watch?v=')){
id=url.split('watch?v=')[1].split('&')[0];
}
else if(url.includes('youtu.be/')){
id=url.split('youtu.be/')[1].split('?')[0];
}
else if(url.includes('/shorts/')){
id=url.split('/shorts/')[1].split('?')[0];
}

return id
? 'https://www.youtube.com/embed/' + id
: '';

}

function shareLine(url){

window.open(
'https://social-plugins.line.me/lineit/share?url=' +
encodeURIComponent(url),
'_blank'
);

}

function shareFacebook(url){

window.open(
'https://www.facebook.com/sharer/sharer.php?u=' +
encodeURIComponent(url),
'_blank'
);

}

function shareX(url,title){

window.open(
'https://x.com/intent/tweet?url=' +
encodeURIComponent(url) +
'&text=' +
encodeURIComponent(title),
'_blank'
);

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

function loadSheet(){

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler:handleSheet';

script.onerror=function(){

document.getElementById('videos').innerHTML=
'<div class="loading">シート接続失敗</div>';

};

document.body.appendChild(script);

}

function escapeHtml(str){

if(!str)return '';

return String(str)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');

}

function handleSheet(json){

const box =
document.getElementById('videos');

if(
!json ||
!json.table ||
!json.table.rows
){

box.innerHTML =
'<div class="loading">データ取得失敗</div>';

return;

}

const rows =
json.table.rows.slice().reverse();

let html='';

rows.forEach(function(row,index){

if(!row || !row.c)return;

const date =
row.c[0] ? getVal(row.c[0]) : '';

const title =
row.c[1] ? getVal(row.c[1]) : '';

const desc =
row.c[2] ? getVal(row.c[2]) : '';

const youtube =
row.c[3] ? getVal(row.c[3]) : '';

if(!title && !youtube)return;

const embed =
youtubeEmbed(youtube);

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-fun-v2.html?video=' +
(index + 1);

html += '<div class="card">';

if(embed){

html +=
'<iframe src="' +
embed +
'" allowfullscreen></iframe>';

}

html +=
'<div class="content">' +

'<div class="date">' +
escapeHtml(date) +
'</div>' +

'<div class="title">' +
escapeHtml(title) +
'</div>' +

'<div class="desc">' +
escapeHtml(desc) +
'</div>' +

'<div class="share">' +

'<button onclick="shareLine(\'' +
shareUrl +
'\')">LINEで共有</button>' +

'<button onclick="shareFacebook(\'' +
shareUrl +
'\')">Facebookで共有</button>' +

'<button onclick="shareX(\'' +
shareUrl +
'\',\'' +
String(title).replace(/'/g,"\\'") +
'\')">Xで共有</button>' +

'<button onclick="copyUrl(\'' +
shareUrl +
'\')">URLコピー</button>' +

'</div>' +

'</div>' +

'</div>';

});

if(html===''){

html =
'<div class="loading">動画データがありません</div>';

}

box.innerHTML = html;

}

window.handleSheet = handleSheet;

window.onload = function(){

try{

loadSheet();

}catch(e){

document.getElementById('videos').innerHTML=
'<div class="loading">エラー：'+e+'</div>';

console.error(e);

}

};

</script>

</body>
</html>

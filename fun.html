<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef5fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:18px 14px 44px;
}

.header{
background:linear-gradient(135deg,#8e24aa,#ba68c8);
color:#fff;
border-radius:26px;
padding:30px 18px;
text-align:center;
margin-bottom:18px;
}

.header h1{
margin:0;
font-size:34px;
font-weight:900;
}

.header p{
margin:12px 0 0;
font-size:18px;
line-height:1.7;
font-weight:700;
}

.topNav{
display:grid;
grid-template-columns:1fr;
gap:12px;
margin-bottom:18px;
}

.bigBtn{
display:block;
width:100%;
padding:18px;
border-radius:18px;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
color:#fff;
border:0;
cursor:pointer;
}

.gray{background:#607d8b}
.blue{background:#1976d2}
.green{background:#06c755}
.black{background:#111}
.orange{background:#ef6c00}

.card{
background:#fff;
border-radius:24px;
padding:20px;
margin-bottom:22px;
box-shadow:0 6px 20px rgba(0,0,0,.10);
}

.date{
display:inline-block;
background:#e8f5e9;
color:#2e7d32;
padding:8px 14px;
border-radius:999px;
font-size:16px;
font-weight:900;
margin-bottom:12px;
}

.title{
font-size:28px;
font-weight:900;
line-height:1.45;
margin-bottom:14px;
}

.videoBox{
position:relative;
width:100%;
padding-top:56.25%;
border-radius:18px;
overflow:hidden;
background:#000;
margin:12px 0 16px;
}

.videoBox iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.desc{
font-size:18px;
line-height:1.8;
white-space:pre-wrap;
margin-top:12px;
}

.tags{
font-size:16px;
line-height:1.7;
color:#1976d2;
font-weight:900;
margin-top:14px;
white-space:pre-wrap;
}

.snsGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:18px;
}

.snsBtn{
border:0;
border-radius:14px;
padding:14px 8px;
font-size:17px;
font-weight:900;
color:#fff;
cursor:pointer;
}

.archiveBtn{
display:none;
width:100%;
padding:18px;
margin:10px 0 22px;
border:0;
border-radius:18px;
background:#546e7a;
color:#fff;
font-size:20px;
font-weight:900;
cursor:pointer;
}

.hidden{
display:none;
}

.loading{
background:#fff;
border-radius:22px;
padding:28px;
text-align:center;
font-size:20px;
font-weight:900;
}

@media(max-width:520px){
.title{
font-size:24px;
}
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>お楽しみ動画</h1>
<p>懐かしい時代劇や名作動画をお楽しみください。</p>
</div>

<div class="topNav">
<a class="bigBtn gray" href="portal.html">ポータルへ戻る</a>
<a class="bigBtn blue" href="index.html">トップへ戻る</a>
</div>

<div id="latestArea">
<div class="loading">読み込み中...</div>
</div>

<button id="archiveButton" class="archiveBtn" onclick="toggleArchive()">
📚 アーカイブを見る
</button>

<div id="archiveArea" class="hidden"></div>

</div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='お楽しみ動画';
const PAGE_URL='https://ichirohns-jpg.github.io/nsaw-kurashi-01/fun.html';

const url=
'https://docs.google.com/spreadsheets/d/'+
SHEET_ID+
'/gviz/tq?sheet='+
encodeURIComponent(SHEET_NAME)+
'&tqx=out:json';

function $(id){
return document.getElementById(id);
}

function cell(row,index){
if(!row||!row.c||!row.c[index]) return '';
const c=row.c[index];
return c.f||c.v||'';
}

function escapeHtml(text){
return String(text||'')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');
}

function formatDate(value){

const s=String(value||'');

const m=s.match(/^Date\((\d+),(\d+),(\d+)\)$/);

if(m){
const y=Number(m[1]);
const mo=Number(m[2])+1;
const d=Number(m[3]);

return y+'/'+
String(mo).padStart(2,'0')+'/'+
String(d).padStart(2,'0');
}

return s;
}

function dateTime(value){
const t=new Date(formatDate(value)).getTime();
return isNaN(t)?0:t;
}

function getYouTubeId(url){

if(!url) return '';

const text=String(url);

let m=text.match(
/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/
);

if(m) return m[1];

m=text.match(/([A-Za-z0-9_-]{11})/);

return m?m[1]:'';
}

function makeCard(item,index){

const shareUrl=
PAGE_URL+'?id='+encodeURIComponent(index+1);

const youtubeId=
getYouTubeId(item.youtubeURL);

let videoHtml='';

if(youtubeId){

videoHtml=
'<div class="videoBox">'+
'<iframe src="https://www.youtube.com/embed/'+
youtubeId+
'" allowfullscreen></iframe>'+
'</div>';

}

return `
<div class="card">

<div class="date">
${escapeHtml(formatDate(item.date))}
</div>

<div class="title">
${escapeHtml(item.title)}
</div>

${videoHtml}

<div class="desc">
${escapeHtml(item.desc)}
</div>

<div class="tags">
${escapeHtml(item.tags)}
</div>

<div class="snsGrid">

<button
class="snsBtn blue"
onclick="shareFacebook('${shareUrl}')">
Facebook
</button>

<button
class="snsBtn green"
onclick="shareLine('${shareUrl}')">
LINE
</button>

<button
class="snsBtn black"
onclick="shareX('${shareUrl}','${escapeHtml(item.title)}')">
X
</button>

<button
class="snsBtn orange"
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>
`;
}

function shareFacebook(url){
window.open(
'https://www.facebook.com/sharer/sharer.php?u='+
encodeURIComponent(url),
'_blank'
);
}

function shareLine(url){
window.open(
'https://social-plugins.line.me/lineit/share?url='+
encodeURIComponent(url),
'_blank'
);
}

function shareX(url,title){
window.open(
'https://twitter.com/intent/tweet?text='+
encodeURIComponent(title)+
'&url='+
encodeURIComponent(url),
'_blank'
);
}

function copyUrl(url){

navigator.clipboard.writeText(url)
.then(function(){
alert('URLをコピーしました');
})
.catch(function(){
alert(url);
});

}

function toggleArchive(){

const area=$('archiveArea');
const btn=$('archiveButton');

if(area.classList.contains('hidden')){
area.classList.remove('hidden');
btn.textContent='📕 アーカイブを閉じる';
}else{
area.classList.add('hidden');
btn.textContent='📚 アーカイブを見る';
}

}

fetch(url)
.then(res=>res.text())
.then(text=>{

const start=text.indexOf('{');
const end=text.lastIndexOf('}')+1;

const json=
JSON.parse(text.substring(start,end));

const rows=json.table.rows||[];

let items=[];

rows.forEach(row=>{

const date=cell(row,0);
const youtubeURL=cell(row,1);
const title=cell(row,2);
const desc=cell(row,3);
const tags=cell(row,4);

if(!date&&!youtubeURL&&!title) return;

items.push({
date:date,
youtubeURL:youtubeURL,
title:title,
desc:desc,
tags:tags
});

});

items.sort(
(a,b)=>
dateTime(b.date)-dateTime(a.date)
);

const idParam=
new URLSearchParams(location.search).get('id');

let latestHtml='';
let archiveHtml='';

if(idParam){

const idx=
parseInt(idParam,10)-1;

if(idx>=0&&idx<items.length){

latestHtml=
makeCard(items[idx],idx);

}else{

latestHtml=
'<div class="loading">指定された動画が見つかりません</div>';

}

$('archiveButton').style.display='none';

}else{

items.forEach((item,index)=>{

if(index<5){
latestHtml+=makeCard(item,index);
}else{
archiveHtml+=makeCard(item,index);
}

});

if(archiveHtml){
$('archiveButton').style.display='block';
}

}

$('latestArea').innerHTML=
latestHtml||
'<div class="loading">動画がありません</div>';

$('archiveArea').innerHTML=
archiveHtml;

})
.catch(function(){

$('latestArea').innerHTML=
'<div class="loading">読み込みに失敗しました</div>';

});

</script>

</body>
</html>

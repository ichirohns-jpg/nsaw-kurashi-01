<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#e53935;
color:#fff;
padding:28px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
margin-bottom:28px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.player{
width:100%;
background:#000;
aspect-ratio:16 / 9;
}

.player iframe{
width:100%;
height:100%;
border:0;
display:block;
}

.date{
display:inline-block;
margin:18px;
padding:10px 18px;
background:#e3f2fd;
border-radius:999px;
font-size:24px;
font-weight:900;
}

.title{
padding:0 18px 10px;
font-size:36px;
font-weight:900;
}

.desc{
padding:0 18px 18px;
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
}

.watchBtn{
display:block;
margin:18px;
padding:18px;
background:#e53935;
color:#fff;
text-align:center;
border-radius:14px;
text-decoration:none;
font-size:26px;
font-weight:900;
}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:18px;
}

.share button{
border:0;
border-radius:14px;
padding:18px;
font-size:22px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2;}
.line{background:#06c755;}
.x{background:#000;}
.copy{background:#ff9800;}

.notice{
background:#fff3cd;
padding:20px;
margin:18px;
border-radius:14px;
font-size:24px;
font-weight:900;
}

</style>
</head>

<body>

<header>
お楽しみ動画
</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt-rfc6LXQgoc";
const SHEET_NAME="お楽しみ動画";

const url=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="
+encodeURIComponent(SHEET_NAME)
+"&tqx=out:json";

function cell(row,i){
return row?.c?.[i]?.v || row?.c?.[i]?.f || "";
}

function parseGViz(text){

const match=text.match(/\{[\s\S]*\}/);
if(!match) return {table:{rows:[]}};
return JSON.parse(match[0]);

}

function formatDate(v){
if(!v) return "";
let t=String(v);
let m=t.match(/Date\((\d+),(\d+),(\d+)\)/);
if(m){
return `${m[1]}年${Number(m[2])+1}月${m[3]}日`;
}
return t;
}

function getYoutubeId(url){
if(!url) return "";
url=String(url);

let m=url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
if(m) return m[1];

m=url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
if(m) return m[1];

m=url.match(/shorts\/([a-zA-Z0-9_-]+)/);
if(m) return m[1];

return "";
}

function shareFacebook(url){
window.open(
"https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url),
"_blank"
);
}

function shareLine(url){
window.open(
"https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url),
"_blank"
);
}

function shareX(url,text){
window.open(
"https://twitter.com/intent/tweet?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text),
"_blank"
);
}

function copyUrl(url){
navigator.clipboard.writeText(url);
alert("URLをコピーしました");
}

fetch(url)
.then(r=>r.text())
.then(text=>{

const json=parseGViz(text);
const rows=json?.table?.rows || [];

let html="";

for(let i=rows.length-1;i>=0;i--){

const row=rows[i];

const date=formatDate(cell(row,0));
const title=cell(row,2);
const desc=cell(row,4);
const videoUrl=cell(row,5);

const videoId=getYoutubeId(videoUrl);

if(!title && !videoUrl) continue;

html+=`
<div class="card">

<div class="player">
${
videoId
? `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`
: `<div class="notice">動画が読み込めません</div>`
}
</div>

<div class="date">${date}</div>
<div class="title">${title}</div>
<div class="desc">${desc}</div>

<a class="watchBtn" href="${videoUrl}" target="_blank">
YouTubeを見る
</a>

<div class="share">

<button class="fb" onclick="shareFacebook(location.href)">Facebook</button>
<button class="line" onclick="shareLine(location.href)">LINE</button>
<button class="x" onclick="shareX(location.href,'${title}')">X</button>
<button class="copy" onclick="copyUrl(location.href)">URLコピー</button>

</div>

</div>
`;
}

document.getElementById("app").innerHTML =
html || "<div class='notice'>記事がありません</div>";

})
.catch(err=>{
document.getElementById("app").innerHTML =
"<div class='notice'>読み込み失敗</div>";
console.error(err);
});

</script>

</body>
</html>

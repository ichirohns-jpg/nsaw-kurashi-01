<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW AI相談DX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e3ece6;
  color:#1f2e2a;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #2e7d32,
    #1b5e20
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* 本体 */

.wrap{
  padding:16px 14px 50px;
}

/* 地域 */

.select-box{

  background:#fff;

  border-radius:24px;

  padding:24px;

  margin-bottom:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);
}

.select-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1b5e20;
}

.select{

  width:100%;

  padding:22px;

  border-radius:18px;

  border:
  2px solid #dbe6de;

  font-size:26px;

  font-weight:900;

  margin-bottom:18px;

  background:#fff;
}

/* マイク */

.mic-btn{

  width:100%;

  border:none;

  background:#2e7d32;

  color:#fff;

  border-radius:28px;

  padding:28px 20px;

  font-size:38px;

  font-weight:900;

  box-shadow:
  0 10px 26px rgba(0,0,0,.15);

  margin-bottom:24px;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:24px;

  padding:22px;

  font-size:30px;

  font-weight:900;

  line-height:1.8;

  color:#1b5e20;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;

  min-height:120px;
}

/* 押すだけ相談 */

.quick-box{

  background:#fff;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.quick-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1b5e20;
}

.quick-btn{

  width:100%;

  border:none;

  background:#f3f7f4;

  border-radius:18px;

  padding:22px;

  margin-bottom:16px;

  text-align:left;

  font-size:28px;

  font-weight:900;

  color:#33443f;

  border:
  2px solid #dbe6de;
}

/* 会話 */

.chat-wrap{
  margin-top:20px;
}

.user-box{

  background:#dff3e4;

  border-radius:24px;

  padding:22px;

  margin-bottom:18px;

  box-shadow:
  0 6px 18px rgba(0,0,0,.08);
}

.ai-box{

  background:#fff;

  border-radius:24px;

  padding:22px;

  margin-bottom:18px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);
}

.chat-title{

  font-size:24px;

  font-weight:900;

  margin-bottom:12px;
}

.user-title{
  color:#1b5e20;
}

.ai-title{
  color:#1976d2;
}

.chat-text{

  font-size:28px;

  line-height:1.9;

  color:#33443f;

  white-space:pre-wrap;
}

/* 包括 */

.houkatsu{

  background:#fff3e0;

  border-radius:24px;

  padding:22px;

  margin-bottom:28px;

  border:
  3px solid #ffb74d;
}

.houkatsu-title{

  font-size:28px;

  font-weight:900;

  margin-bottom:14px;

  color:#e65100;
}

.houkatsu-text{

  font-size:26px;

  line-height:1.8;

  color:#5d4037;
}

.tel-btn{

  display:block;

  text-decoration:none;

  background:#d32f2f;

  color:#fff;

  text-align:center;

  padding:22px;

  border-radius:20px;

  margin-top:18px;

  font-size:30px;

  font-weight:900;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.select-title{
  font-size:28px;
}

.select{
  font-size:22px;
}

.mic-btn{
  font-size:32px;
}

.status{
  font-size:26px;
}

.quick-title{
  font-size:28px;
}

.quick-btn{
  font-size:24px;
}

.chat-text{
  font-size:24px;
}

.houkatsu-title{
  font-size:24px;
}

.houkatsu-text{
  font-size:22px;
}

.tel-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      AI相談DX
    </div>

    <div class="sub">
      地域包括支援センターと連携し、
      高齢者にも使いやすい
      AI相談DXを目指しています。
    </div>

  </div>

</div>

<div class="wrap">

  <div class="select-box">

    <div class="select-title">
      お住まいの地域
    </div>

    <select class="select"
    id="citySelect"
    onchange="changeArea()">

      <option value="志木市">
      志木市
      </option>

      <option value="新座市">
      新座市
      </option>

      <option value="朝霞市">
      朝霞市
      </option>

      <option value="和光市">
      和光市
      </option>

    </select>

    <select class="select"
    id="areaSelect">

    </select>

  </div>

  <button class="mic-btn"
  onclick="startVoice()">

    🎤 音声で相談する

  </button>

  <div class="status"
  id="status">

    ボタンを押して
    話してください

  </div>

  <div class="quick-box">

    <div class="quick-title">
      押すだけ相談
    </div>

    <button class="quick-btn"
    onclick="quickAsk('介護')">

      ▶ 介護の相談

    </button>

    <button class="quick-btn"
    onclick="quickAsk('病院')">

      ▶ 病院を探したい

    </button>

    <button class="quick-btn"
    onclick="quickAsk('空き家')">

      ▶ 空き家の相談

    </button>

  </div>

  <div class="chat-wrap"
  id="chatWrap">

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

const DATA = {

'志木市':{

'本町':{
name:'高齢者あんしん相談センター ブロン',
tel:'048-486-0003'
},

'柏町':{
name:'高齢者あんしん相談センター 柏の杜',
tel:'048-486-5199'
},

'館・幸町':{
name:'高齢者あんしん相談センター 館・幸町',
tel:'048-485-5610'
},

'宗岡':{
name:'高齢者あんしん相談センター せせらぎ',
tel:'048-485-2113'
}

},

'新座市':{

'東北':{
name:'新座市東部第一地域包括支援センター',
tel:'048-480-5853'
},

'栗原':{
name:'新座市東部第二地域包括支援センター',
tel:'048-480-7808'
}

},

'朝霞市':{

'北朝霞':{
name:'地域包括支援センター モーニングパーク',
tel:'048-450-0855'
},

'本町':{
name:'あさか中央地域包括支援センター',
tel:'048-423-2761'
}

},

'和光市':{

'丸山台':{
name:'和光市中央地域包括支援センター',
tel:'048-450-0472'
},

'白子':{
name:'和光市南地域包括支援センター',
tel:'048-452-7600'
}

}

};

function changeArea(){

const city =
document.getElementById(
'citySelect'
).value;

const areaSelect =
document.getElementById(
'areaSelect'
);

areaSelect.innerHTML = '';

Object.keys(DATA[city])
.forEach(function(area){

const option =
document.createElement('option');

option.value = area;

option.textContent = area;

areaSelect.appendChild(option);

});

}

changeArea();

function quickAsk(word){

document.getElementById(
'status'
).innerHTML =

'相談内容を確認しています…';

addChat(
word,
getAnswer(word)
);

}

function startVoice(){

if(
!('webkitSpeechRecognition' in window)
){

alert(
'このブラウザは音声入力に対応していません'
);

return;

}

const recognition =
new webkitSpeechRecognition();

recognition.lang = 'ja-JP';

recognition.interimResults = true;

recognition.continuous = false;

const status =
document.getElementById('status');

status.innerHTML =
'🎤 聞いています…';

let liveText = '';

recognition.onresult =
function(event){

let text = '';

for(
let i = 0;
i < event.results.length;
i++
){

text +=
event.results[i][0].transcript;

}

liveText = text;

status.innerHTML =
'🎤 ' + text;

};

recognition.onend =
function(){

status.innerHTML =
'相談内容を確認しています…';

addChat(
liveText,
getAnswer(liveText)
);

};

recognition.start();

}

function addChat(userText,aiText){

const wrap =
document.getElementById('chatWrap');

const userBox =
document.createElement('div');

userBox.className =
'user-box';

userBox.innerHTML =

'<div class="chat-title user-title">相談内容</div>' +

'<div class="chat-text">' +
userText +
'</div>';

wrap.prepend(userBox);

const aiBox =
document.createElement('div');

aiBox.className =
'ai-box';

const aiId =
'ai-' + Date.now();

aiBox.innerHTML =

'<div class="chat-title ai-title">AI回答</div>' +

'<div class="chat-text" id="' +
aiId +
'"></div>';

wrap.prepend(aiBox);

typeWriter(
aiText,
aiId
);

const city =
document.getElementById(
'citySelect'
).value;

const area =
document.getElementById(
'areaSelect'
).value;

const info =
DATA[city][area];

const houkatsu =
document.createElement('div');

houkatsu.className =
'houkatsu';

houkatsu.innerHTML =

'<div class="houkatsu-title">地域包括支援センター</div>' +

'<div class="houkatsu-text">' +

info.name +

'<br><br>' +

info.tel +

'</div>' +

'<a class="tel-btn" href="tel:' +

info.tel +

'">📞 いますぐ電話する</a>';

wrap.prepend(houkatsu);

}

function getAnswer(text){

if(
text.includes('介護')
){

return '介護についてですね。\n\n地域包括支援センターへ相談できます。';

}

if(
text.includes('病院')
){

return '病院を探したいのですね。\n\n地域マップDXもご利用ください。';

}

if(
text.includes('空き家')
){

return '空き家についてですね。\n\n住まい・相続・管理の相談ができます。';

}

return '相談内容を確認しました。\n\n地域相談窓口をご案内します。';

}

function typeWriter(text,elementId){

const el =
document.getElementById(elementId);

el.innerHTML = '';

let i = 0;

const timer =
setInterval(function(){

el.innerHTML +=
text.charAt(i);

i++;

if(i >= text.length){

clearInterval(timer);

}

},40);

}

</script>

</body>
</html>

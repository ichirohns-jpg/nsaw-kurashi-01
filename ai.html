<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW AI相談DX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e3ece6;
  color:#1f2e2a;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #2e7d32,
    #1b5e20
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* メイン */

.wrap{
  padding:16px 14px 50px;
}

/* マイク */

.mic-btn{

  width:100%;

  border:none;

  background:#2e7d32;

  color:#fff;

  border-radius:28px;

  padding:28px 20px;

  font-size:38px;

  font-weight:900;

  box-shadow:
  0 10px 26px rgba(0,0,0,.15);

  margin-bottom:24px;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:24px;

  padding:22px;

  font-size:30px;

  font-weight:900;

  line-height:1.8;

  color:#1b5e20;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;

  min-height:120px;
}

/* 文字表示 */

.result{

  background:#fff;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.result-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:16px;

  color:#1b5e20;
}

.result-text{

  font-size:28px;

  line-height:1.9;

  color:#33443f;

  white-space:pre-wrap;
}

/* 例 */

.sample{

  background:#fff;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);
}

.sample-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:18px;

  color:#1b5e20;
}

.sample-btn{

  width:100%;

  border:none;

  background:#f3f7f4;

  border-radius:18px;

  padding:20px;

  margin-bottom:14px;

  text-align:left;

  font-size:24px;

  font-weight:800;

  color:#33443f;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.mic-btn{
  font-size:32px;
}

.status{
  font-size:26px;
}

.result-title{
  font-size:28px;
}

.result-text{
  font-size:24px;
}

.sample-title{
  font-size:28px;
}

.sample-btn{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      AI相談DX
    </div>

    <div class="sub">
      暮らし・介護・ごみ・
      手続き・空き家などを、
      AIで分かりやすく案内します。
    </div>

  </div>

</div>

<div class="wrap">

  <button class="mic-btn"
  onclick="startVoice()">

    🎤 音声で相談する

  </button>

  <div class="status"
  id="status">

    ボタンを押して
    話してください

  </div>

  <div class="result">

    <div class="result-title">
      音声認識結果
    </div>

    <div class="result-text"
    id="result">

      ここに音声が文字で表示されます

    </div>

  </div>

  <div class="sample">

    <div class="sample-title">
      よくある相談
    </div>

    <button class="sample-btn">
      ごみの出し方を知りたい
    </button>

    <button class="sample-btn">
      介護保険について知りたい
    </button>

    <button class="sample-btn">
      空き家の相談をしたい
    </button>

    <button class="sample-btn">
      病院を探したい
    </button>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

function startVoice(){

  if(
    !('webkitSpeechRecognition' in window)
  ){

    alert(
      'このブラウザは音声入力に対応していません'
    );

    return;

  }

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang = 'ja-JP';

  recognition.interimResults = true;

  recognition.continuous = false;

  const status =
  document.getElementById('status');

  const result =
  document.getElementById('result');

  status.innerHTML =
  '🎤 聞いています…';

  result.innerHTML = '';

  recognition.onresult =
  function(event){

    let text = '';

    for(
      let i = 0;
      i < event.results.length;
      i++
    ){

      text +=
      event.results[i][0].transcript;

    }

    result.innerHTML = text;

  };

  recognition.onend =
  function(){

    status.innerHTML =
    '相談内容を確認しています…';

  };

  recognition.start();

}

</script>

</body>
</html>

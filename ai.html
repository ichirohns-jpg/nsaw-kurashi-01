<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW AI相談DX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e3ece6;
  color:#1f2e2a;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #2e7d32,
    #1b5e20
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* 本体 */

.wrap{
  padding:16px 14px 50px;
}

/* マイク */

.mic-btn{

  width:100%;

  border:none;

  background:#2e7d32;

  color:#fff;

  border-radius:28px;

  padding:28px 20px;

  font-size:38px;

  font-weight:900;

  box-shadow:
  0 10px 26px rgba(0,0,0,.15);

  margin-bottom:24px;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:24px;

  padding:22px;

  font-size:30px;

  font-weight:900;

  line-height:1.8;

  color:#1b5e20;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;

  min-height:120px;
}

/* 結果 */

.result{

  background:#fff;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.result-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:16px;

  color:#1b5e20;
}

.result-text{

  font-size:28px;

  line-height:1.9;

  color:#33443f;

  white-space:pre-wrap;
}

/* AI返答 */

.ai-box{

  background:#fff;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  margin-bottom:24px;
}

.ai-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:16px;

  color:#1b5e20;
}

.ai-text{

  font-size:28px;

  line-height:1.9;

  color:#33443f;

  white-space:pre-wrap;

  min-height:180px;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.mic-btn{
  font-size:32px;
}

.status{
  font-size:26px;
}

.result-title{
  font-size:28px;
}

.result-text{
  font-size:24px;
}

.ai-title{
  font-size:28px;
}

.ai-text{
  font-size:24px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      AI相談DX
    </div>

    <div class="sub">
      暮らし・介護・ごみ・
      手続き・空き家などを、
      AIで分かりやすく案内します。
    </div>

  </div>

</div>

<div class="wrap">

  <button class="mic-btn"
  onclick="startVoice()">

    🎤 音声で相談する

  </button>

  <div class="status"
  id="status">

    ボタンを押して
    話してください

  </div>

  <div class="result">

    <div class="result-title">
      音声認識結果
    </div>

    <div class="result-text"
    id="result">

      ここに音声が文字で表示されます

    </div>

  </div>

  <div class="ai-box">

    <div class="ai-title">
      AI回答
    </div>

    <div class="ai-text"
    id="aiResult">

      AIが相談内容を確認します

    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

function startVoice(){

  if(
    !('webkitSpeechRecognition' in window)
  ){

    alert(
      'このブラウザは音声入力に対応していません'
    );

    return;

  }

  const recognition =
  new webkitSpeechRecognition();

  recognition.lang = 'ja-JP';

  recognition.interimResults = true;

  recognition.continuous = false;

  const status =
  document.getElementById('status');

  const result =
  document.getElementById('result');

  const aiResult =
  document.getElementById('aiResult');

  status.innerHTML =
  '🎤 聞いています…';

  result.innerHTML = '';

  aiResult.innerHTML =
  '相談内容を確認しています…';

  recognition.onresult =
  function(event){

    let text = '';

    for(
      let i = 0;
      i < event.results.length;
      i++
    ){

      text +=
      event.results[i][0].transcript;

    }

    result.innerHTML = text;

  };

  recognition.onend =
  function(){

    status.innerHTML =
    '相談内容を確認しています…';

    const text =
    result.innerHTML;

    setTimeout(function(){

      typeWriter(
        getAnswer(text),
        'aiResult'
      );

    },1200);

  };

  recognition.start();

}

function getAnswer(text){

  if(
    text.includes('ごみ')
  ){

    return 'ごみの出し方についてですね。\n\n地域のごみ収集日をご確認ください。';

  }

  if(
    text.includes('介護')
  ){

    return '介護についてですね。\n\n地域包括支援センターへ相談できます。';

  }

  if(
    text.includes('病院')
  ){

    return '病院を探したいのですね。\n\n地域マップDXもご利用ください。';

  }

  if(
    text.includes('空き家')
  ){

    return '空き家についてですね。\n\n住まい・相続・管理の相談ができます。';

  }

  return '相談内容を確認しました。\n\n地域相談窓口をご案内します。';

}

function typeWriter(text,elementId){

  const el =
  document.getElementById(elementId);

  el.innerHTML = '';

  let i = 0;

  const timer =
  setInterval(function(){

    el.innerHTML +=
    text.charAt(i);

    i++;

    if(i >= text.length){

      clearInterval(timer);

    }

  },40);

}

</script>

</body>
</html>

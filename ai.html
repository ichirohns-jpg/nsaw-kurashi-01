<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW AI相談DX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e3ece6;
  color:#1f2e2a;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #2e7d32,
    #1b5e20
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* メニュー */

.wrap{
  padding:16px 14px 50px;
}

.card{

  display:block;

  text-decoration:none;

  background:#fff;

  border-radius:26px;

  padding:24px;

  margin-bottom:22px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);

  border:
  2px solid #d6e0da;
}

.card-title{

  font-size:34px;

  font-weight:900;

  margin-bottom:12px;

  color:#1b5e20;
}

.card-desc{

  font-size:24px;

  line-height:1.8;

  color:#33443f;
}

/* 色 */

.green{
  border-left:
  12px solid #2e7d32;
}

.orange{
  border-left:
  12px solid #ef6c00;
}

.red{
  border-left:
  12px solid #c62828;
}

.blue{
  border-left:
  12px solid #1976d2;
}

.purple{
  border-left:
  12px solid #7b1fa2;
}

/* ボタン */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.card-title{
  font-size:30px;
}

.card-desc{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      AI相談DX
    </div>

    <div class="sub">
      暮らし・介護・ごみ・
      手続き・空き家・見守りなどを、
      AIで分かりやすく案内する
      地域相談DXです。
    </div>

  </div>

</div>

<div class="wrap">

  <div class="card green">

    <div class="card-title">
      ▶ 介護・高齢者相談
    </div>

    <div class="card-desc">
      介護保険・地域包括支援センター・
      見守り・高齢者支援など。
    </div>

  </div>

  <div class="card orange">

    <div class="card-title">
      ▶ ごみ・暮らし相談
    </div>

    <div class="card-desc">
      ごみ出し・粗大ごみ・
      生活の困りごと案内。
    </div>

  </div>

  <div class="card red">

    <div class="card-title">
      ▶ 空き家・住まい相談
    </div>

    <div class="card-desc">
      空き家・相続・住まい管理・
      地域見守り相談。
    </div>

  </div>

  <div class="card blue">

    <div class="card-title">
      ▶ 手続き・行政相談
    </div>

    <div class="card-desc">
      住民票・保険・年金・
      市役所手続き案内。
    </div>

  </div>

  <div class="card purple">

    <div class="card-title">
      ▶ 緊急・生活相談
    </div>

    <div class="card-desc">
      生活困窮・病院・
      緊急時相談窓口。
    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

</body>
</html>

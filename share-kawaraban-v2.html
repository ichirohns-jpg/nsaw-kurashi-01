<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>4市瓦版</title>

<meta property="og:type" content="website">
<meta property="og:title" content="4市瓦版">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の暮らし情報をお届けします。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-kawaraban-v2.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="4市瓦版">
<meta name="twitter:description" content="志木市・新座市・朝霞市・和光市の暮らし情報をお届けします。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.hero{
width:100%;
display:block;
}

.content{
padding:24px;
}

.title{
font-size:38px;
font-weight:900;
line-height:1.4;
margin-bottom:20px;
}

.desc{
font-size:28px;
line-height:1.8;
margin-bottom:24px;
white-space:pre-wrap;
}

.openBtn{
display:block;
width:100%;
padding:22px;
border:0;
border-radius:18px;
background:#1976d2;
color:#fff;
font-size:28px;
font-weight:900;
text-align:center;
text-decoration:none;
margin-bottom:18px;
}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.share button{
border:0;
border-radius:14px;
padding:18px;
font-size:22px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2;}
.line{background:#06c755;}
.x{background:#000;}
.copy{background:#ff9800;}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<img
src="top.jpg"
class="hero"
alt="4市瓦版">

<div class="content">

<div class="title">
4市瓦版
</div>

<div class="desc">
志木市・新座市・朝霞市・和光市の暮らしに役立つ情報を毎日お届けします。
</div>

<a
id="openBtn"
class="openBtn"
href="#">
瓦版を見る
</a>

<div class="share">

<button
class="fb"
onclick="shareFacebook()">
Facebook
</button>

<button
class="line"
onclick="shareLine()">
LINE
</button>

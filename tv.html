<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 地域テレビ
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#223;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #1565c0,
    #0d47a1
  );

  border-radius:28px;

  padding:30px 24px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  font-weight:900;

  line-height:1.4;
}

.sub{

  margin-top:16px;

  font-size:22px;

  line-height:1.9;
}

.wrap{
  padding:16px 14px 60px;
}

/* 再生 */

.player-box{

  background:#fff;

  border-radius:28px;

  padding:22px;

  margin-bottom:28px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.player-title{

  font-size:34px;

  font-weight:900;

  color:#1565c0;

  margin-bottom:20px;
}

.video-wrap{

  position:relative;

  width:100%;

  padding-top:56.25%;

  border-radius:24px;

  overflow:hidden;

  background:#000;
}

.video-wrap iframe{

  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100%;

  border:none;
}

/* 大ボタン */

.big-btn{

  width:100%;

  border:none;

  border-radius:30px;

  padding:36px 20px;

  font-size:36px;

  font-weight:900;

  color:#fff;

  margin-bottom:24px;

  box-shadow:
  0 10px 26px rgba(0,0,0,.18);
}

.play{
  background:#43a047;
}

.drama{
  background:#5e35b1;
}

.music{
  background:#00897b;
}

.jidaigeki{
  background:#6d4c41;
}

.local{
  background:#ef6c00;
}

/* 説明 */

.info{

  background:#fff;

  border-radius:26px;

  padding:26px;

  font-size:28px;

  line-height:2;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:24px;

  border-radius:24px;

  font-size:30px;

  font-weight:900;

  margin-top:34px;
}

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.player-title{
  font-size:30px;
}

.big-btn{
  font-size:30px;
}

.info{
  font-size:24px;
}

.home-btn{
  font-size:26px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      地域テレビ
    </div>

    <div class="sub">
      病院の待ち時間や、
      ちょっと休みたい時に、
      テレビ感覚で楽しめます。
    </div>

  </div>

</div>

<div class="wrap">

  <button class="big-btn play"
  onclick="playNow()">

    ▶ すぐ見る

  </button>

  <button class="big-btn drama"
  onclick="changeVideo(
  'https://www.youtube.com/embed/dQw4w9WgXcQ'
  )">

    🎬 ドラマ

  </button>

  <button class="big-btn music"
  onclick="changeVideo(
  'https://www.youtube.com/embed/jfKfPfyJRdk'
  )">

    🎵 音楽

  </button>

  <button class="big-btn jidaigeki"
  onclick="changeVideo(
  'https://www.youtube.com/embed/aqz-KE-bpKQ'
  )">

    🏯 時代劇

  </button>

  <button class="big-btn local"
  onclick="changeVideo(
  'https://www.youtube.com/embed/ScMzIvxBSi4'
  )">

    📺 地域情報

  </button>

  <div class="player-box">

    <div class="player-title">
      地域テレビ
    </div>

    <div class="video-wrap">

      <iframe
      id="mainVideo"
      src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1"
      allow="autoplay"
      allowfullscreen>
      </iframe>

    </div>

  </div>

  <div class="info">

    📺 操作を難しくせず、
    押すだけでテレビ感覚で見られるようにしています。

    <br><br>

    病院の待ち時間や、
    少し休みたい時に、
    ゆっくりお楽しみください。

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

function changeVideo(url){

  document.getElementById(
    'mainVideo'
  ).src =
  url + '?autoplay=1';

}

function playNow(){

  changeVideo(
    'https://www.youtube.com/embed/jfKfPfyJRdk'
  );

}

</script>

</body>
</html>

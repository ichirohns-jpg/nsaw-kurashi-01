<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 地域テレビ
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#10151b;
  color:#fff;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #8b0000,
    #1b1b1b
  );

  border-radius:28px;

  padding:28px 22px;

  box-shadow:
  0 12px 30px rgba(0,0,0,.4);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.8;

  opacity:.92;
}

/* 動画 */

.wrap{
  padding:16px 14px 50px;
}

.video-card{

  background:#1a222b;

  border-radius:26px;

  overflow:hidden;

  margin-bottom:24px;

  box-shadow:
  0 10px 26px rgba(0,0,0,.35);

  border:
  2px solid #303b47;
}

.video-head{

  background:
  linear-gradient(
    90deg,
    #d32f2f,
    #ff7043
  );

  padding:14px 18px;

  font-size:24px;

  font-weight:900;
}

.video-box iframe{

  width:100%;

  height:240px;

  border:none;
}

.video-body{
  padding:20px;
}

.video-title{

  font-size:32px;

  line-height:1.6;

  font-weight:900;

  margin-bottom:14px;
}

.video-desc{

  font-size:24px;

  line-height:1.9;

  color:#d7e1ea;
}

/* ボタン */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:20px;

  border-radius:22px;

  font-size:28px;

  font-weight:900;

  margin-top:28px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.3);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.video-title{
  font-size:28px;
}

.video-desc{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      地域テレビ
    </div>

    <div class="sub">
      地域動画・暮らし情報・
      病院待ち時間向け動画などを
      高齢者にも見やすくまとめた
      地域テレビDX
    </div>

  </div>

</div>

<div class="wrap">

  <!-- 動画1 -->

  <div class="video-card">

    <div class="video-head">
      ▶ 地域テレビ
    </div>

    <div class="video-box">

      <iframe
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      allowfullscreen>
      </iframe>

    </div>

    <div class="video-body">

      <div class="video-title">
        地域暮らし情報
      </div>

      <div class="video-desc">
        地域の暮らしや
        情報を見やすくお届けします。
      </div>

    </div>

  </div>

  <!-- 動画2 -->

  <div class="video-card">

    <div class="video-head">
      ▶ 病院待ち時間動画
    </div>

    <div class="video-box">

      <iframe
      src="https://www.youtube.com/embed/ysz5S6PUM-U"
      allowfullscreen>
      </iframe>

    </div>

    <div class="video-body">

      <div class="video-title">
        待ち時間向け動画
      </div>

      <div class="video-desc">
        病院待ち時間などで
        見やすい動画をまとめます。
      </div>

    </div>

  </div>

  <!-- 動画3 -->

  <div class="video-card">

    <div class="video-head">
      ▶ 地域音楽テレビ
    </div>

    <div class="video-box">

      <iframe
      src="https://www.youtube.com/embed/tgbNymZ7vqY"
      allowfullscreen>
      </iframe>

    </div>

    <div class="video-body">

      <div class="video-title">
        音楽・地域テレビ
      </div>

      <div class="video-desc">
        音楽や地域動画を
        テレビ感覚で楽しめます。
      </div>

    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

</body>
</html>

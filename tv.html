<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
地域テレビ
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

border-left:
14px solid #1976d2;
}

.date{

font-size:20px;

font-weight:900;

color:#607080;

margin-bottom:10px;
}

.video-title{

font-size:34px;

font-weight:900;

margin-bottom:18px;
}

.desc{

font-size:24px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.hash{

font-size:20px;

line-height:1.8;

color:#1976d2;

margin-bottom:20px;
}

.player{

margin-top:20px;
}

.player iframe{

width:100%;

height:260px;

border:none;

border-radius:20px;

background:#000;
}

.share{

display:grid;

grid-template-columns:
1fr 1fr;

gap:12px;

margin-top:20px;
}

.share-btn{

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

height:60px;

border-radius:18px;

font-size:22px;

font-weight:900;

color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#111;
}

.copy{
background:#ef6c00;
}

.archive-title{

font-size:34px;

font-weight:900;

margin:
40px 0 20px;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.video-title{
font-size:30px;
}

.desc{
font-size:22px;
}

.player iframe{
height:220px;
}

.share-btn{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
📺 地域テレビ
</div>

<div class="sub">
地域動画や暮らし情報を
テレビ感覚で見られます
</div>

</div>

<div id="latest"></div>

<div class="archive-title">
📚 アーカイブ
</div>

<div id="archive"></div>

<div class="footer">

NSAW 地域テレビ

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const PAGE_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/tv.html';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=お楽しみ動画&tqx=out:json';

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

rows.reverse();

const latest =
document.getElementById('latest');

const archive =
document.getElementById('archive');

rows.forEach((row,index)=>{

const c = row.c;

const date =
c[0]?.v || '';

const youtube =
c[1]?.v || '';

const title =
c[2]?.v || '';

const desc =
c[3]?.v || '';

const hash =
c[4]?.v || '';

const embed =
youtube
.replace('watch?v=','embed/')
.replace('youtu.be/','youtube.com/embed/');

const shareText =
encodeURIComponent(title + ' ' + PAGE_URL);

const html = `

<div class="card">

<div class="date">
${date}
</div>

<div class="video-title">
${title}
</div>

<div class="desc">
${desc}
</div>

<div class="hash">
${hash}
</div>

<div class="player">

<iframe
src="${embed}"
allowfullscreen>
</iframe>

</div>

<div class="share">

<a class="share-btn fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(PAGE_URL)}">
Facebook
</a>

<a class="share-btn line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(PAGE_URL)}">
LINE
</a>

<a class="share-btn x"
target="_blank"
href="https://twitter.com/intent/tweet?text=${shareText}">
X
</a>

<a class="share-btn copy"
href="#"
onclick="navigator.clipboard.writeText('${PAGE_URL}')">
コピー
</a>

</div>

</div>

`;

if(index < 5){

latest.innerHTML += html;

}else{

archive.innerHTML += html;

}

});

});

</script>

</body>
</html>

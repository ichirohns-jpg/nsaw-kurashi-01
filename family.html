<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日の見守り確認</title>

<style>

body{
  margin:0;
  background:#eef3f8;
  font-family:sans-serif;
  color:#222;
}

.top{
  background:linear-gradient(135deg,#1976d2,#0d47a1);
  color:white;
  padding:28px 20px 34px;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.logo{
  font-size:42px;
  font-weight:900;
  margin-bottom:18px;
}

.date{
  font-size:28px;
  font-weight:900;
  line-height:1.8;
}

.sub{
  font-size:22px;
  line-height:1.8;
  margin-top:12px;
}

.wrap{
  padding:18px;
}

.current{
  background:white;
  border-radius:28px;
  padding:30px;
  margin-bottom:24px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  text-align:center;
}

.current-label{
  font-size:24px;
  color:#666;
  font-weight:900;
  margin-bottom:16px;
}

.current-status{
  font-size:46px;
  font-weight:900;
  line-height:1.5;
}

.current-time{
  font-size:24px;
  color:#666;
  margin-top:16px;
}

.card{
  background:white;
  border-radius:24px;
  padding:22px;
  margin-bottom:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.time{
  font-size:22px;
  color:#666;
  margin-bottom:10px;
}

.status{
  font-size:34px;
  font-weight:900;
  line-height:1.5;
}

.normal{
  color:#2e7d32;
}

.alert{
  color:#d32f2f;
}

.section{
  font-size:30px;
  font-weight:900;
  margin:24px 0 18px;
}

.share{
  display:block;
  text-align:center;
  background:#06c755;
  color:white;
  text-decoration:none;
  font-size:28px;
  font-weight:900;
  padding:22px;
  border-radius:22px;
  margin:20px 0;
}

.voice{
  width:100%;
  border:none;
  background:#1565c0;
  color:white;
  font-size:28px;
  font-weight:900;
  padding:22px;
  border-radius:22px;
  margin-bottom:22px;
}

</style>
</head>

<body>

<div class="top">

  <div class="logo">
    今日の見守り確認
  </div>

  <div class="date" id="todayDate"></div>

  <div class="sub">
    ご家族の見守り状況を確認できます
  </div>

</div>

<div class="wrap">

  <div id="currentStatus"></div>

  <button class="voice" onclick="speakLatest()">
    🔊 AI読み上げ
  </button>

  <a class="share"
  href="https://line.me/R/msg/text/?今日の見守り確認%0Ahttps://ichirohns-jpg.github.io/nsaw-kurashi-01/family.html">

  LINEで共有

  </a>

  <div class="section">
    今日の履歴
  </div>

  <div id="list"></div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

let latestMessage = '';

function showToday(){

  const now =
  new Date();

  const week = [
    '日曜日',
    '月曜日',
    '火曜日',
    '水曜日',
    '木曜日',
    '金曜日',
    '土曜日'
  ];

  document.getElementById('todayDate').innerHTML =
    now.getFullYear() + '年 ' +
    (now.getMonth()+1) + '月 ' +
    now.getDate() + '日 ' +
    week[now.getDay()];

}

function speakLatest(){

  if(!latestMessage)return;

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(latestMessage);

  msg.lang =
  'ja-JP';

  speechSynthesis.speak(msg);

}

function handleData(response){

  const rows =
  response.table.rows;

  const list =
  document.getElementById('list');

  list.innerHTML = '';

  if(!rows || rows.length === 0){

    document.getElementById('currentStatus').innerHTML =
    '<div class="current"><div class="current-status">まだ記録がありません</div></div>';

    return;

  }

  rows.reverse();

  const latest =
  rows[0];

  const latestTime =
    latest.c[0]?.f ||
    latest.c[0]?.v ||
    '';

  const latestStatus =
    latest.c[2]?.v ||
    '';

  const latestContent =
    latest.c[3]?.v ||
    '';

  const voiceText =
  latestContent
  .replace('😊','')
  .replace('🚨','')
  .replace('💊','')
  .replace('🏥','')
  .replace('🚌','')
  .replace('🏠','')
  .trim();

  latestMessage =
  '最新の見守り状況をお伝えします。' +
  voiceText +
  '。確認時間は ' +
  latestTime +
  'です。';

  const latestClass =
  latestStatus === '緊急'
  ? 'alert'
  : 'normal';

  document.getElementById('currentStatus').innerHTML =

    '<div class="current">' +
      '<div class="current-label">現在の状態</div>' +
      '<div class="current-status ' + latestClass + '">' +
        latestContent +
      '</div>' +
      '<div class="current-time">' +
        latestTime +
      '</div>' +
    '</div>';

  rows.forEach(function(r){

    const time =
      r.c[0]?.f ||
      r.c[0]?.v ||
      '';

    const status =
      r.c[2]?.v ||
      '';

    const content =
      r.c[3]?.v ||
      '';

    const cls =
      status === '緊急'
      ? 'alert'
      : 'normal';

    const card =
    document.createElement('div');

    card.className =
    'card';

    card.innerHTML =

      '<div class="time">' +
      time +
      '</div>' +

      '<div class="status ' + cls + '">' +
      content +
      '</div>';

    list.appendChild(card);

  });

}

showToday();

window.google = {
  visualization:{
    Query:{
      setResponse:handleData
    }
  }
};

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り記録&tqx=out:json';

document.body.appendChild(script);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 見守りDX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f3ebe2;
  color:#2b2b2b;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #ef6c00,
    #bf360c
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* ボタン */

.wrap{
  padding:16px 14px 50px;
}

.big-btn{

  display:block;

  text-decoration:none;

  text-align:center;

  background:#fff;

  color:#bf360c;

  border-radius:28px;

  padding:30px 20px;

  margin-bottom:24px;

  font-size:38px;

  font-weight:900;

  box-shadow:
  0 10px 26px rgba(0,0,0,.12);

  border:
  3px solid #ffd3b5;
}

.big-btn.red{
  background:#d32f2f;
  color:#fff;
}

.big-btn.green{
  background:#2e7d32;
  color:#fff;
}

.big-btn.blue{
  background:#1976d2;
  color:#fff;
}

.info{

  background:#fff;

  border-radius:26px;

  padding:24px;

  margin-top:10px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.info-title{

  font-size:32px;

  font-weight:900;

  margin-bottom:16px;

  color:#bf360c;
}

.info-text{

  font-size:24px;

  line-height:1.9;

  color:#444;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.big-btn{
  font-size:32px;
}

.info-title{
  font-size:28px;
}

.info-text{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      見守りDX
    </div>

    <div class="sub">
      元気ですボタン・安否確認・
      地域見守り・緊急連絡などを、
      高齢者にも使いやすくまとめた
      地域見守りDXです。
    </div>

  </div>

</div>

<div class="wrap">

  <a class="big-btn green"
  href="#">

    元気です

  </a>

  <a class="big-btn red"
  href="#">

    助けてください

  </a>

  <a class="big-btn blue"
  href="#">

    地域包括支援センター

  </a>

  <div class="info">

    <div class="info-title">
      見守りについて
    </div>

    <div class="info-text">
      地域で安心して暮らせるよう、
      見守り・相談・安否確認を
      まとめていくページです。<br><br>

      今後、
      元気ですボタンや、
      家族連携機能、
      緊急時通知などを
      追加予定です。
    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

</body>
</html>

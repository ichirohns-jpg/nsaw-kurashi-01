<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
見守りDX
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.card{

background:#ffffff;

border-radius:30px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.name{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.area{

font-size:24px;

font-weight:900;

color:#607080;

margin-bottom:20px;
}

.status{

font-size:30px;

font-weight:900;

color:#2e7d32;

margin-bottom:24px;
}

.big-btn{

display:block;

width:100%;

border:none;

border-radius:26px;

padding:28px;

margin-bottom:18px;

font-size:34px;

font-weight:900;

color:#fff;
}

.ok{
background:#43a047;
}

.help{
background:#ef6c00;
}

.danger{
background:#d32f2f;
}

.drug{
background:#1976d2;
}

.info{

font-size:24px;

line-height:1.8;

color:#425466;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

color:#607080;
}

@media(max-width:768px){

.name{
font-size:36px;
}

.area{
font-size:22px;
}

.status{
font-size:26px;
}

.big-btn{
font-size:28px;
padding:24px;
}

.info{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="name"
id="name">

読み込み中…

</div>

<div class="area"
id="area">

</div>

<div class="status"
id="status">

</div>

<button class="big-btn ok">

😊 元気です

</button>

<button class="big-btn help">

😓 少し困っています

</button>

<button class="big-btn danger">

🚨 助けてください

</button>

<button class="big-btn drug">

💊 薬を飲みました

</button>

<div class="info">

このページは、
ご本人専用の見守りページです。

</div>

</div>

<div class="footer">

NSAW 見守りDX

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const params =
new URLSearchParams(location.search);

const userId =
params.get('id');

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=利用者管理&tqx=out:json';

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

rows.forEach((row)=>{

const c = row.c;

const name =
c[1]?.v || '';

const city =
c[2]?.v || '';

const area =
c[3]?.v || '';

const chome =
c[4]?.v || '';

const status =
c[10]?.v || '';

const id =
c[11]?.v || '';

if(id === userId){

document.getElementById('name')
.innerHTML = name;

document.getElementById('area')
.innerHTML =
city + ' ' +
area + ' ' +
chome;

document.getElementById('status')
.innerHTML =
'現在状態：' + status;

}

});

});

</script>

</body>
</html>

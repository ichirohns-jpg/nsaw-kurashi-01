<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 見守りDX
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f3ebe2;
  color:#2b2b2b;

  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #ef6c00,
    #bf360c
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;
}

.sub{

  margin-top:14px;

  font-size:22px;

  line-height:1.9;

  opacity:.95;
}

/* 本体 */

.wrap{
  padding:16px 14px 50px;
}

/* ボタン */

.big-btn{

  width:100%;

  border:none;

  border-radius:28px;

  padding:30px 20px;

  margin-bottom:24px;

  font-size:38px;

  font-weight:900;

  color:#fff;

  box-shadow:
  0 10px 26px rgba(0,0,0,.12);
}

.green{
  background:#2e7d32;
}

.red{
  background:#d32f2f;
}

.blue{
  background:#1976d2;
}

/* 服薬 */

.medicine-box{

  background:#fff;

  border-radius:26px;

  padding:24px;

  margin-top:20px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.medicine-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:20px;

  color:#bf360c;
}

.medicine-btn{

  width:100%;

  border:none;

  background:#f5f5f5;

  border-radius:22px;

  padding:24px;

  margin-bottom:18px;

  font-size:30px;

  font-weight:900;

  color:#333;

  border:
  2px solid #e0e0e0;
}

/* 状態 */

.status{

  background:#fff;

  border-radius:26px;

  padding:26px;

  margin-top:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);

  min-height:180px;
}

.status-title{

  font-size:32px;

  font-weight:900;

  margin-bottom:18px;

  color:#bf360c;
}

.status-text{

  font-size:28px;

  line-height:1.9;

  color:#444;

  white-space:pre-wrap;
}

/* 履歴 */

.history{

  background:#fff;

  border-radius:26px;

  padding:24px;

  margin-top:24px;

  box-shadow:
  0 8px 24px rgba(0,0,0,.12);
}

.history-title{

  font-size:30px;

  font-weight:900;

  margin-bottom:20px;

  color:#bf360c;
}

.history-item{

  background:#f7f7f7;

  border-radius:18px;

  padding:18px;

  margin-bottom:16px;

  font-size:24px;

  line-height:1.8;

  color:#444;

  border-left:
  8px solid #ef6c00;
}

/* 戻る */

.home-btn{

  display:block;

  text-align:center;

  background:#1976d2;

  color:#fff;

  text-decoration:none;

  padding:22px;

  border-radius:24px;

  font-size:28px;

  font-weight:900;

  margin-top:30px;

  box-shadow:
  0 8px 20px rgba(0,0,0,.25);
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.big-btn{
  font-size:32px;
}

.medicine-title{
  font-size:28px;
}

.medicine-btn{
  font-size:24px;
}

.status-title{
  font-size:28px;
}

.status-text{
  font-size:24px;
}

.history-title{
  font-size:28px;
}

.history-item{
  font-size:22px;
}

.home-btn{
  font-size:24px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      見守りDX
    </div>

    <div class="sub">
      元気確認・服薬確認・
      見守り履歴などを、
      高齢者にも使いやすくまとめた
      見守りDXです。
    </div>

  </div>

</div>

<div class="wrap">

  <button class="big-btn green"
  onclick="genki()">

    元気です

  </button>

  <button class="big-btn red"
  onclick="helpMe()">

    助けてください

  </button>

  <button class="big-btn blue"
  onclick="houkatsu()">

    地域包括支援センター

  </button>

  <div class="medicine-box">

    <div class="medicine-title">
      💊 服薬確認
    </div>

    <button class="medicine-btn"
    onclick="medicine('朝の薬')">

      💊 朝の薬を飲みました

    </button>

    <button class="medicine-btn"
    onclick="medicine('昼の薬')">

      💊 昼の薬を飲みました

    </button>

    <button class="medicine-btn"
    onclick="medicine('夜の薬')">

      💊 夜の薬を飲みました

    </button>

  </div>

  <div class="status">

    <div class="status-title">
      見守り状況
    </div>

    <div class="status-text"
    id="statusText">

      ボタンを押すと、
      ここに状況が表示されます。

    </div>

  </div>

  <div class="history">

    <div class="history-title">
      履歴
    </div>

    <div id="historyList">

    </div>

  </div>

  <a class="home-btn"
  href="index.html">

    ← トップへ戻る

  </a>

</div>

<script>

function addHistory(text){

  const list =
  document.getElementById(
    'historyList'
  );

  const item =
  document.createElement('div');

  item.className =
  'history-item';

  const now =
  new Date();

  const time =
  now.getFullYear() +
  '/' +
  (now.getMonth()+1) +
  '/' +
  now.getDate() +
  ' ' +
  now.getHours() +
  ':' +
  String(now.getMinutes())
  .padStart(2,'0');

  item.innerHTML =

  time +

  '<br><br>' +

  text;

  list.prepend(item);

}

function genki(){

  document.getElementById(
    'statusText'
  ).innerHTML =

  '本日の元気確認を受け付けました。<br><br>' +

  'ありがとうございます。';

  addHistory(
    '元気確認済み'
  );

}

function helpMe(){

  document.getElementById(
    'statusText'
  ).innerHTML =

  '地域見守りへ連絡準備をしています。<br><br>' +

  '必要に応じて、地域包括支援センターや家族連携を行います。';

  addHistory(
    '助けてください通知'
  );

}

function houkatsu(){

  document.getElementById(
    'statusText'
  ).innerHTML =

  '地域包括支援センター情報を表示します。<br><br>' +

  '高齢者相談・介護相談・見守り相談などに対応します。';

  addHistory(
    '地域包括支援センター確認'
  );

}

function medicine(type){

  document.getElementById(
    'statusText'
  ).innerHTML =

  type +

  ' を確認しました。<br><br>' +

  'ありがとうございます。';

  addHistory(
    type + ' 確認済み'
  );

}

</script>

</body>
</html>

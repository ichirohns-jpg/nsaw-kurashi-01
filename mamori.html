<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
見まもりDX
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:700px;
margin:auto;
padding:16px;
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:18px;
}

.name{

font-size:36px;

font-weight:900;

margin-bottom:10px;
}

.area{

font-size:24px;

color:#607080;

margin-bottom:18px;
}

.status{

font-size:24px;

font-weight:900;

margin-bottom:18px;
}

.btn{

width:100%;

border:none;

border-radius:22px;

padding:26px;

font-size:30px;

font-weight:900;

margin-top:16px;

color:#fff;
}

.green{
background:#43a047;
}

.orange{
background:#ef6c00;
}

.red{
background:#d32f2f;
}

.blue{
background:#1976d2;
}

.purple{
background:#7b1fa2;
}

.footer{

text-align:center;

font-size:20px;

padding:24px;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.name{
font-size:32px;
}

.area{
font-size:22px;
}

.status{
font-size:22px;
}

.btn{
font-size:26px;
padding:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">
🏠 見まもりDX
</div>

<div class="name"
id="username">

確認中...

</div>

<div class="area"
id="userarea">

確認中...

</div>

<div class="status"
id="userstatus">

😊 今日も元気です

</div>

<button
class="btn green"
onclick="sendStatus('😊 元気です')">

😊 元気です

</button>

<button
class="btn blue"
onclick="sendStatus('💊 朝の薬')">

💊 朝の薬

</button>

<button
class="btn blue"
onclick="sendStatus('💊 昼の薬')">

💊 昼の薬

</button>

<button
class="btn blue"
onclick="sendStatus('💊 夜の薬')">

💊 夜の薬

</button>

<button
class="btn orange"
onclick="sendStatus('😓 少し困っています')">

😓 少し困っています

</button>

<button
class="btn red"
onclick="sendStatus('🚨 助けてください')">

🚨 助けてください

</button>

<button
class="btn purple"
onclick="goShelter()">

🚨 避難所へ行く

</button>

</div>

<div class="footer">

NSAW 見まもりDX

</div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbws5QbZzLbXcU4v6xApbbe8hspIWPwrpDEHCtf3yOGURwHCvE9FbW2T3BbVLAIBGfkO/exec';

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const params =
new URLSearchParams(location.search);

const userId =
params.get('id') || '';

let userLat = '';
let userLng = '';

fetch(
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=利用者管理&tqx=out:json'
)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

rows.forEach((row)=>{

const c = row.c;

const id =
c[11]?.v || '';

if(id == userId){

document
.getElementById('username')
.innerText =
c[1]?.v || '';

document
.getElementById('userarea')
.innerText =
(c[2]?.v || '') +
' ' +
(c[3]?.v || '');

userLat =
parseFloat(c[14]?.v || 0);

userLng =
parseFloat(c[15]?.v || 0);

}

});

});

function sendStatus(status){

document
.getElementById('userstatus')
.innerText = status;

fetch(GAS_URL,{

method:'POST',

body:JSON.stringify({

id:userId,
status:status

})

})
.then(()=>{

alert('送信しました');

});

}

function goShelter(){

fetch(
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=地域施設&tqx=out:json'
)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

let nearest = null;

let minDistance = 999999;

rows.forEach((row)=>{

const c = row.c;

const type =
c[0]?.v || '';

if(type != '避難所') return;

const lat =
parseFloat(c[4]?.v || 0);

const lng =
parseFloat(c[5]?.v || 0);

const distance =
Math.sqrt(
Math.pow(userLat-lat,2)+
Math.pow(userLng-lng,2)
);

if(distance < minDistance){

minDistance = distance;

nearest = {
name:c[2]?.v || '',
lat:lat,
lng:lng
};

}

});

if(nearest){

const url =
'https://www.google.com/maps/dir/?api=1&destination=' +
nearest.lat +
',' +
nearest.lng;

location.href = url;

}

});

}

</script>

</body>
</html>

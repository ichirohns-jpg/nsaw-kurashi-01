<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 地域OS</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:48px;
}

.header p{
font-size:22px;
font-weight:900;
margin-top:12px;
line-height:1.8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
text-align:center;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.icon{
font-size:70px;
margin-bottom:12px;
}

.title{
font-size:32px;
font-weight:900;
margin-bottom:12px;
}

.desc{
font-size:18px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.btn{
display:block;
width:100%;
padding:18px;
color:white;
text-decoration:none;
border-radius:20px;
font-size:22px;
font-weight:900;
}

.blue{background:#1565c0}
.orange{background:#ef6c00}
.red{background:#d32f2f}
.green{background:#00897b}

.footer{
text-align:center;
font-size:18px;
margin-top:30px;
color:#666;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.header h1{
font-size:38px;
}

}
</style>

</head>
<body>

<div class="wrap">

<div class="header">
<h1>🏠 NSAW 地域OS</h1>
<p>
志木・新座・朝霞・和光<br>
暮らし情報と見守りの入口
</p>
</div>

<div class="grid">

<div class="card">
<div class="icon">📰</div>
<div class="title">4市瓦版</div>
<div class="desc">
地域ニュース・イベント情報
</div>
<a class="btn blue"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban.html">
開く
</a>
</div>

<div class="card">
<div class="icon">🌅</div>
<div class="title">地域ラジオ</div>
<div class="desc">
朝の3分 地域ラジオ
</div>
<a class="btn orange"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/radio2.html">
聞く
</a>
</div>

<div class="card">
<div class="icon">🫶</div>
<div class="title">本人ページ</div>
<div class="desc">
見守り・薬確認
</div>
<a class="btn red"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/index.html?id=a001">
開く
</a>
</div>

<div class="card">
<div class="icon">🧑‍⚕️</div>
<div class="title">支援者ページ</div>
<div class="desc">
見守り履歴・薬確認・利用者管理
</div>
<a class="btn green"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/admin.html">
開く
</a>
</div>

</div>

<div class="footer">
NSAW 暮らし情報局
</div>

</div>

</html>

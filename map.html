<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
地域マップ
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

border-left:
14px solid #1976d2;
}

.kind{

font-size:22px;

font-weight:900;

color:#1976d2;

margin-bottom:10px;
}

.name{

font-size:34px;

font-weight:900;

margin-bottom:16px;
}

.address{

font-size:24px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

text-align:center;

padding:20px;

border-radius:22px;

font-size:28px;

font-weight:900;

margin-top:16px;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

.loading{

background:#fff3cd;

padding:18px;

border-radius:20px;

font-size:24px;

font-weight:900;

margin-bottom:20px;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.name{
font-size:30px;
}

.address{
font-size:22px;
}

.btn{
font-size:24px;
}

.loading{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
🗺 地域マップ
</div>

<div class="sub">
病院・薬局・スーパー・
避難所などを、
押すだけで案内します
</div>

</div>

<div class="loading"
id="loading">

現在地を確認しています…

</div>

<div id="list"></div>

<div class="footer">

NSAW 地域マップ

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=地域施設&tqx=out:json';

let userLat = null;
let userLng = null;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat =
position.coords.latitude;

userLng =
position.coords.longitude;

document.getElementById('loading')
.style.display = 'none';

loadData();

},

()=>{

document.getElementById('loading')
.innerHTML =
'位置情報が取得できませんでした';

loadData();

}

);

function distance(lat1,lng1,lat2,lng2){

const dx = lat1 - lat2;
const dy = lng1 - lng2;

return Math.sqrt(dx*dx + dy*dy);

}

function loadData(){

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

const list =
document.getElementById('list');

const data = [];

rows.forEach((row)=>{

const c = row.c;

const kind =
c[0]?.v || '';

const city =
c[1]?.v || '';

const name =
c[2]?.v || '';

const address =
c[3]?.v || '';

const lat =
parseFloat(c[4]?.v || 0);

const lng =
parseFloat(c[5]?.v || 0);

const link =
c[6]?.v || '';

const note =
c[7]?.v || '';

let dist = 999999;

if(userLat && userLng){

dist =
distance(
userLat,
userLng,
lat,
lng
);

}

data.push({

kind,
city,
name,
address,
lat,
lng,
link,
note,
dist

});

});

data.sort((a,b)=>a.dist-b.dist);

data.forEach((item)=>{

const googleURL =
'https://www.google.com/maps/dir/?api=1&destination=' +
item.lat + ',' + item.lng;

const html = `

<div class="card">

<div class="kind">
${item.kind}　${item.city}
</div>

<div class="name">
${item.name}
</div>

<div class="address">
${item.address}<br>
${item.note}
</div>

<a class="btn"
href="${googleURL}"
target="_blank">

ここへ行く

</a>

${item.link ? `

<a class="btn"
href="${item.link}"
target="_blank">

公式ページ

</a>

` : ''}

</div>

`;

list.innerHTML += html;

});

});

}

</script>

</body>
</html>

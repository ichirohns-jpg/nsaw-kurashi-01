<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どこへ行きますか？</title>

<style>
body{margin:0;background:#eef3f8;font-family:sans-serif;color:#222}
.top{background:linear-gradient(135deg,#1976d2,#0d47a1);color:white;padding:34px 20px 40px;border-bottom-left-radius:34px;border-bottom-right-radius:34px;text-align:center}
.title{font-size:42px;font-weight:900}
.wrap{padding:18px}
.card{background:white;border-radius:30px;padding:28px;margin-bottom:24px;box-shadow:0 6px 18px rgba(0,0,0,.12);text-align:center}
label{display:block;font-size:28px;font-weight:900;margin-bottom:14px}
input{width:100%;box-sizing:border-box;font-size:32px;padding:22px;border-radius:20px;border:3px solid #ccc;margin-bottom:20px}
.big-button{width:100%;border:none;border-radius:30px;padding:34px;margin-bottom:20px;color:white;font-size:36px;font-weight:900}
.blue{background:#1565c0}.green{background:#43a047}
.sub{font-size:24px;color:#666;line-height:1.7}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
.quick button{border:none;border-radius:22px;padding:24px;color:white;font-size:26px;font-weight:900}
.red{background:#d32f2f}.orange{background:#fb8c00}.teal{background:#00897b}.gray{background:#546e7a}
</style>
</head>

<body>

<div class="top">
  <div class="title">どこへ行きますか？</div>
</div>

<div class="wrap">

  <div class="card">

    <label>行きたい場所を入れてください</label>

    <input id="destination" placeholder="例：近くの薬局">

    <button class="big-button green" onclick="goMap()">
      🚶 案内します
    </button>

    <div class="sub">
      入力欄を押して、iPhoneキーボードの<br>
      🎤マイクで話して入力できます。
    </div>

    <div class="quick">
      <button class="red" onclick="quickMap('近くの病院')">🏥 病院</button>
      <button class="orange" onclick="quickMap('近くの薬局')">💊 薬局</button>
      <button class="teal" onclick="quickMap('近くのコンビニ')">🏪 コンビニ</button>
      <button class="gray" onclick="quickMap('近くのトイレ')">🚻 トイレ</button>
    </div>

  </div>

</div>

<script>
function goMap(){
  const destination = document.getElementById('destination').value.trim();

  if(!destination){
    alert('行きたい場所を入れてください');
    return;
  }

  location.href =
    'https://www.google.com/maps/search/?api=1&query=' +
    encodeURIComponent(destination);
}

function quickMap(word){
  location.href =
    'https://www.google.com/maps/search/?api=1&query=' +
    encodeURIComponent(word);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>四市マップ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#14324a;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 40px;
}

.top{
  background:#ffffff;
  border:5px solid #16864a;
  border-radius:28px;
  padding:28px 20px;
  text-align:center;
  margin-bottom:24px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.top h1{
  margin:0;
  font-size:38px;
  line-height:1.3;
  color:#118047;
  font-weight:900;
}

.top p{
  margin:16px 0 0;
  font-size:22px;
  line-height:1.6;
  font-weight:800;
  color:#31465a;
}

.sectionTitle{
  font-size:28px;
  font-weight:900;
  margin:30px 0 14px;
  color:#12324a;
}

.mapBtn{
  display:block;
  width:100%;
  text-decoration:none;
  color:#ffffff;
  border-radius:28px;
  padding:24px 18px;
  margin-bottom:16px;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.mapTitle{
  font-size:27px;
  line-height:1.4;
  font-weight:900;
  margin-bottom:8px;
}

.mapText{
  font-size:20px;
  line-height:1.5;
  font-weight:800;
}

.green{background:#16a34a;}
.blue{background:#2563eb;}
.pink{background:#ea4f8b;}
.purple{background:#7c3aed;}
.orange{background:#f59e0b;}
.red{background:#dc2626;}
.sky{background:#0ea5e9;}

.homeBtn{
  display:block;
  width:100%;
  text-decoration:none;
  text-align:center;
  background:#16864a;
  color:#ffffff;
  border-radius:24px;
  padding:22px 14px;
  margin-top:30px;
  font-size:24px;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <h1>
      🗺<br>
      四市マップ
    </h1>

    <p>
      市役所や相談先を<br>
      地図で開けます
    </p>

  </div>

  <div class="sectionTitle">
    四市の市役所
  </div>

  <a class="mapBtn green"
     target="_blank"
     href="https://maps.google.com/?q=志木市役所">

    <div class="mapTitle">
      志木市役所
    </div>

    <div class="mapText">
      Google Mapsで開く
    </div>

  </a>

  <a class="mapBtn blue"
     target="_blank"
     href="https://maps.google.com/?q=新座市役所">

    <div class="mapTitle">
      新座市役所
    </div>

    <div class="mapText">
      Google Mapsで開く
    </div>

  </a>

  <a class="mapBtn pink"
     target="_blank"
     href="https://maps.google.com/?q=朝霞市役所">

    <div class="mapTitle">
      朝霞市役所
    </div>

    <div class="mapText">
      Google Mapsで開く
    </div>

  </a>

  <a class="mapBtn purple"
     target="_blank"
     href="https://maps.google.com/?q=和光市役所">

    <div class="mapTitle">
      和光市役所
    </div>

    <div class="mapText">
      Google Mapsで開く
    </div>

  </a>

  <div class="sectionTitle">
    高齢者・介護相談
  </div>

  <a class="mapBtn sky"
     target="_blank"
     href="https://maps.google.com/?q=地域包括支援センター">

    <div class="mapTitle">
      地域包括支援センター
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <div class="sectionTitle">
    生活インフラ
  </div>

  <a class="mapBtn red"
     target="_blank"
     href="https://maps.google.com/?q=救急病院">

    <div class="mapTitle">
      🏥 救急病院
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <a class="mapBtn blue"
     target="_blank"
     href="https://maps.google.com/?q=薬局">

    <div class="mapTitle">
      💊 薬局
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <a class="mapBtn green"
     target="_blank"
     href="https://maps.google.com/?q=コンビニ">

    <div class="mapTitle">
      🏪 コンビニ
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <a class="mapBtn orange"
     target="_blank"
     href="https://maps.google.com/?q=公衆トイレ">

    <div class="mapTitle">
      🚻 トイレ
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <a class="mapBtn purple"
     target="_blank"
     href="https://maps.google.com/?q=避難所">

    <div class="mapTitle">
      ⛑ 避難所
    </div>

    <div class="mapText">
      近くを探す
    </div>

  </a>

  <a class="homeBtn"
     href="./app.html">

     ← 暮らし情報局へ戻る

  </a>

</div>

</body>
</html>

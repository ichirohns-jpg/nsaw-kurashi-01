<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
地域マップ
</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

.filter{

display:grid;

grid-template-columns:
1fr 1fr;

gap:12px;

margin-bottom:20px;
}

.filter button{

border:none;

border-radius:18px;

padding:18px;

font-size:22px;

font-weight:900;

background:#1976d2;

color:#fff;
}

#map{

height:320px;

border-radius:28px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

border-left:
14px solid #1976d2;
}

.kind{

font-size:22px;

font-weight:900;

color:#1976d2;

margin-bottom:10px;
}

.name{

font-size:34px;

font-weight:900;

margin-bottom:10px;
}

.walk{

font-size:24px;

font-weight:900;

color:#ef6c00;

margin-bottom:14px;
}

.address{

font-size:24px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

text-align:center;

padding:18px;

border-radius:20px;

font-size:26px;

font-weight:900;

margin-top:14px;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

.loading{

background:#fff3cd;

padding:18px;

border-radius:20px;

font-size:24px;

font-weight:900;

margin-bottom:20px;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.name{
font-size:30px;
}

.address{
font-size:22px;
}

.filter button{
font-size:20px;
}

.walk{
font-size:22px;
}

#map{
height:260px;
}

.btn{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
🗺 地域マップ
</div>

<div class="sub">
病院・薬局・スーパー・
避難所などを、
近い順で表示します
</div>

</div>

<div class="loading"
id="loading">

現在地を確認しています…

</div>

<div class="filter">

<button onclick="showType('病院')">
🏥 病院
</button>

<button onclick="showType('薬局')">
💊 薬局
</button>

<button onclick="showType('スーパー')">
🛒 スーパー
</button>

<button onclick="showType('避難所')">
🚨 避難所
</button>

<button onclick="showType('トイレ')">
🚻 トイレ
</button>

<button onclick="showType('全部')">
📍 全部
</button>

</div>

<div id="map"></div>

<div id="list"></div>

<div class="footer">

NSAW 地域マップ

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=地域施設&tqx=out:json';

const map = L.map('map').setView(
[35.82,139.57],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap'
}
).addTo(map);

let allData = [];
let markers = [];

let userLat = null;
let userLng = null;

navigator.geolocation.getCurrentPosition(

(position)=>{

userLat =
position.coords.latitude;

userLng =
position.coords.longitude;

map.setView([userLat,userLng],15);

L.marker([userLat,userLng])
.addTo(map)
.bindPopup('現在地')
.openPopup();

document.getElementById('loading')
.style.display='none';

loadData();

},

()=>{

document.getElementById('loading')
.innerHTML =
'位置情報が取得できませんでした';

loadData();

}

);

function calcDistance(lat1,lng1,lat2,lng2){

const R = 6371;

const dLat =
(lat2-lat1) * Math.PI/180;

const dLng =
(lng2-lng1) * Math.PI/180;

const a =
Math.sin(dLat/2) *
Math.sin(dLat/2) +

Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *

Math.sin(dLng/2) *
Math.sin(dLng/2);

const c =
2 * Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R * c;

}

function loadData(){

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

rows.forEach((row)=>{

const c = row.c;

const lat =
parseFloat(c[4]?.v || 0);

const lng =
parseFloat(c[5]?.v || 0);

let dist = 9999;

if(userLat && userLng){

dist =
calcDistance(
userLat,
userLng,
lat,
lng
);

}

allData.push({

kind:c[0]?.v || '',
city:c[1]?.v || '',
name:c[2]?.v || '',
address:c[3]?.v || '',
lat,
lng,
link:c[6]?.v || '',
note:c[7]?.v || '',
dist

});

});

allData.sort((a,b)=>a.dist-b.dist);

showType('全部');

});

}

function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));

markers=[];

}

function showType(type){

clearMarkers();

const list =
document.getElementById('list');

list.innerHTML='';

allData.forEach((item)=>{

if(type !== '全部' &&
item.kind !== type){

return;

}

const marker =
L.marker([item.lat,item.lng])
.addTo(map)
.bindPopup(
'<b>' + item.name + '</b><br>' +
item.kind
);

markers.push(marker);

const walkMin =
Math.max(
1,
Math.round(item.dist * 1000 / 80)
);

const navURL =
'https://www.google.com/maps/dir/?api=1&destination=' +
item.lat + ',' + item.lng;

const html = `

<div class="card">

<div class="kind">
${item.kind}　${item.city}
</div>

<div class="name">
${item.name}
</div>

<div class="walk">
🚶 徒歩 約${walkMin}分
</div>

<div class="address">
${item.address}<br>
${item.note}
</div>

<a class="btn"
target="_blank"
href="${navURL}">

🚶 ここへ行く

</a>

</div>

`;

list.innerHTML += html;

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
地域マップ
</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

#map{

height:420px;

border-radius:28px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

border-left:
14px solid #1976d2;
}

.kind{

font-size:22px;

font-weight:900;

color:#1976d2;

margin-bottom:10px;
}

.name{

font-size:34px;

font-weight:900;

margin-bottom:16px;
}

.address{

font-size:24px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

text-align:center;

padding:18px;

border-radius:20px;

font-size:26px;

font-weight:900;

margin-top:14px;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.name{
font-size:30px;
}

.address{
font-size:22px;
}

.btn{
font-size:22px;
}

#map{
height:360px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
🗺 地域マップ
</div>

<div class="sub">
病院・薬局・スーパー・
避難所などを、
見やすく案内します
</div>

</div>

<div id="map"></div>

<div id="list"></div>

<div class="footer">

NSAW 地域マップ

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=地域施設&tqx=out:json';

const map = L.map('map').setView(
[35.82,139.57],
13
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap'
}
).addTo(map);

navigator.geolocation.getCurrentPosition(

(position)=>{

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng])
.addTo(map)
.bindPopup('現在地')
.openPopup();

}

);

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

const list =
document.getElementById('list');

rows.forEach((row)=>{

const c = row.c;

const kind =
c[0]?.v || '';

const city =
c[1]?.v || '';

const name =
c[2]?.v || '';

const address =
c[3]?.v || '';

const lat =
parseFloat(c[4]?.v || 0);

const lng =
parseFloat(c[5]?.v || 0);

const link =
c[6]?.v || '';

const note =
c[7]?.v || '';

L.marker([lat,lng])
.addTo(map)
.bindPopup(
'<b>' + name + '</b><br>' +
kind
);

const html = `

<div class="card">

<div class="kind">
${kind}　${city}
</div>

<div class="name">
${name}
</div>

<div class="address">
${address}<br>
${note}
</div>

${link ? `

<a class="btn"
href="${link}"
target="_blank">

公式ページ

</a>

` : ''}

</div>

`;

list.innerHTML += html;

});

});

</script>

</body>
</html>

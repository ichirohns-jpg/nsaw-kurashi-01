<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:34px;
  line-height:1.3;
  font-weight:900;
}

.text{
  margin-top:16px;
  font-size:19px;
  line-height:1.7;
  font-weight:700;
  color:#50677d;
}

.label{
  margin-top:24px;
  font-size:18px;
  font-weight:900;
}

.input{
  width:100%;
  border:none;
  border-radius:22px;
  background:#edf4fb;
  padding:20px 16px;
  margin-top:10px;
  font-size:24px;
  font-weight:700;
}

.btns{
  margin-top:22px;
  display:grid;
  gap:16px;
}

.bigBtn{
  border:none;
  border-radius:24px;
  padding:24px 16px;
  color:#fff;
  font-size:28px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.blue{
  background:#2563eb;
}

.message{
  display:none;
  margin-top:20px;
  background:#fff;
  border-radius:22px;
  padding:20px 16px;
  text-align:center;
  font-size:22px;
  line-height:1.6;
  font-weight:900;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.footer{
  margin-top:30px;
  text-align:center;
  font-size:16px;
  color:#678;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="https://drive.google.com/thumbnail?id=1weO1_pqGhYZ2fw7mNWad8NN6diA8TQfd&sz=w1200"
    >

    <div class="inner">

      <div class="title">
        NSAW 暮らし情報局
      </div>

      <div class="text">
        地域の暮らし情報と、
        安否確認をつなぐページです。
      </div>

      <div class="label">
        登録名
      </div>

      <input
        id="nameInput"
        class="input"
        placeholder="お名前を入力"
      >

      <div class="btns">

        <button
          class="bigBtn green"
          onclick="sendSafety('😊 元気です')"
        >
          😊 元気です
        </button>

        <button
          class="bigBtn yellow"
          onclick="sendSafety('😥 困っています')"
        >
          😥 困っています
        </button>

        <button
          class="bigBtn red"
          onclick="sendSafety('🚨 急いで助けてください')"
        >
          🚨 急いで助けてください
        </button>

        <button
          class="bigBtn blue"
          onclick="location.href='admin.html'"
        >
          📋 管理ページを見る
        </button>

      </div>

      <div
        id="message"
        class="message"
      ></div>

    </div>

  </div>

  <div class="footer">
    NSAW 暮らし情報局
  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyx4_EayzmFZNRD8mumHyAfSou8rOrbQI5PVSFMpo3a3YxdLkJtCZ03qM7D-caoF8aM/exec";

const messageBox =
document.getElementById("message");

function showMessage(text){

  messageBox.style.display = "block";

  messageBox.innerHTML = text;

}

function saveName(name){

  localStorage.setItem(
    "nsaw_name",
    name
  );

}

function loadName(){

  const saved =
    localStorage.getItem(
      "nsaw_name"
    );

  if(saved){

    document.getElementById(
      "nameInput"
    ).value = saved;

  }

}

function sendSafety(status){

  const name =
    document.getElementById(
      "nameInput"
    ).value.trim();

  if(!name){

    alert("名前を入力してください");

    return;

  }

  saveName(name);

  navigator.geolocation.getCurrentPosition(

    function(pos){

      sendData(
        name,
        status,
        pos.coords.latitude,
        pos.coords.longitude
      );

    },

    function(){

      sendData(
        name,
        status,
        "",
        ""
      );

    }

  );

}

function sendData(
  name,
  status,
  lat,
  lng
){

  const url =
    GAS_URL
    + "?name=" + encodeURIComponent(name)
    + "&status=" + encodeURIComponent(status)
    + "&lat=" + encodeURIComponent(lat || "")
    + "&lng=" + encodeURIComponent(lng || "")
    + "&t=" + Date.now();

  const img = new Image();

  img.src = url;

  showMessage(
    "送信しました"
  );

}

loadName();

</script>

</body>
</html>

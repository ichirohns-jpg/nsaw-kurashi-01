<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSAW 暮らし情報局</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  color:#14324a;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:18px 14px 40px;
}

.top{
  background:#ffffff;
  border:5px solid #16864a;
  border-radius:28px;
  padding:28px 20px;
  text-align:center;
  margin-bottom:28px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.top h1{
  margin:0;
  font-size:38px;
  line-height:1.25;
  color:#118047;
  font-weight:900;
}

.top p{
  margin:18px 0 0;
  font-size:24px;
  line-height:1.5;
  font-weight:800;
  color:#31465a;
}

.card{
  background:#ffffff;
  border-radius:28px;
  padding:28px 22px;
  margin-bottom:28px;
  box-shadow:0 10px 26px rgba(0,0,0,.10);
}

.date{
  font-size:28px;
  font-weight:900;
  color:#647386;
  margin-bottom:18px;
}

.title{
  font-size:42px;
  line-height:1.25;
  font-weight:900;
  margin:0 0 22px;
  color:#102e4a;
}

.image{
  width:100%;
  border-radius:22px;
  margin-bottom:22px;
  display:block;
}

.description{
  font-size:23px;
  line-height:1.6;
  font-weight:700;
  color:#2d4055;
  margin-bottom:22px;
}

.infoBtn{
  display:block;
  width:100%;
  text-decoration:none;
  color:#ffffff;
  font-size:25px;
  line-height:1.35;
  font-weight:900;
  text-align:center;
  padding:24px 14px;
  border-radius:22px;
  margin:16px 0;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
  word-break:break-word;
}

.green{
  background:#16943a;
}

.blue{
  background:#1976d2;
}

.pink{
  background:#f54285;
}

.orange{
  background:#f39c12;
}

.purple{
  background:#7b4fd6;
}

.movieBox{
  margin-top:24px;
  background:#f2f7ff;
  border:3px solid #2b77d0;
  border-radius:24px;
  padding:20px;
}

.movieTitle{
  font-size:27px;
  font-weight:900;
  color:#1454a8;
  margin-bottom:12px;
}

.movieText{
  font-size:21px;
  line-height:1.5;
  font-weight:700;
  margin-bottom:16px;
}

.movieLink{
  display:block;
  background:#e60033;
  color:#ffffff;
  text-decoration:none;
  text-align:center;
  font-size:25px;
  font-weight:900;
  border-radius:18px;
  padding:20px 12px;
}

.loading{
  text-align:center;
  font-size:26px;
  font-weight:900;
  padding:40px 0;
}

.error{
  background:#fff0f0;
  color:#b00020;
  border:3px solid #f0a0a0;
  border-radius:20px;
  padding:20px;
  font-size:22px;
  font-weight:800;
  line-height:1.5;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <h1>NSAW<br>暮らし情報局</h1>
    <p>四市の暮らし情報を見やすくまとめています</p>
  </div>

  <div id="app" class="loading">
    読み込み中です...
  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

const app =
document.getElementById("app");

/* =========================
   セル取得
========================= */

function cell(row,index){

  if(!row.c) return "";

  if(!row.c[index]) return "";

  return row.c[index].f ||
         row.c[index].v ||
         "";

}

/* =========================
   日付変換
========================= */

function getDateValue(value){

  if(!value) return 0;

  try{

    const d =
      new Date(value);

    const t =
      d.getTime();

    if(isNaN(t)) return 0;

    return t;

  }catch(e){

    return 0;

  }

}

/* =========================
   ボタン
========================= */

function createButton(
  title,
  url,
  colorClass
){

  if(!title) return "";

  if(url){

    return `
      <a
        class="infoBtn ${colorClass}"
        href="${url}"
        target="_blank"
        rel="noopener"
      >
        ${title}
      </a>
    `;

  }

  return `
    <div class="infoBtn ${colorClass}">
      ${title}
    </div>
  `;

}

/* =========================
   表示
========================= */

function render(rows){

  app.className = "";

  app.innerHTML = "";

  if(!rows.length){

    app.innerHTML = `
      <div class="error">
        表示できる情報がありません。
      </div>
    `;

    return;

  }

  rows.forEach(function(item){

    const card =
      document.createElement("div");

    card.className = "card";

    let html = "";

    html += `
      <div class="date">
        ${item.date}
      </div>
    `;

    html += `
      <h2 class="title">
        ${item.title}
      </h2>
    `;

    if(item.imageUrl){

      html += `
        <img
          class="image"
          src="${item.imageUrl}"
          loading="lazy"
        >
      `;

    }

    if(item.description){

      html += `
        <div class="description">
          ${item.description}
        </div>
      `;

    }

    html += createButton(
      item.info1Title,
      item.info1Url,
      "green"
    );

    html += createButton(
      item.info2Title,
      item.info2Url,
      "blue"
    );

    html += createButton(
      item.info3Title,
      item.info3Url,
      "pink"
    );

    html += createButton(
      item.info4Title,
      item.info4Url,
      "orange"
    );

    html += createButton(
      item.info5Title,
      item.info5Url,
      "purple"
    );

    if(
      item.movieTitle ||
      item.movieDetail ||
      item.mediaUrl
    ){

      html += `
        <div class="movieBox">
      `;

      if(item.movieTitle){

        html += `
          <div class="movieTitle">
            ${item.movieTitle}
          </div>
        `;

      }

      if(item.movieDetail){

        html += `
          <div class="movieText">
            ${item.movieDetail}
          </div>
        `;

      }

      if(item.mediaUrl){

        html += `
          <a
            class="movieLink"
            href="${item.mediaUrl}"
            target="_blank"
            rel="noopener"
          >
            動画を見る
          </a>
        `;

      }

      html += `
        </div>
      `;

    }

    card.innerHTML = html;

    app.appendChild(card);

  });

}

/* =========================
   シート読み込み
========================= */

window.handleSheet = function(json){

  try{

    let rows =
      json.table.rows.map(function(row,index){

        return {

          rowNo:index,

          date:
            cell(row,0),

          articleId:
            cell(row,1),

          title:
            cell(row,2),

          imageUrl:
            cell(row,3),

          description:
            cell(row,4),

          info1Title:
            cell(row,5),

          info1Url:
            cell(row,6),

          info2Title:
            cell(row,7),

          info2Url:
            cell(row,8),

          info3Title:
            cell(row,9),

          info3Url:
            cell(row,10),

          info4Title:
            cell(row,11),

          info4Url:
            cell(row,12),

          info5Title:
            cell(row,13),

          info5Url:
            cell(row,14),

          movieTitle:
            cell(row,15),

          movieDetail:
            cell(row,16),

          mediaUrl:
            cell(row,17),

          show:
            cell(row,18)

        };

      });

    rows =
      rows.filter(function(item){

        return String(item.show)
          .trim() === "はい";

      });

    rows =
      rows.sort(function(a,b){

        const aDate =
          getDateValue(a.date);

        const bDate =
          getDateValue(b.date);

        return bDate - aDate;

      });

    render(rows);

  }catch(e){

    console.error(e);

    app.className = "";

    app.innerHTML = `
      <div class="error">
        読み込みエラーです。
      </div>
    `;

  }

};

/* =========================
   JSONP
========================= */

function loadSheet(){

  const script =
    document.createElement("script");

  script.src =
    "https://docs.google.com/spreadsheets/d/"
    + SHEET_ID
    + "/gviz/tq?sheet="
    + encodeURIComponent(SHEET_NAME)
    + "&tqx=out:json;responseHandler=handleSheet&v="
    + Date.now();

  document.body.appendChild(script);

}

loadSheet();

</script>

</body>
</html>

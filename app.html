<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const SHEET_NAME =
'シート1';

const params =
new URLSearchParams(location.search);

const targetId =
params.get('id');

const JSONP_URL =
'https://docs.google.com/spreadsheets/d/'
+ SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler=handleSheet';

const script =
document.createElement('script');

script.src = JSONP_URL;

document.body.appendChild(script);

function handleSheet(json){

const rows =
json.table.rows || [];

const data =
rows.map((r,index) => {

const c = r.c || [];

return {

id:index + 1,

date: c[0]?.v || '',
title: c[1]?.v || '',
text: c[2]?.v || '',
image: c[3]?.v || '',
youtube: c[4]?.v || '',
city: c[5]?.v || ''

};

});

render(data);

}

function render(data){

const latestNews =
document.getElementById('latestNews');

latestNews.innerHTML = '';

let showData = data;

if(targetId){

showData =
data.filter(x => String(x.id) === String(targetId));

}else{

showData =
data.slice(0,5);

}

showData.forEach(item => {

latestNews.innerHTML += buildCard(item);

});

}

function buildCard(item){

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html';

return `

<div class="card">

<div class="date">
${item.date}
</div>

<div class="title">
${item.title}
</div>

<div class="text">
${item.text}
</div>

${item.image ?
`<img class="thumb" src="${item.image}">`
:''}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

<button
class="copy-btn"
onclick="copyShareUrl(${item.id})">
URLコピー
</button>

</div>

</div>

`;

}

function copyShareUrl(id){

const text =
`NSAW暮らし情報局
https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html`;

navigator.clipboard.writeText(text);

alert('URLをコピーしました');

}

</script>

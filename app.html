<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:16px 12px 80px;
}

.top{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.top img{
  width:100%;
  display:block;
}

.topInner{
  padding:20px 16px 24px;
}

.topTitle{
  font-size:34px;
  line-height:1.3;
  font-weight:900;
}

.topText{
  margin-top:14px;
  font-size:18px;
  line-height:1.7;
  font-weight:700;
  color:#48617b;
}

.nameBox{
  margin-top:18px;
}

.nameLabel{
  font-size:18px;
  font-weight:900;
  margin-bottom:10px;
}

.nameInput{
  width:100%;
  border:none;
  background:#edf4fb;
  border-radius:18px;
  padding:18px 16px;
  font-size:22px;
  font-weight:700;
}

.btns{
  margin-top:20px;
  display:grid;
  gap:14px;
}

.bigBtn{
  border:none;
  border-radius:22px;
  padding:22px 18px;
  color:#fff;
  font-size:24px;
  line-height:1.5;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.message{
  margin-top:18px;
  background:#fff;
  border-radius:22px;
  padding:20px 18px;
  text-align:center;
  font-size:22px;
  line-height:1.6;
  font-weight:900;
  display:none;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.linkBtn{
  display:block;
  margin-top:20px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:20px;
  padding:18px 14px;
  font-size:22px;
  font-weight:900;
}

.footer{
  margin-top:30px;
  text-align:center;
  font-size:16px;
  color:#678;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <img
      src="https://drive.google.com/thumbnail?id=1weO1_pqGhYZ2fw7mNWad8NN6diA8TQfd&sz=w1200"
    >

    <div class="topInner">

      <div class="topTitle">
        NSAW 暮らし情報局
      </div>

      <div class="topText">
        地域の暮らし情報と、
        安否確認をつなぐページです。
      </div>

      <div class="nameBox">

        <div class="nameLabel">
          登録名
        </div>

        <input
          id="nameInput"
          class="nameInput"
          placeholder="お名前を入力"
        >

      </div>

      <div class="btns">

        <button
          class="bigBtn green"
          onclick="sendSafety('😊 元気です')"
        >
          😊 元気です
        </button>

        <button
          class="bigBtn yellow"
          onclick="sendSafety('😥 困っています')"
        >
          😥 困っています
        </button>

        <button
          class="bigBtn red"
          onclick="sendSafety('🚨 急いで助けてください')"
        >
          🚨 急いで助けてください
        </button>

      </div>

      <div
        id="message"
        class="message"
      ></div>

      <a
        class="linkBtn"
        href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/admin.html"
      >
        📋 管理ページを見る
      </a>

    </div>

  </div>

  <div class="footer">
    NSAW 暮らし情報局
  </div>

</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbxsEqsi1YQ7eU4ZSTzN35ZdAdxeLBlu2ztJXFiEde5177ABnpyrmWFakvOTXAubSqrj/exec";

const messageBox =
document.getElementById("message");

function showMessage(text){

  messageBox.style.display = "block";

  messageBox.innerHTML = text;

}

function saveName(name){

  localStorage.setItem(
    "nsaw_name",
    name
  );

}

function loadName(){

  const saved =
    localStorage.getItem(
      "nsaw_name"
    );

  if(saved){

    document.getElementById(
      "nameInput"
    ).value = saved;

  }

}

function sendSafety(status){

  const name =
    document.getElementById(
      "nameInput"
    ).value.trim();

  if(!name){

    alert("名前を入力してください");

    return;

  }

  saveName(name);

  navigator.geolocation.getCurrentPosition(

    function(pos){

      sendData(
        name,
        status,
        pos.coords.latitude,
        pos.coords.longitude
      );

    },

    function(){

      sendData(
        name,
        status,
        "",
        ""
      );

    }

  );

}

function sendData(
  name,
  status,
  lat,
  lng
){

  fetch(
    GAS_URL,
    {
      method:"POST",
      body:JSON.stringify({
        name:name,
        status:status,
        lat:lat,
        lng:lng
      })
    }
  )
  .then(r => r.json())
  .then(function(){

    showMessage(
      "送信しました。<br>ありがとうございます。"
    );

  })
  .catch(function(){

    showMessage(
      "送信エラー"
    );

  });

}

loadName();
</script>

</body>
</html>

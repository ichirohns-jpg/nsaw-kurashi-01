<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.card{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
  text-align:center;
}

.label{
  margin-top:24px;
  font-size:18px;
  font-weight:900;
}

.input{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#edf4fb;
  padding:18px 16px;
  font-size:24px;
  font-weight:700;
}

.btns{
  margin-top:24px;
  display:grid;
  gap:14px;
}

.mainBtn{
  width:100%;
  border:none;
  border-radius:22px;
  padding:22px 14px;
  color:#fff;
  font-size:24px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.blue{
  background:#2563eb;
}

.orange{
  background:#ea580c;
}

.gray{
  background:#475569;
}

.purple{
  background:#7c3aed;
}

.message{
  display:none;
  margin-top:18px;
  background:#f0fdf4;
  border:2px solid #bbf7d0;
  border-radius:18px;
  padding:18px 14px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#166534;
}

.section{
  margin-top:34px;
}

.sectionTitle{
  font-size:30px;
  line-height:1.5;
  font-weight:900;
}

.cityGrid{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.cityCard{
  border-radius:26px;
  padding:18px 16px;
  color:#fff;
}

.cityName{
  font-size:28px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.citySub{
  margin-top:6px;
  font-size:20px;
  line-height:1.5;
  font-weight:900;
  text-align:center;
}

.linkBtns{
  margin-top:14px;
  display:grid;
  gap:10px;
}

.linkBtn{
  display:block;
  border-radius:18px;
  padding:14px 12px;
  text-decoration:none;
  text-align:center;
  color:#17324d;
  background:rgba(255,255,255,.92);
  font-size:18px;
  font-weight:900;
}

.lifeGrid{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.lifeBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:130px;
  border-radius:28px;
  padding:20px 14px;
  text-decoration:none;
  color:#fff;
  text-align:center;
  font-size:26px;
  line-height:1.5;
  font-weight:900;
}

.back{
  display:block;
  margin-top:34px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="./top.jpg"
      alt="安否確認"
    >

    <div class="inner">

      <div class="title">
        安否確認ページ
      </div>

      <div class="text">
        今日の状態を送信してください。
      </div>

      <div class="label">
        お名前
      </div>

      <input
        id="nameInput"
        class="input"
        placeholder="お名前を入力"
      >

      <div class="btns">

        <button
          class="mainBtn green"
          onclick="sendSafety('😊 元気です')"
        >
          😊 元気です
        </button>

        <button
          class="mainBtn yellow"
          onclick="sendSafety('😥 困っています')"
        >
          😥 困っています
        </button>

        <button
          class="mainBtn red"
          onclick="sendSafety('🚨 急いで助けてください')"
        >
          🚨 急いで助けてください
        </button>

      </div>

      <div
        id="message"
        class="message"
      >
        送信しました
      </div>

      <div class="section">

        <div class="sectionTitle">
          地域包括支援センター
        </div>

        <div class="cityGrid">

          <div class="cityCard blue">

            <div class="cityName">
              志木市
            </div>

            <div class="citySub">
              地域包括
            </div>

            <div class="linkBtns">

              <a
                class="linkBtn"
                href="tel:0484731111"
              >
                TEL
              </a>

              <a
                class="linkBtn"
                href="https://www.city.shiki.lg.jp/"
                target="_blank"
              >
                HP
              </a>

            </div>

          </div>

          <div class="cityCard green">

            <div class="cityName">
              新座市
            </div>

            <div class="citySub">
              地域包括
            </div>

            <div class="linkBtns">

              <a
                class="linkBtn"
                href="tel:0484776891"
              >
                TEL
              </a>

              <a
                class="linkBtn"
                href="https://www.city.niiza.lg.jp/"
                target="_blank"
              >
                HP
              </a>

            </div>

          </div>

          <div class="cityCard orange">

            <div class="cityName">
              朝霞市
            </div>

            <div class="citySub">
              地域包括
            </div>

            <div class="linkBtns">

              <a
                class="linkBtn"
                href="tel:0484631921"
              >
                TEL
              </a>

              <a
                class="linkBtn"
                href="https://www.city.asaka.lg.jp/"
                target="_blank"
              >
                HP
              </a>

            </div>

          </div>

          <div class="cityCard gray">

            <div class="cityName">
              和光市
            </div>

            <div class="citySub">
              地域包括
            </div>

            <div class="linkBtns">

              <a
                class="linkBtn"
                href="tel:0484249123"
              >
                TEL
              </a>

              <a
                class="linkBtn"
                href="https://www.city.wako.lg.jp/"
                target="_blank"
              >
                HP
              </a>

            </div>

          </div>

        </div>

      </div>

      <div class="section">

        <div class="sectionTitle">
          近くの生活情報
        </div>

        <div class="lifeGrid">

          <a
            class="lifeBtn blue"
            href="https://www.google.com/maps/search/近くのコンビニ/"
            target="_blank"
          >
            🏪<br>
            コンビニ
          </a>

          <a
            class="lifeBtn green"
            href="https://www.google.com/maps/search/近くのトイレ/"
            target="_blank"
          >
            🚻<br>
            トイレ
          </a>

          <a
            class="lifeBtn red"
            href="https://www.google.com/maps/search/近くの病院/"
            target="_blank"
          >
            🏥<br>
            病院
          </a>

          <a
            class="lifeBtn purple"
            href="https://www.google.com/maps/search/近くの薬局/"
            target="_blank"
          >
            💊<br>
            薬局
          </a>

        </div>

      </div>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzKgfSyvUtaeDeUNP3Al5xY--qOjvYnqKzYiQMaWxUzgqem4-GvoNzr8xC9y8QwZ5cA/exec";

const messageBox =
document.getElementById("message");

function saveName(name){

  localStorage.setItem(
    "nsaw_name",
    name
  );

}

function loadName(){

  const saved =
    localStorage.getItem(
      "nsaw_name"
    );

  if(saved){

    document.getElementById(
      "nameInput"
    ).value = saved;

  }

}

function sendSafety(status){

  const name =
    document.getElementById(
      "nameInput"
    ).value.trim();

  if(!name){

    alert("名前を入力してください");

    return;

  }

  saveName(name);

  navigator.geolocation.getCurrentPosition(

    function(pos){

      sendData(
        name,
        status,
        pos.coords.latitude,
        pos.coords.longitude
      );

    },

    function(){

      sendData(
        name,
        status,
        "",
        ""
      );

    }

  );

}

function sendData(
  name,
  status,
  lat,
  lng
){

  const url =
    GAS_URL
    + "?name="
    + encodeURIComponent(name)
    + "&status="
    + encodeURIComponent(status)
    + "&lat="
    + encodeURIComponent(lat || "")
    + "&lng="
    + encodeURIComponent(lng || "")
    + "&t="
    + Date.now();

  const img =
    new Image();

  img.src = url;

  messageBox.style.display =
    "block";

}

loadName();

</script>

</body>
</html>

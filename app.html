<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<style>

*{
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  background:#eef7fb;
  color:#17324d;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:14px;
}

.hero{
  background:linear-gradient(180deg,#ffffff 0%,#e8f7ef 100%);
  border:4px solid #0d8b46;
  border-radius:28px;
  padding:26px 18px 24px;
  margin-bottom:22px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.hero-main{
  font-size:42px;
  line-height:1.2;
  font-weight:900;
  color:#00843d;
}

.hero-area{
  display:inline-block;
  margin-top:14px;
  padding:8px 18px;
  border-radius:999px;
  background:#0d8b46;
  color:#fff;
  font-size:22px;
  font-weight:900;
}

.hero-sub{
  margin-top:14px;
  font-size:22px;
  line-height:1.6;
  font-weight:900;
}

.top-buttons{
  margin-bottom:20px;
}

.status{
  text-align:center;
  font-size:24px;
  font-weight:900;
  padding:30px 10px;
}

.section-title{
  font-size:34px;
  font-weight:900;
  color:#007a3d;
  margin:36px 0 18px;
}

.card{
  background:#ffffff;
  border-radius:24px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.date{
  font-size:18px;
  color:#607080;
  font-weight:900;
}

.type{
  display:inline-block;
  margin-top:10px;
  padding:8px 14px;
  border-radius:999px;
  background:#dff3e8;
  color:#007a3d;
  font-size:17px;
  font-weight:900;
}

.title{
  font-size:30px;
  line-height:1.45;
  font-weight:900;
  margin:18px 0;
}

.desc{
  font-size:21px;
  line-height:1.85;
  font-weight:800;
  white-space:pre-wrap;
}

.mainimg{
  width:100%;
  display:block;
  border-radius:20px;
  margin:16px 0;
}

.btn{
  display:block;
  text-align:center;
  text-decoration:none;
  background:#0d8b46;
  color:#ffffff;
  padding:20px 14px;
  margin:14px 0;
  border-radius:20px;
  font-size:23px;
  font-weight:900;
}

.btn.blue{
  background:#1976d2;
}

.video{
  width:100%;
  aspect-ratio:16/9;
  border:0;
  border-radius:18px;
  margin-top:16px;
}

.footer{
  text-align:center;
  color:#6c7f8d;
  font-size:15px;
  line-height:1.8;
  padding:24px 0 10px;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="hero">

    <div class="hero-main" id="heroTitle">
      暮らし瓦版
    </div>

    <div class="hero-area">
      志木・新座・朝霞・和光
    </div>

    <div class="hero-sub">
      暮らし情報と地域メディアを<br>
      見やすくまとめています
    </div>

  </div>

  <div class="top-buttons">

    <a
      href="#kurashi"
      class="btn"
      style="margin-top:0;"
    >
      暮らし情報を見る
    </a>

    <a
      href="#media"
      class="btn blue"
    >
      地域メディアを見る
    </a>

  </div>

  <div id="content" class="status">
    読み込み中です…
  </div>

  <div class="footer">
    NSAW 暮らし情報局<br>
    地域生活テレビ
  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const GVIZ_URL =
"https://docs.google.com/spreadsheets/d/" +
SHEET_ID +
"/gviz/tq?tqx=out:json;responseHandler:handleSheet";

function cell(row,index){

  if(!row.c[index]) return "";

  if(row.c[index].f) return String(row.c[index].f);

  if(row.c[index].v == null) return "";

  return String(row.c[index].v);

}

function formatDate(value){

  if(!value) return "";

  if(value.startsWith("Date(")){

    const nums = value.match(/\d+/g);

    if(nums && nums.length >= 3){

      const year = Number(nums[0]);
      const month = Number(nums[1]) + 1;
      const day = Number(nums[2]);

      return year + "年" + month + "月" + day + "日";

    }
  }

  return value;

}

function esc(text){

  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

}

function youtubeEmbed(url){

  if(!url) return "";

  let id = "";

  if(url.includes("youtu.be/")){

    id =
      url
      .split("youtu.be/")[1]
      .split(/[?&]/)[0];

  }

  else if(url.includes("watch?v=")){

    id =
      url
      .split("watch?v=")[1]
      .split(/[?&]/)[0];

  }

  else if(url.includes("/shorts/")){

    id =
      url
      .split("/shorts/")[1]
      .split(/[?&]/)[0];

  }

  else if(url.includes("/embed/")){

    return url;

  }

  return id
    ? "https://www.youtube.com/embed/" + id
    : "";

}

function button(title,url,blue){

  if(!title || !url) return "";

  return `
    <a
      class="btn ${blue ? "blue" : ""}"
      href="${esc(url)}"
      target="_blank"
      rel="noopener"
    >
      ${esc(title)}
    </a>
  `;

}

function createCard(item){

  const embedUrl =
    youtubeEmbed(item.mediaUrl);

  return `

    <div class="card">

      <div class="date">
        ${esc(item.date)}
      </div>

      <div class="type">
        ${esc(item.type || "情報")}
      </div>

      <div class="title">
        ${esc(item.title)}
      </div>

      ${
        item.image &&
        item.image.startsWith("http")
        ? `
          <img
            class="mainimg"
            src="${esc(item.image)}"
          >
        `
        : ""
      }

      ${
        item.desc
        ? `
          <div class="desc">
            ${esc(item.desc)}
          </div>
        `
        : ""
      }

      ${button(item.info1Title,item.info1Url,false)}
      ${button(item.info2Title,item.info2Url,false)}
      ${button(item.info3Title,item.info3Url,false)}
      ${button(item.info4Title,item.info4Url,false)}
      ${button(item.info5Title,item.info5Url,false)}

      ${
        item.videoTitle
        ? `
          <div class="title">
            ${esc(item.videoTitle)}
          </div>
        `
        : ""
      }

      ${
        item.videoDesc
        ? `
          <div class="desc">
            ${esc(item.videoDesc)}
          </div>
        `
        : ""
      }

      ${
        embedUrl
        ? `
          <iframe
            class="video"
            src="${embedUrl}"
            allowfullscreen>
          </iframe>
        `
        : ""
      }

    </div>

  `;

}

function handleSheet(json){

  const rows =
    json.table.rows || [];

  const infoItems = [];
  const mediaItems = [];

  rows.forEach(row=>{

    const display =
      cell(row,18);

    if(display !== "はい") return;

    const item = {

      date:
        formatDate(cell(row,0)),

      title:
        cell(row,2),

      image:
        cell(row,3),

      desc:
        cell(row,4),

      info1Title:
        cell(row,5),

      info1Url:
        cell(row,6),

      info2Title:
        cell(row,7),

      info2Url:
        cell(row,8),

      info3Title:
        cell(row,9),

      info3Url:
        cell(row,10),

      info4Title:
        cell(row,11),

      info4Url:
        cell(row,12),

      info5Title:
        cell(row,13),

      info5Url:
        cell(row,14),

      videoTitle:
        cell(row,15),

      videoDesc:
        cell(row,16),

      mediaUrl:
        cell(row,17),

      sortDate:
        Number(cell(row,19)) || 0,

      order:
        Number(cell(row,20)) || 0,

      type:
        cell(row,21),

      month:
        cell(row,22)

    };

    if(item.type === "メディア"){

      mediaItems.push(item);

    }else{

      infoItems.push(item);

    }

  });

  infoItems.sort((a,b)=>{

    if(b.sortDate !== a.sortDate){

      return b.sortDate - a.sortDate;

    }

    return b.order - a.order;

  });

  mediaItems.sort((a,b)=>{

    if(b.sortDate !== a.sortDate){

      return b.sortDate - a.sortDate;

    }

    return b.order - a.order;

  });

  const topDate =
    infoItems.length > 0
    ? infoItems[0].date
    : "";

  if(topDate){

    document.getElementById("heroTitle").innerHTML =
      topDate + "<br>の暮らし瓦版";

  }

  let html = "";

  html += `
    <div
      class="section-title"
      id="kurashi"
    >
      暮らし情報
    </div>
  `;

  infoItems
    .slice(0,5)
    .forEach(item=>{

      html += createCard(item);

    });

  html += `
    <div
      class="section-title"
      id="media"
    >
      地域メディア
    </div>
  `;

  if(mediaItems.length === 0){

    html += `
      <div class="card">

        <div class="title">
          過去の地域メディアを見る
        </div>

        <div class="desc">
          本日は新しい地域メディア投稿がありません。
        </div>

      </div>
    `;

  }else{

    mediaItems
      .slice(0,5)
      .forEach(item=>{

        html += createCard(item);

      });

  }

  const content =
    document.getElementById("content");

  content.className = "";

  content.innerHTML = html;

}

function handleError(){

  document.getElementById("content").innerHTML =
    "読み込みに失敗しました。";

}

const script =
  document.createElement("script");

script.src = GVIZ_URL;

script.onerror = handleError;

document.body.appendChild(script);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<meta name="description"
      content="四市の暮らし情報・電話帳・地図・安心サポート">

<meta property="og:title"
      content="NSAW 暮らし情報局">

<meta property="og:description"
      content="四市の暮らし情報・電話帳・地図・安心サポート">

<meta property="og:image"
      content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<meta property="og:type"
      content="website">

<meta property="og:url"
      content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html">

<meta name="twitter:card"
      content="summary_large_image">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  color:#14324a;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:0 12px 40px;
}

/* 安否確認 */

.fixedBar{
  position:sticky;
  top:0;
  z-index:9999;
  background:#eef8f5;
  padding:8px 0 10px;
}

.miniOpenBtn{
  width:100%;
  border:none;
  border-radius:18px;
  background:#16864a;
  color:#ffffff;
  padding:14px 12px;
  font-size:19px;
  font-weight:900;
  box-shadow:0 4px 10px rgba(0,0,0,.12);
}

.safetyPanel{
  display:none;
  margin-top:10px;
  background:#ffffff;
  border-radius:22px;
  padding:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.nameMiniRow{
  display:flex;
  gap:8px;
  align-items:center;
}

.nameMiniText{
  flex:1;
  font-size:16px;
  font-weight:900;
  color:#145c37;
}

.nameChangeBtn{
  border:none;
  border-radius:12px;
  background:#3476d6;
  color:#ffffff;
  padding:10px 12px;
  font-size:15px;
  font-weight:900;
}

.nameEditArea{
  display:none;
  margin-top:10px;
  gap:8px;
}

.nameInput{
  width:100%;
  border:2px solid #c7d8cf;
  border-radius:14px;
  padding:12px;
  font-size:18px;
  font-weight:800;
}

.nameSave{
  border:none;
  border-radius:14px;
  background:#16864a;
  color:#ffffff;
  padding:12px 16px;
  font-size:16px;
  font-weight:900;
}

.safeBtn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px 12px;
  margin-top:10px;
  font-size:22px;
  font-weight:900;
  color:#ffffff;
}

.greenBtn{
  background:#16a34a;
}

.yellowBtn{
  background:#f59e0b;
}

.redBtn{
  background:#dc2626;
}

.statusMsg{
  display:none;
  background:#ffffff;
  border:3px solid #16a34a;
  border-radius:18px;
  padding:14px;
  margin-top:12px;
  font-size:18px;
  font-weight:900;
  text-align:center;
  color:#146c36;
}

/* タイトル */

.top{
  background:#ffffff;
  border:5px solid #16864a;
  border-radius:28px;
  padding:24px 18px;
  text-align:center;
  margin:14px 0 18px;
  box-shadow:0 8px 22px rgba(0,0,0,.08);
}

.top h1{
  margin:0;
  font-size:38px;
  line-height:1.25;
  color:#118047;
  font-weight:900;
}

.top p{
  margin:14px 0 0;
  font-size:20px;
  line-height:1.5;
  font-weight:800;
  color:#31465a;
}

/* メインボタン */

.contactPanel{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-bottom:24px;
}

.contactBtn{
  display:block;
  text-decoration:none;
  text-align:center;
  color:#ffffff;
  font-size:24px;
  font-weight:900;
  border-radius:22px;
  padding:22px 12px;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
  border:none;
}

.telBtn{
  background:#2563eb;
}

.mapBtn{
  background:#0f766e;
}

.cityMapBtn{
  background:#7c3aed;
}

.homeRegisterBtn{
  background:#15803d;
}

.homeBtn{
  background:#ea580c;
}

/* SNS */

.snsBox{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin:26px 0;
}

.snsBtn{
  border:none;
  border-radius:22px;
  color:#ffffff;
  padding:20px 14px;
  font-size:22px;
  font-weight:900;
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.fbBtn{
  background:#1877f2;
}

.xBtn{
  background:#111111;
}

.lineBtn{
  background:#06c755;
}

.copyBtn{
  background:#666666;
}

/* 記事 */

.card{
  background:#ffffff;
  border-radius:28px;
  padding:24px 20px;
  margin-bottom:28px;
  box-shadow:0 10px 26px rgba(0,0,0,.10);
}

.date{
  font-size:26px;
  font-weight:900;
  color:#647386;
  margin-bottom:16px;
}

.title{
  font-size:34px;
  line-height:1.3;
  font-weight:900;
  margin:0 0 18px;
  color:#102e4a;
}

.image{
  width:100%;
  border-radius:22px;
  margin-bottom:20px;
  display:block;
}

.description{
  font-size:18px;
  line-height:1.7;
  font-weight:700;
  color:#2d4055;
  margin-bottom:20px;
}

.loading{
  text-align:center;
  font-size:24px;
  font-weight:900;
  padding:40px 0;
}

</style>
</head>

<body>

<div class="wrap">

  <!-- 安否 -->

  <div class="fixedBar">

    <button class="miniOpenBtn"
      onclick="toggleSafetyPanel()">

      😊 安否確認・困りごと

    </button>

    <div id="safetyPanel"
         class="safetyPanel">

      <div class="nameMiniRow">

        <div id="nameMiniText"
             class="nameMiniText">

          登録名：未設定

        </div>

        <button class="nameChangeBtn"
          onclick="toggleNameEdit()">

          変更

        </button>

      </div>

      <div id="nameEditArea"
           class="nameEditArea">

        <input id="nameInput"
          class="nameInput"
          placeholder="例：山口さん">

        <button class="nameSave"
          onclick="saveName()">

          保存

        </button>

      </div>

      <button class="safeBtn greenBtn"
        onclick="sendSafety('genki')">

        😊 元気です

      </button>

      <button class="safeBtn yellowBtn"
        onclick="sendSafety('komari')">

        😥 何かに困っています

      </button>

      <button class="safeBtn redBtn"
        onclick="sendSafety('kyukyu')">

        🚨 急いで助けてください

      </button>

      <div id="statusMsg"
           class="statusMsg"></div>

    </div>

  </div>

  <!-- タイトル -->

  <div class="top">

    <h1>
      NSAW<br>
      暮らし情報局
    </h1>

    <p>
      四市の暮らし情報を
      見やすくまとめています
    </p>

  </div>

  <!-- メインボタン -->

  <div class="contactPanel">

    <a class="contactBtn telBtn"
       href="./phone.html">

       📞 電話帳

    </a>

    <button class="contactBtn mapBtn"
      onclick="openCurrentLocationMap()">

      🗺 今いる場所

    </button>

    <a class="contactBtn cityMapBtn"
       href="./map.html">

       🗺 四市マップ

    </a>

    <button class="contactBtn homeRegisterBtn"
      onclick="registerHomeLocation()">

      🏠 今いる場所を家として登録

    </button>

    <button class="contactBtn homeBtn"
      onclick="goHome()">

      🏠 家に帰る

    </button>

  </div>

  <!-- SNS -->

  <div class="snsBox">

    <button class="snsBtn fbBtn"
      onclick="shareFacebook()">

      Facebookでシェア

    </button>

    <button class="snsBtn xBtn"
      onclick="shareX()">

      Xでシェア

    </button>

    <button class="snsBtn lineBtn"
      onclick="shareLine()">

      LINEでシェア

    </button>

    <button class="snsBtn copyBtn"
      onclick="copyUrl()">

      URLコピー

    </button>

  </div>

  <!-- 記事 -->

  <div id="app"
       class="loading">

       読み込み中です...

  </div>

</div>

<script>

const SHARE_URL =
"https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html";

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbz4kvlKDo93xyUfmExcgHj9MqLhyCyxemGM0RWkysNQ_vlAx8AWvPk9McfbJrvM4NIJ/exec";

const app =
document.getElementById("app");

/* 開閉 */

function toggleSafetyPanel(){

  const panel =
    document.getElementById("safetyPanel");

  panel.style.display =
    panel.style.display === "block"
    ? "none"
    : "block";

}

function toggleNameEdit(){

  const area =
    document.getElementById("nameEditArea");

  area.style.display =
    area.style.display === "flex"
    ? "none"
    : "flex";

}

/* 名前 */

function initName(){

  const saved =
    localStorage.getItem("nsaw_name") || "";

  document.getElementById("nameInput").value =
    saved;

  if(saved){

    document.getElementById("nameMiniText")
      .innerText =
      "登録名：" + saved;

  }

}

function saveName(){

  const name =
    document.getElementById("nameInput")
    .value
    .trim();

  if(name){

    localStorage.setItem(
      "nsaw_name",
      name
    );

    document.getElementById("nameMiniText")
      .innerText =
      "登録名：" + name;

  }

  document.getElementById("nameEditArea")
    .style.display = "none";

}

/* 安否 */

function sendSafety(status){

  const name =
    localStorage.getItem("nsaw_name")
    || "名前未設定";

  const url =
    GAS_URL
    + "?name="
    + encodeURIComponent(name)
    + "&status="
    + encodeURIComponent(status)
    + "&t="
    + Date.now();

  fetch(url,{mode:"no-cors"});

  alert("送信しました");

}

/* 現在地 */

function openCurrentLocationMap(){

  navigator.geolocation.getCurrentPosition(

    function(pos){

      const lat =
        pos.coords.latitude;

      const lng =
        pos.coords.longitude;

      window.open(
        "https://www.google.com/maps?q="
        + lat
        + ","
        + lng,
        "_blank"
      );

    }

  );

}

/* 自宅登録 */

function registerHomeLocation(){

  const ok = confirm(
`※ 自宅情報は、このスマートフォンの中だけに保存されます。
他の人やインターネットには公開されません。

※ 「急いで助けてください」を押した時だけ、
現在地情報を支援側へ送ります。`
  );

  if(!ok) return;

  navigator.geolocation.getCurrentPosition(

    function(pos){

      localStorage.setItem(
        "nsaw_home_lat",
        pos.coords.latitude
      );

      localStorage.setItem(
        "nsaw_home_lng",
        pos.coords.longitude
      );

      alert("自宅位置を登録しました");

    }

  );

}

/* 家へ */

function goHome(){

  const lat =
    localStorage.getItem(
      "nsaw_home_lat"
    );

  const lng =
    localStorage.getItem(
      "nsaw_home_lng"
    );

  if(!lat || !lng){

    alert(
      "先に自宅登録してください"
    );

    return;

  }

  window.open(
    "https://www.google.com/maps/dir/?api=1&destination="
    + lat
    + ","
    + lng,
    "_blank"
  );

}

/* SNS */

function shareFacebook(){

  const text =
`NSAW 暮らし情報局

四市の暮らし情報・電話帳・地図・安心サポート`;

  navigator.clipboard.writeText(
    text + "\n" + SHARE_URL
  );

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u="
    + encodeURIComponent(SHARE_URL),
    "_blank"
  );

}

function shareX(){

  window.open(
    "https://twitter.com/intent/tweet?url="
    + encodeURIComponent(SHARE_URL)
    + "&text="
    + encodeURIComponent(
      "NSAW 暮らし情報局"
    ),
    "_blank"
  );

}

function shareLine(){

  window.open(
    "https://social-plugins.line.me/lineit/share?url="
    + encodeURIComponent(SHARE_URL),
    "_blank"
  );

}

function copyUrl(){

  navigator.clipboard.writeText(
    SHARE_URL
  );

  alert(
    "シェアURLをコピーしました"
  );

}

/* シート */

function cell(row,index){

  if(!row.c) return "";

  if(!row.c[index]) return "";

  return (
    row.c[index].f
    || row.c[index].v
    || ""
  );

}

function fixDriveImage(url){

  if(!url) return "";

  url = String(url);

  let match =
    url.match(/\/d\/([a-zA-Z0-9_-]+)/);

  if(match){

    return (
      "https://drive.google.com/thumbnail?id="
      + match[1]
      + "&sz=w1200"
    );

  }

  return url;

}

function render(rows){

  app.className = "";

  app.innerHTML = "";

  rows.forEach(function(row){

    const card =
      document.createElement("div");

    card.className = "card";

    const image =
      fixDriveImage(
        cell(row,3)
      );

    card.innerHTML = `

      <div class="date">
        ${cell(row,0)}
      </div>

      <h2 class="title">
        ${cell(row,2)}
      </h2>

      ${
        image
        ? `<img class="image" src="${image}">`
        : ""
      }

      <div class="description">
        ${cell(row,4)}
      </div>

    `;

    app.appendChild(card);

  });

}

window.handleSheet = function(json){

  render(
    json.table.rows
  );

};

function loadSheet(){

  const script =
    document.createElement("script");

  script.src =
    "https://docs.google.com/spreadsheets/d/"
    + SHEET_ID
    + "/gviz/tq?sheet="
    + encodeURIComponent(SHEET_NAME)
    + "&tqx=out:json;responseHandler:handleSheet&v="
    + Date.now();

  document.body.appendChild(script);

}

initName();
loadSheet();

</script>

</body>
</html>

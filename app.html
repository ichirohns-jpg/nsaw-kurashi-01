<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認ページ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:30px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:16px;
  font-size:18px;
  line-height:1.7;
  font-weight:700;
  color:#5c7084;
  text-align:center;
}

.label{
  margin-top:24px;
  font-size:18px;
  font-weight:900;
}

.input{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:20px;
  background:#edf4fb;
  padding:18px 16px;
  font-size:24px;
  font-weight:700;
}

.btns{
  margin-top:24px;
  display:grid;
  gap:14px;
}

.btn{
  border:none;
  border-radius:22px;
  padding:22px 16px;
  color:#fff;
  font-size:24px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.message{
  display:none;
  margin-top:18px;
  background:#f0fdf4;
  border:2px solid #bbf7d0;
  border-radius:18px;
  padding:18px 14px;
  text-align:center;
  font-size:20px;
  font-weight:900;
  color:#166534;
}

.back{
  display:block;
  margin-top:24px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="./top.jpg"
    >

    <div class="inner">

      <div class="title">
        安否確認ページ
      </div>

      <div class="text">
        今日の状態を送信してください。
      </div>

      <div class="label">
        お名前
      </div>

      <input
        id="nameInput"
        class="input"
        placeholder="お名前を入力"
      >

      <div class="btns">

        <button
          class="btn green"
          onclick="sendSafety('😊 元気です')"
        >
          😊 元気です
        </button>

        <button
          class="btn yellow"
          onclick="sendSafety('😥 困っています')"
        >
          😥 困っています
        </button>

        <button
          class="btn red"
          onclick="sendSafety('🚨 急いで助けてください')"
        >
          🚨 急いで助けてください
        </button>

      </div>

      <div
        id="message"
        class="message"
      >
        送信しました
      </div>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzKgfSyvUtaeDeUNP3Al5xY--qOjvYnqKzYiQMaWxUzgqem4-GvoNzr8xC9y8QwZ5cA/exec";

const messageBox =
document.getElementById("message");

function saveName(name){

  localStorage.setItem(
    "nsaw_name",
    name
  );

}

function loadName(){

  const saved =
    localStorage.getItem(
      "nsaw_name"
    );

  if(saved){

    document.getElementById(
      "nameInput"
    ).value = saved;

  }

}

function sendSafety(status){

  const name =
    document.getElementById(
      "nameInput"
    ).value.trim();

  if(!name){

    alert("名前を入力してください");

    return;

  }

  saveName(name);

  navigator.geolocation.getCurrentPosition(

    function(pos){

      sendData(
        name,
        status,
        pos.coords.latitude,
        pos.coords.longitude
      );

    },

    function(){

      sendData(
        name,
        status,
        "",
        ""
      );

    }

  );

}

function sendData(
  name,
  status,
  lat,
  lng
){

  const url =
    GAS_URL
    + "?name="
    + encodeURIComponent(name)
    + "&status="
    + encodeURIComponent(status)
    + "&lat="
    + encodeURIComponent(lat || "")
    + "&lng="
    + encodeURIComponent(lng || "")
    + "&t="
    + Date.now();

  const img =
    new Image();

  img.src = url;

  messageBox.style.display =
    "block";

}

loadName();

</script>

</body>
</html>

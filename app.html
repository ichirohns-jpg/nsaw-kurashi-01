<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<meta name="description" content="志木・新座・朝霞・和光の暮らし情報を届ける地域テレビ風ページ">

<meta property="og:title" content="NSAW暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/app.html">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#17324d;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:12px;
}

.topimg{
  width:100%;
  border-radius:18px;
  display:block;
  margin-bottom:14px;
}

.section{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-bottom:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.section-title{
  font-size:26px;
  font-weight:900;
  margin-bottom:14px;
  color:#17324d;
}

.video-wrap{
  position:relative;
  width:100%;
  padding-top:56.25%;
  overflow:hidden;
  border-radius:14px;
  background:#000;
}

.video-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.card{
  background:#f7fbff;
  border-radius:16px;
  padding:14px;
  margin-bottom:16px;
}

.date{
  font-size:15px;
  color:#4b6580;
  margin-bottom:6px;
  font-weight:700;
}

.title{
  font-size:25px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:10px;
}

.text{
  font-size:19px;
  line-height:1.9;
  white-space:pre-wrap;
}

.thumb{
  width:100%;
  border-radius:14px;
  margin-top:12px;
}

.sns{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.sns a{
  flex:1;
  text-decoration:none;
  text-align:center;
  padding:14px 8px;
  border-radius:14px;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.fb{
  background:#1877f2;
}

.line{
  background:#06c755;
}

.x{
  background:#000;
}

.loading{
  text-align:center;
  padding:40px;
  font-size:22px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

<img
class="topimg"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg"
>

<div class="section">

<div class="section-title">
今日のお楽しみ動画
</div>

<div id="mainVideo"></div>

</div>

<div class="section">

<div class="section-title">
4市情報
</div>

<div id="cityNews">
<div class="loading">
読み込み中...
</div>
</div>

</div>

<div class="section">

<div class="section-title">
最新5件
</div>

<div id="latestNews">
<div class="loading">
読み込み中...
</div>
</div>

</div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const SHEET_NAME =
'NSAW暮らし情報局_データ';

const url =
'https://docs.google.com/spreadsheets/d/'
+ SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler=handleSheet';

const script =
document.createElement('script');

script.src = url;

document.body.appendChild(script);

function handleSheet(json){

const rows =
json.table.rows || [];

const data = rows.map(r => {

const c = r.c || [];

return {

date: c[0]?.v || '',
title: c[1]?.v || '',
text: c[2]?.v || '',
image: c[3]?.v || '',
youtube: c[4]?.v || '',
city: c[5]?.v || ''

};

});

render(data);

}

function render(data){

const cityWrap =
document.getElementById('cityNews');

const latestWrap =
document.getElementById('latestNews');

const mainVideo =
document.getElementById('mainVideo');

cityWrap.innerHTML = '';
latestWrap.innerHTML = '';

const videoItem =
data.find(x => x.youtube);

if(videoItem){

mainVideo.innerHTML =
`
<div class="video-wrap">
<iframe
src="${youtubeEmbed(videoItem.youtube)}"
allowfullscreen
></iframe>
</div>
`;

}

const cityItems =
data.filter(x => x.city);

cityItems.forEach(item => {

cityWrap.innerHTML += card(item);

});

const latestItems =
data.slice(0,5);

latestItems.forEach(item => {

latestWrap.innerHTML += card(item);

});

}

function card(item){

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html';

return `

<div class="card">

<div class="date">
${item.date}
</div>

<div class="title">
${item.title}
</div>

<div class="text">
${item.text}
</div>

${imageHtml(item.image)}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

</div>

</div>

`;

}

function imageHtml(url){

if(!url) return '';

return `
<img
class="thumb"
src="${url}"
>
`;

}

function youtubeEmbed(url){

if(url.includes('watch?v=')){

return url.replace('watch?v=','embed/');

}

if(url.includes('youtu.be/')){

return 'https://www.youtube.com/embed/' +
url.split('youtu.be/')[1];

}

return url;

}

</script>

</body>
</html>

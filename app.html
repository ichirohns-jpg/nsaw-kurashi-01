<head>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#17324d;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:12px;
}

.topimg{
  width:100%;
  border-radius:18px;
  display:block;
  margin-bottom:14px;
}

.section{
  background:#ffffff;
  border-radius:18px;
  padding:16px;
  margin-bottom:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.section-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:16px;
}

.video-wrap{
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:#000;
  border-radius:16px;
  overflow:hidden;
}

.video-wrap iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

.card{
  background:#f7fbff;
  border-radius:16px;
  padding:16px;
  margin-bottom:18px;
}

.date{
  font-size:15px;
  color:#5a7086;
  font-weight:700;
  margin-bottom:8px;
}

.title{
  font-size:26px;
  line-height:1.5;
  font-weight:900;
  margin-bottom:12px;
}

.text{
  font-size:19px;
  line-height:1.9;
  white-space:pre-wrap;
}

.thumb{
  width:100%;
  border-radius:14px;
  margin-top:14px;
}

.sns{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
}

.sns a,
.copy-btn{
  flex:1;
  border:none;
  text-decoration:none;
  text-align:center;
  color:#fff;
  border-radius:14px;
  padding:15px 8px;
  font-size:18px;
  font-weight:900;
}

.fb{
  background:#1877f2;
}

.line{
  background:#06c755;
}

.x{
  background:#000;
}

.copy-btn{
  background:#ff7a00;
}

.loading{
  text-align:center;
  font-size:24px;
  font-weight:900;
  padding:40px 10px;
}

.archive-btn{
  display:block;
  width:100%;
  text-align:center;
  background:#17324d;
  color:#fff;
  text-decoration:none;
  border-radius:16px;
  padding:18px;
  font-size:22px;
  font-weight:900;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="wrap">

<img
class="topimg"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top-banner.jpg"
>

<div class="section">

<div class="section-title">
今日のお楽しみ動画
</div>

<div id="mainVideo">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<div class="section">

<div class="section-title">
4市情報
</div>

<div id="cityNews">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<div class="section">

<div class="section-title">
最新5件
</div>

<div id="latestNews">

<div class="loading">
読み込み中...
</div>

</div>

<a class="archive-btn" href="#">
アーカイブ（準備中）
</a>

</div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const SHEET_NAME =
'NSAW暮らし情報局_データ';

const JSONP_URL =
'https://docs.google.com/spreadsheets/d/'
+ SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json;responseHandler=handleSheet';

const script =
document.createElement('script');

script.src = JSONP_URL;

document.body.appendChild(script);

function handleSheet(json){

const rows =
json.table.rows || [];

const data =
rows.map(r => {

const c = r.c || [];

return {

date: c[0]?.v || '',
title: c[1]?.v || '',
text: c[2]?.v || '',
image: c[3]?.v || '',
youtube: c[4]?.v || '',
city: c[5]?.v || ''

};

});

render(data);

}

function render(data){

const mainVideo =
document.getElementById('mainVideo');

const cityNews =
document.getElementById('cityNews');

const latestNews =
document.getElementById('latestNews');

cityNews.innerHTML = '';
latestNews.innerHTML = '';

const videoItem =
data.find(x => x.youtube);

if(videoItem){

mainVideo.innerHTML = `
<div class="video-wrap">
<iframe
src="${youtubeEmbed(videoItem.youtube)}"
allowfullscreen
></iframe>
</div>
`;

}else{

mainVideo.innerHTML = `
<div class="loading">
動画がありません
</div>
`;

}

const cityItems =
data.filter(x => x.city);

cityItems.forEach(item => {

cityNews.innerHTML += buildCard(item);

});

const latestItems =
data.slice(0,5);

latestItems.forEach(item => {

latestNews.innerHTML += buildCard(item);

});

}

function buildCard(item){

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html';

return `

<div class="card">

<div class="date">
${escapeHtml(item.date)}
</div>

<div class="title">
${escapeHtml(item.title)}
</div>

<div class="text">
${escapeHtml(item.text)}
</div>

${buildImage(item.image)}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

<button
class="copy-btn"
onclick="copyShareUrl()">
URLコピー
</button>

</div>

</div>

`;

}

function buildImage(url){

if(!url) return '';

return `
<img
class="thumb"
src="${url}"
loading="lazy"
>
`;

}

function youtubeEmbed(url){

if(url.includes('watch?v=')){

return url.replace('watch?v=','embed/');

}

if(url.includes('youtu.be/')){

return 'https://www.youtube.com/embed/' +
url.split('youtu.be/')[1];

}

return url;

}

function copyShareUrl(){

const text =
`NSAW暮らし情報局
https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html`;

navigator.clipboard.writeText(text);

alert('URLをコピーしました');

}

function escapeHtml(str){

return String(str)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#39;');

}

</script>

</body>
</html>

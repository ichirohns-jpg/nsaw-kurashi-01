<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>
body{
  margin:0;
  background:#eef4fa;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  color:#1b2b3a;
}
.header img{
  width:100%;
  display:block;
}
.wrap{
  max-width:760px;
  margin:auto;
  padding:16px;
}
.card{
  background:#fff;
  border-radius:24px;
  padding:22px;
  margin-bottom:22px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
.title{
  font-size:30px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:14px;
}
.text{
  font-size:20px;
  line-height:1.8;
  white-space:pre-wrap;
}
.video iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:18px;
  margin-top:18px;
}
.btn{
  display:block;
  text-align:center;
  text-decoration:none;
  color:white;
  background:#1877f2;
  font-size:20px;
  font-weight:700;
  padding:16px;
  border-radius:16px;
  margin-top:16px;
}
.loading{
  text-align:center;
  padding:80px 20px;
  font-size:26px;
}
</style>
</head>

<body>

<div class="header">
  <img src="top-banner.jpg">
</div>

<div class="wrap" id="app">
  <div class="loading">読み込み中...</div>
</div>

<script>
const SHEET_ID = "1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";
const SHEET_NAME = "NSAW暮らし情報局_データ";

function v(c,i){
  return c[i] && c[i].v != null ? String(c[i].v) : "";
}

function youtube(url){
  if(!url) return "";

  let id = "";

  if(url.includes("watch?v=")){
    id = url.split("watch?v=")[1].split("&")[0];
  }else if(url.includes("youtu.be/")){
    id = url.split("youtu.be/")[1].split("?")[0];
  }else if(url.includes("/shorts/")){
    id = url.split("/shorts/")[1].split("?")[0];
  }

  if(!id) return "";

  return `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`;
}

window.handleSheet = function(json){
  const rows = json.table.rows || [];
  let html = "";

  rows.slice(0,5).forEach((row,index)=>{
    const c = row.c || [];

    const date = v(c,0);
    const title = v(c,1);
    const image = v(c,2);
    const text = v(c,3);
    const videoUrl = v(c,12);

    const shareUrl =
      "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html";

    html += `
      <div class="card">
        <div>${date}</div>
        <div class="title">${title}</div>
        ${image ? `<img src="${image}" style="width:100%;border-radius:18px;margin-bottom:16px;">` : ``}
        <div class="text">${text}</div>
        <div class="video">${youtube(videoUrl)}</div>
        <a class="btn" target="_blank"
        href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
        Facebookでシェア
        </a>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html || "表示する記事がありません";
};

const script = document.createElement("script");
script.src =
  "https://docs.google.com/spreadsheets/d/"
  + SHEET_ID
  + "/gviz/tq?sheet="
  + encodeURIComponent(SHEET_NAME)
  + "&tqx=out:json;responseHandler:handleSheet";
document.body.appendChild(script);
</script>

</body>
</html>

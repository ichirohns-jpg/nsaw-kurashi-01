<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b3a;
}

.header img{
  width:100%;
  display:block;
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:16px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:22px;
  margin-bottom:22px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
  font-size:16px;
  color:#666;
  margin-bottom:12px;
}

.title{
  font-size:32px;
  font-weight:900;
  line-height:1.5;
  margin-bottom:18px;
}

.text{
  font-size:22px;
  line-height:1.9;
  white-space:pre-wrap;
}

.video{
  margin-top:22px;
}

.video iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:18px;
}

.buttons{
  display:flex;
  gap:12px;
  margin-top:24px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  min-width:140px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:20px;
  font-weight:700;
  padding:16px;
  border-radius:16px;
}

.fb{background:#1877f2;}
.line{background:#06c755;}
.x{background:#000;}
.copy{background:#607d8b;}

.loading{
  text-align:center;
  padding:80px 20px;
  font-size:28px;
}

</style>
</head>

<body>

<div class="header">

<img src="top-banner.jpg">

</div>

<div class="wrap" id="app">

<div class="loading">

読み込み中...

</div>

</div>

<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

function v(c,i){

  return c[i] && c[i].v
  ? String(c[i].v)
  : "";
}

function youtube(url){

  if(!url) return "";

  let id = "";

  if(url.includes("watch?v=")){

    id =
    url.split("watch?v=")[1]
    .split("&")[0];

  }else if(url.includes("youtu.be/")){

    id =
    url.split("youtu.be/")[1]
    .split("?")[0];

  }

  if(!id) return "";

  return `
  <iframe
  src="https://www.youtube.com/embed/${id}"
  allowfullscreen>
  </iframe>
  `;
}

window.handleSheet = function(json){

  const rows =
  json.table.rows || [];

  rows.sort((a,b)=>{

    const av =
    a.c[18] && a.c[18].v
    ? Number(a.c[18].v)
    : 0;

    const bv =
    b.c[18] && b.c[18].v
    ? Number(b.c[18].v)
    : 0;

    return bv - av;

  });

  let html = "";

  rows.slice(0,5).forEach((row,index)=>{

    const c = row.c || [];

    const date = v(c,0);
    const title = v(c,1);
    const text = v(c,3);
    const videoUrl = v(c,12);

    const shareUrl =
    "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-00"
    + (index + 1)
    + ".html";

    html += `

    <div class="card">

      <div class="date">

      ${date}

      </div>

      <div class="title">

      ${title}

      </div>

      <div class="text">

      ${text}

      </div>

      <div class="video">

      ${youtube(videoUrl)}

      </div>

      <div class="buttons">

        <a class="btn fb"
        target="_blank"
        href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">

        Facebook

        </a>

        <a class="btn line"
        target="_blank"
        href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">

        LINE

        </a>

        <a class="btn x"
        target="_blank"
        href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">

        X

        </a>

      </div>

    </div>

    `;
  });

  document.getElementById("app").innerHTML =
  html;

};

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler=handleSheet";

document.body.appendChild(script);

</script>

</body>
</html>

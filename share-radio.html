<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>地域ラジオ</title>

<meta property="og:type" content="website">
<meta property="og:site_name" content="NSAW 暮らし情報局">
<meta property="og:title" content="地域ラジオ">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の地域ラジオです。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-radio.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="地域ラジオ">
<meta name="twitter:description" content="志木市・新座市・朝霞市・和光市の地域ラジオです。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:28px 18px;
}

.card{
background:#fff;
border-radius:28px;
padding:28px 22px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
text-align:center;
}

.title{
font-size:36px;
font-weight:900;
margin-bottom:14px;
}

.desc{
font-size:24px;
line-height:1.8;
margin-bottom:22px;
}

.btn{
display:block;
background:#1976d2;
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:900;
padding:20px;
border-radius:18px;
}
</style>

</head>

<body>

<div class="wrap">

<div class="card">

<div class="title">
地域ラジオ
</div>

<div class="desc">
地域ラジオページへ移動します。
</div>

<a
id="goBtn"
class="btn"
href="radio.html">
地域ラジオを開く
</a>

</div>

</div>

<script>

const id=
new URLSearchParams(location.search).get("id") ||
new URLSearchParams(location.search).get("radio") ||
"1";

const targetUrl=
"radio.html?radio="+
encodeURIComponent(id);

document.getElementById("goBtn").href=
targetUrl;

setTimeout(function(){
location.replace(targetUrl);
},600);

</script>

</body>
</html>

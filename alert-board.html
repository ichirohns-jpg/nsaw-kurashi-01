<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>緊急対応ボード</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#fff5f5;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#d32f2f;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:48px;
}

.card{
background:white;
border-left:14px solid #d32f2f;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:34px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:28px;
font-weight:900;
color:#d32f2f;
margin-bottom:10px;
}

.time{
font-size:20px;
color:#666;
margin-bottom:14px;
}

.btnOpen{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>🚨 緊急対応ボード</h1>
</div>

<div id="list"></div>

<a
class="homeBtn"
href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const data = [

{
id:'a001',
name:'山田 太郎',
status:'助けてください',
time:'2026/06/08 15:20'
},

{
id:'a004',
name:'高橋 京子',
status:'助けてください',
time:'2026/06/08 14:55'
}

];

let html='';

data.forEach(row=>{

html += `

<div class="card">

<div class="name">
👤 ${row.name}
</div>

<div class="status">
🚨 ${row.status}
</div>

<div class="time">
${row.time}
</div>

<a
class="btnOpen"
href="person.html?id=${row.id}">

詳細を見る

</a>

</div>

`;

});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>緊急アラートボード</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#fff3f3;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

header{
background:#e53935;
color:#fff;
padding:30px 18px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.alert{
background:#fff;
border-radius:28px;
padding:26px;
margin-bottom:24px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
border-left:16px solid #e53935;
}

.title{
font-size:36px;
font-weight:900;
margin-bottom:12px;
color:#b71c1c;
}

.desc{
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
}

.time{
font-size:22px;
font-weight:900;
color:#607d8b;
margin-top:12px;
}

.btn{
display:block;
margin-top:18px;
padding:22px;
border-radius:18px;
text-align:center;
text-decoration:none;
color:#fff;
font-size:26px;
font-weight:900;
}

.call{
background:#e53935;
}

.map{
background:#1976d2;
}

.back{
background:#607d8b;
}

@media(max-width:700px){

header{
font-size:34px;
}

.title{
font-size:32px;
}

.desc{
font-size:24px;
}

.btn{
font-size:23px;
}

}
</style>
</head>

<body>

<header>
緊急アラートボード
</header>

<div class="wrap">

<div class="alert">

<div class="title">
🚨 助けてください
</div>

<div class="desc">
利用者から緊急の連絡がありました。
電話、訪問、近隣確認など、すぐに対応を検討してください。
</div>

<div class="time">
発生時刻：2026年6月9日 06:10
</div>

<a class="btn call" href="tel:119">
119へ電話
</a>

<a class="btn map" href="support-map.html">
支援マップを開く
</a>

<a class="btn back" href="status-board.html">
状態一覧へ戻る
</a>

</div>

</div>

</body>
</html>

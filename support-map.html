<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>利用者位置マップ</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.filterBox{
display:grid;
grid-template-columns:1fr 1fr 1fr 1fr;
gap:10px;
margin-bottom:20px;
}

.filterBtn{
border:none;
padding:14px;
border-radius:16px;
font-size:18px;
font-weight:900;
color:white;
cursor:pointer;
}

.allBtn{
background:#455a64;
}

.helpBtn{
background:#d32f2f;
}

.warnBtn{
background:#ef6c00;
}

.okBtn{
background:#00897b;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.area{
font-size:20px;
color:#666;
margin-bottom:10px;
}

.status{
font-size:22px;
font-weight:900;
margin-bottom:14px;
line-height:1.8;
}

.ok{
color:#00897b;
}

.warn{
color:#ef6c00;
}

.help{
color:#d32f2f;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
margin-bottom:10px;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}

@media(max-width:768px){

.filterBox{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>📍 利用者位置マップ</h1>
</div>

<div class="filterBox">

<button
class="filterBtn allBtn"
onclick="showAll()">
全員
</button>

<button
class="filterBtn helpBtn"
onclick="showHelp()">
🚨 緊急
</button>

<button
class="filterBtn warnBtn"
onclick="showWarn()">
😓 注意
</button>

<button
class="filterBtn okBtn"
onclick="showOk()">
😊 元気
</button>

</div>

<div id="userList"></div>

<a
class="homeBtn"
href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const users = [

{
id:'a001',
name:'山田 太郎',
area:'志木市 本町',
status:'助けてください',
time:'15:20'
},

{
id:'a002',
name:'佐藤 花子',
area:'新座市 東',
status:'困っています',
time:'14:35'
},

{
id:'a003',
name:'鈴木 一郎',
area:'朝霞市 西原',
status:'元気です',
time:'08:12'
},

{
id:'a004',
name:'高橋 京子',
area:'和光市 丸山台',
status:'元気です',
time:'07:55'
}

];

function draw(list){

let html='';

list.forEach(u=>{

let cls='ok';
let icon='😊';

if(u.status.includes('助け')){
cls='help';
icon='🚨';
}
else if(u.status.includes('困')){
cls='warn';
icon='😓';
}

html += `

<div class="card">

<div class="name">
👤 ${u.name}
</div>

<div class="area">
📍 ${u.area}
</div>

<div class="status ${cls}">
${icon} ${u.status}
<br>
🕒 ${u.time}
</div>

<a
class="btn"
href="person.html?id=${u.id}">
利用者詳細を見る
</a>

<a
class="btn"
href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(u.area)}"
target="_blank">
地図を見る
</a>

</div>

`;

});

document.getElementById('userList').innerHTML =
html;

}

function showAll(){
draw(users);
}

function showHelp(){
draw(
users.filter(
u=>u.status.includes('助け')
)
);
}

function showWarn(){
draw(
users.filter(
u=>u.status.includes('困')
)
);
}

function showOk(){
draw(
users.filter(
u=>u.status.includes('元気')
)
);
}

showAll();

</script>

</body>
</html>

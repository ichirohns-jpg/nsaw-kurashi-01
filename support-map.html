*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#8e24aa;
color:#fff;
padding:28px 18px;
text-align:center;
font-size:40px;
font-weight:900;
line-height:1.3;
}

.wrap{
max-width:1000px;
margin:0 auto;
padding:18px 14px 44px;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.cardInner{
padding:22px;
}

.title{
font-size:34px;
font-weight:900;
line-height:1.45;
margin-bottom:12px;
color:#102a43;
}

.desc{
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
color:#243b53;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
padding:18px;
}

.mapBtn{
display:block;
padding:22px 14px;
border-radius:18px;
color:#fff;
text-decoration:none;
text-align:center;
font-size:24px;
font-weight:900;
line-height:1.45;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.hospital{background:#d32f2f;}
.pharmacy{background:#2e7d32;}
.shelter{background:#fb8c00;}
.care{background:#1976d2;}
.city{background:#455a64;}
.police{background:#283593;}
.toilet{background:#00897b;}
.store{background:#6d4c41;}
.gomap{background:#ef6c00;}

.notice{
background:#fff3cd;
color:#7a4b00;
border-radius:18px;
padding:22px;
margin:20px;
font-size:26px;
line-height:1.6;
font-weight:900;
}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:18px 18px 24px;
}

.share button{
border:0;
border-radius:16px;
padding:20px 10px;
font-size:23px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2;}
.line{background:#06c755;}
.x{background:#000;}
.copy{background:#ff9800;}

<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
地域支援マップ
</title>

<meta property="og:title"
content="地域支援マップ">

<meta property="og:description"
content="病院・薬局・避難所・トイレ・コンビニ">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/img/map.jpg">

<meta name="twitter:card"
content="summary_large_image">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:18px 14px 80px;
}

.topCard{
background:white;
border-radius:32px;
padding:24px;
margin-bottom:28px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.pageTitle{
font-size:58px;
font-weight:900;
margin-bottom:18px;
line-height:1.3;
}

.backBtn{
display:inline-block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px 24px;
border-radius:22px;
font-size:22px;
font-weight:900;
margin-bottom:22px;
}

.desc{
font-size:22px;
line-height:1.9;
color:#607080;
}

.nowBox{
background:#1565c0;
color:white;
padding:24px;
border-radius:28px;
margin-bottom:28px;
box-shadow:
0 6px 18px rgba(0,0,0,.12);
}

.nowTitle{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.nowText{
font-size:22px;
line-height:1.8;
}

.mapGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.mapCard{
background:white;
border-radius:30px;
padding:24px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
text-align:center;
}

.mapIcon{
font-size:68px;
margin-bottom:14px;
}

.mapTitle{
font-size:30px;
font-weight:900;
margin-bottom:14px;
}

.mapText{
font-size:18px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.mapBtn{
display:block;
text-decoration:none;
color:white;
padding:20px;
border-radius:24px;
font-size:22px;
font-weight:900;
text-align:center;
box-shadow:
0 4px 12px rgba(0,0,0,.12);
}

.red{background:#d32f2f;}
.blue{background:#1565c0;}
.green{background:#00897b;}
.orange{background:#ef6c00;}
.purple{background:#8e24aa;}

.gpsBtn{
display:block;
width:100%;
border:none;
background:#00897b;
color:white;
padding:22px;
border-radius:26px;
font-size:26px;
font-weight:900;
margin-top:22px;
box-shadow:
0 6px 18px rgba(0,0,0,.12);
}

@media(max-width:768px){

.pageTitle{
font-size:46px;
}

.mapGrid{
grid-template-columns:1fr;
}

.mapTitle{
font-size:26px;
}

.mapBtn{
font-size:20px;
}

.nowTitle{
font-size:28px;
}

.nowText{
font-size:19px;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="topCard">

<div class="pageTitle">
🗺 地域支援マップ
</div>

<a
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/"
class="backBtn">

⬅ トップへ戻る

</a>

<div class="desc">
病院・薬局・避難所・コンビニ・トイレを、
Googleマップで確認できます。
</div>

</div>

<div class="nowBox">

<div class="nowTitle">
📍 現在地
</div>

<div class="nowText" id="gpsText">
現在地を取得してください
</div>

<button
class="gpsBtn"
onclick="getLocation()">

📡 現在地を取得する

</button>

</div>

<div class="mapGrid">

<div class="mapCard">

<div class="mapIcon">
🏥
</div>

<div class="mapTitle">
病院
</div>

<div class="mapText">
近くの病院を探します
</div>

<a
class="mapBtn red"
target="_blank"
href="https://www.google.com/maps/search/病院">

Googleマップを見る

</a>

</div>

<div class="mapCard">

<div class="mapIcon">
💊
</div>

<div class="mapTitle">
薬局
</div>

<div class="mapText">
近くの薬局を探します
</div>

<a
class="mapBtn blue"
target="_blank"
href="https://www.google.com/maps/search/薬局">

Googleマップを見る

</a>

</div>

<div class="mapCard">

<div class="mapIcon">
🏪
</div>

<div class="mapTitle">
コンビニ
</div>

<div class="mapText">
近くのコンビニを探します
</div>

<a
class="mapBtn green"
target="_blank"
href="https://www.google.com/maps/search/コンビニ">

Googleマップを見る

</a>

</div>

<div class="mapCard">

<div class="mapIcon">
🚻
</div>

<div class="mapTitle">
トイレ
</div>

<div class="mapText">
近くのトイレを探します
</div>

<a
class="mapBtn orange"
target="_blank"
href="https://www.google.com/maps/search/トイレ">

Googleマップを見る

</a>

</div>

<div class="mapCard">

<div class="mapIcon">
🏫
</div>

<div class="mapTitle">
避難所
</div>

<div class="mapText">
近くの避難所を探します
</div>

<a
class="mapBtn purple"
target="_blank"
href="https://www.google.com/maps/search/避難所">

Googleマップを見る

</a>

</div>

</div>

</div>

<script>

function getLocation(){

if(!navigator.geolocation){

document.getElementById(
'gpsText'
).innerHTML =
'位置情報に対応していません';

return;

}

navigator.geolocation.getCurrentPosition(

function(position){

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

document.getElementById(
'gpsText'
).innerHTML =
'緯度：' +
lat +
'<br>経度：' +
lng;

},

function(){

document.getElementById(
'gpsText'
).innerHTML =
'現在地を取得できませんでした';

},

{
enableHighAccuracy:true,
timeout:5000,
maximumAge:0
}

);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
支援者マップ
</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
background:#eef3f8;
color:#17324d;
}

.top{

padding:20px;

background:#ffffff;

box-shadow:
0 4px 12px rgba(0,0,0,.12);

z-index:999;

position:relative;
}

.title{

font-size:36px;

font-weight:900;

margin-bottom:10px;
}

.sub{

font-size:22px;

line-height:1.7;

color:#607080;
}

#map{

width:100%;

height:calc(100vh - 140px);
}

.popup{

font-size:18px;

line-height:1.8;
}

.btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

padding:12px;

border-radius:14px;

text-align:center;

font-weight:900;

margin-top:10px;
}

@media(max-width:768px){

.title{
font-size:30px;
}

.sub{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="top">

<div class="title">
🗺 支援者マップ
</div>

<div class="sub">

利用者の現在地を
一覧表示しています

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const map = L.map('map')
.setView([35.8257,139.5755],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap'
}
).addTo(map);

fetch(
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=利用者管理&tqx=out:json'
)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(
text.substring(47).slice(0,-2)
);

const rows =
json.table.rows;

rows.forEach((row)=>{

const c = row.c;

const name =
c[1]?.v || '';

const status =
c[10]?.v || '';

const urlid =
c[11]?.v || '';

const lat =
parseFloat(c[14]?.v || 0);

const lng =
parseFloat(c[15]?.v || 0);

if(!lat || !lng) return;

let color = 'green';

if(status.includes('困')){

color = 'orange';

}

if(status.includes('助け')){

color = 'red';

}

let radius = 14;

if(status.includes('助け')){

radius = 22;

}

const marker =
L.circleMarker(
[lat,lng],
{
radius:radius,
color:color,
fillColor:color,
fillOpacity:0.9
}
)
.addTo(map);

if(status.includes('助け')){

let flash = true;

setInterval(()=>{

if(flash){

marker.setStyle({
fillOpacity:0.2
});

}else{

marker.setStyle({
fillOpacity:0.95
});

}

flash = !flash;

},500);

}

const userURL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/mamori.html?id=' +
urlid;

const navURL =
'https://www.google.com/maps/dir/?api=1&destination=' +
lat + ',' + lng;

const homeLat =
c[41]?.v || '';

const homeLng =
c[42]?.v || '';

const homeURL =
'https://www.google.com/maps/dir/?api=1&destination=' +
homeLat + ',' + homeLng;

const hospitalURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+病院';

const pharmacyURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+薬局';

const toiletURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+トイレ';

const shelterURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+避難所';

const foodURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+配食';

const marketURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+スーパー';

const storeURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+コンビニ';

const gasURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+ガソリンスタンド';

const careURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+地域包括支援センター';

const cityURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+市役所';

const fireURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+消防署';

const policeURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+警察署';

const bedURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+病院';

const aedURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+AED';

const stationURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+駅';

const busURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+バス停';

const cafeURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+カフェ';

const foodShopURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+飲食店';

const bankURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+銀行';

const postURL =
'https://www.google.com/maps/search/?api=1&query=' +
lat + ',' + lng + '+郵便局';

marker.bindPopup(`

<div class="popup">

<b>${name}</b><br>

状態：${status}

<a
class="btn"
target="_blank"
href="${userURL}">

👤 本人ページを見る

</a>

<a
class="btn"
style="background:#ef6c00;"
target="_blank"
href="${navURL}">

🧭 現在地へ行く

</a>

<a
class="btn"
style="background:#43a047;"
target="_blank"
href="${homeURL}">

🏠 自宅へ戻る

</a>

<a
class="btn"
style="background:#d32f2f;"
href="tel:119">

🚑 119 通報

</a>

<a
class="btn"
style="background:#37474f;"
href="tel:110">

🚓 110 通報

</a>

<a
class="btn"
style="background:#c62828;"
target="_blank"
href="${hospitalURL}">

🏥 近くの病院

</a>

<a
class="btn"
style="background:#00897b;"
target="_blank"
href="${pharmacyURL}">

💊 近くの薬局

</a>

<a
class="btn"
style="background:#546e7a;"
target="_blank"
href="${toiletURL}">

🚻 近くのトイレ

</a>

<a
class="btn"
style="background:#7b1fa2;"
target="_blank"
href="${shelterURL}">

🚨 最寄り避難所

</a>

<a
class="btn"
style="background:#8d6e63;"
target="_blank"
href="${foodURL}">

🍱 配食サービス

</a>

<a
class="btn"
style="background:#2e7d32;"
target="_blank"
href="${marketURL}">

🛒 近くのスーパー

</a>

<a
class="btn"
style="background:#1565c0;"
target="_blank"
href="${storeURL}">

🏪 近くのコンビニ

</a>

<a
class="btn"
style="background:#5d4037;"
target="_blank"
href="${gasURL}">

⛽ ガソリンスタンド

</a>

<a
class="btn"
style="background:#6a1b9a;"
target="_blank"
href="${careURL}">

🧓 地域包括支援センター

</a>

<a
class="btn"
style="background:#455a64;"
target="_blank"
href="${cityURL}">

🏛 市役所

</a>

<a
class="btn"
style="background:#b71c1c;"
target="_blank"
href="${fireURL}">

🚒 消防署

</a>

<a
class="btn"
style="background:#263238;"
target="_blank"
href="${policeURL}">

👮 警察署

</a>

<a
class="btn"
style="background:#ad1457;"
target="_blank"
href="${bedURL}">

🛏 受診先を探す

</a>

<a
class="btn"
style="background:#e53935;"
target="_blank"
href="${aedURL}">

🚑 AED を探す

</a>

<a
class="btn"
style="background:#3949ab;"
target="_blank"
href="${stationURL}">

🚉 最寄り駅

</a>

<a
class="btn"
style="background:#00838f;"
target="_blank"
href="${busURL}">

🚌 バス停

</a>

<a
class="btn"
style="background:#6d4c41;"
target="_blank"
href="${cafeURL}">

☕ カフェ

</a>

<a
class="btn"
style="background:#ef6c00;"
target="_blank"
href="${foodShopURL}">

🍜 飲食店

</a>

<a
class="btn"
style="background:#1b5e20;"
target="_blank"
href="${bankURL}">

🏦 銀行

</a>

<a
class="btn"
style="background:#ad1457;"
target="_blank"
href="${postURL}">

📮 郵便局

</a>

</div>

`);

});

});

</script>

</body>
</html>

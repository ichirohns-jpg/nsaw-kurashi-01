<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>利用者位置マップ</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#1565c0,#1e88e5);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(21,101,192,.25);
}

.header h1{
margin:0;
font-size:42px;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

#map{
width:100%;
height:420px;
border-radius:30px;
margin-bottom:18px;
box-shadow:0 7px 20px rgba(0,0,0,.12);
overflow:hidden;
}

.card{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:16px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:12px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:16px;
}

.help{color:#d32f2f}
.warn{color:#ef6c00}
.ok{color:#00897b}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:18px;
border-radius:22px;
text-align:center;
font-size:22px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>📍 利用者位置マップ</h1>
</div>

<div class="note">
表は見やすいオープンソース地図。裏側で利用者の状態を読み込みます。
</div>

<div id="map"></div>

<div id="list">
<div class="card">読み込み中...</div>
</div>

<a class="homeBtn" href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

const userPlaces = {
a001:{
area:'志木市 本町',
lat:35.8369,
lng:139.5807
},
a002:{
area:'新座市 東',
lat:35.8038,
lng:139.5633
},
a003:{
area:'朝霞市 西原',
lat:35.8156,
lng:139.5876
},
a004:{
area:'和光市 丸山台',
lat:35.7886,
lng:139.6129
}
};

const map =
L.map('map').setView([35.815,139.585],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}
).addTo(map);

function cell(row,index){
return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';
}

function markerColor(status){
if(status.includes('助け')) return '#d32f2f';
if(status.includes('困')) return '#ef6c00';
return '#00897b';
}

function statusIcon(status){
if(status.includes('助け')) return '🚨';
if(status.includes('困')) return '😓';
return '😊';
}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json =
JSON.parse(t.substr(47).slice(0,-2));

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const id = cell(row,1);
const name = cell(row,2);
const status = cell(row,3);

if(!id || !name)return;

latest[id] = {
id:id,
name:name,
status:status
};

});

let html='';

Object.values(latest).forEach(user=>{

const place =
userPlaces[user.id];

if(!place)return;

const color =
markerColor(user.status);

const icon =
statusIcon(user.status);

const divIcon =
L.divIcon({
className:'',
html:
'<div style="' +
'width:34px;height:34px;border-radius:50%;' +
'background:' + color + ';' +
'color:white;display:flex;align-items:center;justify-content:center;' +
'font-size:20px;font-weight:900;' +
'box-shadow:0 3px 10px rgba(0,0,0,.35);' +
'">' + icon + '</div>',
iconSize:[34,34],
iconAnchor:[17,17]
});

L.marker([place.lat,place.lng],{icon:divIcon})
.addTo(map)
.bindPopup(
'<b>' + user.name + '</b><br>' +
icon + ' ' + user.status + '<br>' +
place.area
);

let cls='ok';
if(user.status.includes('助け')) cls='help';
else if(user.status.includes('困')) cls='warn';

html += `

<div class="card">

<div class="name">
👤 ${user.name}
</div>

<div class="status ${cls}">
${icon} ${user.status}<br>
📍 ${place.area}
</div>

<a
class="btn"
href="person.html?id=${user.id}">
利用者詳細を見る
</a>

</div>

`;

});

document.getElementById('list').innerHTML =
html || '<div class="card">利用者がいません</div>';

})
.catch(()=>{

document.getElementById('list').innerHTML =
'<div class="card">読み込みに失敗しました</div>';

});

</script>

</body>
</html>

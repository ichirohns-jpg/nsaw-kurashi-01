<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>支援マップ</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#8e24aa;
color:#fff;
padding:28px;
text-align:center;
font-size:38px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.topInfo{
background:#fff;
border-radius:24px;
padding:24px;
margin-bottom:20px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.topTitle{
font-size:34px;
font-weight:900;
margin-bottom:10px;
}

.topText{
font-size:24px;
line-height:1.8;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
margin-top:18px;
}

.card{
background:#fff;
border-radius:24px;
padding:22px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.title{
font-size:30px;
font-weight:900;
margin-bottom:8px;
}

.desc{
font-size:24px;
line-height:1.7;
color:#455a64;
}

.link{
display:block;
margin-top:14px;
padding:18px;
background:#1976d2;
color:#fff;
text-decoration:none;
border-radius:14px;
text-align:center;
font-weight:900;
font-size:24px;
}

.badge{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:#e3f2fd;
color:#0d47a1;
font-weight:900;
font-size:20px;
margin-top:10px;
}

@media(max-width:700px){

header{
font-size:32px;
}

.title{
font-size:28px;
}

.desc{
font-size:22px;
}

.link{
font-size:22px;
}

}

</style>

</head>

<body>

<header>
支援マップ
</header>

<div class="wrap">

<div class="topInfo">

<div class="topTitle">
地域の支援場所まとめ
</div>

<div class="topText">
病院・薬局・避難所・相談窓口を
まとめて確認できます。
</div>

</div>

<div class="grid">

<div class="card">
<div class="title">病院</div>
<div class="desc">近くの医療機関を検索できます</div>
<span class="badge">Googleマップ</span>

<a class="link"
href="https://www.google.com/maps/search/?api=1&query=病院">
開く
</a>
</div>

<div class="card">
<div class="title">薬局</div>
<div class="desc">近くの薬局を検索できます</div>
<span class="badge">Googleマップ</span>

<a class="link"
href="https://www.google.com/maps/search/?api=1&query=薬局">
開く
</a>
</div>

<div class="card">
<div class="title">避難所</div>
<div class="desc">災害時に利用できる避難場所</div>
<span class="badge">Googleマップ</span>

<a class="link"
href="https://www.google.com/maps/search/?api=1&query=避難所">
開く
</a>
</div>

<div class="card">
<div class="title">地域包括支援センター</div>
<div class="desc">高齢者の相談窓口</div>
<span class="badge">相談窓口</span>

<a class="link"
href="https://www.google.com/maps/search/?api=1&query=地域包括支援センター">
開く
</a>
</div>

<div class="card">
<div class="title">緊急時</div>
<div class="desc">救急・警察・消防</div>
<span class="badge">119 / 110</span>

<a class="link"
href="tel:119">
119に電話する
</a>
</div>

</div>

</div>

</body>
</html>

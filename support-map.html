<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>支援マップ</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#8e24aa;
color:#fff;
padding:28px 18px;
text-align:center;
font-size:40px;
font-weight:900;
line-height:1.3;
}

.wrap{
max-width:1100px;
margin:0 auto;
padding:18px 14px 44px;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
margin-bottom:28px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.cardInner{
padding:24px;
}

.title{
font-size:36px;
font-weight:900;
line-height:1.45;
margin-bottom:12px;
color:#102a43;
}

.desc{
font-size:26px;
line-height:1.85;
white-space:pre-wrap;
color:#243b53;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:16px;
padding:18px;
}

.mapBtn{
display:block;
padding:22px 14px;
border-radius:18px;
color:#fff;
text-decoration:none;
text-align:center;
font-size:24px;
font-weight:900;
line-height:1.45;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.hospital{
background:#d32f2f;
}

.pharmacy{
background:#2e7d32;
}

.shelter{
background:#fb8c00;
}

.care{
background:#1976d2;
}

.city{
background:#455a64;
}

.police{
background:#283593;
}

.toilet{
background:#00897b;
}

.store{
background:#6d4c41;
}

.gomap{
background:#ef6c00;
}

.notice{
background:#fff3cd;
color:#7a4b00;
border-radius:18px;
padding:22px;
margin:20px;
font-size:26px;
line-height:1.6;
font-weight:900;
}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:18px 18px 24px;
}

.share button{
border:0;
border-radius:16px;
padding:20px 10px;
font-size:23px;
font-weight:900;
color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy{
background:#ff9800;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

header{
font-size:34px;
padding:24px 14px;
}

.grid{
grid-template-columns:1fr;
}

.title{
font-size:32px;
}

.desc{
font-size:24px;
}

.mapBtn{
font-size:22px;
padding:18px 12px;
}

.share button{
font-size:20px;
padding:18px 8px;
}

}

</style>
</head>

<body>

<header>
支援マップ
</header>

<div class="wrap">

<div class="card">

<div class="cardInner">

<div class="title">
地域の支援先を探す
</div>

<div class="desc">
病院・薬局・避難所・地域包括支援センター・市役所・交番などをすぐに探せます。
</div>

</div>

<div class="grid">

<a class="mapBtn hospital"
href="https://www.google.com/maps/search/?api=1&query=病院"
target="_blank">
🏥 病院
</a>

<a class="mapBtn pharmacy"
href="https://www.google.com/maps/search/?api=1&query=薬局"
target="_blank">
💊 薬局
</a>

<a class="mapBtn shelter"
href="https://www.google.com/maps/search/?api=1&query=避難所"
target="_blank">
🏫 避難所
</a>

<a class="mapBtn care"
href="https://www.google.com/maps/search/?api=1&query=地域包括支援センター"
target="_blank">
🤝 包括支援
</a>

<a class="mapBtn city"
href="https://www.google.com/maps/search/?api=1&query=市役所"
target="_blank">
🏢 市役所
</a>

<a class="mapBtn police"
href="https://www.google.com/maps/search/?api=1&query=交番"
target="_blank">
🚓 交番
</a>

<a class="mapBtn toilet"
href="https://www.google.com/maps/search/?api=1&query=公衆トイレ"
target="_blank">
🚻 トイレ
</a>

<a class="mapBtn store"
href="https://www.google.com/maps/search/?api=1&query=コンビニ"
target="_blank">
🏪 コンビニ
</a>

<a class="mapBtn gomap"
href="https://ichirohns-jpg.github.io/shiki.gomap-001/"
target="_blank">
🗺 Go Map
</a>

<a class="mapBtn hospital"
href="https://www.google.com/maps/search/?api=1&query=内科"
target="_blank">
🩺 内科
</a>

<a class="mapBtn pharmacy"
href="https://www.google.com/maps/search/?api=1&query=歯科"
target="_blank">
🦷 歯医者
</a>

<a class="mapBtn shelter"
href="https://www.google.com/maps/search/?api=1&query=整形外科"
target="_blank">
🦴 整形外科
</a>

</div>

<div class="notice">
緊急時は119番または110番へ連絡してください。
</div>

<div class="share">

<button class="fb"
onclick="shareFacebook(location.href)">
Facebook
</button>

<button class="line"
onclick="shareLine(location.href)">
LINE
</button>

<button class="x"
onclick="shareX(location.href)">
X
</button>

<button class="copy"
onclick="copyUrl(location.href)">
URLコピー
</button>

</div>

</div>

</div>

<script>

function shareFacebook(url){
window.open(
"https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url),
"_blank"
);
}

function shareLine(url){
window.open(
"https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url),
"_blank"
);
}

function shareX(url){
window.open(
"https://twitter.com/intent/tweet?url="+encodeURIComponent(url),
"_blank"
);
}

function copyUrl(url){
navigator.clipboard.writeText(url);
alert("URLをコピーしました");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>暮らし情報</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:32px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
  text-align:center;
}

.btn{
  display:block;
  margin-top:24px;
  border-radius:24px;
  padding:22px 16px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:24px;
  line-height:1.4;
  font-weight:900;
}

.blue{background:#2563eb}
.green{background:#16a34a}

.back{
  display:block;
  margin-top:24px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img class="banner" src="./top.jpg" alt="NSAW 暮らし情報局">

    <div class="inner">

      <div class="title">
        暮らし情報
      </div>

      <div class="text">
        四市の暮らし情報、地域イベント、回覧板情報をまとめています。
      </div>

      <a class="btn blue" href="https://ichirohns-jpg.github.io/ShikiConcierge-18/">
        📺 地域生活テレビを見る
      </a>

      <a class="btn green" href="./index.html">
        🏠 トップへ戻る
      </a>

    </div>

  </div>

</div>

</body>
</html>

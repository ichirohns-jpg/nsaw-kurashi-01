<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族共有ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(25,118,210,.25);
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.card{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:18px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.name{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.status{
font-size:26px;
font-weight:900;
margin-top:12px;
line-height:1.6;
}

.ok{color:#00897b}
.warn{color:#ef6c00}
.help{color:#d32f2f}

.time{
font-size:20px;
color:#607080;
font-weight:900;
margin-top:12px;
}

.btn{
display:block;
background:#1976d2;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
margin-top:18px;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.backBtn{
background:#455a64;
}

@media(max-width:640px){
.header h1{font-size:36px}
.name{font-size:30px}
.status{font-size:22px}
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族共有ページ</h1>
</div>

<div class="note">
家族が現在の見守り状況を確認するページです。
</div>

<div id="detail">

<div class="card">
読み込み中...
</div>

</div>

<a
class="btn backBtn"
href="family-list.html">

⬅ 家族一覧へ戻る

</a>

</div>

<script>

const params =
new URLSearchParams(location.search);

const targetId =
params.get('id') || '';

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)

.then(r=>r.text())

.then(t=>{

const json =
JSON.parse(
t.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let target = null;

rows.forEach(row=>{

const time =
cell(row,0);

const id =
cell(row,1);

const name =
cell(row,2);

const status =
cell(row,3);

if(id === targetId){

target = {
time,
id,
name,
status
};

}

});

if(!target){

document.getElementById('detail').innerHTML =
'<div class="card">利用者が見つかりません</div>';

return;

}

let cls='ok';
let icon='😊';

if(target.status.includes('助け')){
cls='help';
icon='🚨';
}
else if(target.status.includes('困')){
cls='warn';
icon='😓';
}

document.getElementById('detail').innerHTML = `

<div class="card">

<div class="name">
👤 ${target.name}
</div>

<div class="status ${cls}">
${icon} ${target.status}
</div>

<div class="time">
🕒 最終確認：${target.time}
</div>

</div>

`;

})

.catch(()=>{

document.getElementById('detail').innerHTML =
'<div class="card">読み込み失敗</div>';

});

</script>

</body>
</html>

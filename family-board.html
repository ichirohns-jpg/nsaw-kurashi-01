<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族共有ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.name{
font-size:36px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:20px;
color:#666;
}

.ok{
color:#00897b;
}

.warn{
color:#ef6c00;
}

.help{
color:#d32f2f;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:18px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:20px;
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族共有ページ</h1>
</div>

<div class="card">

<div class="name">
👤 山田 太郎
</div>

<div class="status ok">
😊 元気です
</div>

<div class="time">
最終確認：2026/06/08 08:12
</div>

</div>

<div class="card">

<div class="name">
💊 服薬状況
</div>

<div class="status ok">
朝の薬 確認済み
</div>

<div class="time">
確認時刻：2026/06/08 08:15
</div>

</div>

<a
class="btn"
href="portal.html">

🏠 地域OSへ戻る

</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族共有ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.name{
font-size:36px;
font-weight:900;
margin-bottom:12px;
}

.area{
font-size:22px;
color:#607080;
margin-bottom:12px;
}

.status{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:20px;
color:#666;
}

.ok{color:#00897b}
.warn{color:#ef6c00}
.help{color:#d32f2f}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:18px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:20px;
}

@media(max-width:768px){

.header h1{
font-size:38px;
}

.name{
font-size:30px;
}

.status{
font-size:24px;
}

}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族共有ページ</h1>
</div>

<div class="card">

<div
class="name"
id="userName">

利用者

</div>

<div
class="area"
id="userArea">

地域

</div>

</div>

<div class="card">

<div class="name">
現在の状態
</div>

<div
class="status ok"
id="userStatus">

😊 元気です

</div>

<div
class="time"
id="statusTime">

最終確認：
2026/06/08 08:12

</div>

</div>

<div class="card">

<div class="name">
💊 服薬状況
</div>

<div class="status ok">

確認済み

</div>

<div class="time">

最終確認：
2026/06/08 08:15

</div>

</div>

<a
class="btn"
href="portal.html">

🏠 地域OSへ戻る

</a>

</div>

<script>

const params =
new URLSearchParams(
location.search
);

const userId =
params.get('id') || 'a001';

const users = {

a001:{
name:'山田 太郎',
area:'志木市 本町'
},

a002:{
name:'佐藤 花子',
area:'新座市 東'
},

a003:{
name:'鈴木 一郎',
area:'朝霞市 西原'
},

a004:{
name:'高橋 京子',
area:'和光市 丸山台'
}

};

const user =
users[userId] || {
name:'利用者',
area:'地域未設定'
};

document.getElementById(
'userName'
).innerHTML =
'👤 ' + user.name;

document.getElementById(
'userArea'
).innerHTML =
'📍 ' + user.area;

</script>

</body>
</html>

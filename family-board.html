<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族共有ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1976d2;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:38px;
font-weight:900;
margin-bottom:10px;
}

.area{
font-size:22px;
color:#666;
}

.status{
font-size:32px;
font-weight:900;
margin-top:12px;
}

.ok{color:#00897b}
.warn{color:#ef6c00}
.help{color:#d32f2f}

.btn{
display:block;
background:#1976d2;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:12px;
}

.homeBtn{
display:block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:24px;
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族共有ページ</h1>
</div>

<div class="card">

<div id="userName" class="name">
利用者
</div>

<div id="userArea" class="area">
地域
</div>

</div>

<div class="card">

<h2>現在状態</h2>

<div id="userStatus" class="status ok">
😊 元気です
</div>

</div>

<div class="card">

<h2>見守り情報</h2>

<p>最終確認：2026/06/08 08:12</p>

<p>服薬確認：済</p>

</div>

<a
class="btn"
href="family-list.html">
👨‍👩‍👧‍👦 家族一覧
</a>

<a
class="btn"
href="family-dashboard.html">
📊 家族ダッシュボード
</a>

<a
class="homeBtn"
href="portal.html">
🏠 地域OSへ戻る
</a>

</div>

<script>

const params =
new URLSearchParams(location.search);

const userId =
params.get('id') || 'a001';

const users = {

a001:{
name:'山田 太郎',
area:'志木市 本町'
},

a002:{
name:'佐藤 花子',
area:'新座市 東'
},

a003:{
name:'鈴木 一郎',
area:'朝霞市 西原'
},

a004:{
name:'高橋 京子',
area:'和光市 丸山台'
}

};

const user =
users[userId] || users.a001;

document.getElementById('userName').innerHTML =
'👤 ' + user.name;

document.getElementById('userArea').innerHTML =
'📍 ' + user.area;

</script>

</body>
</html>

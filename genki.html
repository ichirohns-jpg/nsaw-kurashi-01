<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>元気です確認</title>

<style>

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b3a;
  text-align:center;
}

.wrap{
  max-width:700px;
  margin:auto;
  padding:30px 20px;
}

.title{
  font-size:42px;
  font-weight:900;
  line-height:1.5;
  margin-top:30px;
}

.text{
  font-size:24px;
  line-height:1.9;
  margin-top:30px;
}

.btn{
  display:block;
  width:100%;
  background:#22c55e;
  color:#fff;
  text-decoration:none;
  font-size:40px;
  font-weight:900;
  padding:38px 20px;
  border-radius:28px;
  margin-top:50px;
  border:none;
}

.date{
  font-size:22px;
  color:#666;
  margin-top:20px;
}

.ok{
  font-size:28px;
  color:#16a34a;
  font-weight:900;
  margin-top:40px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="date" id="date"></div>

<div class="title">

元気です確認

</div>

<div class="text">

今日も元気なら、<br>
下のボタンを押してください。

</div>

<button class="btn" onclick="sendOK()">

元気です

</button>

<div class="ok" id="ok"></div>

</div>

<script>

document.getElementById("date").innerHTML =
new Date().toLocaleDateString("ja-JP");

function sendOK(){

  document.getElementById("ok").innerHTML =
  "確認しました";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>地域お助けマップ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:28px;
border-radius:28px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:42px;
}

.header p{
font-size:20px;
font-weight:900;
margin-top:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
text-align:center;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.icon{
font-size:64px;
margin-bottom:12px;
}

.title{
font-size:30px;
font-weight:900;
margin-bottom:12px;
}

.desc{
font-size:18px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.btn{
display:block;
width:100%;
padding:18px;
background:#1565c0;
color:white;
text-decoration:none;
border-radius:20px;
font-size:22px;
font-weight:900;
}

.footer{
text-align:center;
font-size:18px;
margin-top:30px;
color:#666;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.header h1{
font-size:34px;
}

}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>📍 地域お助けマップ</h1>
<p>近くの施設をすぐ探せます</p>
</div>

<div class="grid">

<div class="card">
<div class="icon">🏥</div>
<div class="title">病院</div>
<div class="desc">
近くの病院を探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/病院"
target="_blank">
開く
</a>
</div>

<div class="card">
<div class="icon">💊</div>
<div class="title">薬局</div>
<div class="desc">
近くの薬局を探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/薬局"
target="_blank">
開く
</a>
</div>

<div class="card">
<div class="icon">🚻</div>
<div class="title">トイレ</div>
<div class="desc">
近くのトイレを探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/トイレ"
target="_blank">
開く
</a>
</div>

<div class="card">
<div class="icon">🏪</div>
<div class="title">コンビニ</div>
<div class="desc">
近くのコンビニを探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/コンビニ"
target="_blank">
開く
</a>
</div>

<div class="card">
<div class="icon">🏃</div>
<div class="title">避難所</div>
<div class="desc">
近くの避難所を探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/避難所"
target="_blank">
開く
</a>
</div>

<div class="card">
<div class="icon">❤️</div>
<div class="title">AED</div>
<div class="desc">
近くのAEDを探します
</div>
<a class="btn"
href="https://www.google.com/maps/search/AED"
target="_blank">
開く
</a>
</div>

</div>

<div class="footer">
NSAW 暮らし情報局
</div>

</div>

</body>
</html>

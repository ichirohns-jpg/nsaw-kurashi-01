<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>要対応者一覧</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#d32f2f;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.help{
color:#d32f2f;
}

.warn{
color:#ef6c00;
}

.time{
font-size:18px;
color:#666;
margin-bottom:14px;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
margin-top:10px;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>📋 要対応者一覧</h1>
</div>

<div id="list">

<div class="card">
読み込み中...
</div>

</div>

<a
class="homeBtn"
href="admin.html">

⬅ 支援者ページへ戻る

</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)

.then(r=>r.text())

.then(t=>{

const json =
JSON.parse(
t.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const time =
cell(row,0);

const id =
cell(row,1);

const name =
cell(row,2);

const status =
cell(row,3);

if(!name)return;

latest[name] = {
id:id,
time:time,
status:status
};

});

let html='';

Object.keys(latest).forEach(name=>{

const item =
latest[name];

if(
!item.status.includes('困') &&
!item.status.includes('助け')
){
return;
}

let cls='warn';
let icon='😓';

if(item.status.includes('助け')){
cls='help';
icon='🚨';
}

html += `

<div class="card">

<div class="name">
👤 ${name}
</div>

<div class="status ${cls}">
${icon} ${item.status}
</div>

<div class="time">
🕒 ${item.time}
</div>

<a
class="btn"
href="person.html?id=${item.id}">

利用者詳細

</a>

</div>

`;

});

document.getElementById('list').innerHTML =
html || '<div class="card">要対応者はいません</div>';

})

.catch(()=>{

document.getElementById('list').innerHTML =
'<div class="card">読み込み失敗</div>';

});

</script>

</body>
</html>

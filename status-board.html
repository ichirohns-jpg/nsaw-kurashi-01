<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>要対応者一覧</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#ef6c00,#ff9800);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(239,108,0,.25);
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.card{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:16px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.warnCard{
border-left:12px solid #ef6c00;
}

.helpCard{
border-left:12px solid #d32f2f;
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:12px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:12px;
line-height:1.6;
}

.help{
color:#d32f2f;
}

.warn{
color:#ef6c00;
}

.time{
font-size:18px;
color:#607080;
font-weight:900;
margin-bottom:16px;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:18px;
border-radius:22px;
text-align:center;
font-size:22px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

@media(max-width:640px){
.header h1{font-size:36px}
.name{font-size:28px}
.status{font-size:22px}
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>📋 要対応者一覧</h1>
</div>

<div class="note">
「困っています」「助けてください」を確認するページです。
</div>

<div id="list">

<div class="card">
読み込み中...
</div>

</div>

<a
class="homeBtn"
href="admin.html">

⬅ 支援者ページへ戻る

</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)

.then(r=>r.text())

.then(t=>{

const json =
JSON.parse(
t.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const time =
cell(row,0);

const id =
cell(row,1);

const name =
cell(row,2);

const status =
cell(row,3);

if(!name)return;

latest[name] = {
id:id,
time:time,
status:status
};

});

let html='';

Object.keys(latest).forEach(name=>{

const item =
latest[name];

if(
!item.status.includes('困') &&
!item.status.includes('助け')
){
return;
}

let cls='warn';
let icon='😓';
let card='warnCard';

if(item.status.includes('助け')){
cls='help';
icon='🚨';
card='helpCard';
}

html += `

<div class="card ${card}">

<div class="name">
👤 ${name}
</div>

<div class="status ${cls}">
${icon} ${item.status}
</div>

<div class="time">
🕒 ${item.time}
</div>

<a
class="btn"
href="person.html?id=${item.id}">

利用者詳細を見る

</a>

</div>

`;

});

document.getElementById('list').innerHTML =
html || '<div class="card">要対応者はいません</div>';

})

.catch(()=>{

document.getElementById('list').innerHTML =
'<div class="card">読み込み失敗</div>';

});

</script>

</body>
</html>

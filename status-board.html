<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>要対応者一覧</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#d32f2f;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:48px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.help{
border-left:12px solid #d32f2f;
}

.warn{
border-left:12px solid #ef6c00;
}

.ok{
border-left:12px solid #00897b;
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:26px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:20px;
color:#607080;
}

.btn{
display:block;
margin-top:16px;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>🚨 要対応者一覧</h1>
</div>

<div class="card help">
<div class="name">👤 山田 太郎</div>
<div class="status">🚨 助けてください</div>
<div class="time">2026/06/08 15:20</div>
<a class="btn"
href="person.html?id=a001">
詳細を見る
</a>
</div>

<div class="card warn">
<div class="name">👤 佐藤 花子</div>
<div class="status">😓 少し困っています</div>
<div class="time">2026/06/08 14:35</div>
<a class="btn"
href="person.html?id=a002">
詳細を見る
</a>
</div>

<div class="card ok">
<div class="name">👤 鈴木 一郎</div>
<div class="status">😊 元気です</div>
<div class="time">2026/06/08 08:12</div>
<a class="btn"
href="person.html?id=a003">
詳細を見る
</a>
</div>

</div>

</body>
</html>

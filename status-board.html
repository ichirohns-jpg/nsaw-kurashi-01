<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>状態一覧ボード</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

header{
background:#43a047;
color:#fff;
padding:30px 18px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:20px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.name{
font-size:34px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:22px;
color:#607d8b;
font-weight:800;
}

.good{
border-left:14px solid #43a047;
}

.warn{
border-left:14px solid #fb8c00;
}

.alert{
border-left:14px solid #e53935;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:24px;
}

.btn{
display:block;
padding:22px;
border-radius:18px;
text-align:center;
text-decoration:none;
color:#fff;
font-size:24px;
font-weight:900;
}

.blue{
background:#1976d2;
}

.purple{
background:#8e24aa;
}

@media(max-width:700px){

.menu{
grid-template-columns:1fr;
}

header{
font-size:34px;
}

.name{
font-size:30px;
}

.status{
font-size:28px;
}

.btn{
font-size:22px;
}

}
</style>
</head>

<body>

<header>
状態一覧ボード
</header>

<div class="wrap">

<div class="card good">
<div class="name">山田さん</div>
<div class="status">😊 元気です</div>
<div class="time">2026年6月9日 08:30</div>
</div>

<div class="card warn">
<div class="name">佐藤さん</div>
<div class="status">😓 少し困っています</div>
<div class="time">2026年6月9日 07:45</div>
</div>

<div class="card alert">
<div class="name">鈴木さん</div>
<div class="status">🚨 助けてください</div>
<div class="time">2026年6月9日 06:10</div>
</div>

<div class="menu">

<a class="btn blue"
href="dashboard.html">
ダッシュボードへ
</a>

<a class="btn purple"
href="family-dashboard.html">
家族確認ページ
</a>

</div>

</div>

</body>
</html>

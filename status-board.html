<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>要対応者一覧</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#d32f2f;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.help{
border-left:12px solid #d32f2f;
}

.warn{
border-left:12px solid #ef6c00;
}

.ok{
border-left:12px solid #00897b;
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
margin-bottom:14px;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>📊 要対応者一覧</h1>
</div>

<div id="list"></div>

<a
class="homeBtn"
href="admin.html">

⬅ 支援者ページへ戻る

</a>

</div>

<script>

const data = [

{
id:'a001',
name:'山田 太郎',
status:'助けてください',
time:'15:20'
},

{
id:'a002',
name:'佐藤 花子',
status:'困っています',
time:'14:35'
},

{
id:'a003',
name:'鈴木 一郎',
status:'元気です',
time:'08:12'
}

];

let html='';

data.forEach(row=>{

let cls='ok';
let icon='😊';

if(row.status.includes('助け')){
cls='help';
icon='🚨';
}

else if(row.status.includes('困')){
cls='warn';
icon='😓';
}

html += `

<div class="card ${cls}">

<div class="name">
👤 ${row.name}
</div>

<div class="status">
${icon} ${row.status}
</div>

<div class="time">
${row.time}
</div>

<a
class="btn"
href="person.html?id=${row.id}">

詳細を見る

</a>

</div>

`;

});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>

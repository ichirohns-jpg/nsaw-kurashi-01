<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>利用者詳細</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:38px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:28px;
font-weight:900;
margin-top:10px;
}

.ok{
color:#00897b;
}

.warn{
color:#ef6c00;
}

.help{
color:#d32f2f;
}

.time{
font-size:20px;
color:#666;
margin-top:10px;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:12px;
}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👤 利用者詳細</h1>
</div>

<div id="detail">

<div class="card">
読み込み中...
</div>

</div>

<a
class="btn"
href="users.html">

⬅ 利用者一覧へ戻る

</a>

</div>

<script>

const params =
new URLSearchParams(location.search);

const targetId =
params.get('id') || '';

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)

.then(r=>r.text())

.then(t=>{

const json =
JSON.parse(
t.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let target = null;

rows.forEach(row=>{

const time =
cell(row,0);

const id =
cell(row,1);

const name =
cell(row,2);

const status =
cell(row,3);

if(id === targetId){

target = {
time,
id,
name,
status
};

}

});

if(!target){

document.getElementById('detail').innerHTML =
'<div class="card">利用者が見つかりません</div>';

return;

}

let cls='ok';
let icon='😊';

if(target.status.includes('助け')){
cls='help';
icon='🚨';
}
else if(target.status.includes('困')){
cls='warn';
icon='😓';
}

document.getElementById('detail').innerHTML = `

<div class="card">

<div class="name">
👤 ${target.name}
</div>

<div class="status ${cls}">
${icon} ${target.status}
</div>

<div class="time">
最終確認：
${target.time}
</div>

</div>

`;

})

.catch(()=>{

document.getElementById('detail').innerHTML =
'<div class="card">読み込み失敗</div>';

});

</script>

</body>
</html>

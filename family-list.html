<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族一覧</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1976d2;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:22px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.area{
font-size:20px;
color:#666;
margin-bottom:10px;
}

.status{
font-size:22px;
font-weight:900;
margin-bottom:14px;
}

.ok{
color:#00897b;
}

.warn{
color:#ef6c00;
}

.help{
color:#d32f2f;
}

.btn{
display:block;
background:#1976d2;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}

</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族一覧</h1>
</div>

<div id="list"></div>

<a
class="homeBtn"
href="family-dashboard.html">

⬅ 家族ダッシュボードへ戻る

</a>

</div>

<script>

const users = [

{
id:'a001',
name:'山田 太郎',
area:'志木市 本町',
status:'助けてください'
},

{
id:'a002',
name:'佐藤 花子',
area:'新座市 東',
status:'困っています'
},

{
id:'a003',
name:'鈴木 一郎',
area:'朝霞市 西原',
status:'元気です'
},

{
id:'a004',
name:'高橋 京子',
area:'和光市 丸山台',
status:'元気です'
}

];

let html='';

users.forEach(user=>{

let cls='ok';
let icon='😊';

if(user.status.includes('助け')){
cls='help';
icon='🚨';
}
else if(user.status.includes('困')){
cls='warn';
icon='😓';
}

html += `

<div class="card">

<div class="name">
👤 ${user.name}
</div>

<div class="area">
📍 ${user.area}
</div>

<div class="status ${cls}">
${icon} ${user.status}
</div>

<a
class="btn"
href="family-board.html?id=${user.id}">

状況を見る

</a>

</div>

`;

});

document.getElementById('list').innerHTML =
html;

</script>

</body>
</html>

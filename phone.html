<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>困った時の連絡先</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#14324a;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:20px 14px 40px;
}

.top{

  background:#ffffff;

  border:5px solid #16864a;

  border-radius:28px;

  padding:28px 20px;

  text-align:center;

  margin-bottom:24px;

  box-shadow:0 8px 22px rgba(0,0,0,.08);

}

.top h1{

  margin:0;

  font-size:38px;

  line-height:1.3;

  color:#118047;

  font-weight:900;

}

.top p{

  margin:16px 0 0;

  font-size:22px;

  line-height:1.6;

  font-weight:800;

  color:#31465a;

}

.telBtn{

  display:block;

  width:100%;

  text-decoration:none;

  color:#ffffff;

  border-radius:28px;

  padding:28px 20px;

  margin-bottom:18px;

  box-shadow:0 8px 18px rgba(0,0,0,.12);

}

.telTitle{

  font-size:30px;

  line-height:1.4;

  font-weight:900;

  margin-bottom:10px;

}

.telNumber{

  font-size:26px;

  line-height:1.4;

  font-weight:900;

}

.green{
  background:#16a34a;
}

.blue{
  background:#2563eb;
}

.orange{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.purple{
  background:#7c3aed;
}

.gray{
  background:#666666;
}

.note{

  margin-top:24px;

  background:#ffffff;

  border-radius:24px;

  padding:22px;

  font-size:18px;

  line-height:1.7;

  font-weight:700;

  color:#425466;

  box-shadow:0 6px 14px rgba(0,0,0,.08);

}

.homeBtn{

  display:block;

  width:100%;

  text-decoration:none;

  text-align:center;

  background:#16864a;

  color:#ffffff;

  border-radius:24px;

  padding:22px 14px;

  margin-top:28px;

  font-size:24px;

  font-weight:900;

  box-shadow:0 8px 18px rgba(0,0,0,.12);

}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <h1>
      📞<br>
      困った時の連絡先
    </h1>

    <p>
      押すとそのまま電話できます
    </p>

  </div>

  <!-- 地域包括 -->

  <a class="telBtn green"
     href="tel:0484731111">

    <div class="telTitle">
      地域包括支援センター
    </div>

    <div class="telNumber">
      048-473-1111
    </div>

  </a>

  <!-- 市役所 -->

  <a class="telBtn blue"
     href="tel:0484731111">

    <div class="telTitle">
      志木市役所
    </div>

    <div class="telNumber">
      048-473-1111
    </div>

  </a>

  <!-- 救急相談 -->

  <a class="telBtn orange"
     href="tel:#7119">

    <div class="telTitle">
      救急相談 #7119
    </div>

    <div class="telNumber">
      #7119
    </div>

  </a>

  <!-- 消防 -->

  <a class="telBtn red"
     href="tel:119">

    <div class="telTitle">
      消防・救急
    </div>

    <div class="telNumber">
      119
    </div>

  </a>

  <!-- タクシー -->

  <a class="telBtn purple"
     href="tel:0000000000">

    <div class="telTitle">
      タクシー
    </div>

    <div class="telNumber">
      電話番号あとで設定
    </div>

  </a>

  <!-- メモ -->

  <div class="note">

    ・緊急時は迷わず119番へ。<br>
    ・地域包括支援センターは、高齢者や介護の相談窓口です。<br>
    ・救急車を呼ぶか迷った時は #7119 に相談できます。

  </div>

  <!-- 戻る -->

  <a class="homeBtn"
     href="./app.html">

     ← 暮らし情報局へ戻る

  </a>

</div>

</body>
</html>

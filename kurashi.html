function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");

}

function cell(row,i){

  if(!row.c || !row.c[i]){
    return "";
  }

  return row.c[i].v || "";

}

function drive(url){

  url = String(url || "");

  let m =
    url.match(/[-\w]{25,}/);

  if(m){

    return "https://drive.google.com/thumbnail?id="
    + m[0]
    + "&sz=w1600";

  }

  return url;

}

function youtubeId(url){

  url = String(url || "");

  let m =
    url.match(/[?&]v=([^&]+)/);

  if(m) return m[1];

  m =
    url.match(/youtu\.be\/([^?&]+)/);

  if(m) return m[1];

  m =
    url.match(/shorts\/([^?&]+)/);

  if(m) return m[1];

  return "";

}

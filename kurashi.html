<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

const params =
new URLSearchParams(location.search);

const targetId =
params.get("id") || "";

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");
}

function cleanKey(str){

  return String(str || "")
  .replace(/\s/g,"")
  .replace(/　/g,"")
  .trim();
}

function shareFacebook(url){

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u="
    + encodeURIComponent(url),
    "_blank"
  );
}

function shareX(url){

  window.open(
    "https://twitter.com/intent/tweet?url="
    + encodeURIComponent(url),
    "_blank"
  );
}

function shareLine(url){

  window.open(
    "https://social-plugins.line.me/lineit/share?url="
    + encodeURIComponent(url),
    "_blank"
  );
}

function copyUrl(url){

  navigator.clipboard.writeText(url);

  alert("URLをコピーしました");
}

function buildVideo(url){

  if(!url) return "";

  if(
    url.includes("youtube.com") ||
    url.includes("youtu.be")
  ){

    let id = "";

    if(url.includes("watch?v=")){

      id =
      url.split("watch?v=")[1]
      .split("&")[0];

    }else if(url.includes("youtu.be/")){

      id =
      url.split("youtu.be/")[1]
      .split("?")[0];
    }

    return `
    <iframe
      src="https://www.youtube.com/embed/${id}"
      allowfullscreen>
    </iframe>
    `;
  }

  return `
  <video controls playsinline>
    <source src="${url}">
  </video>
  `;
}

window.handleSheet = function(json){

  try{

    const cols =
    json.table.cols || [];

    const rows =
    json.table.rows || [];

    const headers =
    cols.map(col => cleanKey(col.label));

    let html = "";

    rows.forEach(row=>{

      const c = row.c || [];

      const rowData = {};

      headers.forEach((h,i)=>{

        rowData[h] =
        c[i] && c[i].v != null
        ? String(c[i].v)
        : "";

      });

      const flag =
      Object.values(rowData)
      .includes("はい");

      if(!flag){
        return;
      }

      const id =
      rowData["ID"] || "";

      if(
        targetId &&
        id !== targetId
      ){
        return;
      }

      const shareUrl =
      "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html?id="
      + id;

      html += `

      <div class="card">

        <div class="date">
          ${esc(rowData["日付"])}
        </div>

        <div class="title">
          ${esc(rowData["タイトル"])}
        </div>

        ${
          rowData["画像URL"]
          ?
          `<img class="main-image" src="${rowData["画像URL"]}">`
          :
          ``
        }

        <div class="text">
          ${esc(rowData["本文"])}
        </div>

        <div class="buttons">

          ${
            rowData["情報1タイトル"] &&
            rowData["情報1URL"]
            ?
            `<a class="city-btn shiki" href="${rowData["情報1URL"]}" target="_blank">${esc(rowData["情報1タイトル"])}</a>`
            :
            ``
          }

          ${
            rowData["情報2タイトル"] &&
            rowData["情報2URL"]
            ?
            `<a class="city-btn niiza" href="${rowData["情報2URL"]}" target="_blank">${esc(rowData["情報2タイトル"])}</a>`
            :
            ``
          }

          ${
            rowData["情報3タイトル"] &&
            rowData["情報3URL"]
            ?
            `<a class="city-btn asaka" href="${rowData["情報3URL"]}" target="_blank">${esc(rowData["情報3タイトル"])}</a>`
            :
            ``
          }

          ${
            rowData["情報4タイトル"] &&
            rowData["情報4URL"]
            ?
            `<a class="city-btn wako" href="${rowData["情報4URL"]}" target="_blank">${esc(rowData["情報4タイトル"])}</a>`
            :
            ``
          }

        </div>

        ${
          rowData["動画URL"]
          ?
          `
          <div class="video">

            <div class="video-title">
              ${esc(rowData["動画タイトル"])}
            </div>

            <div class="video-desc">
              ${esc(rowData["動画説明"])}
            </div>

            ${buildVideo(rowData["動画URL"])}

          </div>
          `
          :
          ``
        }

        <div class="sns">

          <button
            class="fb"
            onclick="shareFacebook('${shareUrl}')">
            Facebook
          </button>

          <button
            class="line"
            onclick="shareLine('${shareUrl}')">
            LINE
          </button>

          <button
            class="x"
            onclick="shareX('${shareUrl}')">
            X
          </button>

          <button
            class="copy"
            onclick="copyUrl('${shareUrl}')">
            URLコピー
          </button>

        </div>

      </div>

      `;
    });

    if(!html){

      html =
      `
      <div class="error">
      表示できる記事がありません
      </div>
      `;
    }

    document.getElementById("app").innerHTML =
    html;

  }catch(e){

    console.error(e);

    document.getElementById("app").innerHTML =
    `
    <div class="error">
    読み込みエラー
    <br><br>
    ${e.message}
    </div>
    `;
  }
};

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler:handleSheet";

document.body.appendChild(script);

</script>

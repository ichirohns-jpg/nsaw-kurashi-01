<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
}

.wrap{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.box{
  background:white;
  border-radius:20px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.loading{
  font-size:24px;
  text-align:center;
}

.error{
  color:red;
  white-space:pre-wrap;
  line-height:1.8;
}

.ok{
  color:#1565c0;
  font-weight:900;
  margin-bottom:12px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="box">

<div class="loading" id="status">
読み込み中...
</div>

</div>

<div id="debug"></div>

</div>

<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

function show(msg){

  document.getElementById("debug").innerHTML +=
  `
  <div class="box">
    <div class="error">${msg}</div>
  </div>
  `;
}

window.handleSheet = function(json){

  try{

    document.getElementById("status").innerHTML =
    "JSON受信成功";

    const cols =
    json.table.cols || [];

    const rows =
    json.table.rows || [];

    show("列数: " + cols.length);
    show("行数: " + rows.length);

    const headers =
    cols.map(col => col.label);

    show(
      "ヘッダー:<br>" +
      headers.join(" / ")
    );

    if(rows.length === 0){

      show("行データが0件");
      return;
    }

    let html = "";

    rows.forEach((row,index)=>{

      const c = row.c || [];

      const rowData = {};

      headers.forEach((h,i)=>{

        rowData[h] =
        c[i] && c[i].v != null
        ? String(c[i].v)
        : "";

      });

      html += `
      <div class="box">

        <div class="ok">
          ${index + 1}件目
        </div>

        日付:
        ${rowData["日付"] || "なし"}

        <br><br>

        ID:
        ${rowData["ID"] || "なし"}

        <br><br>

        タイトル:
        ${rowData["タイトル"] || "なし"}

        <br><br>

        表示:
        ${rowData["表示"] || "なし"}

      </div>
      `;
    });

    document.getElementById("debug").innerHTML +=
    html;

  }catch(e){

    document.getElementById("status").innerHTML =
    "エラー";

    show(
      "handleSheetエラー:<br><br>" +
      e.message
    );

    console.error(e);
  }
};

window.onerror = function(msg){

  show(
    "window.onerror:<br><br>" +
    msg
  );
};

const url =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler=handleSheet";

show("読み込みURL:<br><br>" + url);

const script =
document.createElement("script");

script.src = url;

script.onerror = function(){

  document.getElementById("status").innerHTML =
  "script読み込み失敗";

  show("JSONP script.onerror 発生");
};

document.body.appendChild(script);

setTimeout(function(){

  if(
    document.getElementById("status").innerHTML
    === "読み込み中..."
  ){

    document.getElementById("status").innerHTML =
    "タイムアウト";

    show(
      "handleSheet が呼ばれていません"
    );
  }

},8000);

</script>

</body>
</html>

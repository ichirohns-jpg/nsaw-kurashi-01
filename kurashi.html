<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<meta property="og:title"
content="NSAW暮らし情報局">

<meta property="og:description"
content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">

<meta name="twitter:card"
content="summary_large_image">

<style>

body{
margin:0;
background:#eef4f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:16px;
}

.banner{
width:100%;
border-radius:20px;
display:block;
margin-bottom:18px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.title{
font-size:30px;
font-weight:900;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.text{
font-size:20px;
line-height:1.9;
white-space:pre-wrap;
margin-bottom:16px;
color:#17324d;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:16px;
display:block;
}

.video-title{
font-size:26px;
font-weight:900;
line-height:1.6;
margin-bottom:12px;
color:#17324d;
}

.video-desc{
font-size:18px;
line-height:1.8;
margin-bottom:16px;
color:#48657f;
white-space:pre-wrap;
}

.video-wrap{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:16px;
overflow:hidden;
margin-bottom:16px;
}

.video-wrap iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.sns{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:16px;
}

.sns a,
.copy-btn{
flex:1;
border:none;
text-decoration:none;
text-align:center;
color:#fff;
border-radius:14px;
padding:16px 8px;
font-size:18px;
font-weight:900;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy-btn{
background:#ff7a00;
}

.loading{
font-size:28px;
font-weight:900;
padding:40px 10px;
text-align:center;
}

.error{
font-size:26px;
font-weight:900;
padding:40px 10px;
text-align:center;
color:#c62828;
}

.debug{
background:#fff3cd;
padding:12px;
margin-bottom:12px;
border-radius:12px;
font-size:14px;
line-height:1.7;
word-break:break-all;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<div id="newsArea">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<script>

function getVal(cell){

    if(!cell) return '';

    if(cell.v !== null &&
       cell.v !== undefined){
        return cell.v;
    }

    if(cell.f !== null &&
       cell.f !== undefined){
        return cell.f;
    }

    return '';

}

function youtubeEmbed(url){

    if(!url) return '';

    url = String(url).trim();

    if(url.includes('watch?v=')){
        const id =
        url.split('watch?v=')[1]
        .split('&')[0];

        return 'https://www.youtube.com/embed/' + id;
    }

    if(url.includes('youtu.be/')){
        const id =
        url.split('youtu.be/')[1]
        .split('?')[0];

        return 'https://www.youtube.com/embed/' + id;
    }

    if(url.includes('/shorts/')){
        const id =
        url.split('/shorts/')[1]
        .split('?')[0];

        return 'https://www.youtube.com/embed/' + id;
    }

    return '';

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

function renderTable(table){

const rows =
table.rows || [];

const newsArea =
document.getElementById('newsArea');

newsArea.innerHTML = '';

if(rows.length === 0){

newsArea.innerHTML =
'<div class="error">データがありません</div>';

return;

}

rows.forEach((row,index)=>{

const c =
row.c || [];

const id =
getVal(c[1]);

const title =
getVal(c[2]);

const image =
getVal(c[3]);

const text =
getVal(c[4]);

const videoTitle =
getVal(c[13]);

const videoDesc =
getVal(c[14]);

const videoUrl =
getVal(c[15]);

const embedUrl =
youtubeEmbed(videoUrl);

console.log(
'--- 行番号 ---',
index + 1
);

console.log(
'動画URL:',
videoUrl
);

console.log(
'embedURL:',
embedUrl
);

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html?id='
+ id;

newsArea.innerHTML += `

<div class="card">

<div class="debug">

動画URL:<br>
${videoUrl}<br><br>

embedURL:<br>
${embedUrl}

</div>

<div class="title">
${title}
</div>

${image ?
`
<img
class="thumb"
src="${image}">
`
:''}

<div class="text">
${text}
</div>

${videoTitle ?
`
<div class="video-title">
${videoTitle}
</div>
`
:''}

${videoDesc ?
`
<div class="video-desc">
${videoDesc}
</div>
`
:''}

${embedUrl ?
`
<div class="video-wrap">

<iframe
src="${embedUrl}"
allowfullscreen>
</iframe>

</div>
`
:''}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

<button
class="copy-btn"
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>

`;

});

}

window.google = {
visualization: {
Query: {
setResponse: function(response){

if(response.status === 'ok'){

renderTable(response.table);

}else{

document.getElementById(
'newsArea'
).innerHTML =
'<div class="error">データ取得失敗</div>';

console.error(response);

}

}
}
}
};

const sheetId =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const script =
document.createElement('script');

script.src =
`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

document.body.appendChild(script);

</script>

</body>
</html>

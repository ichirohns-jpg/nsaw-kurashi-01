<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<meta property="og:title"
content="NSAW 暮らし情報局">

<meta property="og:description"
content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg?v=100">

<meta name="twitter:card"
content="summary_large_image">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:700px;
margin:auto;
padding:12px;
}

.banner img{
width:100%;
display:block;
border-radius:18px;
margin-bottom:14px;
}

.card{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:16px;
box-shadow:
0 4px 12px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.title{
font-size:26px;
font-weight:bold;
line-height:1.5;
margin-bottom:12px;
}

.desc{
font-size:18px;
line-height:1.8;
white-space:pre-wrap;
}

.media{
margin-top:14px;
}

.media img{
width:100%;
border-radius:14px;
display:block;
}

.youtube{
position:relative;
width:100%;
padding-top:56.25%;
margin-top:14px;
border-radius:14px;
overflow:hidden;
}

.youtube iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.btns{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:16px;
}

.btn{
flex:1;
min-width:120px;
padding:14px;
border-radius:12px;
text-align:center;
text-decoration:none;
font-weight:bold;
color:#fff;
}

.line{
background:#06c755;
}

.fb{
background:#1877f2;
}

.x{
background:#111;
}

.copy{
background:#666;
}

</style>

</head>

<body>

<div class="wrap">

<div class="banner">
<img src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg?v=100">
</div>

<div id="detail"></div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const SHEET_NAME =
'NSAW暮らし情報局_データ';

const urlParams =
new URLSearchParams(
window.location.search
);

const targetId =
urlParams.get('id')
? urlParams.get('id').trim()
: null;

const cacheBust =
Date.now();

const url =
'https://docs.google.com/spreadsheets/d/'
+ SHEET_ID
+ '/gviz/tq?sheet='
+ encodeURIComponent(SHEET_NAME)
+ '&tqx=out:json&t='
+ cacheBust;

/* null安全 */

function getCellValue(
row,
index
){

if(
!row ||
!row.c ||
!row.c[index]
){
return '';
}

const value =
row.c[index].v;

return (
value !== null &&
value !== undefined
)
? String(value).trim()
: '';

}

/* JSONP */

function handleGoogleSheetsResponse(
response
){

if(
!targetId
){
console.error(
'IDなし'
);
return;
}

if(
response &&
response.table &&
response.table.rows
){

const rows =
response.table.rows;

/* find */

const matchedRow =
rows.find(row => {

if(
!row ||
!row.c ||
!row.c[0]
){
return false;
}

const cellId =
row.c[0].v !== null
? String(row.c[0].v).trim()
: '';

return cellId === targetId;

});

if(
matchedRow
){

const date =
getCellValue(
matchedRow,
0
);

const title =
getCellValue(
matchedRow,
1
);

const desc =
getCellValue(
matchedRow,
2
);

const imageUrl =
getCellValue(
matchedRow,
3
);

let mediaHtml='';

/* YouTube */

if(
imageUrl.includes('youtube.com')
||
imageUrl.includes('youtu.be')
){

let y =
imageUrl;

y = y.replace(
'watch?v=',
'embed/'
);

y = y.replace(
'youtu.be/',
'youtube.com/embed/'
);

y = y.replace(
'/shorts/',
'/embed/'
);

mediaHtml = `
<div class="youtube">
<iframe
src="${y}"
allowfullscreen>
</iframe>
</div>
`;

}

/* Drive画像 */

else if(
imageUrl.includes('/file/d/')
){

const m =
imageUrl.match(
/\/d\/(.*?)\//
);

if(m){

const img =
'https://drive.google.com/thumbnail?id='
+ m[1]
+ '&sz=w1200';

mediaHtml = `
<div class="media">
<img src="${img}">
</div>
`;

}

}

/* 普通画像 */

else if(
imageUrl.match(/\.(jpg|jpeg|png|webp)/i)
){

mediaHtml = `
<div class="media">
<img src="${imageUrl}">
</div>
`;

}

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-'
+ String(targetId).padStart(3,'0')
+ '.html';

const html = `

<div class="card">

<div class="date">
${date}
</div>

<div class="title">
${title}
</div>

<div class="desc">
${desc}
</div>

${mediaHtml}

<div class="btns">

<a class="btn line"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}"
target="_blank">
LINE
</a>

<a class="btn fb"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}"
target="_blank">
Facebook
</a>

<a class="btn x"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}"
target="_blank">
X
</a>

<a class="btn copy"
href="#"
onclick="
navigator.clipboard.writeText('${shareUrl}');
alert('コピーしました');
return false;
">
URLコピー
</a>

</div>

</div>

`;

document
.getElementById('detail')
.innerHTML = html;

}else{

console.error(
'該当IDなし'
);

}

}

}

/* callback固定 */

window.google = {
visualization:{
Query:{
setResponse:
handleGoogleSheetsResponse
}
}
};

/* script */

const s =
document.createElement(
'script'
);

s.src = url;

document.body.appendChild(
s
);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

body{
margin:0;
background:#eef5fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.header img{
width:100%;
display:block;
}

.wrap{
max-width:700px;
margin:auto;
padding:12px;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#666;
margin-bottom:8px;
}

.title{
font-size:28px;
font-weight:bold;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.detail{
font-size:18px;
line-height:1.9;
white-space:pre-wrap;
color:#333;
}

.loading{
padding:40px;
text-align:center;
font-size:22px;
}

.error{
padding:40px;
text-align:center;
font-size:22px;
color:red;
}

</style>
</head>

<body>

<div class="header">
<img src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
</div>

<div class="wrap" id="app">

<div class="loading">
読み込み中...
</div>

</div>

<script>

window.handleSheet = function(json){

try{

const rows = json.table.rows || [];

let html = '';

rows.reverse().forEach((row)=>{

const c = row.c || [];

const date =
(c[0] && c[0].v)
? c[0].v
: '';

const title =
(c[1] && c[1].v)
? c[1].v
: '';

const detail =
(c[2] && c[2].v)
? c[2].v
: '';

html += `

<div class="card">

<div class="date">
${date}
</div>

<div class="title">
${title}
</div>

<div class="detail">
${detail}
</div>

</div>

`;

});

document.getElementById('app').innerHTML = html;

}catch(e){

document.getElementById('app').innerHTML = `
<div class="error">
読み込みエラー
</div>
`;

console.log(e);

}

};

const script = document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY/gviz/tq?sheet=NSAW暮らし情報局_データ&tqx=out:json&responseHandler=handleSheet';

document.body.appendChild(script);

</script>

</body>
</html>

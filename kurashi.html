<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>瓦板</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.card{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
}

.video{
  margin-top:24px;
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:20px;
  overflow:hidden;
  background:#000;
}

.section{
  margin-top:28px;
}

.sectionTitle{
  font-size:26px;
  line-height:1.5;
  font-weight:900;
}

.grid{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.box{
  display:block;
  background:#f8fbff;
  border-radius:22px;
  padding:18px 14px;
  text-decoration:none;
  color:#17324d;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.boxTitle{
  font-size:20px;
  line-height:1.5;
  font-weight:900;
}

.boxText{
  margin-top:10px;
  font-size:15px;
  line-height:1.7;
  font-weight:700;
  color:#5b7084;
}

.blue{
  background:#2563eb;
  color:#fff;
}

.red{
  background:#dc2626;
  color:#fff;
}

.green{
  background:#16a34a;
  color:#fff;
}

.orange{
  background:#ea580c;
  color:#fff;
}

.back{
  display:block;
  margin-top:30px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="./top.jpg"
      alt="瓦板"
    >

    <div class="inner">

      <div class="title">
        瓦板
      </div>

      <div class="text">
        四市の暮らし情報、
        地域動画、
        お知らせをまとめています。
      </div>

      <iframe
        class="video"
        src="https://www.youtube.com/embed/jfKfPfyJRdk"
        title="地域動画"
        allowfullscreen
      ></iframe>

      <div class="section">

        <div class="sectionTitle">
          地域情報
        </div>

        <div class="grid">

          <a
            class="box blue"
            href="https://ichirohns-jpg.github.io/ShikiConcierge-18/"
          >
            <div class="boxTitle">
              📺 地域動画
            </div>

            <div class="boxText">
              四市の地域動画を見る
            </div>
          </a>

          <a
            class="box green"
            href="https://www.city.shiki.lg.jp/"
          >
            <div class="boxTitle">
              🏛 市役所情報
            </div>

            <div class="boxText">
              志木市ホームページ
            </div>
          </a>

          <a
            class="box red"
            href="tel:119"
          >
            <div class="boxTitle">
              🚒 緊急連絡
            </div>

            <div class="boxText">
              火事・救急・緊急時
            </div>
          </a>

          <a
            class="box orange"
            href="https://www.google.com/maps/search/病院/"
          >
            <div class="boxTitle">
              🏥 病院
            </div>

            <div class="boxText">
              近くの病院を探す
            </div>
          </a>

        </div>

      </div>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

</div>

</body>
</html>

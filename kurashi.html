<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<meta name="description"
content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:title"
content="NSAW暮らし情報局">

<meta property="og:description"
content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:type"
content="website">

<meta property="og:url"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kurashi.html">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">

<meta name="twitter:card"
content="summary_large_image">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:16px;
}

.banner{
width:100%;
border-radius:22px;
display:block;
margin-bottom:18px;
}

.section{
background:#fff;
border-radius:22px;
padding:18px;
margin-bottom:18px;
box-shadow:0 6px 22px rgba(0,0,0,.08);
}

.section-title{
font-size:30px;
font-weight:900;
margin-bottom:18px;
}

.card{
background:#f7fbff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

.date{
font-size:15px;
color:#607489;
font-weight:700;
margin-bottom:8px;
}

.title{
font-size:28px;
line-height:1.5;
font-weight:900;
margin-bottom:14px;
}

.text{
font-size:20px;
line-height:1.9;
white-space:pre-wrap;
margin-bottom:16px;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:16px;
}

.city-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
margin-bottom:16px;
}

.city-btn{
display:block;
text-decoration:none;
color:#fff;
padding:16px 10px;
border-radius:14px;
font-size:18px;
font-weight:900;
text-align:center;
}

.shiki{
background:#1976d2;
}

.niiza{
background:#2e7d32;
}

.asaka{
background:#ef6c00;
}

.wako{
background:#7b1fa2;
}

.video-title{
font-size:26px;
line-height:1.6;
font-weight:900;
margin-top:18px;
margin-bottom:12px;
}

.video-desc{
font-size:18px;
line-height:1.9;
margin-bottom:16px;
color:#48657f;
white-space:pre-wrap;
}

.video-wrap{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:16px;
overflow:hidden;
margin-bottom:16px;
}

.video-wrap iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:none;
}

.sns{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

.sns a,
.copy-btn{
flex:1;
border:none;
text-decoration:none;
text-align:center;
color:#fff;
border-radius:14px;
padding:16px 8px;
font-size:18px;
font-weight:900;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy-btn{
background:#ff7a00;
}

.genki-area{
margin-top:26px;
padding-top:22px;
border-top:2px solid #d9e6f2;
}

.genki-title{
font-size:28px;
font-weight:900;
text-align:center;
margin-bottom:18px;
}

.genki-btn{
display:block;
width:100%;
border:none;
border-radius:18px;
padding:22px 12px;
font-size:26px;
font-weight:900;
color:#fff;
margin-bottom:14px;
}

.green{
background:#2e7d32;
}

.yellow{
background:#f9a825;
}

.orange{
background:#ef6c00;
}

.red{
background:#c62828;
}

.loading{
text-align:center;
padding:50px 10px;
font-size:24px;
font-weight:900;
}

.error{
text-align:center;
padding:50px 10px;
font-size:24px;
font-weight:900;
color:#c62828;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<div class="section">

<div class="section-title">
NSAW暮らし情報局
</div>

<div id="newsArea">

<div class="loading">
読み込み中...
</div>

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(location.search);

const targetId =
params.get('id');

window.handleSheet =
function(json){

const rows =
json.table.rows || [];

const data =
rows.map((r)=>{

const c = r.c || [];

return{

date:c[0]?.f || c[0]?.v || '',
id:c[1]?.v || '',
title:c[2]?.v || '',
image:c[3]?.v || '',
text:c[4]?.v || '',

shikiTitle:c[5]?.v || '',
shikiUrl:c[6]?.v || '',

niizaTitle:c[7]?.v || '',
niizaUrl:c[8]?.v || '',

asakaTitle:c[9]?.v || '',
asakaUrl:c[10]?.v || '',

wakoTitle:c[11]?.v || '',
wakoUrl:c[12]?.v || '',

videoTitle:c[13]?.v || '',
videoDesc:c[14]?.v || '',
videoUrl:c[15]?.v || '',

showFlag:c[16]?.v || '',
sort:c[17]?.v || ''

};

});

render(data);

};

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY/gviz/tq?tqx=out:json;responseHandler:handleSheet';

document.body.appendChild(script);

function render(data){

const newsArea =
document.getElementById('newsArea');

newsArea.innerHTML = '';

let showData =
data.filter(x =>
String(x.showFlag) !== 'OFF'
);

if(targetId){

showData =
showData.filter(x =>
String(x.id) === String(targetId)
);

}else{

showData =
showData.slice(0,5);

}

if(showData.length === 0){

newsArea.innerHTML =
'<div class="error">記事がありません</div>';

return;

}

showData.forEach(item=>{

newsArea.innerHTML += buildCard(item);

});

}

function buildCard(item){

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html?id='
+ item.id;

return `

<div class="card">

<div class="date">
${escapeHtml(item.date)}
</div>

<div class="title">
${escapeHtml(item.title)}
</div>

${item.image ?
`<img class="thumb" src="${item.image}">`
:''}

<div class="text">
${escapeHtml(item.text)}
</div>

<div class="city-grid">

${buildCity(
item.shikiTitle,
item.shikiUrl,
'shiki'
)}

${buildCity(
item.niizaTitle,
item.niizaUrl,
'niiza'
)}

${buildCity(
item.asakaTitle,
item.asakaUrl,
'asaka'
)}

${buildCity(
item.wakoTitle,
item.wakoUrl,
'wako'
)}

</div>

${buildVideo(
item.videoTitle,
item.videoDesc,
item.videoUrl
)}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

<button
class="copy-btn"
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

<div class="genki-area">

<div class="genki-title">
安否確認
</div>

<button
class="genki-btn green">
🟢 元気です
</button>

<button
class="genki-btn yellow">
🟡 少し体調が悪いです
</button>

<button
class="genki-btn orange">
🟠 困っています
</button>

<button
class="genki-btn red">
🔴 緊急です
</button>

</div>

</div>

`;

}

function buildCity(title,url,className){

if(!title || !url) return '';

return `
<a
class="city-btn ${className}"
href="${url}"
target="_blank">
${escapeHtml(title)}
</a>
`;

}

function buildVideo(title,desc,url){

if(!url) return '';

return `

<div class="video-title">
${escapeHtml(title || '')}
</div>

<div class="video-desc">
${escapeHtml(desc || '')}
</div>

<div class="video-wrap">

<iframe
src="${youtubeEmbed(url)}"
allowfullscreen>
</iframe>

</div>

`;

}

function youtubeEmbed(url){

if(!url) return '';

url = String(url).trim();

if(url.includes('watch?v=')){

const id =
url.split('watch?v=')[1]
.split('&')[0];

return
'https://www.youtube.com/embed/' + id;

}

if(url.includes('youtu.be/')){

const id =
url.split('youtu.be/')[1]
.split('?')[0];

return
'https://www.youtube.com/embed/' + id;

}

if(url.includes('/shorts/')){

const id =
url.split('/shorts/')[1]
.split('?')[0];

return
'https://www.youtube.com/embed/' + id;

}

return url;

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

function escapeHtml(str){

return String(str)
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#39;');

}

</script>

</body>
</html>

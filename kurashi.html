<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
background:#eef5fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.header{
width:100%;
background:#fff;
padding:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

.header img{
width:100%;
border-radius:16px;
display:block;
}

.wrap{
max-width:700px;
margin:0 auto;
padding:14px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#6b7b8c;
margin-bottom:8px;
}

.title{
font-size:26px;
font-weight:700;
line-height:1.5;
margin-bottom:12px;
}

.detail{
font-size:18px;
line-height:1.8;
white-space:pre-wrap;
}

.image{
margin-top:14px;
}

.image img{
width:100%;
border-radius:14px;
display:block;
}

.buttons{
margin-top:16px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:12px;
background:#1877f2;
color:#fff;
text-decoration:none;
font-size:16px;
font-weight:700;
}

.btn.line{
background:#06c755;
}

.btn.x{
background:#111;
}

.loading{
padding:40px;
text-align:center;
font-size:20px;
}

</style>
</head>

<body>

<div class="header">
<img src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
</div>

<div class="wrap" id="app">

<div class="loading">
読み込み中...
</div>

</div>

<script>

const SHEET_ID = '13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';
const SHEET_NAME = 'NSAW暮らし情報局_データ';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json&responseHandler=handleSheet';

const script = document.createElement('script');
script.src = url;
document.body.appendChild(script);

function handleSheet(json){

const rows = json.table.rows || [];

let html = '';

rows.reverse().forEach((row,index)=>{

const c = row.c || [];

const date = c[0]?.v || '';
const title = c[1]?.v || '';
const detail = c[2]?.v || '';
const image = c[3]?.v || '';

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-001.html?v=' + Date.now();

html += `
<div class="card">

<div class="date">${date}</div>

<div class="title">${title}</div>

<div class="detail">${detail}</div>

${image ? `
<div class="image">
<img src="${image}">
</div>
` : ''}

<div class="buttons">

<a class="btn"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a class="btn line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a class="btn x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

</div>

</div>
`;

});

document.getElementById('app').innerHTML = html;

}

</script>

</body>
</html>

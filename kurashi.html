<style>
body{margin:0;background:#eef4f8;font-family:"Hiragino Sans","Yu Gothic",sans-serif;color:#17324d}

.month-title{font-size:28px;font-weight:900;padding:12px 0;color:#17324d;cursor:pointer}
.month-inner{padding-top:10px}
.archive-main-title{font-size:34px;font-weight:900;margin:40px 0 20px;text-align:center}

<script>
function getVal(cell){
  if(!cell) return '';
  if(cell.v !== null && cell.v !== undefined) return cell.v;
  if(cell.f !== null && cell.f !== undefined) return cell.f;
  return '';
}

function youtubeEmbed(url){
  if(!url) return '';
  url=String(url).trim();
  if(url.includes('watch?v=')) return 'https://www.youtube.com/embed/'+url.split('watch?v=')[1].split('&')[0];
  if(url.includes('youtu.be/')) return 'https://www.youtube.com/embed/'+url.split('youtu.be/')[1].split('?')[0];
  if(url.includes('/shorts/')) return 'https://www.youtube.com/embed/'+url.split('/shorts/')[1].split('?')[0];
  return '';
}

function copyUrl(url){
  navigator.clipboard.writeText(url);
  alert('URLをコピーしました');
}

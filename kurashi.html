<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>瓦板</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
}

.video{
  margin-top:24px;
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:20px;
  overflow:hidden;
  background:#000;
}

.card{
  margin-top:18px;
  background:#ffffff;
  border-radius:24px;
  padding:18px 16px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.cardTitle{
  font-size:24px;
  line-height:1.5;
  font-weight:900;
}

.cardDate{
  margin-top:10px;
  font-size:15px;
  color:#64748b;
  font-weight:700;
}

.cardText{
  margin-top:14px;
  font-size:17px;
  line-height:1.8;
  font-weight:700;
  color:#44566c;
}

.btn{
  display:block;
  margin-top:16px;
  background:#2563eb;
  border-radius:18px;
  padding:16px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.back{
  display:block;
  margin-top:30px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

.loading{
  margin-top:30px;
  text-align:center;
  font-size:24px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <img
      class="banner"
      src="./top.jpg"
      alt="瓦板"
    >

    <div class="inner">

      <div class="title">
        瓦板
      </div>

      <div class="text">
        四市の暮らし情報、
        地域動画、
        お知らせをまとめています。
      </div>

      <iframe
        class="video"
        src="https://www.youtube.com/embed/jfKfPfyJRdk"
        title="地域動画"
        allowfullscreen
      ></iframe>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

  <div id="list">

    <div class="loading">
      読み込み中...
    </div>

  </div>

</div>

<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"回覧板データー";

const URL =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json";

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

fetch(URL)
.then(r => r.text())
.then(text => {

  const json =
    JSON.parse(
      text.substring(
        47,
        text.length - 2
      )
    );

  const rows =
    json.table.rows || [];

  const list =
    document.getElementById("list");

  list.innerHTML = "";

  rows.reverse();

  rows.forEach(row => {

    const c =
      row.c || [];

    const date =
      c[0]?.v || "";

    const title =
      c[1]?.v || "";

    const detail =
      c[3]?.v || "";

    const link =
      c[5]?.v || "";

    if(!title){
      return;
    }

    const div =
      document.createElement("div");

    div.className =
      "card";

    div.innerHTML =

      '<div class="cardTitle">'
      + esc(title)
      + '</div>'

      +

      '<div class="cardDate">'
      + esc(date)
      + '</div>'

      +

      '<div class="cardText">'
      + esc(detail)
      + '</div>'

      +

      (
        link
        ? '<a class="btn" target="_blank" href="'
          + esc(link)
          + '">詳しく見る</a>'
        : ''
      );

    list.appendChild(div);

  });

});

</script>

</body>
</html>

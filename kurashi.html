<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>回覧板</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.card{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:32px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
}

.video{
  margin-top:24px;
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:20px;
  overflow:hidden;
}

.info{
  margin-top:24px;
  background:#f8fbff;
  border-radius:20px;
  padding:18px 16px;
}

.infoTitle{
  font-size:22px;
  font-weight:900;
}

.infoText{
  margin-top:10px;
  font-size:17px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
}

.btn{
  display:block;
  margin-top:24px;
  background:#2563eb;
  border-radius:24px;
  padding:22px 16px;
  text-align:center;
  text-decoration:none;
  color:#ffffff;
  font-size:24px;
  line-height:1.4;
  font-weight:900;
}

.back{
  display:block;
  margin-top:24px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="./top.jpg"
      alt="回覧板"
    >

    <div class="inner">

      <div class="title">
        回覧板
      </div>

      <div class="text">
        四市の暮らし情報、
        地域のお知らせ、
        動画情報をまとめています。
      </div>

      <iframe
        class="video"
        src="https://www.youtube.com/embed/videoseries?list=PL"
        title="地域動画"
        allowfullscreen
      ></iframe>

      <div class="info">

        <div class="infoTitle">
          地域情報
        </div>

        <div class="infoText">
          回覧板や地域情報、
          動画などを順次追加していきます。
        </div>

      </div>

      <a
        class="btn"
        href="https://ichirohns-jpg.github.io/ShikiConcierge-18/"
      >
        📺 地域生活テレビを見る
      </a>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

</div>

</body>
</html>

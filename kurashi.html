<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>瓦板</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#ffffff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:18px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
}

.card{
  margin-top:18px;
  background:#ffffff;
  border-radius:24px;
  padding:18px 16px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.cardTitle{
  font-size:28px;
  line-height:1.5;
  font-weight:900;
}

.cardDate{
  margin-top:10px;
  font-size:16px;
  color:#64748b;
  font-weight:700;
}

.cardText{
  margin-top:14px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#44566c;
}

.cardImage{
  width:100%;
  margin-top:16px;
  border-radius:18px;
  display:block;
}

.video{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:18px;
  margin-top:16px;
}

.btn{
  display:block;
  margin-top:16px;
  background:#2563eb;
  border-radius:18px;
  padding:16px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.back{
  display:block;
  margin-top:30px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <img
      class="banner"
      src="./top.jpg"
      alt="瓦板"
    >

    <div class="inner">

      <div class="title">
        瓦板
      </div>

      <div class="text">
        四市の暮らし情報、
        地域動画、
        お知らせをまとめています。
      </div>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

  <div id="list">

    <div class="loading">
      読み込み中...
    </div>

  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function cell(row,index){

  if(
    !row.c ||
    !row.c[index]
  ){
    return "";
  }

  return row.c[index].v || "";

}

function formatDate(v){

  if(!v){
    return "";
  }

  if(typeof v === "string"){
    return v;
  }

  if(v instanceof Date){

    const y = v.getFullYear();
    const m = v.getMonth() + 1;
    const d = v.getDate();

    return y + "年" + m + "月" + d + "日";
  }

  return String(v);

}

function youtubeId(url){

  url = String(url || "");

  let m =
    url.match(/[?&]v=([^&]+)/);

  if(m){
    return m[1];
  }

  m =
    url.match(/youtu\.be\/([^?&]+)/);

  if(m){
    return m[1];
  }

  return "";

}

function handleSheet(json){

  const rows =
    json.table.rows || [];

  const list =
    document.getElementById("list");

  list.innerHTML = "";

  rows.reverse();

  rows.forEach(row => {

    const date =
      formatDate(cell(row,0));

    const title =
      cell(row,1);

    const detail =
      cell(row,2);

    const image =
      cell(row,3);

    const video =
      cell(row,4);

    if(!title){
      return;
    }

    const div =
      document.createElement("div");

    div.className =
      "card";

    let html =

      '<div class="cardTitle">'
      + esc(title)
      + '</div>'

      +

      '<div class="cardDate">'
      + esc(date)
      + '</div>'

      +

      '<div class="cardText">'
      + esc(detail)
      + '</div>';

    if(image){

      html +=

      '<img class="cardImage" src="'
      + esc(image)
      + '">';

    }

    const yt =
      youtubeId(video);

    if(yt){

      html +=

      '<iframe class="video" src="https://www.youtube.com/embed/'
      + yt
      + '" allowfullscreen></iframe>';

    }

    div.innerHTML =
      html;

    list.appendChild(div);

  });

}

const script =
  document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler=handleSheet&t="
+ Date.now();

document.body.appendChild(script);

</script>

</body>
</html>

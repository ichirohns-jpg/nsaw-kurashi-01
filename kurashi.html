<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

body{
margin:0;
background:#eef4f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:16px;
}

.banner{
width:100%;
border-radius:20px;
margin-bottom:18px;
display:block;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.date{
font-size:16px;
font-weight:700;
color:#607489;
margin-bottom:8px;
}

.title{
font-size:30px;
font-weight:900;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.text{
font-size:20px;
line-height:1.9;
margin-bottom:16px;
white-space:pre-wrap;
color:#17324d;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:16px;
display:block;
}

.video-title{
font-size:26px;
font-weight:900;
line-height:1.6;
margin-bottom:12px;
color:#17324d;
}

.video-desc{
font-size:18px;
line-height:1.8;
margin-bottom:16px;
color:#48657f;
white-space:pre-wrap;
}

.video-wrap{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:16px;
overflow:hidden;
margin-bottom:16px;
}

.video-wrap iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.sns{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:16px;
}

.sns a,
.copy-btn{
flex:1;
border:none;
text-decoration:none;
text-align:center;
color:#fff;
border-radius:14px;
padding:16px 8px;
font-size:18px;
font-weight:900;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy-btn{
background:#ff7a00;
}

.loading{
font-size:28px;
font-weight:900;
padding:40px 10px;
text-align:center;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<div id="newsArea">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<script>

window.handleSheet =
function(json){

const rows =
json.table.rows || [];

const newsArea =
document.getElementById('newsArea');

newsArea.innerHTML = '';

rows.slice(0,5).forEach((r)=>{

const c = r.c || [];

const date =
c[0]?.f || c[0]?.v || '';

const id =
c[1]?.v || '';

const title =
c[2]?.v || '';

const image =
c[3]?.v || '';

const text =
c[4]?.v || '';

const videoTitle =
c[13]?.v || '';

const videoDesc =
c[14]?.v || '';

const videoUrl =
c[15]?.v || '';

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html?id='
+ id;

newsArea.innerHTML += `

<div class="card">

<div class="date">
${date}
</div>

<div class="title">
${title}
</div>

${image ?
`
<img
class="thumb"
src="${image}">
`
:''}

<div class="text">
${text}
</div>

${videoTitle ?
`
<div class="video-title">
${videoTitle}
</div>
`
:''}

${videoDesc ?
`
<div class="video-desc">
${videoDesc}
</div>
`
:''}

${videoUrl ?
`
<div class="video-wrap">

<iframe
src="${youtubeEmbed(videoUrl)}"
allowfullscreen>
</iframe>

</div>
`
:''}

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">
Facebook
</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">
LINE
</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">
X
</a>

<button
class="copy-btn"
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>

`;

});

};

function youtubeEmbed(url){

if(!url) return '';

url = String(url).trim();

if(url.includes('watch?v=')){

const id =
url.split('watch?v=')[1]
.split('&')[0];

return
'https://www.youtube.com/embed/' + id;

}

if(url.includes('youtu.be/')){

const id =
url.split('youtu.be/')[1]
.split('?')[0];

return
'https://www.youtube.com/embed/' + id;

}

if(url.includes('/shorts/')){

const id =
url.split('/shorts/')[1]
.split('?')[0];

return
'https://www.youtube.com/embed/' + id;

}

return '';

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY/gviz/tq?sheet=NSAW暮らし情報局_データ&tqx=out:json;responseHandler=handleSheet';

document.body.appendChild(script);

</script>

</body>
</html>

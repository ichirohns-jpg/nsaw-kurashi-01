<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b3a;
}

.header img{
  width:100%;
  display:block;
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:14px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  line-height:1.8;
  white-space:pre-wrap;
  word-break:break-all;
}

.debug{
  font-size:20px;
  font-weight:900;
  color:#1565c0;
}

</style>
</head>

<body>

<div class="header">
<img src="top-banner.jpg">
</div>

<div class="wrap" id="app">

<div class="card">
読み込み中...
</div>

</div>

<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

window.handleSheet = function(json){

  try{

    const rows =
    json.table.rows || [];

    let html = "";

    html += `
    <div class="card debug">
      rows件数:
      ${rows.length}
    </div>
    `;

    rows.forEach((row,index)=>{

      const c = row.c || [];

      const allData =
      JSON.stringify(
        c.map(v =>
          v && v.v != null
          ? v.v
          : ""
        ),
        null,
        2
      );

      html += `

      <div class="card">

      ${index + 1}件目

      <br><br>

      ${allData}

      </div>

      `;
    });

    document.getElementById("app").innerHTML =
    html;

  }catch(e){

    document.getElementById("app").innerHTML =
    `
    <div class="card">
    エラー:
    <br><br>
    ${e.message}
    </div>
    `;
  }
};

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler:handleSheet";

document.body.appendChild(script);

</script>

</body>
</html>

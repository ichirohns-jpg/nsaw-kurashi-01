<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

body{
margin:0;
background:#eef4f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:16px;
}

.banner{
width:100%;
border-radius:20px;
display:block;
margin-bottom:18px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.title{
font-size:30px;
font-weight:900;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.text{
font-size:20px;
line-height:1.9;
white-space:pre-wrap;
margin-bottom:16px;
color:#17324d;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:16px;
display:block;
}

.btn{
display:block;
width:100%;
padding:18px;
background:#1877f2;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:16px;
font-size:22px;
font-weight:900;
box-sizing:border-box;
margin-top:12px;
}

.archive-title{
font-size:34px;
font-weight:900;
margin:40px 0 20px;
color:#17324d;
text-align:center;
}

.loading{
font-size:28px;
font-weight:900;
padding:40px 10px;
text-align:center;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg?v=202605211540">

<div id="mainArea">

<div class="loading">
読み込み中...
</div>

</div>

<div id="archiveArea"></div>

</div>

<script>

function getVal(cell){

if(!cell) return '';

if(cell.v !== null &&
cell.v !== undefined){
return cell.v;
}

if(cell.f !== null &&
cell.f !== undefined){
return cell.f;
}

return '';

}

function renderTable(table){

const rows =
table.rows || [];

const mainArea =
document.getElementById('mainArea');

const archiveArea =
document.getElementById('archiveArea');

mainArea.innerHTML = '';
archiveArea.innerHTML = '';

if(rows.length === 0){

mainArea.innerHTML =
'<div class="loading">データがありません</div>';

return;

}

rows.reverse();

rows.forEach((row,index)=>{

const c =
row.c || [];

const id =
getVal(c[1]);

const title =
getVal(c[2]);

const image =
getVal(c[3]);

const text =
getVal(c[4]);

const html = `

<div class="card">

<div class="title">
${title}
</div>

${image
? `<img class="thumb" src="${image}">`
: ''}

<div class="text">
${text}
</div>

<a
class="btn"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-${String(id).padStart(3,'0')}.html">

記事を見る

</a>

</div>

`;

if(index < 5){

mainArea.innerHTML += html;

}else{

if(
archiveArea.innerHTML === ''
){

archiveArea.innerHTML =
'<div class="archive-title">アーカイブ</div>';

}

archiveArea.innerHTML += html;

}

});

}

window.google = {
visualization:{
Query:{
setResponse:function(response){

if(response.status === 'ok'){

renderTable(response.table);

}

}
}
}
};

const sheetId =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
sheetId +
'/gviz/tq?tqx=out:json';

document.body.appendChild(script);

</script>

</body>
</html>

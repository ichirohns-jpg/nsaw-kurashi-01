<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>瓦板</title>

<meta property="og:title" content="NSAW暮らし情報局">
<meta property="og:description" content="四市の暮らし情報・地域動画・お知らせ">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">
<meta property="og:type" content="website">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.top{
  background:#fff;
  border-radius:26px;
  overflow:hidden;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:22px 18px;
}

.topTitle{
  font-size:34px;
  line-height:1.4;
  font-weight:900;
  text-align:center;
}

.topText{
  margin-top:14px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#5b7084;
  text-align:center;
}

.card{
  margin-top:20px;
  background:#fff;
  border-radius:26px;
  padding:18px 16px;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.title{
  font-size:30px;
  line-height:1.45;
  font-weight:900;
}

.date{
  margin-top:8px;
  font-size:15px;
  color:#64748b;
  font-weight:800;
}

.image{
  width:100%;
  margin-top:14px;
  border-radius:18px;
  display:block;
}

.text{
  margin-top:14px;
  font-size:18px;
  line-height:1.8;
  font-weight:700;
  color:#44566c;
  white-space:pre-wrap;
}

.movieTitle{
  margin-top:18px;
  font-size:22px;
  line-height:1.6;
  font-weight:900;
}

.movieText{
  margin-top:10px;
  font-size:17px;
  line-height:1.8;
  font-weight:700;
  color:#44566c;
  white-space:pre-wrap;
}

.video{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:18px;
  margin-top:16px;
  background:#000;
}

.grid{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:82px;
  border:none;
  border-radius:20px;
  padding:14px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:20px;
  line-height:1.45;
  font-weight:900;
}

.blue{background:#2563eb;}
.green{background:#16a34a;}
.orange{background:#ea580c;}
.purple{background:#7c3aed;}
.black{background:#111111;}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:28px;
  font-weight:900;
}

.back{
  display:block;
  margin-top:24px;
  text-align:center;
  font-size:18px;
  font-weight:900;
  color:#2563eb;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <img
      class="banner"
      src="./top.jpg"
      alt="瓦板"
    >

    <div class="inner">

      <div class="topTitle">
        瓦板
      </div>

      <div class="topText">
        四市の暮らし情報・地域動画・お知らせをまとめています。
      </div>

      <a
        class="back"
        href="./index.html"
      >
        ← トップへ戻る
      </a>

    </div>

  </div>

  <div id="list">

    <div class="loading">
      読み込み中...
    </div>

  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

function esc(str){

  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

function cell(row,i){

  if(!row.c || !row.c[i]){
    return "";
  }

  return row.c[i].v || "";

}

function drive(url){

  url = String(url || "");

  let m =
    url.match(/\/d\/([a-zA-Z0-9_-]+)/);

  if(m){

    return "https://drive.google.com/thumbnail?id="
      + m[1]
      + "&sz=w1600";

  }

  m =
    url.match(/[?&]id=([a-zA-Z0-9_-]+)/);

  if(m){

    return "https://drive.google.com/thumbnail?id="
      + m[1]
      + "&sz=w1600";

  }

  return url;

}

function youtubeId(url){

  url = String(url || "");

  let m =
    url.match(/[?&]v=([^&]+)/);

  if(m) return m[1];

  m =
    url.match(/youtu\.be\/([^?&]+)/);

  if(m) return m[1];

  m =
    url.match(/shorts\/([^?&]+)/);

  if(m) return m[1];

  return "";

}

function shareButtons(url){

  return `

  <div class="grid">

    <button
      class="btn blue"
      onclick="shareFacebook('${url}')"
      type="button">
      Facebook
    </button>

    <button
      class="btn green"
      onclick="shareLine('${url}')"
      type="button">
      LINE
    </button>

    <button
      class="btn black"
      onclick="shareX('${url}')"
      type="button">
      X
    </button>

    <button
      class="btn purple"
      onclick="copyUrl('${url}')"
      type="button">
      コピー
    </button>

  </div>

  `;

}

function handleSheet(json){

  const rows =
    json.table.rows || [];

  const list =
    document.getElementById("list");

  list.innerHTML = "";

  rows.reverse();

  rows.forEach((row,index)=>{

    const date = cell(row,0);
    const title = cell(row,2);
    const image = drive(cell(row,3));
    const detail = cell(row,4);

    const movieTitle = cell(row,15);
    const movieText = cell(row,16);

    const video = cell(row,17);

    if(!title){
      return;
    }

    let html = `

    <div class="card">

      <div class="title">
        ${esc(title)}
      </div>

      <div class="date">
        ${esc(date)}
      </div>

    `;

    if(image){

      html += `
      <img
        class="image"
        src="${esc(image)}">
      `;

    }

    if(detail){

      html += `
      <div class="text">
        ${esc(detail)}
      </div>
      `;

    }

    if(movieTitle){

      html += `
      <div class="movieTitle">
        ${esc(movieTitle)}
      </div>
      `;

    }

    if(movieText){

      html += `
      <div class="movieText">
        ${esc(movieText)}
      </div>
      `;

    }

    const yt =
      youtubeId(video);

    if(yt){

      html += `
      <iframe
        class="video"
        src="https://www.youtube.com/embed/${yt}"
        allowfullscreen>
      </iframe>
      `;

    }

    const num =
      String(index + 1).padStart(3,"0");

    const shareUrl =
      "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-"
      + num
      + ".html";

    html += shareButtons(
      shareUrl
    );

    html += `
    </div>
    `;

    list.innerHTML += html;

  });

}

function shareFacebook(url){

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u="
    + encodeURIComponent(url),
    "_blank"
  );

}

function shareLine(url){

  window.open(
    "https://social-plugins.line.me/lineit/share?url="
    + encodeURIComponent(url),
    "_blank"
  );

}

function shareX(url){

  window.open(
    "https://twitter.com/intent/tweet?url="
    + encodeURIComponent(url),
    "_blank"
  );

}

function copyUrl(url){

  navigator.clipboard.writeText(url);

  alert("URLをコピーしました");

}

window.handleSheet =
handleSheet;

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=responseHandler:handleSheet;out:json&t="
+ Date.now();

document.body.appendChild(script);

</script>

</body>
</html>

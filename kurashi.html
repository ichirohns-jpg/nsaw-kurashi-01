<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<meta name="description" content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:type" content="website">
<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/">

<meta name="twitter:card" content="summary_large_image">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b3a;
}

.header{
  width:100%;
}

.header img{
  width:100%;
  display:block;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:auto;
  padding:14px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.title{
  font-size:28px;
  font-weight:900;
  line-height:1.4;
  margin-bottom:16px;
}

.main-image{
  width:100%;
  border-radius:16px;
  margin-bottom:16px;
}

.text{
  font-size:18px;
  line-height:1.9;
  white-space:pre-wrap;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

.city-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  padding:14px;
  border-radius:14px;
  font-size:17px;
}

.shiki{
  background:#1e88e5;
}

.niiza{
  background:#43a047;
}

.asaka{
  background:#fb8c00;
}

.wako{
  background:#8e24aa;
}

.video{
  margin-top:24px;
}

.video-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

.video-desc{
  line-height:1.8;
  margin-bottom:14px;
}

.video iframe{
  width:100%;
  aspect-ratio:16/9;
  border:none;
  border-radius:16px;
}

.video video{
  width:100%;
  border-radius:16px;
}

.sns{
  display:flex;
  gap:10px;
  margin-top:22px;
  flex-wrap:wrap;
}

.sns button{
  flex:1;
  min-width:120px;
  border:none;
  border-radius:14px;
  padding:14px;
  color:#fff;
  font-size:16px;
  font-weight:700;
}

.fb{
  background:#1877f2;
}

.line{
  background:#06c755;
}

.x{
  background:#000;
}

.copy{
  background:#607d8b;
}

.loading{
  text-align:center;
  padding:60px 20px;
  font-size:20px;
}

.error{
  text-align:center;
  padding:60px 20px;
  font-size:18px;
  color:#c62828;
}

</style>
</head>

<body>

<div class="header">
  <img src="top-banner.jpg">
</div>

<div class="wrap" id="app">

<div class="loading">
読み込み中...
</div>

</div>

<script>

const SHEET_ID =
"1Xx0a0dRqSrL6pacX7xY5jyTtiQ1Ot8E03oLmMICfI6M";

const SHEET_NAME =
"NSAW暮らし情報局_データ";

const params =
new URLSearchParams(location.search);

const targetId =
params.get("id") || "";

function get(c,i){

  return c[i] && c[i].v != null
  ? String(c[i].v)
  : "";
}

function escapeHtml(str){

  return String(str)
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");
}

function buildVideo(url){

  if(!url) return "";

  if(
    url.includes("youtube.com") ||
    url.includes("youtu.be")
  ){

    let id = "";

    if(url.includes("watch?v=")){

      id =
      url.split("watch?v=")[1]
      .split("&")[0];

    }else if(url.includes("youtu.be/")){

      id =
      url.split("youtu.be/")[1]
      .split("?")[0];
    }

    return `
    <iframe
      src="https://www.youtube.com/embed/${id}"
      allowfullscreen>
    </iframe>
    `;
  }

  return `
  <video controls playsinline>
    <source src="${url}">
  </video>
  `;
}

function shareFacebook(url){

  window.open(
    "https://www.facebook.com/sharer/sharer.php?u="
    + encodeURIComponent(url),
    "_blank"
  );
}

function shareX(url){

  window.open(
    "https://twitter.com/intent/tweet?url="
    + encodeURIComponent(url),
    "_blank"
  );
}

function shareLine(url){

  window.open(
    "https://social-plugins.line.me/lineit/share?url="
    + encodeURIComponent(url),
    "_blank"
  );
}

function copyUrl(url){

  navigator.clipboard.writeText(url);

  alert("URLをコピーしました");
}

window.handleSheet = function(json){

  try{

    const rows =
    json.table.rows || [];

    let html = "";

    rows.forEach(row=>{

      const c = row.c || [];

      const date = get(c,0);
      const id = get(c,1);
      const title = get(c,2);
      const image = get(c,3);
      const text = get(c,4);

      const info1Title = get(c,5);
      const info1Url = get(c,6);

      const info2Title = get(c,7);
      const info2Url = get(c,8);

      const info3Title = get(c,9);
      const info3Url = get(c,10);

      const info4Title = get(c,11);
      const info4Url = get(c,12);

      const videoTitle = get(c,15);
      const videoDesc = get(c,16);
      const videoUrl = get(c,17);

      const flag = get(c,18);

      if(flag !== "はい") return;

      if(targetId && id !== targetId) return;

      const shareUrl =
      "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share.html?id="
      + id;

      html += `

      <div class="card">

        <div class="date">
          ${date}
        </div>

        <div class="title">
          ${escapeHtml(title)}
        </div>

        ${
          image
          ?
          `<img class="main-image" src="${image}">`
          :
          ``
        }

        <div class="text">
          ${escapeHtml(text)}
        </div>

        <div class="buttons">

          ${
            info1Title && info1Url
            ?
            `<a class="city-btn shiki" href="${info1Url}" target="_blank">${escapeHtml(info1Title)}</a>`
            :
            ``
          }

          ${
            info2Title && info2Url
            ?
            `<a class="city-btn niiza" href="${info2Url}" target="_blank">${escapeHtml(info2Title)}</a>`
            :
            ``
          }

          ${
            info3Title && info3Url
            ?
            `<a class="city-btn asaka" href="${info3Url}" target="_blank">${escapeHtml(info3Title)}</a>`
            :
            ``
          }

          ${
            info4Title && info4Url
            ?
            `<a class="city-btn wako" href="${info4Url}" target="_blank">${escapeHtml(info4Title)}</a>`
            :
            ``
          }

        </div>

        ${
          videoUrl
          ?
          `
          <div class="video">

            <div class="video-title">
              ${escapeHtml(videoTitle)}
            </div>

            <div class="video-desc">
              ${escapeHtml(videoDesc)}
            </div>

            ${buildVideo(videoUrl)}

          </div>
          `
          :
          ``
        }

        <div class="sns">

          <button
            class="fb"
            onclick="shareFacebook('${shareUrl}')">
            Facebook
          </button>

          <button
            class="line"
            onclick="shareLine('${shareUrl}')">
            LINE
          </button>

          <button
            class="x"
            onclick="shareX('${shareUrl}')">
            X
          </button>

          <button
            class="copy"
            onclick="copyUrl('${shareUrl}')">
            URLコピー
          </button>

        </div>

      </div>

      `;
    });

    if(!html){

      html = `
      <div class="error">
      表示できる記事がありません
      </div>
      `;
    }

    document.getElementById("app").innerHTML =
    html;

  }catch(e){

    document.getElementById("app").innerHTML =
    `
    <div class="error">
    読み込みエラーが発生しました
    </div>
    `;

    console.error(e);
  }
};

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json;responseHandler=handleSheet";

document.body.appendChild(script);

</script>

</body>
</html>

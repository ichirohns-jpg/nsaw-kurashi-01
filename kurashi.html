<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:0;
background:#eef5fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.header{
width:100%;
background:#fff;
}

.header img{
width:100%;
display:block;
}

.wrap{
max-width:720px;
margin:auto;
padding:14px;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:20px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.title{
font-size:28px;
font-weight:bold;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.detail{
font-size:18px;
line-height:1.9;
white-space:pre-wrap;
color:#333;
}

.image{
margin-top:16px;
}

.image img{
width:100%;
display:block;
border-radius:14px;
}

.loading{
padding:50px;
text-align:center;
font-size:22px;
}

.error{
padding:30px;
text-align:center;
font-size:20px;
color:red;
}

</style>
</head>

<body>

<div class="header">
<img src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
</div>

<div class="wrap" id="app">

<div class="loading">
読み込み中...
</div>

</div>

<script>

const SHEET_ID = '13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';
const SHEET_NAME = 'NSAW暮らし情報局_データ';

window.handleSheet = function(json){

try{

const rows = json.table.rows || [];

let html = '';

rows.reverse().forEach((row)=>{

try{

const c = row.c || [];

const date =
(c[0] && c[0].v)
? c[0].v
: '';

const title =
(c[1] && c[1].v)
? c[1].v
: '';

const detail =
(c[2] && c[2].v)
? c[2].v
: '';

const image =
(c[3] && c[3].v)
? c[3].v
: '';

html += `

<div class="card">

<div class="date">
${date}
</div>

<div class="title">
${title}
</div>

<div class="detail">
${detail}
</div>

${image ? `

<div class="image">
<img src="${image}">
</div>

` : ''}

</div>

`;

}catch(e){

console.log(e);

}

});

if(!html){

html = `
<div class="error">
データがありません
</div>
`;

}

document.getElementById('app').innerHTML = html;

}catch(e){

document.getElementById('app').innerHTML = `
<div class="error">
読み込みエラー
</div>
`;

console.log(e);

}

};

const script = document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json&responseHandler=handleSheet';

document.body.appendChild(script);

</script>

</body>
</html>

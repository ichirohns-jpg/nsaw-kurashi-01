<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<meta property="og:title"
content="NSAW暮らし情報局">

<meta property="og:description"
content="志木・新座・朝霞・和光の暮らし情報">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top-banner.jpg">

<meta property="og:url"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kurashi.html">

<meta property="og:type"
content="website">

<meta name="twitter:card"
content="summary_large_image">

<style>

body{
margin:0;
background:#eef2f7;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:720px;
margin:auto;
padding:12px;
}

.banner{
width:100%;
border-radius:20px;
display:block;
margin-bottom:14px;
}

.card{
background:#fff;
border-radius:20px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#666;
margin-bottom:6px;
}

.title{
font-size:20px;
font-weight:700;
line-height:1.5;
margin-bottom:10px;
}

.text{
font-size:15px;
line-height:1.8;
margin-bottom:12px;
white-space:pre-wrap;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:12px;
display:block;
}

.video-wrap{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:16px;
overflow:hidden;
margin-bottom:12px;
}

.video-wrap iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.shareRow{
display:flex;
gap:8px;
}

.shareBtn{
flex:1;
border:none;
border-radius:12px;
padding:12px 0;
font-size:15px;
font-weight:700;
color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy{
background:#666;
}

.archive{
background:#fff;
border-radius:20px;
padding:16px;
margin-top:18px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.archiveTitle{
font-size:28px;
font-weight:700;
margin-bottom:16px;
}

.monthBox{
margin-bottom:20px;
}

.monthTitle{
font-size:20px;
font-weight:700;
margin-bottom:10px;
padding-bottom:6px;
border-bottom:2px solid #ddd;
}

.archiveLink{
display:block;
padding:10px 0;
text-decoration:none;
color:#1f2d3d;
border-bottom:1px solid #eee;
font-size:16px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top-banner.jpg"
>

<div id="main"></div>

<div class="archive">

<div class="archiveTitle">
過去の記事
</div>

<div id="archive"></div>

</div>

</div>

<script>

const SHEET_URL =
'https://docs.google.com/spreadsheets/d/13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY/gviz/tq?tqx=out:json';

function loadSheet(){

const s =
document.createElement('script');

s.src = SHEET_URL;

document.body.appendChild(s);

}

window.google = {
visualization:{
Query:{
setResponse:function(res){

const rows =
res.table.rows;

const data = [];

rows.forEach(r=>{

const c = r.c || [];

const rawDate =
c[0]?.f ||
c[0]?.v ||
'';

const id =
String(c[1]?.v || '').trim();

if(!id) return;

const title =
c[2]?.v || '';

const image =
c[3]?.v || '';

const text =
c[4]?.v ||
c[5]?.v ||
'';

let video = '';

c.forEach(cell=>{

const raw =
JSON.stringify(cell || '');

if(
raw.includes('youtube.com') ||
raw.includes('youtu.be')
){

const match =
raw.match(/https?:\/\/[^"]+/);

if(match){

video = match[0]
.replace(/\\/g,'');

}

}

});

data.push({
id,
title,
image,
text,
date:rawDate,
video
});

});

draw(data);

}
}
}
};

function youtubeEmbed(url){

if(!url) return '';

if(url.includes('watch?v=')){

return 'https://www.youtube.com/embed/' +
url.split('watch?v=')[1]
.split('&')[0];

}

if(url.includes('youtu.be/')){

return 'https://www.youtube.com/embed/' +
url.split('youtu.be/')[1]
.split('?')[0];

}

if(url.includes('/shorts/')){

return 'https://www.youtube.com/embed/' +
url.split('/shorts/')[1]
.split('?')[0];

}

return '';

}

function draw(data){

const main =
document.getElementById('main');

const archive =
document.getElementById('archive');

data.reverse();

const monthMap = {};

data.forEach((d,index)=>{

const id =
String(d.id).padStart(3,'0');

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-' +
id +
'.html';

const embed =
youtubeEmbed(d.video);

const html = `

<div class="card">

<div class="date">
${d.date}
</div>

<div class="title">
${d.title}
</div>

${d.image
? `<img class="thumb" src="${d.image}">`
: ''}

<div class="text">
${d.text}
</div>

${embed
? `
<div class="video-wrap">
<iframe
src="${embed}"
allowfullscreen>
</iframe>
</div>
`
: ''}

<div class="shareRow">

<button
class="shareBtn fb"
onclick="
window.open(
'https://www.facebook.com/sharer/sharer.php?u=' +
encodeURIComponent('${shareUrl}')
);
"
>
Facebook
</button>

<button
class="shareBtn line"
onclick="
window.open(
'https://social-plugins.line.me/lineit/share?url=' +
encodeURIComponent('${shareUrl}')
);
"
>
LINE
</button>

<button
class="shareBtn x"
onclick="
window.open(
'https://twitter.com/intent/tweet?url=' +
encodeURIComponent('${shareUrl}')
);
"
>
X
</button>

<button
class="shareBtn copy"
onclick="
navigator.clipboard.writeText('${shareUrl}');
alert('URLをコピーしました');
"
>
コピー
</button>

</div>

</div>

`;

if(index < 5){

main.innerHTML += html;

}else{

const month =
String(d.date).substring(0,7);

if(!monthMap[month]){

monthMap[month] = [];

}

monthMap[month].push(`
<a
class="archiveLink"
href="${shareUrl}"
target="_blank"
>
${d.date}
　
${d.title}
</a>
`);

}

});

Object.keys(monthMap)
.sort()
.reverse()
.forEach(month=>{

archive.innerHTML += `

<div class="monthBox">

<div class="monthTitle">
${month}
</div>

${monthMap[month].join('')}

</div>

`;

});

}

loadSheet();

</script>

</body>
</html>

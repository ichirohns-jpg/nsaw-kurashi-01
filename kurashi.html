<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

body{
margin:0;
background:#eef4f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
}

.wrap{
max-width:760px;
margin:0 auto;
padding:16px;
}

.banner{
width:100%;
border-radius:20px;
display:block;
margin-bottom:18px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.title{
font-size:30px;
font-weight:900;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.text{
font-size:20px;
line-height:1.9;
white-space:pre-wrap;
margin-bottom:16px;
color:#17324d;
}

.thumb{
width:100%;
border-radius:16px;
margin-bottom:16px;
display:block;
}

.video-wrap{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:16px;
overflow:hidden;
margin-top:16px;
margin-bottom:16px;
}

.video-wrap iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

.btn{
display:block;
width:100%;
padding:18px;
background:#1877f2;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:16px;
font-size:22px;
font-weight:900;
box-sizing:border-box;
margin-top:12px;
border:none;
cursor:pointer;
}

.copy-btn{
background:#ff9800;
}

.sns{
display:flex;
gap:10px;
margin-top:16px;
}

.sns a{
flex:1;
text-align:center;
padding:14px 10px;
border-radius:14px;
color:#fff;
text-decoration:none;
font-size:18px;
font-weight:900;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.loading{
font-size:28px;
font-weight:900;
padding:40px 10px;
text-align:center;
}

.month-box{
background:#fff;
border-radius:18px;
margin-bottom:18px;
padding:10px 16px;
box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.month-title{
font-size:28px;
font-weight:900;
padding:12px 0;
color:#17324d;
cursor:pointer;
}

.month-inner{
padding-top:10px;
}

.archive-main-title{
font-size:34px;
font-weight:900;
margin:40px 0 20px;
color:#17324d;
text-align:center;
}

</style>

</head>

<body>

<div class="wrap">

<img
class="banner"
src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg?v=202605212035">

<div id="mainArea">

<div class="loading">
読み込み中...
</div>

</div>

<div id="archiveArea"></div>

</div>

<script>

function getVal(cell){

if(!cell) return '';

if(cell.v !== null &&
cell.v !== undefined){
return cell.v;
}

if(cell.f !== null &&
cell.f !== undefined){
return cell.f;
}

return '';

}

function youtubeEmbed(url){

if(!url) return '';

url = String(url).trim();

if(url.includes('watch?v=')){

const id =
url.split('watch?v=')[1]
.split('&')[0];

return 'https://www.youtube.com/embed/' + id;

}

if(url.includes('youtu.be/')){

const id =
url.split('youtu.be/')[1]
.split('?')[0];

return 'https://www.youtube.com/embed/' + id;

}

if(url.includes('/shorts/')){

const id =
url.split('/shorts/')[1]
.split('?')[0];

return 'https://www.youtube.com/embed/' + id;

}

return '';

}

function copyLink(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

function renderTable(table){

let rows =
table.rows || [];

const params =
new URLSearchParams(
window.location.search
);

const targetId =
params.get('id');

const mainArea =
document.getElementById('mainArea');

const archiveArea =
document.getElementById('archiveArea');

mainArea.innerHTML = '';
archiveArea.innerHTML = '';

if(rows.length === 0){

mainArea.innerHTML =
'<div class="loading">データがありません</div>';

return;

}

rows.reverse();

if(targetId){

rows =
rows.filter(row=>{

const c = row.c || [];

const rowId =
String(getVal(c[1]))
.replace(/^0+/,'')
.trim();

const target =
String(targetId)
.replace(/^0+/,'')
.trim();

return rowId === target;

});

}

const archiveMap = {};

rows.forEach((row,index)=>{

const c =
row.c || [];

const date =
String(getVal(c[0]));

const id =
String(getVal(c[1])).trim();

const title =
getVal(c[2]);

const image =
getVal(c[3]);

const text =
getVal(c[4]) ||
getVal(c[5]) ||
'';

let videoUrl = '';

c.forEach(cell=>{

if(!cell) return;

const raw =
JSON.stringify(cell);

if(
raw.includes('youtube.com') ||
raw.includes('youtu.be')
){

const clean =
raw.replace(/\\/g,'');

const match =
clean.match(/https?:\/\/[^\s"'\}]+/);

if(match){

videoUrl = match[0];

}

}

});

const embedUrl =
youtubeEmbed(videoUrl);

const shareUrl =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-' +
String(id).padStart(3,'0') +
'.html';

let monthLabel =
'過去の記事';

if(date.includes('/')){

const parts =
date.split('/');

if(parts.length >= 2){

monthLabel =
parts[1] + '月';

}

}

const html = `

<div class="card">

<div class="title">
${title}
</div>

${image
? `<img class="thumb" src="${image}">`
: ''}

<div class="text">
${text}
</div>

${embedUrl
? `
<div class="video-wrap">
<iframe
src="${embedUrl}"
allowfullscreen>
</iframe>
</div>
`
: ''}

<a
class="btn"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kurashi.html?id=${id}">

記事を見る

</a>

<button
class="btn copy-btn"
onclick="copyLink('${shareUrl}')">

URLコピー

</button>

<div class="sns">

<a
class="fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}">

Facebook

</a>

<a
class="line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}">

LINE

</a>

<a
class="x"
target="_blank"
href="https://twitter.com/intent/tweet?url=${encodeURIComponent(shareUrl)}">

X

</a>

</div>

</div>

`;

if(targetId){

mainArea.innerHTML += html;
return;

}

if(index < 5){

mainArea.innerHTML += html;

}else{

if(!archiveMap[monthLabel]){

archiveMap[monthLabel] = [];

}

archiveMap[monthLabel].push(html);

}

});

if(!targetId){

if(Object.keys(archiveMap).length > 0){

archiveArea.innerHTML +=
'<div class="archive-main-title">アーカイブ</div>';

}

Object.keys(archiveMap)
.reverse()
.forEach(month=>{

archiveArea.innerHTML += `

<details class="month-box">

<summary class="month-title">
${month}
</summary>

<div class="month-inner">
${archiveMap[month].join('')}
</div>

</details>

`;

});

}

}

window.google = {
visualization:{
Query:{
setResponse:function(response){

if(response.status === 'ok'){

renderTable(response.table);

}

}
}
}
};

const sheetId =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

const script =
document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
sheetId +
'/gviz/tq?tqx=out:json';

document.body.appendChild(script);

</script>

</body>
</html>

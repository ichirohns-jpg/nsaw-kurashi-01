<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW暮らし情報局</title>

<style>

body{
margin:0;
background:#eef5fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
}

.header{
width:100%;
}

.header img{
width:100%;
display:block;
}

.wrap{
max-width:720px;
margin:auto;
padding:14px;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:20px;
box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.date{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.title{
font-size:28px;
font-weight:bold;
line-height:1.5;
margin-bottom:14px;
color:#17324d;
}

.detail{
font-size:18px;
line-height:1.9;
white-space:pre-wrap;
color:#333;
}

.image{
margin-top:16px;
}

.image img{
width:100%;
border-radius:14px;
display:block;
}

.loading{
padding:40px;
text-align:center;
font-size:22px;
color:#17324d;
}

</style>
</head>

<body>

<div class="header">
<img src="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
</div>

<div class="wrap" id="app">

<div class="loading">
読み込み中...
</div>

</div>

<script>

const SHEET_ID = '13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';
const SHEET_NAME = 'NSAW暮らし情報局_データ';

window.handleSheet = function(json){

const rows = json.table.rows || [];

let html = '';

rows.reverse().forEach((row)=>{

const c = row.c || [];

const date = c[0]?.v || '';
const title = c[1]?.v || '';
const detail = c[2]?.v || '';
const image = c[3]?.v || '';

html += `
<div class="card">

<div class="date">${date}</div>

<div class="title">${title}</div>

<div class="detail">${detail}</div>

${image ? `
<div class="image">
<img src="${image}">
</div>
` : ''}

</div>
`;

});

document.getElementById('app').innerHTML = html;

};

const script = document.createElement('script');

script.src =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json&responseHandler=handleSheet';

document.body.appendChild(script);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報と地域メディアを見やすくまとめています。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef7fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:14px;
}

.hero{
  background:linear-gradient(180deg,#ffffff 0%,#e8f7ef 100%);
  border:4px solid #0d8b46;
  border-radius:28px;
  padding:28px 18px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.hero-main{
  font-size:56px;
  line-height:1.2;
  font-weight:900;
  color:#00843d;
}

.hero-sub{
  margin-top:18px;
  font-size:23px;
  line-height:1.7;
  font-weight:900;
  color:#17324d;
}

.area{
  display:inline-block;
  margin-top:16px;
  padding:10px 22px;
  border-radius:999px;
  background:#0d8b46;
  color:#fff;
  font-size:24px;
  font-weight:900;
}

.card{
  margin-top:22px;
  background:#ffffff;
  border-radius:26px;
  padding:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.btn{
  display:block;
  text-decoration:none;
  text-align:center;
  background:#0d8b46;
  color:#ffffff;
  padding:24px 18px;
  border-radius:22px;
  margin:18px 0;
  font-size:34px;
  font-weight:900;
  box-shadow:0 10px 0 #0a6b35;
}

.btn.blue{
  background:#1976d2;
  box-shadow:0 10px 0 #114fa5;
}

.desc{
  margin-top:18px;
  font-size:22px;
  line-height:1.9;
  font-weight:700;
  color:#5c6f7c;
  text-align:center;
}

.footer{
  text-align:center;
  color:#6c7f8d;
  font-size:15px;
  line-height:1.8;
  padding:28px 0 12px;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="hero">

    <div class="hero-main">
      NSAW 暮らし情報局
    </div>

    <div class="area">
      志木・新座・朝霞・和光
    </div>

    <div class="hero-sub">
      暮らし情報と地域メディアを<br>
      見やすくまとめています
    </div>

  </div>

  <div class="card">

    <a
      href="app.html#kurashi"
      class="btn"
    >
      暮らし情報を見る
    </a>

    <a
      href="app.html#media"
      class="btn blue"
    >
      地域メディアを見る
    </a>

    <div class="desc">
      地域イベント、特売情報、無料動画、市役所情報などを、
      スマホで見やすくまとめてお届けします。
    </div>

  </div>

  <div class="footer">
    NSAW 暮らし情報局<br>
    地域生活テレビ
  </div>

</div>

</body>
</html>

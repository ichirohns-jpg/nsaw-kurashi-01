<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const SHEET_NAME =
'ゴミ';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

const week = [
'日曜日',
'月曜日',
'火曜日',
'水曜日',
'木曜日',
'金曜日',
'土曜日'
];

const today =
week[new Date().getDay()];

fetch(url)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(
text.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let gomiList = [];

rows.forEach(r=>{

const area =
cell(r,1);

const day =
cell(r,2);

const type =
cell(r,3);

if(day !== today) return;

gomiList.push(
area + '：' + type
);

});

document.getElementById(
'todayGomiText'
).innerHTML =
gomiList.length
? gomiList.join('<br>')
: '今日は収集情報がありません';

});

</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守りDX</title>
</head>

<body style="text-align:center;font-family:sans-serif;padding:20px;">

<h1>見守りDX</h1>

<button onclick="send('元気です')">😊 元気です</button>
<button onclick="send('少し不安')">⚠ 少し不安</button>
<button onclick="send('助けて')">🚨 助けて</button>

<p id="result"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://mimamori-4a627-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.send = function(status){

  push(ref(db, "mimamori"), {
    id: "A001",
    status: status,
    time: new Date().toISOString()
  });

  document.getElementById("result").innerText = "送信しました";

}

</script>

</body>
</html>

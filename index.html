<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
NSAW 地域DXポータル
</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#dfe7ef;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1d2d3d;
}

/* 上 */

.top{
  padding:14px;
}

.top-box{

  background:
  linear-gradient(
    135deg,
    #0e4c81,
    #173657
  );

  border-radius:28px;

  padding:28px 22px;

  color:#fff;

  box-shadow:
  0 12px 28px rgba(0,0,0,.18);
}

.main-title{

  font-size:42px;

  line-height:1.3;

  font-weight:900;

  text-shadow:
  0 3px 6px rgba(0,0,0,.25);
}

.sub{

  margin-top:16px;

  font-size:22px;

  line-height:1.8;

  opacity:.95;
}

/* ボタン */

.menu{
  padding:16px 14px 40px;
}

.card{

  display:block;

  text-decoration:none;

  background:#fff;

  border-radius:28px;

  padding:24px;

  margin-bottom:20px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.12);

  border:
  2px solid #d6e0ea;
}

.card-title{

  font-size:34px;

  font-weight:900;

  margin-bottom:12px;

  color:#17324d;
}

.card-desc{

  font-size:24px;

  line-height:1.8;

  color:#324454;
}

/* 色 */

.blue{
  border-left:
  12px solid #1976d2;
}

.red{
  border-left:
  12px solid #d32f2f;
}

.green{
  border-left:
  12px solid #2e7d32;
}

.orange{
  border-left:
  12px solid #ef6c00;
}

.purple{
  border-left:
  12px solid #7b1fa2;
}

/* 下 */

.footer{

  text-align:center;

  padding:20px 20px 50px;

  font-size:20px;

  color:#607080;

  line-height:1.8;
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.card-title{
  font-size:30px;
}

.card-desc{
  font-size:22px;
}

}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      NSAW<br>
      地域DXポータル
    </div>

    <div class="sub">
      志木・新座・朝霞・和光の
      地域情報・地域テレビ・AI相談・
      見守り・地域マップを、
      高齢者にも見やすくまとめた
      地域ポータルDX
    </div>

  </div>

</div>

<div class="menu">

  <a class="card blue"
  href="kawaraban.html">

    <div class="card-title">
      ▶ 地域瓦版
    </div>

    <div class="card-desc">
      地域情報・イベント・行政情報を
      見やすく表示します。
    </div>

  </a>

  <a class="card red"
  href="#">

    <div class="card-title">
      ▶ 地域テレビ
    </div>

    <div class="card-desc">
      地域動画や暮らし情報を
      テレビ感覚で見られます。
    </div>

  </a>

  <a class="card green"
  href="#">

    <div class="card-title">
      ▶ AI相談
    </div>

    <div class="card-desc">
      暮らし・介護・ごみ・手続きを
      AIが案内します。
    </div>

  </a>

  <a class="card orange"
  href="#">

    <div class="card-title">
      ▶ 見守りDX
    </div>

    <div class="card-desc">
      元気ですボタンなど、
      地域見守り機能をまとめます。
    </div>

  </a>

  <a class="card purple"
  href="#">

    <div class="card-title">
      ▶ 地域マップ
    </div>

    <div class="card-desc">
      病院・コンビニ・
      地域施設を確認できます。
    </div>

  </a>

</div>

<div class="footer">

  NSAW 地域DXポータル

</div>

</body>
</html>

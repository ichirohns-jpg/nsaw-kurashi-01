<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:18px 14px 80px;
}

.mainCard{
background:#1565c0;
color:white;
padding:34px 24px;
border-radius:34px;
text-align:center;
margin-bottom:28px;
}

.mainTitle{
font-size:56px;
font-weight:900;
line-height:1.3;
}

.block{
background:white;
padding:26px;
border-radius:30px;
margin-bottom:28px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.blockTitle{
font-size:34px;
font-weight:900;
margin-bottom:18px;
color:#1565c0;
}

.statusBtn{
width:100%;
border:none;
padding:24px;
border-radius:26px;
font-size:30px;
font-weight:900;
color:white;
margin-bottom:16px;
box-shadow:
0 6px 18px rgba(0,0,0,.12);
}

.green{
background:#00897b;
}

.orange{
background:#ef6c00;
}

.red{
background:#d32f2f;
}

.resultBox{
margin-top:20px;
font-size:24px;
font-weight:900;
line-height:1.8;
}

.menuGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.menuCard{
background:white;
border-radius:30px;
padding:22px;
text-align:center;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.menuIcon{
font-size:64px;
margin-bottom:12px;
}

.menuTitle{
font-size:30px;
font-weight:900;
margin-bottom:14px;
}

.menuText{
font-size:18px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.bigBtn{
display:block;
width:100%;
text-decoration:none;
color:white;
padding:20px;
border-radius:24px;
font-size:22px;
font-weight:900;
text-align:center;
}

.blue{
background:#1565c0;
}

@media(max-width:768px){

.mainTitle{
font-size:42px;
}

.blockTitle{
font-size:28px;
}

.statusBtn{
font-size:24px;
}

.menuGrid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="mainCard">

<div class="mainTitle">
NSAW<br>
暮らし情報局
</div>

</div>

<div class="block">

<div class="blockTitle">
🫶 地域見守り
</div>

<button
class="statusBtn green"
onclick="setStatus('😊 元気です')">

😊 元気です

</button>

<button
class="statusBtn orange"
onclick="setStatus('😓 少し困っています')">

😓 少し困っています

</button>

<button
class="statusBtn red"
onclick="setStatus('🚨 助けてください')">

🚨 助けてください

</button>

<div
id="statusResult"
class="resultBox">

まだ送信されていません

</div>

</div>

<div class="menuGrid">

<div class="menuCard">

<div class="menuIcon">
🫶
</div>

<div class="menuTitle">
見守りDX
</div>

<div class="menuText">
支援者用確認ページ
</div>

<a
class="bigBtn blue"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/watch.html">

開く

</a>

</div>

</div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/ここに自分のexecURL/exec';

function setStatus(status){

document.getElementById(
'statusResult'
).innerHTML =
'位置情報取得中...';

if(!navigator.geolocation){

sendData(status,'','');

return;

}

navigator.geolocation.getCurrentPosition(

function(position){

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

sendData(status,lat,lng);

},

function(){

sendData(status,'','');

},

{
enableHighAccuracy:true,
timeout:5000,
maximumAge:0
}

);

}

function sendData(status,lat,lng){

const now =
new Date();

const time =
now.toLocaleString('ja-JP');

const payload = {

name:'利用者',
status:status,
memo:'',
lat:lat,
lng:lng

};

fetch(
GAS_URL,
{

method:'POST',

body:JSON.stringify(payload)

}

)
.then(r=>r.json())
.then(data=>{

let mapLink = '';

if(lat && lng){

mapLink =
'<br><a target="_blank" href="https://www.google.com/maps?q=' +
lat +
',' +
lng +
'">📍 地図を見る</a>';

}

document.getElementById(
'statusResult'
).innerHTML =

status +
'<br>' +
time +
' に送信しました' +
mapLink;

})
.catch(err=>{

document.getElementById(
'statusResult'
).innerHTML =
'送信失敗';

});

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<meta name="description" content="志木・新座・朝霞・和光の暮らし情報を見やすく届ける地域情報ページ">

<meta property="og:type" content="website">
<meta property="og:site_name" content="NSAW 暮らし情報局">

<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報を見やすく届ける地域情報ページ">

<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/">

<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NSAW 暮らし情報局">
<meta name="twitter:description" content="志木・新座・朝霞・和光の暮らし情報を見やすく届ける地域情報ページ">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef4fa;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b3a;
}

.hero{
  width:100%;
}

.hero img{
  width:100%;
  display:block;
}

.wrap{
  width:100%;
  max-width:760px;
  margin:auto;
  padding:20px 16px 50px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.title{
  font-size:34px;
  font-weight:900;
  text-align:center;
  margin-bottom:18px;
  line-height:1.4;
}

.desc{
  font-size:18px;
  line-height:1.9;
  text-align:center;
  margin-bottom:28px;
}

.enter-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  text-decoration:none;
  background:#1565c0;
  color:#fff;
  font-size:22px;
  font-weight:900;
  padding:18px;
  border-radius:18px;
}

.info{
  margin-top:28px;
}

.info-title{
  font-size:24px;
  font-weight:900;
  margin-bottom:14px;
}

.city-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.city{
  border-radius:16px;
  color:#fff;
  padding:18px 12px;
  text-align:center;
  font-size:18px;
  font-weight:800;
}

.shiki{
  background:#1e88e5;
}

.niiza{
  background:#43a047;
}

.asaka{
  background:#fb8c00;
}

.wako{
  background:#8e24aa;
}

.footer{
  margin-top:28px;
  text-align:center;
  font-size:14px;
  color:#666;
  line-height:1.8;
}

</style>
</head>

<body>

<div class="hero">
  <img src="top-banner.jpg">
</div>

<div class="wrap">

  <div class="card">

    <div class="title">
      NSAW 暮らし情報局
    </div>

    <div class="desc">
      志木・新座・朝霞・和光の<br>
      暮らし情報を、見やすく届ける<br>
      地域情報ページです。
    </div>

    <a
      class="enter-btn"
      href="kurashi.html">
      暮らし情報を見る
    </a>

    <div class="info">

      <div class="info-title">
        対応エリア
      </div>

      <div class="city-grid">

        <div class="city shiki">
          志木市
        </div>

        <div class="city niiza">
          新座市
        </div>

        <div class="city asaka">
          朝霞市
        </div>

        <div class="city wako">
          和光市
        </div>

      </div>

    </div>

    <div class="footer">
      NSAW 暮らし情報局<br>
      地域の「いま」をわかりやすく。
    </div>

  </div>

</div>

</body>
</html>

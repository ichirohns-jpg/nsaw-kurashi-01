<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta name="viewport"

<meta property="og:title"
      content="NSAW 暮らし情報局">

<meta property="og:description"
      content="四市の暮らし情報・電話帳・地図・安心サポート">

<meta name="twitter:card"
      content="summary_large_image">

<meta name="twitter:title"

<meta name="twitter:description"
      content="四市の暮らし情報・電話帳・地図・安心サポート">

<meta name="twitter:image"

<link rel="icon"
      href="./icon.png">

<link rel="apple-touch-icon"
      href="./icon.png">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  font-family:
    "Hiragino Sans",
    "Yu Gothic",
    "Meiryo",
    sans-serif;
  color:#14324a;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:18px 14px 40px;
}

/* バナー */

.banner{
  width:100%;
  border-radius:28px;
  display:block;
  box-shadow:
    0 10px 28px rgba(0,0,0,.14);
}

/* タイトル */

.topBox{
  background:#ffffff;
  border-radius:28px;
  padding:26px 20px;
  margin-top:18px;
  text-align:center;
  box-shadow:
    0 10px 24px rgba(0,0,0,.10);
}

.topTitle{
  margin:0;
  font-size:42px;
  line-height:1.25;
  color:#14824a;
  font-weight:900;
}

.topSub{
  margin-top:16px;
  font-size:22px;
  line-height:1.7;
  color:#31465a;
  font-weight:800;
}

/* ボタン */

.btnArea{
  margin-top:24px;
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.mainBtn{
  display:block;
  width:100%;
  text-decoration:none;
  border:none;
  border-radius:24px;
  padding:24px 18px;
  color:#ffffff;
  font-size:28px;
  font-weight:900;
  text-align:center;
  box-shadow:
    0 8px 20px rgba(0,0,0,.16);
}

.green{
  background:#16864a;
}

.blue{
  background:#3476d6;
}

.orange{
  background:#ea7a19;
}

.purple{
  background:#7d4dd8;
}

/* 説明 */

.infoBox{
  background:#ffffff;
  border-radius:28px;
  padding:24px 20px;
  margin-top:26px;
  box-shadow:
    0 8px 22px rgba(0,0,0,.10);
}

.infoTitle{
  margin:0 0 14px;
  font-size:30px;
  color:#14824a;
  font-weight:900;
}

.infoText{
  margin:0;
  font-size:20px;
  line-height:1.9;
  font-weight:700;
  color:#31465a;
}

.footer{
  text-align:center;
  margin-top:32px;
  font-size:16px;
  color:#587086;
  font-weight:700;
}

</style>

</head>

<body>

<div class="wrap">

  <!-- バナー -->

  <img
    class="banner"
    src="./top.jpg"
    alt="NSAW 暮らし情報局">

  <!-- タイトル -->

  <div class="topBox">

    <h1 class="topTitle">
      NSAW<br>
      暮らし情報局
    </h1>

    <div class="topSub">

      志木・新座・朝霞・和光の<br>
      暮らし情報を見やすくまとめた<br>
      地域生活サポートページです。

    </div>

  </div>

  <!-- ボタン -->

  <div class="btnArea">

    <a
      class="mainBtn green"
      href="./app.html">

      📰 暮らし情報を見る

    </a>

    <a
      class="mainBtn blue"
      href="./phone.html">

      📞 電話帳を開く

    </a>

    <a
      class="mainBtn orange"
      href="./map.html">

      🗺 四市マップを見る

    </a>

    <a
      class="mainBtn purple"
      href="./share.html">

      📲 このページをシェア

    </a>

  </div>

  <!-- 説明 -->

  <div class="infoBox">

    <h2 class="infoTitle">
      このページについて
    </h2>

    <p class="infoText">

      NSAW 暮らし情報局は、<br>
      四市の暮らし情報・地図・電話帳・
      安心サポート情報を、
      スマートフォンで見やすくまとめた
      地域向けページです。

    </p>

  </div>

  <div class="footer">

    NSAW 暮らし情報局

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見守りDX</title>
</head>

<body style="font-family: sans-serif; text-align:center; padding:20px;">

<h1>見守りDX</h1>

<button onclick="send('元気です')" style="font-size:20px;padding:15px;margin:10px;">
😊 元気です
</button>

<button onclick="send('少し不安')" style="font-size:20px;padding:15px;margin:10px;">
⚠ 少し不安
</button>

<button onclick="send('助けて')" style="font-size:20px;padding:15px;margin:10px;background:red;color:white;">
🚨 助けて
</button>

<p id="result"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* ★ここだけ自分のFirebaseに合わせる */
const firebaseConfig = {
  databaseURL: "https://mimamori-4a627-default-rtdb.firebaseio.com/"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.send = function(status){

  push(ref(db, "mimamori"), {
    id: "A001",
    status: status,
    time: new Date().toISOString()
  });

  document.getElementById("result").innerText = "送信しました";

}

</script>

</body>
</html>

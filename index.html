<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

function cell(row,index){
return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';
}

const week = [
'日曜日',
'月曜日',
'火曜日',
'水曜日',
'木曜日',
'金曜日',
'土曜日'
];

const today =
week[new Date().getDay()];

const GOMI_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=ゴミ&tqx=out:json';

fetch(GOMI_URL)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(text.substr(47).slice(0,-2));

const rows =
json.table.rows;

let gomiList = [];

rows.forEach(r=>{

const area = cell(r,1);
const day = cell(r,2);
const type = cell(r,3);

if(day !== today) return;

gomiList.push(
area + '：' + type
);

});

document.getElementById(
'todayGomiText'
).innerHTML =
gomiList.length
? gomiList.join('<br>')
: '今日は収集情報がありません';

});

const NEWS_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=4市瓦版&tqx=out:json';

fetch(NEWS_URL)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(text.substr(47).slice(0,-2));

const rows =
json.table.rows;

if(!rows.length) return;

const r =
rows[rows.length - 1];

function newsCell(i){
return r.c[i]
? (r.c[i].f || r.c[i].v || '')
: '';
}

let image =
newsCell(1);

if(
image &&
image.includes('drive.google.com/file/d/')
){

const fileId =
image.split('/d/')[1].split('/')[0];

image =
'https://drive.google.com/thumbnail?id=' +
fileId +
'&sz=w2000';

}

const title =
newsCell(2);

const textBody =
newsCell(3);

document.getElementById(
'todayNewsArea'
).innerHTML = `

<img
src="${image}"
class="todayNewsImage">

<div class="todayNewsHeadline">
${title}
</div>

<div class="todayNewsText">
${textBody}
</div>

`;

});

const RADIO_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=地域ラジオ&tqx=out:json';

function getYouTubeId(url){

if(!url) return '';

const m =
url.match(
/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/
);

return m ? m[1] : '';

}

fetch(RADIO_URL)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(text.substr(47).slice(0,-2));

const rows =
json.table.rows;

if(!rows.length) return;

const r =
rows[rows.length - 1];

function radioCell(i){
return r.c[i]
? (r.c[i].f || r.c[i].v || '')
: '';
}

const title =
radioCell(2);

const desc =
radioCell(4);

const movieURL =
radioCell(5);

const youtubeId =
getYouTubeId(movieURL);

document.getElementById(
'todayRadioArea'
).innerHTML = `

<div class="youtubeBox">

<iframe
src="https://www.youtube.com/embed/${youtubeId}"
allowfullscreen>
</iframe>

</div>

<div class="radioHeadline">
${title}
</div>

<div class="radioText">
${desc}
</div>

`;

});

</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 暮らし情報局</title>

<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="地域の暮らし情報と毎日の安否確認ページ">
<meta property="og:type" content="website">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#eef5fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:18px 14px 80px;
}

.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.banner{
  width:100%;
  display:block;
}

.inner{
  padding:24px 18px 30px;
}

.title{
  font-size:32px;
  line-height:1.35;
  font-weight:900;
  text-align:center;
}

.text{
  margin-top:16px;
  font-size:18px;
  line-height:1.7;
  font-weight:700;
  color:#5b7084;
  text-align:center;
}

.btns{
  margin-top:28px;
  display:grid;
  gap:16px;
}

.btn{
  display:block;
  width:100%;
  border-radius:24px;
  padding:22px 16px;
  text-align:center;
  text-decoration:none;
  color:#fff;
  font-size:26px;
  line-height:1.4;
  font-weight:900;
}

.green{background:#16a34a}
.blue{background:#2563eb}
.orange{background:#ea580c}

.footer{
  margin-top:28px;
  text-align:center;
  font-size:15px;
  color:#6b7c8d;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <img
      class="banner"
      src="./top.jpg"
      alt="NSAW 暮らし情報局"
    >

    <div class="inner">

      <div class="title">
        NSAW<br>
        暮らし情報局
      </div>

      <div class="text">
        地域の暮らし情報と、<br>
        毎日の安否確認ページです。
      </div>

      <div class="btns">

        <a class="btn green" href="./app.html">
          😊 安否確認する
        </a>

        <a class="btn blue" href="./admin.html">
          📋 管理ページを見る
        </a>

        <a class="btn orange" href="./くらし.html">
          🏠 暮らし情報を見る
        </a>

      </div>

    </div>

  </div>

  <div class="footer">
    NSAW 暮らし情報局
  </div>

</div>

</body>
</html>

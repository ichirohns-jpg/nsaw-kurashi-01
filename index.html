<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NSAW 暮らし情報局</title>
  <meta name="description" content="志木・新座・朝霞・和光の暮らし情報を、見やすく届ける地域生活テレビです。">

  <meta property="og:title" content="NSAW 暮らし情報局">
  <meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報を、見やすく届ける地域生活テレビです。">
  <meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi/top-banner.jpg">
  <meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi/">
  <meta property="og:type" content="website">

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: #eef7fb;
      color: #17324d;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px;
    }

    .banner {
      width: 100%;
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.15);
      margin-bottom: 18px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      margin-bottom: 18px;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      line-height: 1.35;
      margin: 0 0 12px;
      color: #006837;
      font-weight: 900;
    }

    .lead {
      font-size: 20px;
      line-height: 1.7;
      font-weight: 700;
      margin: 0;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 14px 0;
      padding: 18px 16px;
      border-radius: 18px;
      background: #1f8f4d;
      color: #ffffff;
      text-decoration: none;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 5px 0 #0f5f32;
    }

    .btn.blue {
      background: #1976d2;
      box-shadow: 0 5px 0 #0d47a1;
    }

    .small {
      font-size: 15px;
      line-height: 1.7;
      color: #4d6273;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <img src="top-banner.jpg" alt="NSAW 暮らし情報局" class="banner">

    <div class="card">
      <h1>NSAW 暮らし情報局</h1>
      <p class="lead">
        志木・新座・朝霞・和光の<br>
        暮らし情報を見やすく届ける<br>
        地域生活テレビです。
      </p>
    </div>

    <div class="card">
      <a class="btn" href="app.html">暮らし情報を見る</a>
      <a class="btn blue" href="app.html">明日の生活瓦版を見る</a>

      <p class="small">
        地域イベント、特売情報、無料動画、市役所情報などを、<br>
        スマホで見やすくまとめてお届けします。
      </p>
    </div>

  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSAW 暮らし情報局</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#1565c0;
color:#fff;
padding:26px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1100px;
margin:auto;
padding:18px;
}

.top{
background:#fff;
border-radius:28px;
padding:26px;
margin-bottom:22px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.topTitle{
font-size:36px;
font-weight:900;
margin-bottom:10px;
}

.topText{
font-size:24px;
line-height:1.8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:18px;
}

.card{
display:block;
background:#fff;
border-radius:24px;
padding:26px;
text-decoration:none;
color:#1f2d3d;
box-shadow:0 8px 22px rgba(0,0,0,.12);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.cardTitle{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.cardText{
font-size:24px;
line-height:1.7;
}

.radio{border-left:12px solid #1976d2;}
.fun{border-left:12px solid #d32f2f;}
.kawaraban{border-left:12px solid #43a047;}
.support{border-left:12px solid #8e24aa;}
.map{border-left:12px solid #fb8c00;}
.news{border-left:12px solid #009688;}

.footer{
margin-top:28px;
background:#fff;
border-radius:28px;
padding:24px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.footerText{
font-size:22px;
line-height:1.8;
}

@media(max-width:800px){

.grid{
grid-template-columns:1fr;
}

header{
font-size:34px;
}

.cardTitle{
font-size:30px;
}

.cardText{
font-size:22px;
}

}

</style>

</head>

<body>

<header>
NSAW 暮らし情報局
</header>

<div class="wrap">

<div class="top">

<div class="topTitle">
地域情報をひとつにまとめる
</div>

<div class="topText">
志木・新座・朝霞・和光の情報を
まとめて見やすく表示します。
</div>

</div>

<div class="grid">

<a class="card radio" href="radio.html">
<div class="cardTitle">地域ラジオ</div>
<div class="cardText">毎朝のニュースを音声風で配信</div>
</a>

<a class="card fun" href="fun.html">
<div class="cardTitle">お楽しみ動画</div>
<div class="cardText">YouTube動画をそのまま再生</div>
</a>

<a class="card kawaraban" href="kawaraban.html">
<div class="cardTitle">4市瓦版</div>
<div class="cardText">最新の地域ニュース一覧</div>
</a>

<a class="card support" href="support-map.html">
<div class="cardTitle">支援マップ</div>
<div class="cardText">病院・薬局・避難所・相談窓口</div>
</a>

</div>

<div class="footer">

<div class="footerText">
このサイトは地域の情報を
スマホで見やすくまとめ

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAW 暮らし情報局</title>

<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の暮らし情報と地域メディアを見やすくまとめています。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#0d8b46">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef7fb;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:14px;
}

.banner{
  width:100%;
  display:block;
  border-radius:24px;
  margin-bottom:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.14);
}

.card{
  background:#ffffff;
  border-radius:28px;
  padding:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.btn{
  display:block;
  text-decoration:none;
  text-align:center;
  background:#0d8b46;
  color:#ffffff;
  padding:22px 16px;
  border-radius:22px;
  margin:18px 0;
  font-size:32px;
  font-weight:900;
  box-shadow:0 8px 0 #0a6b35;
}

.btn.blue{
  background:#1976d2;
  box-shadow:0 8px 0 #114fa5;
}

.desc{
  margin-top:18px;
  font-size:22px;
  line-height:1.9;
  font-weight:700;
  color:#5c6f7c;
  text-align:center;
}

.install{
  margin-top:26px;
  padding:18px;
  background:#f5fbff;
  border-radius:20px;
  font-size:18px;
  line-height:1.8;
  color:#456;
  text-align:center;
}

.footer{
  text-align:center;
  color:#6c7f8d;
  font-size:15px;
  line-height:1.8;
  padding:28px 0 12px;
}

</style>
</head>

<body>

<div class="wrap">

  <img
    src="top.jpg"
    class="banner"
    alt="NSAW 暮らし情報局"
  >

  <div class="card">

    <a href="kurashi.html" class="btn">
      暮らし情報を見る
    </a>

    <a href="media.html" class="btn blue">
      地域メディアを見る
    </a>

    <div class="desc">
      地域イベント、特売情報、市役所情報、無料動画などを、<br>
      スマホで見やすくまとめてお届けします。
    </div>

    <div class="install">
      iPhoneの共有ボタンから<br>
      「ホーム画面に追加」で<br>
      アプリのように使えます。
    </div>

  </div>

  <div class="footer">
    NSAW 暮らし情報局<br>
    地域生活テレビ
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>本人ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:44px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:38px;
font-weight:900;
margin-bottom:10px;
}

.area{
font-size:22px;
color:#666;
}

.bigBtn{
display:block;
width:100%;
border:none;
padding:24px;
margin-bottom:16px;
border-radius:22px;
font-size:28px;
font-weight:900;
color:white;
cursor:pointer;
}

.green{
background:#00897b;
}

.orange{
background:#ef6c00;
}

.red{
background:#d32f2f;
}

.blue{
background:#1565c0;
}

.statusBox{
background:#f4f7fb;
border-radius:20px;
padding:20px;
font-size:24px;
font-weight:900;
text-align:center;
}

.time{
margin-top:12px;
font-size:18px;
color:#666;
text-align:center;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>🫶 本人ページ</h1>
</div>

<div class="card">

<div id="userName" class="name">
👤 利用者
</div>

<div id="userArea" class="area">
地域
</div>

</div>

<div class="card">

<button class="bigBtn green">
😊 元気です
</button>

<button class="bigBtn orange">
😓 少し困っています
</button>

<button class="bigBtn red">
🚨 助けてください
</button>

<button class="bigBtn blue">
💊 薬を飲みました
</button>

</div>

<div class="card">

<div class="statusBox">
現在状態：😊 元気です
</div>

<div class="time">
最終確認：2026/06/08 08:12
</div>

</div>

</div>

<script>

const params =
new URLSearchParams(location.search);

const userId =
params.get('id') || 'a001';

const users = {

a001:{
name:'山田 太郎',
area:'志木市 本町'
},

a002:{
name:'佐藤 花子',
area:'新座市 東'
},

a003:{
name:'鈴木 一郎',
area:'朝霞市 西原'
},

a004:{
name:'高橋 京子',
area:'和光市 丸山台'
}

};

const user =
users[userId] || users.a001;

document.getElementById('userName').innerHTML =
'👤 ' + user.name;

document.getElementById('userArea').innerHTML =
'📍 ' + user.area;

</script>

</body>
</html>

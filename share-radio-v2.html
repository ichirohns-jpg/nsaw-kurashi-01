<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>地域ラジオ</title>

<meta property="og:type" content="website">
<meta property="og:title" content="地域ラジオ">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の暮らし情報を音声でお届けします。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-radio-v2.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="地域ラジオ">
<meta name="twitter:description" content="志木市・新座市・朝霞市・和光市の暮らし情報を音声でお届けします。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.hero{
width:100%;
display:block;
}

.content{
padding:24px;
}

.title{
font-size:38px;
font-weight:900;
line-height:1.4;
margin-bottom:20px;
}

.desc{
font-size:28px;
line-height:1.8;
margin-bottom:24px;
white-space:pre-wrap;
}

.openBtn{
display:block;
width:100%;
padding:22px;
border:0;
border-radius:18px;
background:#6a1b9a;
color:#fff;
font-size:28px;
font-weight:900;
text-align:center;
text-decoration:none;
margin-bottom:18px;
}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.share button{
border:0;
border-radius:14px;
padding:18px;
font-size:22px;
font-weight:900;
color:#fff;
cursor:pointer;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#000;
}

.copy{
background:#ff9800;
}

@media(max-width:700px){

.title{
font-size:32px;
}

.desc{
font-size:24px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<img
src="top.jpg"
class="hero"
alt="地域ラジオ">

<div class="content">

<div class="title">
地域ラジオ
</div>

<div class="desc">
志木市・新座市・朝霞市・和光市の暮らしに役立つ情報を、
毎朝3分程度の音声でお届けします。
</div>

<a
id="openBtn"
class="openBtn"
href="#">
地域ラジオを聴く
</a>

<div class="share">

<button
class="fb"
onclick="shareFacebook()">
Facebook
</button>

<button
class="line"
onclick="shareLine()">
LINE
</button>

<button
class="x"
onclick="shareX()">
X
</button>

<button
class="copy"
onclick="copyUrl()">
URLコピー
</button>

</div>

</div>

</div>

</div>

<script>

const params =
new URLSearchParams(location.search);

const radioId =
params.get("radio") || "";

const targetUrl =
radioId
?
"https://ichirohns-jpg.github.io/nsaw-kurashi-01/radio.html?radio="
+ radioId
:
"https://ichirohns-jpg.github.io/nsaw-kurashi-01/radio.html";

document
.getElementById("openBtn")
.href =
targetUrl;

function shareFacebook(){

window.open(
"https://www.facebook.com/sharer/sharer.php?u="
+
encodeURIComponent(location.href),
"_blank"
);

}

function shareLine(){

window.open(
"https://social-plugins.line.me/lineit/share?url="
+
encodeURIComponent(location.href),
"_blank"
);

}

function shareX(){

window.open(
"https://twitter.com/intent/tweet?url="
+
encodeURIComponent(location.href),
"_blank"
);

}

function copyUrl(){

navigator.clipboard.writeText(
location.href
);

alert(
"URLをコピーしました"
);

}

setTimeout(function(){

location.href =
targetUrl;

},3000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
支援者用 見守りDX
</title>

<meta property="og:title"
content="支援者用 見守りDX">

<meta property="og:description"
content="地域見守り状況一覧">

<meta property="og:image"
content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/img/map.jpg">

<meta name="twitter:card"
content="summary_large_image">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:18px 14px 80px;
}

.topCard{
background:white;
border-radius:32px;
padding:24px;
margin-bottom:28px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.pageTitle{
font-size:58px;
font-weight:900;
margin-bottom:18px;
line-height:1.3;
}

.backBtn{
display:inline-block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px 24px;
border-radius:22px;
font-size:22px;
font-weight:900;
margin-bottom:22px;
}

.desc{
font-size:22px;
line-height:1.9;
color:#607080;
}

.alertBox{
background:#d32f2f;
color:white;
padding:24px;
border-radius:28px;
margin-bottom:28px;
font-size:30px;
font-weight:900;
text-align:center;
animation:flash 1s infinite;
display:none;
}

@keyframes flash{

0%{
opacity:1;
}

50%{
opacity:.4;
}

100%{
opacity:1;
}

}

.watchCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
border-left:14px solid #1565c0;
}

.okCard{
border-left-color:#00897b;
}

.warnCard{
border-left-color:#ef6c00;
}

.helpCard{
border-left-color:#d32f2f;
background:#fff5f5;
}

.watchName{
font-size:34px;
font-weight:900;
margin-bottom:14px;
}

.watchStatus{
font-size:30px;
font-weight:900;
margin-bottom:14px;
}

.watchTime{
font-size:22px;
line-height:1.8;
color:#607080;
}

.ok{
color:#00897b;
}

.warn{
color:#ef6c00;
}

.help{
color:#d32f2f;
}

.lastBox{
background:#1565c0;
color:white;
padding:18px;
border-radius:22px;
margin-top:18px;
font-size:22px;
font-weight:900;
line-height:1.8;
}

.loading{
background:white;
padding:40px;
border-radius:24px;
font-size:26px;
font-weight:900;
text-align:center;
}

@media(max-width:768px){

.pageTitle{
font-size:46px;
}

.watchName{
font-size:28px;
}

.watchStatus{
font-size:24px;
}

.watchTime{
font-size:18px;
}

.lastBox{
font-size:18px;
}

.alertBox{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="topCard">

<div class="pageTitle">
🫶 支援者用 見守りDX
</div>

<a
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/"
class="backBtn">

⬅ トップへ戻る

</a>

<div class="desc">
地域見守りボタンの最新状況です。
</div>

</div>

<div
id="alertBox"
class="alertBox">

🚨 助けてください が送信されています

</div>

<div id="watchArea">

<div class="loading">
読み込み中...
</div>

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json =
JSON.parse(
text.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let html = '';

let dangerFound = false;

rows.reverse().forEach(r=>{

const time =
cell(r,0);

const name =
cell(r,1);

const status =
cell(r,2);

let statusClass = '';
let cardClass = '';

if(status.includes('元気')){

statusClass = 'ok';
cardClass = 'okCard';

}else
if(status.includes('困')){

statusClass = 'warn';
cardClass = 'warnCard';

}else{

statusClass = 'help';
cardClass = 'helpCard';

dangerFound = true;

}

html += `

<div class="watchCard ${cardClass}">

<div class="watchName">
👤 ${name}
</div>

<div class="watchStatus ${statusClass}">
${status}
</div>

<div class="watchTime">
🕒 ${time}
</div>

<div class="lastBox">
最終確認：
${time}
</div>

</div>

`;

});

if(dangerFound){

document.getElementById(
'alertBox'
).style.display = 'block';

}

document.getElementById(
'watchArea'
).innerHTML =
html || '<div class="loading">履歴がありません</div>';

});

</script>

</body>
</html>

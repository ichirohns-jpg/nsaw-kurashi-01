<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>薬履歴</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#00897b,#26a69a);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(0,137,123,.25);
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.card{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:16px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:12px;
}

.status{
font-size:24px;
font-weight:900;
color:#00897b;
margin-bottom:12px;
line-height:1.6;
}

.time{
font-size:18px;
color:#607080;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

@media(max-width:640px){
.header h1{font-size:36px}
.name{font-size:28px}
.status{font-size:22px}
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>💊 薬履歴</h1>
</div>

<div class="note">
これまで送信された服薬記録を新しい順に確認します。
</div>

<div id="list">
<div class="card">読み込み中...</div>
</div>

<a
class="homeBtn"
href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=服薬&tqx=out:json';

function cell(row,index){
return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';
}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json =
JSON.parse(t.substr(47).slice(0,-2));

const rows =
json.table.rows.reverse();

let html='';

rows.forEach(row=>{

const time = cell(row,0);
const name = cell(row,2);
const status = cell(row,3);

html += `

<div class="card">

<div class="name">
👤 ${name}
</div>

<div class="status">
💊 ${status}
</div>

<div class="time">
🕒 ${time}
</div>

</div>

`;

});

document.getElementById('list').innerHTML =
html || '<div class="card">薬履歴がありません</div>';

})
.catch(()=>{

document.getElementById('list').innerHTML =
'<div class="card">読み込み失敗</div>';

});

</script>

</body>
</html>

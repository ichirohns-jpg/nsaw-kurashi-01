<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>薬履歴</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#00897b;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
margin-top:10px;
}

.ok{
color:#00897b;
font-size:24px;
font-weight:900;
}

.ng{
color:#d32f2f;
font-size:24px;
font-weight:900;
}

.btn{
display:block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:24px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>💊 薬履歴</h1>
</div>

<div id="list"></div>

<a class="btn" href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const data = [

{
name:'山田 太郎',
status:'確認済み',
time:'2026/06/08 08:15'
},

{
name:'佐藤 花子',
status:'未確認',
time:'2026/06/08 12:00'
}

];

let html='';

data.forEach(row=>{

html += `

<div class="card">

<div class="name">
👤 ${row.name}
</div>

<div class="${
row.status==='確認済み'
?'ok'
:'ng'
}">

💊 ${row.status}

</div>

<div class="time">
${row.time}
</div>

</div>

`;

});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>

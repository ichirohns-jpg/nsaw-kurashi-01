<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>朝の3分 地域ラジオ</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:28px;
border-radius:28px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:42px;
}

.header p{
font-size:20px;
margin-top:10px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:20px;
box-shadow:
0 4px 12px rgba(0,0,0,.08);
}

.sectionTitle{
font-size:32px;
font-weight:900;
margin-bottom:16px;
color:#1565c0;
}

.topic{
font-size:22px;
line-height:1.8;
margin-bottom:10px;
}

.special{
background:#fff3cd;
border-left:10px solid #ff9800;
}

.specialTitle{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.specialText{
font-size:22px;
line-height:1.9;
}

.btn{
display:block;
width:100%;
padding:20px;
background:#1565c0;
color:white;
border:none;
border-radius:20px;
font-size:24px;
font-weight:900;
}

.footer{
text-align:center;
font-size:18px;
margin-top:30px;
color:#666;
}

</style>
</head>
<body>

<div class="wrap">

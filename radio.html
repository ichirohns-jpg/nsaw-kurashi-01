<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>地域ラジオ</title>

<meta property="og:type" content="website">
<meta property="og:title" content="地域ラジオ">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の地域ラジオ">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
padding:12px;
}

.container{
max-width:900px;
margin:auto;
}

header{
background:linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#334155
);
color:#fff;
text-align:center;
padding:28px;
border-radius:28px;
font-size:42px;
font-weight:900;
margin-bottom:20px;
}

.home{
width:100%;
border:none;
border-radius:24px;
padding:24px;
margin-bottom:20px;
background:#111827;
color:#fff;
font-size:24px;
font-weight:900;
cursor:pointer;
}

.featured{
font-size:34px;
font-weight:900;
margin:20px 0;
color:#1e40af;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.12);
margin-bottom:24px;
}

.player{
width:100%;
aspect-ratio:16/9;
background:#000;
}

.player iframe{
width:100%;
height:100%;
border:none;
display:block;
}

.thumb{
width:100%;
display:block;
}

.date{
display:inline-block;
margin:20px;
padding:10px 18px;
background:#dbeafe;
border-radius:999px;
font-size:24px;
font-weight:900;
color:#1e40af;
}

.title{
padding:0 20px 12px;
font-size:34px;
font-weight:900;
line-height:1.5;
}

.desc{
padding:0 20px 20px;
font-size:24px;
line-height:1.8;
white-space:pre-wrap;
}

.tags{
padding:0 20px 20px;
font-size:22px;
font-weight:900;
color:#64748b;
}

.loading{
background:#fff;
padding:30px;
border-radius:24px;
font-size:26px;
font-weight:900;
text-align:center;
}

.share{
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.share button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#111827;
color:#fff;
font-size:22px;
font-weight:900;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<header>
📻 地域ラジオ
</header>

<button
class="home"
onclick="location.href='index.html'">
🏠 トップへ戻る
</button>

<div id="app">

<div class="loading">
読込中...
</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const SHEET_NAME =
'地域ラジオ';

const GVIZ_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=responseHandler:handleSheet';

function getCell(row,index){

if(!row) return '';
if(!row.c) return '';
if(!row.c[index]) return '';

const c=row.c[index];

if(c.f!==undefined && c.f!==null){
return c.f;
}

if(c.v!==undefined && c.v!==null){
return c.v;
}

return '';

}

function formatDate(rawDate){

if(rawDate instanceof Date){

return rawDate.getFullYear() + '年' +
(rawDate.getMonth()+1) + '月' +
rawDate.getDate() + '日';

}

const txt =
String(rawDate || '');

const m =
txt.match(/Date\((\d+),(\d+),(\d+)\)/);

if(m){

return m[1] + '年' +
(Number(m[2])+1) + '月' +
m[3] + '日';

}

return txt;

}

function getYoutubeId(value){

if(!value)return "";

const text=String(value);

let m=text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);

if(m)return m[1];

m=text.match(/[?&]v=([a-zA-Z0-9_-]+)/);

if(m)return m[1];

m=text.match(/shorts\/([a-zA-Z0-9_-]+)/);

if(m)return m[1];

return "";

}

function makeShareUrl(id){

return 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-radio-v2.html?radio=' + id;

}

function shareFacebook(url){

window.open(
'https://www.facebook.com/sharer/sharer.php?u=' +
encodeURIComponent(url),
'_blank'
);

}

function shareLine(url){

window.open(
'https://social-plugins.line.me/lineit/share?url=' +
encodeURIComponent(url),
'_blank'
);

}

function shareX(url,text){

window.open(
'https://twitter.com/intent/tweet?url=' +
encodeURIComponent(url) +
'&text=' +
encodeURIComponent(text),
'_blank'
);

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert('URLをコピーしました');

}

window.handleSheet = function(json){

const rows =
json.table && json.table.rows
? json.table.rows
: [];

let items=[];

for(let i=0;i<rows.length;i++){

const row=rows[i];

const date =
formatDate(
getCell(row,0)
);

const videoUrl =
String(getCell(row,1)||'');

const title =
String(getCell(row,2)||'');

const desc =
String(getCell(row,3)||'');

const tags =
String(getCell(row,4)||'');

const image =
String(getCell(row,5)||'');

const videoId =
getYoutubeId(videoUrl);

if(
!date &&
!videoUrl &&
!title &&
!desc
){
continue;
}

items.push({

id:i+1,

date:date,

title:title,

desc:desc,

tags:tags,

image:image,

videoUrl:videoUrl,

videoId:videoId

});

}

items.reverse();

const latest =
items.length
? items[0]
: null;

const archives =
items.slice(1);

let html = '';

if(latest){

const shareUrl =
makeShareUrl(latest.id);

const shareText =
latest.title || '地域ラジオ';

html += `

<div class="featured">
🎙 本日の地域ラジオ
</div>

<div class="card">

${latest.image ? `
<img
src="${latest.image}"
class="thumb"
loading="lazy">
` : ''}

<div class="player">

${latest.videoId ? `
<iframe
src="https://www.youtube.com/embed/${latest.videoId}"
allowfullscreen>
</iframe>
` : `
<div class="notice">
動画を埋め込めません
</div>
`}

</div>

<div class="date">
${latest.date}
</div>

<div class="title">
${latest.title}
</div>

<div class="desc">
${latest.desc}
</div>

<div class="tags">
${latest.tags}
</div>

<div class="share">

<button
onclick="shareFacebook('${shareUrl}')">
Facebookで共有
</button>

<button
onclick="shareLine('${shareUrl}')">
LINEで共有
</button>

<button
onclick="shareX('${shareUrl}','${String(shareText).replace(/'/g,"\\'")}')">
Xで共有
</button>

<button
onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>

`;

}

document.getElementById('app').innerHTML =
html ||
'<div class="loading">記事がありません</div>';

};

const script =
document.createElement('script');

script.src = GVIZ_URL;

document.body.appendChild(script);

</script>

</body>
</html>

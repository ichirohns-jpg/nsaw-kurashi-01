<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSAW</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f7fb;color:#1e2a3a}
header{background:#1976d2;color:#fff;padding:22px;text-align:center;font-size:26px;font-weight:900}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;margin-bottom:16px;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.08)}
img{width:100%;display:block}
.date{padding:6px 10px;margin:10px;background:#e3f2fd;border-radius:999px;display:inline-block;font-weight:900}
.title{font-size:20px;font-weight:900;padding:10px}
.desc{padding:10px;font-size:15px;line-height:1.6}
</style>
</head>

<body>

<header>NSAW</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_rfc6LXQgoc";

/* 安定セル取得 */
function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || "") : "";
}

/* 画像取得（Drive対応・完全安定） */
function getImage(r){
if(!r.c) return "";

for(let i=0;i<r.c.length;i++){
let v = r.c[i] ? r.c[i].v : "";

if(typeof v === "string" && v.startsWith("http")){

/* Google Drive変換 */
if(v.includes("drive.google.com/file/d/")){
let id = v.match(/\/d\/(.+?)\//);
if(id){
return "https://drive.google.com/uc?id=" + id[1];
}
}

return v;
}
}

return "";
}

/* GViz安全パース */
function parseGViz(text){
let s = text.indexOf("{");
let e = text.lastIndexOf("}");
return JSON.parse(text.substring(s,e+1));
}

/* 読み込み */
function load(sheet){

const url =
"https://docs.google.com/spreadsheets/d/" +
SHEET_ID +
"/gviz/tq?sheet=" +
encodeURIComponent(sheet) +
"&tqx=out:json";

fetch(url)
.then(r=>r.text())
.then(t=>{

const json = parseGViz(t);

let rows = json.table.rows || [];

let items = rows.map((r,i)=>({

id:i+1,
date:cell(r,0),
title:cell(r,2),
image:getImage(r),
desc:cell(r,4)

})).filter(x=>x.title).reverse();

let html = "";

items.forEach(i=>{
html += `
<div class="card">

<img src="${i.image}">

<div class="date">${i.date}</div>
<div class="title">${i.title}</div>
<div class="desc">${i.desc}</div>

</div>
`;
});

document.getElementById("app").innerHTML = html;

});

}

/* ページ判定（確実版） */
const page = location.pathname;

if(page.includes("radio.html")) load("地域ラジオ");
if(page.includes("fun.html")) load("お楽しみ動画");
if(page.includes("kawaraban.html")) load("4市瓦版");

</script>

</body>
</html>

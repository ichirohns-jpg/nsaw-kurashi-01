<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>お楽しみ動画</title>

<style>
body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
background:#f4f7fb;
color:#1e2a3a;
}

header{
background:#1976d2;
color:#fff;
padding:22px;
text-align:center;
font-size:26px;
font-weight:900;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
margin-bottom:18px;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card img{
width:100%;
display:block;
}

.date{
padding:6px 10px;
margin:10px;
background:#e3f2fd;
border-radius:999px;
display:inline-block;
font-weight:900;
}

.title{
font-size:20px;
font-weight:900;
padding:10px;
}

.desc{
padding:10px;
font-size:15px;
line-height:1.7;
white-space:pre-wrap;
}

.movieBtn{
display:block;
margin:10px;
padding:14px;
text-align:center;
background:#e53935;
color:#fff;
font-weight:900;
border-radius:10px;
text-decoration:none;
}
</style>
</head>

<body>

<header>お楽しみ動画</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="お楽しみ動画";

const url=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="+encodeURIComponent(SHEET_NAME)+
"&tqx=out:json";

function cell(row,index){
return row.c?.[index]?.v ?? "";
}

function parseGViz(text){
const jsonText=text.substring(
text.indexOf("{"),
text.lastIndexOf("}")+1
);
return JSON.parse(jsonText);
}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json=parseGViz(text);
const rows=json.table.rows||[];

const items=rows.map(row=>({

date:cell(row,0),
videoId:cell(row,1),
title:cell(row,2),
thumb:cell(row,3),
desc:cell(row,4),
videoUrl:cell(row,5)

}))
.filter(x=>x.title)
.reverse();

let html="";

items.forEach(item=>{

html+=`
<div class="card">

<img src="${item.thumb}"
onerror="this.style.display='none'">

<div class="date">${item.date}</div>

<div class="title">${item.title}</div>

<div class="desc">${item.desc}</div>

<a class="movieBtn"
href="${item.videoUrl}"
target="_blank">
動画を見る
</a>

</div>
`;

});

document.getElementById("app").innerHTML=
html || "記事がありません";

})
.catch(err=>{
document.getElementById("app").innerHTML=
"読み込みに失敗しました";
console.error(err);
});

</script>

</body>
</html>

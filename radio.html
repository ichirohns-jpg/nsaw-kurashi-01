<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>地域ラジオ</title>

<meta property="og:type" content="website">
<meta property="og:title" content="地域ラジオ">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の地域ラジオです。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

header{
background:#1976d2;
color:#fff;
padding:28px 18px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px 14px 60px;
}

.featured{
font-size:34px;
font-weight:900;
color:#1976d2;
margin:10px 0 24px;
}

.archiveTitle{
font-size:34px;
font-weight:900;
margin-top:70px;
margin-bottom:24px;
padding-top:24px;
border-top:4px solid #dfe5ec;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.thumb{
width:100%;
display:block;
aspect-ratio:16/9;
object-fit:cover;
background:#ddd;
}

.player{
width:100%;
background:#000;
aspect-ratio:16/9;
}

.player iframe{
width:100%;
height:100%;
border:0;
display:block;
}

.date{
display:inline-block;
margin:20px 18px 8px;
padding:12px 20px;
background:#e3f2fd;
color:#0d47a1;
border-radius:999px;
font-size:26px;
font-weight:900;
}

.title{
padding:8px 18px 14px;
font-size:38px;
font-weight:900;
line-height:1.45;
}

.desc{
padding:6px 18px 20px;
font-size:28px;
line-height:1.85;
white-space:pre-wrap;
}

.tags{
padding:0 18px 20px;
font-size:24px;
line-height:1.7;
color:#607d8b;
font-weight:800;
white-space:pre-wrap;
}

.share{
display:flex;
flex-direction:column;
gap:14px;
padding:18px;
}

.share button{

width:100%;

background:#ffffff;

color:#1f2d3d;

border:1px solid #d9dde3;

border-radius:24px;

padding:22px;

font-size:24px;

font-weight:900;

text-align:left;

box-shadow:0 4px 12px rgba(0,0,0,.08);

cursor:pointer;

}

.share button:active{
transform:scale(.98);
}

.fb::after,
.line::after,
.x::after,
.copy::after{

content:" ＞";

float:right;

color:#9aa4af;

}

.notice{
background:#fff3cd;
color:#7a4b00;
padding:20px;
margin:20px;
border-radius:16px;
font-size:24px;
font-weight:900;
}

</style>
</head>

<body>

<header>
地域ラジオ
</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="地域ラジオ";

const GVIZ_URL=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="
+encodeURIComponent(SHEET_NAME)
+"&tqx=out:json";

function getCell(row,index){

if(!row || !row.c || !row.c[index]){
return "";
}

const c=row.c[index];

if(c.v!==undefined && c.v!==null){
return c.v;
}

if(c.f!==undefined && c.f!==null){
return c.f;
}

return "";

}

function getYoutubeId(value){

if(!value)return "";

const text=String(value);

let m=text.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
if(m)return m[1];

m=text.match(/[?&]v=([a-zA-Z0-9_-]+)/);
if(m)return m[1];

m=text.match(/shorts\/([a-zA-Z0-9_-]+)/);
if(m)return m[1];

return "";

}

function makeShareUrl(id){

return
"https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-radio-v2.html?radio="
+ id;

}

function shareFacebook(url){

window.open(
"https://www.facebook.com/sharer/sharer.php?u="
+ encodeURIComponent(url),
"_blank"
);

}

function shareLine(url){

window.open(
"https://social-plugins.line.me/lineit/share?url="
+ encodeURIComponent(url),
"_blank"
);

}

function shareX(url,text){

window.open(
"https://twitter.com/intent/tweet?url="
+ encodeURIComponent(url)
+ "&text="
+ encodeURIComponent(text),
"_blank"
);

}

function copyUrl(url){

navigator.clipboard.writeText(url);

alert("URLをコピーしました");

}

fetch(GVIZ_URL)

.then(function(response){

return response.text();

})

.then(function(text){

const match=text.match(/\{[\s\S]*\}/);

const json=JSON.parse(match[0]);

const rows=
json.table && json.table.rows
? json.table.rows
: [];

let items=[];

for(let i=0;i<rows.length;i++){

const row=rows[i];

const date=
String(getCell(row,0)||"");

const videoUrl=
String(getCell(row,1)||"");

const title=
String(getCell(row,2)||"");

const desc=
String(getCell(row,3)||"");

const tags=
String(getCell(row,4)||"");

const image=
String(getCell(row,5)||"");

const videoId=
getYoutubeId(videoUrl);

if(
!date &&
!videoUrl &&
!title &&
!desc
){
continue;
}

items.push({

id:i+1,

date:date,

title:title,

desc:desc,

tags:tags,

image:image,

videoUrl:videoUrl,

videoId:videoId

});

}

items.reverse();

const latest=
items.length
? items[0]
: null;

const archives=
items.slice(1);

let html="";

if(latest){

const shareUrl=
makeShareUrl(latest.id);

const shareText=
latest.title || "地域ラジオ";

html+=`

<div class="featured">
🎙 本日の地域ラジオ
</div>

<div class="card">

${
latest.image
?
`
<img
src="${latest.image}"
class="thumb"
loading="lazy">
`
:
''
}

<div class="player">

${
latest.videoId
?
`
<iframe
src="https://www.youtube.com/embed/${latest.videoId}"
allowfullscreen>
</iframe>
`
:
`
<div class="notice">
動画を埋め込めません
</div>
`
}

</div>

<div class="date">
${latest.date}
</div>

<div class="title">
${latest.title}
</div>

<div class="desc">
${latest.desc}
</div>

<div class="tags">
${latest.tags}
</div>

<div class="share">

<button
class="fb"
onclick="shareFacebook('${shareUrl}')">
Facebookで共有
</button>

<button
class="line"
onclick="shareLine('${shareUrl}')">
LINEで共有
</button>

<button
class="x"
onclick="shareX('${shareUrl}','${String(shareText).replace(/'/g,"\\'")}')">
Xで共有
</button>

<button
class="copy"
onclick="copyUrl('${shareUrl}')">
URLをコピー
</button>

</div>

</div>

`;

}

if(archives.length){

html+=`

<div class="archiveTitle">
📚 アーカイブ
</div>

`;

archives.forEach(function(item){

const shareUrl=
makeShareUrl(item.id);

const shareText=
item.title || "地域ラジオ";

html+=`

<div class="card">

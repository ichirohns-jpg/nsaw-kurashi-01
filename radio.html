<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>地域ラジオ</title>

<style>
body{
  margin:0;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  background:#f4f7fb;
  color:#1e2a3a;
}

header{
  background:#1976d2;
  color:#fff;
  padding:22px;
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:#fff;
  margin-bottom:18px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.thumb{
  width:100%;
  aspect-ratio:16/9;
  background:#ddd;
}

.thumb iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
}

.date{
  padding:6px 10px;
  margin:10px;
  background:#e3f2fd;
  border-radius:999px;
  display:inline-block;
  font-weight:900;
}

.title{
  font-size:20px;
  font-weight:900;
  padding:10px;
}

.desc{
  padding:10px;
  font-size:15px;
  line-height:1.7;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<header>地域ラジオ</header>

<div class="wrap">
  <div id="app">読み込み中...</div>
</div>

<script>
const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_rfc6LXQgoc";
const SHEET_NAME = "地域ラジオ";

const url =
  "https://docs.google.com/spreadsheets/d/" +
  SHEET_ID +
  "/gviz/tq?sheet=" +
  encodeURIComponent(SHEET_NAME) +
  "&tqx=out:json";

function cell(row,index){
  return row.c?.[index]?.v ?? "";
}

function youtubeId(url){
  if(!url) return "";
  const m = String(url).match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([a-zA-Z0-9_-]{6,})/);
  return m ? m[1] : "";
}

function parseGviz(text){
  const jsonText = text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1);
  return JSON.parse(jsonText);
}

fetch(url)
.then(res => res.text())
.then(text => {
  const json = parseGviz(text);
  const rows = json.table.rows || [];

  const items = rows.map((row,i)=>({
    id:i+1,
    date:cell(row,0),
    title:cell(row,2),
    video:cell(row,3),
    desc:cell(row,4)
  }))
  .filter(item => item.title)
  .reverse();

  let html = "";

  items.forEach(item=>{
    const id = youtubeId(item.video);

    html += `
      <div class="card">
        <div class="thumb">
          ${
            id
            ? `<iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>`
            : ``
          }
        </div>
        <div class="date">${item.date}</div>
        <div class="title">${item.title}</div>
        <div class="desc">${item.desc}</div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html || "表示する記事がありません。";
})
.catch(err=>{
  document.getElementById("app").innerHTML = "読み込みに失敗しました。";
  console.error(err);
});
</script>

</body>
</html>

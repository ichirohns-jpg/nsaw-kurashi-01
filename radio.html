<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSAW地域ラジオ</title>

<style>
body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
background:#f4f7fb;
color:#1e2a3a;
}

header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:#fff;
padding:26px;
text-align:center;
font-size:32px;
font-weight:900;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

/* カード */
.card{
background:#fff;
border-radius:20px;
overflow:hidden;
margin-bottom:18px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
display:block;
}

/* 日付 */
.date{
display:inline-block;
margin:12px;
padding:6px 14px;
background:#e3f2fd;
color:#1565c0;
border-radius:999px;
font-weight:900;
}

/* タイトル */
.title{
font-size:26px;
font-weight:900;
padding:0 12px;
}

/* 本文 */
.script{
padding:12px;
font-size:18px;
line-height:1.8;
white-space:pre-wrap;
}

/* 動画 */
.videoBox{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
}

.videoBox iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

/* SNS */
.sns{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:12px;
}

.sns button{
border:0;
padding:12px;
border-radius:12px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#111}
.copy{background:#ff9800}

/* アーカイブ */
.archive a{
display:block;
padding:12px;
background:#fff;
margin-bottom:10px;
border-radius:12px;
text-decoration:none;
color:#1e2a3a;
font-weight:900;
}
</style>
</head>

<body>

<header>
NSAW 地域ラジオ
</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='地域ラジオ';

const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=out:json';

function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || r.c[i].f || '') : '';
}

/* YouTubeID */
function yt(url){
if(!url) return '';
let m=url.match(/v=([^&]+)/);
if(m) return m[1];
m=url.match(/youtu\.be\/([^?]+)/);
if(m) return m[1];
return '';
}

/* シェアURL */
function shareUrl(id){
return 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-radio.html?id='+id;
}

function openShare(type,id){
const s=shareUrl(id);

if(type==='facebook'){
window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(s));
}
if(type==='line'){
window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(s));
}
if(type==='x'){
window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(s));
}
}

function copyUrl(id){
navigator.clipboard.writeText(shareUrl(id));
alert('コピーしました');
}

/* データ取得 */
fetch(url)
.then(r=>r.text())
.then(t=>{

const json=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));

let rows=json.table.rows||[];

let items=rows.map((r,i)=>({
id:i+1,
date:cell(r,0),
title:cell(r,2),
image:cell(r,3),
script:cell(r,4),
video:cell(r,5)
}));

items=items.filter(x=>x.title);
items.reverse();

const app=document.getElementById('app');
const params=new URLSearchParams(location.search);
const id=params.get('radio');

/* 詳細 */
if(id){

const item = items.find(x=>String(x.id)===String(id));
const yid = yt(item.video);

app.innerHTML=`
<div class="card">

<div class="date">${item.date}</div>

<div class="title">${item.title}</div>

<img src="${item.image || 'https://ichirohns-jpg/nsaw-kurashi-01/radio-ogp.jpg'}">

<div class="script">${item.script}</div>

${yid?`
<div class="videoBox">
<iframe src="https://www.youtube.com/embed/${yid}" allowfullscreen></iframe>
</div>
`:''}

<div class="sns">
<button class="fb" onclick="openShare('facebook','${id}')">Facebook</button>
<button class="line" onclick="openShare('line','${id}')">LINE</button>
<button class="x" onclick="openShare('x','${id}')">X</button>
<button class="copy" onclick="copyUrl('${id}')">URLコピー</button>
</div>

</div>
`;
return;
}

/* 一覧 */
let html='';

items.slice(0,5).forEach((item,index)=>{

html+=`
<div class="card">

<a href="radio.html?radio=${index+1}">
<img src="${item.image || 'https://ichirohns-jpg/nsaw-kurashi-01/radio-ogp.jpg'}">
</a>

<div class="date">${item.date}</div>

<div class="title">
<a href="radio.html?radio=${index+1}">
${item.title}
</a>
</div>

<div class="script">${(item.script||'').substring(0,120)}...</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${index+1}')">Facebook</button>
<button class="line" onclick="openShare('line','${index+1}')">LINE</button>
<button class="x" onclick="openShare('x','${index+1}')">X</button>
<button class="copy" onclick="copyUrl('${index+1}')">URLコピー</button>
</div>

</div>
`;
});

app.innerHTML=html;

})
.catch(()=>{
document.getElementById('app').innerHTML='読み込み失敗';
});

</script>

</body>
</html>

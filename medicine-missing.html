<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>薬未確認一覧</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#fffaf2;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#ef6c00;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-left:12px solid #ef6c00;
border-radius:24px;
padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:900;
color:#ef6c00;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
margin-bottom:14px;
}

.btn{
display:block;
background:#1565c0;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>💊 薬未確認一覧</h1>
</div>

<div id="list"></div>

<a
class="homeBtn"
href="admin.html">

⬅ 支援者ページへ戻る

</a>

</div>

<script>

const data = [

{
id:'a001',
name:'山田 太郎',
status:'朝の薬 未確認',
time:'2026/06/08 08:15'
},

{
id:'a003',
name:'鈴木 一郎',
status:'昼の薬 未確認',
time:'2026/06/08 12:00'
}

];

let html='';

data.forEach(row=>{

html += `

<div class="card">

<div class="name">
👤 ${row.name}
</div>

<div class="status">
${row.status}
</div>

<div class="time">
${row.time}
</div>

<a
class="btn"
href="person.html?id=${row.id}">

詳細を見る

</a>

</div>

`;

});

document.getElementById('list').innerHTML = html;

</script>

</body>
</html>

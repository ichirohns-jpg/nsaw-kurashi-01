<title>助けてください一覧</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#fff5f5;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{

color:white;
padding:30px;

.card{

padding:24px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:26px;
font-weight:900;
color:#d32f2f;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
margin-bottom:14px;
}

.btn{
display:block;
background:#1976d2;
color:white;
text-decoration:none;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:900;
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}
</style>
</head>

<body>

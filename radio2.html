<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>朝の3分 地域ラジオ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:28px;
border-radius:28px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.header p{
font-size:20px;
font-weight:900;
margin-top:10px;
}

.card{
background:white;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:0 4px 14px rgba(0,0,0,.10);
}

.date{
font-size:22px;
font-weight:900;
color:#1565c0;
margin-bottom:12px;
}

.title{
font-size:34px;
font-weight:900;
line-height:1.45;
margin-bottom:18px;
}

.desc{
font-size:22px;
line-height:1.9;
white-space:pre-wrap;
margin-bottom:18px;
color:#334;
}

.tags{
font-size:20px;
font-weight:900;
color:#607080;
line-height:1.8;
white-space:pre-wrap;
margin-bottom:18px;
}

.video{
position:relative;
width:100%;
padding-top:56.25%;
background:#000;
border-radius:24px;
overflow:hidden;
margin-bottom:20px;
}

.video iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.snsGrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-top:18px;
}

.snsBtn{
border:none;
color:white;
padding:16px;
border-radius:18px;
font-size:20px;
font-weight:900;
text-align:center;
cursor:pointer;
}

.facebook{background:#1877f2}
.line{background:#06c755}
.x{background:#000}

.copyBtn{
width:100%;
border:none;
background:#455a64;
color:white;
padding:18px;
border-radius:20px;
font-size:20px;
font-weight:900;
margin-top:12px;
cursor:pointer;
}

.archiveBtn{
width:100%;
border:none;
background:#1565c0;
color:white;
padding:20px;
border-radius:22px;
font-size:24px;
font-weight:900;
margin:10px 0 24px;
cursor:pointer;
}

.hidden{
display:none;
}

.loading{
background:white;
padding:40px;
border-radius:24px;
font-size:26px;
font-weight:900;
text-align:center;
}

.footer{
text-align:center;
font-size:18px;
margin-top:30px;
color:#666;
}

@media(max-width:768px){
.header h1{font-size:34px}
.title{font-size:28px}
.desc{font-size:19px}
.tags{font-size:18px}
.snsGrid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>🌅 朝の3分<br>地域ラジオ</h1>
<p>志木・新座・朝霞・和光 暮らし情報</p>
</div>

<div id="latestArea">
<div class="loading">読み込み中...</div>
</div>

<button id="archiveButton" class="archiveBtn hidden" onclick="toggleArchive()">
📚 アーカイブを見る
</button>

<div id="archiveArea" class="hidden"></div>

<div class="footer">
NSAW 暮らし情報局
</div>

</div>

<script>
const SHEET_ID = '149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME = '地域ラジオ';
const PAGE_URL = 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/radio2.html';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(row,index){
return row.c[index] ? (row.c[index].f || row.c[index].v || '') : '';
}

function getYouTubeId(youtubeURL){
if(!youtubeURL) return '';
const m = youtubeURL.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
return m ? m[1] : '';
}

function escapeHtml(text){
return String(text || '')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');
}

function makeCard(item,index){
const shareUrl = PAGE_URL + '?radio=' + encodeURIComponent(index + 1);
const youtubeId = getYouTubeId(item.youtubeURL);

let videoHtml = '';

if(youtubeId){
videoHtml = `
<div class="video">
<iframe
src="https://www.youtube.com/embed/${youtubeId}"
allowfullscreen>
</iframe>
</div>
`;
}

return `
<div class="card">

${videoHtml}

<div class="date">
${escapeHtml(item.date)}
</div>

<div class="title">
${escapeHtml(item.title)}
</div>

<div class="desc">
${escapeHtml(item.desc)}
</div>

<div class="tags">
${escapeHtml(item.tags)}
</div>

<div class="snsGrid">

<button
class="snsBtn facebook"
onclick="shareFacebook('${shareUrl}')">
Facebook
</button>

<button
class="snsBtn line"
onclick="shareLine('${shareUrl}')">
LINE
</button>

<button
class="snsBtn x"
onclick="shareX('${shareUrl}','${escapeHtml(item.title)}')">
X
</button>

</div>

<button
class="copyBtn"
onclick="copyUrl('${shareUrl}')">
🔗 URLコピー
</button>

</div>
`;
}

function shareFacebook(shareUrl){
window.open(
'https://www.facebook.com/sharer/sharer.php?u=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function shareLine(shareUrl){
window.open(
'https://social-plugins.line.me/lineit/share?url=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function shareX(shareUrl,title){
window.open(
'https://twitter.com/intent/tweet?text=' +
encodeURIComponent(title) +
'&url=' +
encodeURIComponent(shareUrl),
'_blank'
);
}

function copyUrl(shareUrl){
navigator.clipboard.writeText(shareUrl).then(function(){
alert('URLをコピーしました');
}).catch(function(){
alert(shareUrl);
});
}

function toggleArchive(){
const area = document.getElementById('archiveArea');
const btn = document.getElementById('archiveButton');

if(area.classList.contains('hidden')){
area.classList.remove('hidden');
btn.innerHTML = '📕 アーカイブを閉じる';
}else{
area.classList.add('hidden');
btn.innerHTML = '📚 アーカイブを見る';
}
}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json = JSON.parse(text.substr(47).slice(0,-2));
const rows = json.table.rows;

let items = [];

rows.forEach(r=>{

const date = cell(r,0);
const youtubeURL = cell(r,1);
const title = cell(r,2);
const desc = cell(r,3);
const tags = cell(r,4);

if(!date && !youtubeURL && !title) return;

items.push({
date:date,
youtubeURL:youtubeURL,
title:title,
desc:desc,
tags:tags
});

});

items.reverse();

let latestHtml = '';
let archiveHtml = '';

items.forEach((item,index)=>{

if(index < 5){
latestHtml += makeCard(item,index);
}else{
archiveHtml += makeCard(item,index);
}

});

document.getElementById('latestArea').innerHTML =
latestHtml || '<div class="loading">地域ラジオがありません</div>';

document.getElementById('archiveArea').innerHTML =
archiveHtml;

if(archiveHtml){
document.getElementById('archiveButton').classList.remove('hidden');
}

})
.catch(err=>{

document.getElementById('latestArea').innerHTML =
'<div class="loading">読み込みに失敗しました</div>';

});
</script>

</body>
</html>

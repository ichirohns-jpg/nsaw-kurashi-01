<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW シェア</title>

<!-- OGP固定 -->
<meta property="og:title" content="NSAW 暮らし情報局">
<meta property="og:description" content="志木・新座・朝霞・和光の地域情報">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<script>

const params = new URLSearchParams(location.search);
const id = params.get('id') || '1';
const type = params.get('type') || 'radio';

/* ★OGP完全固定（ここが重要） */
let ogImage =
'https://ichirohns-jpg/nsaw-kurashi-01/kawaraban-ogp.jpg';

document.write(`
<meta property="og:image" content="${ogImage}">
<meta name="twitter:image" content="${ogImage}">
`);

/* 遷移先設定 */
let target = '';

if(type === 'radio'){
target = 'radio.html?radio=' + id;
}

if(type === 'fun'){
target = 'fun.html?id=' + id;
}

if(type === 'kawaraban'){
target = 'kawaraban.html?id=' + id;
}

/* 即リダイレクト */
window.location.replace(
'https://ichirohns-jpg/nsaw-kurashi-01/' + target
);

</script>

</head>

<body>
移動中...
</body>
</html>

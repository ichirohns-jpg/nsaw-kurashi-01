<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>担当利用者一覧</title>

<meta property="og:title" content="担当利用者一覧">
<meta property="og:description" content="支援者用 利用者管理ページ">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/img/shiki.jpg">
<meta name="twitter:card" content="summary_large_image">

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:18px 14px 80px;
}

.topCard{
background:#d32f2f;
color:white;
padding:30px 24px;
border-radius:34px;
margin-bottom:28px;
text-align:center;
box-shadow:0 6px 18px rgba(0,0,0,.14);
}

.pageTitle{
font-size:52px;
font-weight:900;
line-height:1.3;
margin-bottom:12px;
}

.pageText{
font-size:22px;
font-weight:900;
line-height:1.8;
}

.userCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:24px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.userName{
font-size:36px;
font-weight:900;
margin-bottom:12px;
}

.userArea{
font-size:22px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.idBox{
background:#f4f7fb;
padding:18px;
border-radius:22px;
font-size:22px;
font-weight:900;
margin-bottom:18px;
}

.qrBox{
text-align:center;
margin-bottom:22px;
}

.qrBox img{
width:240px;
max-width:100%;
background:white;
padding:12px;
border-radius:24px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.bigBtn{
display:block;
text-decoration:none;
color:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.blue{background:#1565c0}
.green{background:#00897b}
.red{background:#d32f2f}
.purple{background:#8e24aa}
.gray{background:#455a64}

.footerBtn{
display:block;
text-decoration:none;
background:#455a64;
color:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
text-align:center;
margin-top:24px;
}

@media(max-width:768px){
.pageTitle{font-size:40px}
.pageText{font-size:18px}
.userName{font-size:30px}
.userArea{font-size:18px}
.btnGrid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="wrap">

<div class="topCard">
<div class="pageTitle">🧑‍⚕️ 担当利用者一覧</div>
<div class="pageText">支援者用 利用者管理ページ</div>
</div>

<div id="userArea"></div>

<a class="footerBtn"
href="https://ichirohns-jpg.github.io/nsaw-kurashi-01/admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>
const BASE_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/index.html?id=';

const WATCH_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/watch.html';

const MEDICINE_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/medicine-watch.html';

const users = [
{
id:'a001',
name:'山田 太郎',
area:'志木市 本町'
},
{
id:'a002',
name:'佐藤 花子',
area:'新座市 東'
},
{
id:'a003',
name:'鈴木 一郎',
area:'朝霞市 西原'
},
{
id:'a004',
name:'高橋 京子',
area:'和光市 丸山台'
}
];

let html = '';

users.forEach(user=>{

const personUrl =
BASE_URL + user.id;

const qr =
'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
encodeURIComponent(personUrl);

html += `

<div class="userCard">

<div class="userName">
👤 ${user.name}
</div>

<div class="userArea">
📍 ${user.area}
</div>

<div class="idBox">
利用者ID：${user.id}
</div>

<div class="qrBox">
<img src="${qr}">
</div>

<div class="btnGrid">

<a class="bigBtn blue"
target="_blank"
href="${personUrl}">
📱 本人ページ
</a>

<a class="bigBtn red"
target="_blank"
href="${WATCH_URL}">
📋 見守り履歴
</a>

<a class="bigBtn green"
target="_blank"
href="${MEDICINE_URL}">
💊 薬履歴
</a>

<a class="bigBtn purple"
target="_blank"
href="${qr}">
🔲 QRを開く
</a>

</div>

</div>

`;

});

document.getElementById('userArea').innerHTML = html;
</script>

</body>
</html>

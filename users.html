<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>利用者一覧DX</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#1565c0,#1e88e5);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(21,101,192,.25);
}

.header h1{
margin:0;
font-size:42px;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.userCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:18px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.userName{
font-size:30px;
font-weight:900;
margin-bottom:12px;
}

.userInfo{
font-size:19px;
font-weight:900;
color:#607080;
line-height:1.7;
margin-bottom:14px;
}

.status{
font-size:22px;
font-weight:900;
margin-bottom:16px;
}

.help{color:#d32f2f}
.warn{color:#ef6c00}
.ok{color:#00897b}
.none{color:#607080}

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.bigBtn{
display:block;
text-decoration:none;
color:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
text-align:center;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.blue{background:#1565c0}
.green{background:#00897b}
.red{background:#d32f2f}
.purple{background:#8e24aa}
.gray{background:#455a64}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

@media(max-width:640px){
.header h1{font-size:36px}
.userName{font-size:28px}
.btnGrid{grid-template-columns:1fr}
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👥 利用者一覧DX</h1>
</div>

<div class="note">
利用者シートに登録された人を表示します。
</div>

<div id="userArea">
<div class="userCard">読み込み中...</div>
</div>

<a class="homeBtn" href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const USER_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent('利用者シート') +
'&tqx=out:json';

const STATUS_URL =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){
return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';
}

Promise.all([
fetch(USER_URL).then(r=>r.text()),
fetch(STATUS_URL).then(r=>r.text())
])

.then(([userText,statusText])=>{

const userJson =
JSON.parse(userText.substr(47).slice(0,-2));

const statusJson =
JSON.parse(statusText.substr(47).slice(0,-2));

const userRows =
userJson.table.rows;

const statusRows =
statusJson.table.rows;

let latest = {};

statusRows.forEach(row=>{

const id =
cell(row,1);

const status =
cell(row,3);

if(id){
latest[id] = status;
}

});

let html='';

userRows.forEach(row=>{

const id =
cell(row,1);

const name =
cell(row,2);

const area =
cell(row,3);

const family =
cell(row,4);

const phone =
cell(row,5);

if(!id || !name)return;

const status =
latest[id] || '未確認';

let cls='none';
let icon='⭕';

if(status.includes('助け')){
cls='help';
icon='🚨';
}
else if(status.includes('困')){
cls='warn';
icon='😓';
}
else if(status.includes('元気')){
cls='ok';
icon='😊';
}

html += `

<div class="userCard">

<div class="userName">
👤 ${name}
</div>

<div class="userInfo">
ID：${id}<br>
📍 ${area || '住所未登録'}<br>
👨‍👩‍👧 ${family || '家族未登録'}<br>
📞 ${phone || '電話未登録'}
</div>

<div class="status ${cls}">
${icon} ${status}
</div>

<div class="btnGrid">

<a
class="bigBtn blue"
href="index.html?id=${id}">
📱 本人ページ
</a>

<a
class="bigBtn green"
href="person.html?id=${id}">
👤 利用者詳細
</a>

<a
class="bigBtn red"
href="family-board.html?id=${id}">
👨‍👩‍👧 家族ページ
</a>

<a
class="bigBtn purple"
href="support-map.html">
📍 地図
</a>

</div>

</div>

`;

});

document.getElementById('userArea').innerHTML =
html || '<div class="userCard">利用者が登録されていません</div>';

})

.catch(()=>{

document.getElementById('userArea').innerHTML =
'<div class="userCard">読み込み失敗</div>';

});

</script>

</body>
</html>

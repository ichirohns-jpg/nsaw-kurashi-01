<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
利用者一覧DX
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:18px 14px 80px;
}

.topCard{
background:#1565c0;
color:white;
padding:30px 24px;
border-radius:34px;
margin-bottom:28px;
text-align:center;
box-shadow:
0 6px 18px rgba(0,0,0,.14);
}

.pageTitle{
font-size:56px;
font-weight:900;
line-height:1.3;
margin-bottom:12px;
}

.pageText{
font-size:22px;
font-weight:900;
line-height:1.8;
}

.userCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.userName{
font-size:36px;
font-weight:900;
margin-bottom:12px;
}

.userArea{
font-size:22px;
line-height:1.8;
color:#607080;
margin-bottom:18px;
}

.idBox{
background:#f4f7fb;
padding:18px;
border-radius:22px;
font-size:22px;
font-weight:900;
margin-bottom:18px;
text-align:center;
}

.qrBox{
text-align:center;
margin-bottom:22px;
}

.qrBox img{
width:240px;
max-width:100%;
background:white;
padding:12px;
border-radius:24px;
box-shadow:
0 4px 12px rgba(0,0,0,.12);
}

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.bigBtn{
display:block;
text-decoration:none;
color:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
text-align:center;
box-shadow:
0 4px 12px rgba(0,0,0,.12);
}

.blue{
background:#1565c0;
}

.green{
background:#00897b;
}

.red{
background:#d32f2f;
}

.purple{
background:#8e24aa;
}

@media(max-width:768px){

.pageTitle{
font-size:42px;
}

.pageText{
font-size:18px;
}

.userName{
font-size:30px;
}

.userArea{
font-size:18px;
}

.btnGrid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="wrap">

<div class="topCard">

<div class="pageTitle">
🧑‍🤝‍🧑 利用者一覧DX
</div>

<div class="pageText">
個人別QRコード管理ページ
</div>

</div>

<div id="userArea"></div>

</div>

<script>

const BASE_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/index.html?id=';

const users = [

{
id:'a001',
name:'山田 太郎',
area:'志木市 本町',
status:'🚨 助けてください'
},

{
id:'a002',
name:'佐藤 花子',
area:'新座市 東',
status:'😓 困っています'
},

{
id:'a003',
name:'鈴木 一郎',
area:'朝霞市 西原',
status:'😊 元気です'
},

{
id:'a004',
name:'高橋 京子',
area:'和光市 丸山台',
status:'😊 元気です'
}

];

let html = '';

users.forEach(user=>{

const url =
BASE_URL + user.id;

const qr =
'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
encodeURIComponent(url);

let color = '#00897b';

if(user.status.includes('助け')){
color = '#d32f2f';
}
else if(user.status.includes('困')){
color = '#ef6c00';
}

html += `

<div class="userCard">

<div class="userName">
👤 ${user.name}
</div>

<div class="userArea">
📍 ${user.area}
</div>

<div class="idBox">

ID：${user.id}

<br><br>

<span
style="
color:${color};
font-size:24px;
font-weight:900;
">

${user.status}

</span>

</div>

<div class="qrBox">

<img src="${qr}">

</div>

<div class="btnGrid">

<a
class="bigBtn blue"
target="_blank"
href="index.html?id=${user.id}">

📱 本人ページ

</a>

<a
class="bigBtn green"
target="_blank"
href="person.html?id=${user.id}">

👤 利用者詳細

</a>

<a
class="bigBtn red"
target="_blank"
href="family-board.html?id=${user.id}">

👨‍👩‍👧 家族ページ

</a>

<a
class="bigBtn purple"
target="_blank"
href="${qr}">

⬇ QRを見る

</a>

</div>

</div>

`;

});

document.getElementById(
'userArea'
).innerHTML =
html;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
利用者一覧DX
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:18px 14px 80px;
}

.topCard{
background:#1565c0;
color:white;
padding:30px 24px;
border-radius:34px;
margin-bottom:28px;
text-align:center;
}

.pageTitle{
font-size:56px;
font-weight:900;
}

.pageText{
font-size:22px;
font-weight:900;
margin-top:10px;
}

.userCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:24px;
box-shadow:
0 6px 18px rgba(0,0,0,.08);
}

.userName{
font-size:36px;
font-weight:900;
margin-bottom:12px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:16px;
}

.help{
color:#d32f2f;
}

.warn{
color:#ef6c00;
}

.ok{
color:#00897b;
}

.btnGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.bigBtn{
display:block;
text-decoration:none;
color:white;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
text-align:center;
}

.blue{
background:#1565c0;
}

.green{
background:#00897b;
}

.red{
background:#d32f2f;
}

.purple{
background:#8e24aa;
}

</style>

</head>

<body>

<div class="wrap">

<div class="topCard">

<div class="pageTitle">
🧑‍🤝‍🧑 利用者一覧DX
</div>

<div class="pageText">
見守り状況一覧
</div>

</div>

<div id="userArea">
読み込み中...
</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(row,index){

return row.c[index]
? (row.c[index].f || row.c[index].v || '')
: '';

}

fetch(url)

.then(r=>r.text())

.then(t=>{

const json =
JSON.parse(
t.substr(47).slice(0,-2)
);

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const id =
cell(row,1);

const name =
cell(row,2);

const status =
cell(row,3);

if(!name)return;

latest[name] = {
id:id,
status:status
};

});

let html='';

Object.keys(latest).forEach(name=>{

let cls='ok';
let icon='😊';

if(latest[name].status.includes('助け')){
cls='help';
icon='🚨';
}
else if(latest[name].status.includes('困')){
cls='warn';
icon='😓';
}

html += `

<div class="userCard">

<div class="userName">
👤 ${name}
</div>

<div class="status ${cls}">
${icon} ${latest[name].status}
</div>

<div class="btnGrid">

<a
class="bigBtn blue"
href="index.html?id=${latest[name].id}">
📱 本人ページ
</a>

<a
class="bigBtn green"
href="person.html?id=${latest[name].id}">
👤 利用者詳細
</a>

<a
class="bigBtn red"
href="family-board.html?id=${latest[name].id}">
👨‍👩‍👧 家族ページ
</a>

<a
class="bigBtn purple"
href="support-map.html">
📍 地図
</a>

</div>

</div>

`;

});

document.getElementById('userArea').innerHTML =
html;

})

.catch(()=>{

document.getElementById('userArea').innerHTML =
'読み込み失敗';

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>見守り確認</title>

<style>

body{
  background:#eef3f8;
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}

button{
  width:90%;
  max-width:420px;
  padding:30px;
  margin:20px auto;
  display:block;
  border:none;
  border-radius:20px;
  color:white;
  font-size:36px;
  font-weight:900;
}

.genki{
  background:#43a047;
}

.kinkyu{
  background:#d32f2f;
}

</style>
</head>

<body>

<h1>見守り確認</h1>

<button
class="genki"
onclick="sendData('正常')">

😊 元気です

</button>

<button
class="kinkyu"
onclick="sendData('緊急')">

🚨 緊急です

</button>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbwcvgu0Qae7mUwNnaWr-XtqkGT8MZCqPKZfaq5RO1waW9_Cy2i5wWCklFIhouqBPF8W/exec';

async function sendData(status){

  try{

    await fetch(GAS_URL,{

      method:'POST',

      mode:'cors',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify({
        status:status
      }),

      keepalive:true

    });

    alert('送信しました');

  }catch(error){

    alert('通信失敗');

    console.log(error);

  }

}

</script>

</body>
</html>

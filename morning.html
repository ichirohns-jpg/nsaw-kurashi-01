<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日の安心</title>

<style>

body{
  margin:0;
  background:#eef3f8;
  font-family:sans-serif;
  color:#222;
}

.top{
  background:linear-gradient(135deg,#1976d2,#0d47a1);
  color:white;
  padding:30px 20px 36px;
  border-bottom-left-radius:34px;
  border-bottom-right-radius:34px;
}

.logo{
  font-size:38px;
  font-weight:900;
  margin-bottom:18px;
}

.date{
  font-size:26px;
  font-weight:900;
  line-height:1.6;
}

.wrap{
  padding:18px;
}

.main-card,
.qr-card{
  background:white;
  border-radius:30px;
  padding:28px;
  margin-bottom:24px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  text-align:center;
}

.schedule-title{
  font-size:24px;
  color:#1565c0;
  font-weight:900;
  margin-bottom:14px;
}

.schedule-time{
  font-size:48px;
  font-weight:900;
  line-height:1.3;
}

.schedule-sub{
  font-size:24px;
  color:#666;
  margin-top:10px;
}

.big-button{
  width:100%;
  border:none;
  border-radius:28px;
  padding:34px;
  margin-bottom:22px;
  color:white;
  font-size:40px;
  font-weight:900;
}

.green{
  background:#43a047;
}

blue{
  background:#1565c0;
}

.red{
  background:#d32f2f;
}

.yellow{
  background:#f9a825;
}

.gray{
  background:#546e7a;
}

.sub-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:8px;
}

.small-button{
  border:none;
  border-radius:22px;
  padding:22px;
  color:white;
  font-size:24px;
  font-weight:900;
}

.result{
  text-align:center;
  font-size:30px;
  font-weight:900;
  margin-top:18px;
}

.checked{
  opacity:.5;
  box-shadow:
  0 0 0 6px #fff,
  0 0 0 12px #00c853;
}

.hidden{
  display:none;
}

.qr-title{
  font-size:28px;
  font-weight:900;
  color:#1565c0;
  margin-bottom:12px;
}

.qr-text{
  font-size:22px;
  line-height:1.7;
  color:#444;
  margin-bottom:18px;
}

.qr-box{
  width:220px;
  height:220px;
  margin:0 auto;
  border:6px dashed #bbb;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:900;
  color:#777;
  background:#fafafa;
}

.link-button{
  width:100%;
  border:none;
  border-radius:24px;
  padding:28px;
  margin-top:16px;
  font-size:32px;
  font-weight:900;
  color:white;
  background:#1565c0;
}

</style>
</head>

<body>

<div class="top">

  <div class="logo">
    今日の安心
  </div>

  <div class="date" id="todayDate"></div>

</div>

<div class="wrap">

  <div class="main-card">

    <div class="schedule-title">
      📅 今日の予定
    </div>

    <div class="schedule-time">
      今日は予定ありません
    </div>

    <div class="schedule-sub">
      今日はゆっくりお過ごしください
    </div>

  </div>

  <button
  id="btn-genki"
  class="big-button green"
  onclick="sendData('btn-genki','正常','😊 元気です')">

  😊 元気です

  </button>

  <button
  id="btn-hospital"
  class="big-button blue"
  onclick="sendData('btn-hospital','外出','🏥 病院へ出発しました')">

  🏥 出発しました

  </button>

  <div class="sub-buttons">

    <button
    id="btn-medicine"
    class="small-button blue"
    onclick="sendData('btn-medicine','薬','💊 薬を飲みました')">

    💊 薬

    </button>

    <button
    id="btn-home"
    class="small-button gray"
    onclick="sendData('btn-home','帰宅','🏠 帰宅しました')">

    🏠 帰宅

    </button>

    <button
    id="btn-help"
    class="small-button yellow"
    onclick="sendData('btn-help','注意','🟡 困っています')">

    🟡 困っています

    </button>

    <button
    id="btn-emergency"
    class="small-button red"
    onclick="emergencyAction()">

    🚨 緊急

    </button>

  </div>

  <div class="result" id="result"></div>

  <button
  class="link-button"
  onclick="location.href='https://ichirohns-jpg.github.io/nsaw-kurashi-01/news.html'">

  📰 4市情報・動画

  </button>

  <button
  class="link-button"
  onclick="location.href='https://ichirohns-jpg.github.io/nsaw-kurashi-01/map.html'">

  🗺️ 行き先案内

  </button>

  <div class="qr-card">

    <div class="qr-title">
      ご家族・支援者の方へ
    </div>

    <div class="qr-text">
      このQRコードを読み取ると、<br>
      状況を確認できます。
    </div>

    <div class="qr-box">
      QR<br>ここに入れる
    </div>

  </div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbwcvgu0Qae7mUwNnaWr-XtqkGT8MZCqPKZfaq5RO1waW9_Cy2i5wWCklFIhouqBPF8W/exec';

function showToday(){

  const now = new Date();

  const week = [
    '日曜日',
    '月曜日',
    '火曜日',
    '水曜日',
    '木曜日',
    '金曜日',
    '土曜日'
  ];

  document.getElementById('todayDate').innerHTML =
    now.getFullYear() + '年 ' +
    (now.getMonth()+1) + '月 ' +
    now.getDate() + '日 ' +
    week[now.getDay()];

}

function clearChecks(){

  document.querySelectorAll('button').forEach(btn=>{

    btn.classList.remove('checked');

    btn.innerHTML =
      btn.innerHTML.replace(' ✅','');

  });

}

function restoreLastButton(){

  const lastButton =
  localStorage.getItem('lastButton');

  if(!lastButton)return;

  const btn =
  document.getElementById(lastButton);

  if(!btn)return;

  btn.classList.add('checked');

  if(!btn.innerHTML.includes('✅')){

    btn.innerHTML =
      btn.innerHTML + ' ✅';

  }

}

async function sendData(
  buttonId,
  status,
  content
){

  try{

    await fetch(GAS_URL,{

      method:'POST',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify({

        name:'山口さん',

        status:status,

        content:content

      }),

      keepalive:true

    });

    clearChecks();

    const btn =
    document.getElementById(buttonId);

    btn.classList.add('checked');

    if(!btn.innerHTML.includes('✅')){

      btn.innerHTML =
        btn.innerHTML + ' ✅';

    }

    localStorage.setItem(
      'lastButton',
      buttonId
    );

    document.getElementById('result').innerHTML =
      '送信しました';

  }catch(error){

    alert('通信エラー');

  }

}

async function emergencyAction(){

  await sendData(
    'btn-emergency',
    '緊急',
    '🚨 緊急です'
  );

  if(confirm('家族へ電話しますか？')){

    location.href =
      'tel:09012345678';

  }

}

showToday();

restoreLastButton();

</script>

</body>
</html>

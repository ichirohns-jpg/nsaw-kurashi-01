<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>朝3分DX</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  color:#222;
}

.top{
  padding:14px;
}

.top-box{
  background:linear-gradient(135deg,#1565c0,#0d47a1);
  border-radius:28px;
  padding:30px 24px;
  color:#fff;
  box-shadow:0 10px 28px rgba(0,0,0,.18);
}

.main-title{
  font-size:42px;
  font-weight:900;
  line-height:1.4;
}

.today-date{
  margin-top:20px;
  font-size:34px;
  font-weight:900;
  line-height:1.8;
}

.sub{
  margin-top:18px;
  font-size:22px;
  line-height:1.8;
}

.wrap{
  padding:16px 14px 80px;
}

.box{
  background:#fff;
  border-radius:28px;
  padding:24px;
  margin-bottom:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.title{
  font-size:32px;
  font-weight:900;
  color:#1565c0;
  margin-bottom:18px;
}

.item{
  background:#f5f7fb;
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
  border-left:8px solid #1976d2;
  font-size:28px;
  line-height:1.9;
}

.big-btn{
  width:100%;
  border:none;
  border-radius:30px;
  padding:36px 20px;
  margin-bottom:22px;
  color:#fff;
  font-size:36px;
  font-weight:900;
  box-shadow:0 10px 28px rgba(0,0,0,.18);
}

.green{
  background:#43a047;
}

.orange{
  background:#ef6c00;
}

.red{
  background:#d32f2f;
}

.blue{
  background:#1565c0;
}

.brown{
  background:#6d4c41;
}

.result{
  background:#fff3e0;
  border:4px solid #ef6c00;
  border-radius:28px;
  padding:28px;
  font-size:30px;
  line-height:2;
  font-weight:900;
  text-align:center;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="top">

  <div class="top-box">

    <div class="main-title">
      朝3分DX
    </div>

    <div class="today-date" id="todayDate">
    </div>

    <div class="sub">
      今日の予定・天気・体調確認を、
      毎朝わかりやすく確認できます。
    </div>

  </div>

</div>

<div class="wrap">

  <div class="box">

    <div class="title">
      今日のAI秘書
    </div>

    <div id="aiBox"></div>

  </div>

  <div class="box">

    <div class="title">
      今日の予定
    </div>

    <div id="planBox"></div>

  </div>

  <div class="box">

    <div class="title">
      今日の天気
    </div>

    <button
    class="big-btn blue"
    onclick="speakWeather()">

      ☀ 今日の天気を読む

    </button>

    <div id="weatherBox"></div>

  </div>

  <button class="big-btn green" onclick="pushGenki()">
    😊 元気です
  </button>

  <button class="big-btn orange" onclick="pushCare()">
    💬 気になることがあります
  </button>

  <button class="big-btn red" onclick="pushEmergency()">
    🚨 緊急です
  </button>

  <button class="big-btn blue" onclick="pushMedicine()">
    💊 薬を飲みました
  </button>

  <button class="big-btn brown" onclick="pushHome()">
    🏠 帰宅しました
  </button>

  <div class="result" id="resultBox">
    今日の確認はまだありません
  </div>

</div>

<script>

const SHEET_ID =
'13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

function showToday(){

  const now = new Date();

  const week = [
    '日曜日',
    '月曜日',
    '火曜日',
    '水曜日',
    '木曜日',
    '金曜日',
    '土曜日'
  ];

  const text =
    now.getFullYear() + '年' +
    (now.getMonth()+1) + '月' +
    now.getDate() + '日 ' +
    week[now.getDay()];

  document.getElementById('todayDate').innerHTML =
    text;

}

function speakNow(text){

  speechSynthesis.cancel();

  const msg =
  new SpeechSynthesisUtterance(text);

  msg.lang = 'ja-JP';

  speechSynthesis.speak(msg);

}

function setResult(text){

  document.getElementById('resultBox').innerHTML =
  text +
  '<br><br>' +
  new Date().toLocaleTimeString();

}

function addItem(target,text){

  const div =
  document.createElement('div');

  div.className = 'item';

  div.innerHTML = text;

  div.addEventListener('click',function(){

    const plain =
    text
    .replace(/<br>/g,'。')
    .replace(/🕒/g,'')
    .replace(/📌/g,'')
    .replace(/👜/g,'')
    .replace(/☀/g,'')
    .replace(/👕/g,'')
    .replace(/⚠/g,'');

    setResult(
      plain +
      '<br><br>確認しました'
    );

    speakNow(plain);

  });

  document
  .getElementById(target)
  .appendChild(div);

}

function speakWeather(){

  const box =
  document.getElementById('weatherBox');

  const text =
  box.innerText;

  setResult(text);

  speakNow(text);

}

function saveLog(type,content,name,status){

  console.log(
    type,
    content,
    name,
    status
  );

}

function handleMorning(response){

  const rows =
  response.table.rows;

  if(!rows || rows.length === 0)return;

  const row = rows[0];

  const ai =
  row.c[1] ? row.c[1].v : '';

  const weather =
  row.c[2] ? row.c[2].v : '';

  const wash =
  row.c[3] ? row.c[3].v : '';

  const notice =
  row.c[4] ? row.c[4].v : '';

  addItem(
    'aiBox',
    ai
  );

  addItem(
    'weatherBox',
    '☀ 今日の天気は ' + weather + ' です'
  );

  addItem(
    'weatherBox',
    '👕 ' + wash
  );

  addItem(
    'weatherBox',
    '⚠ ' + notice
  );

}

function handlePlans(response){

  const rows =
  response.table.rows;

  rows.forEach(function(r){

    let time = '';

    if(r.c[1] && r.c[1].f){

      time = r.c[1].f;

    }else if(r.c[1] && r.c[1].v){

      time = r.c[1].v;

    }

    const plan =
    r.c[3] ? r.c[3].v : '';

    const item =
    r.c[4] ? r.c[4].v : '';

    addItem(
      'planBox',
      '🕒 ' + time + '<br>' +
      '📌 ' + plan + '<br>' +
      '👜 ' + item
    );

  });

}

window.onload = function(){

  showToday();

  loadMorning();

  setTimeout(function(){

    loadPlans();

  },500);

};

function loadMorning(){

  const script =
  document.createElement('script');

  window.google = {
    visualization:{
      Query:{
        setResponse:function(response){

          handleMorning(response);

        }
      }
    }
  };

  script.src =
  'https://docs.google.com/spreadsheets/d/' +
  SHEET_ID +
  '/gviz/tq?sheet=朝DX&tqx=out:json';

  document.body.appendChild(script);

}

function loadPlans(){

  const script =
  document.createElement('script');

  window.google = {
    visualization:{
      Query:{
        setResponse:function(response){

          handlePlans(response);

        }
      }
    }
  };

  script.src =
  'https://docs.google.com/spreadsheets/d/' +
  SHEET_ID +
  '/gviz/tq?sheet=予定&tqx=out:json';

  document.body.appendChild(script);

}

function pushGenki(){

  setResult(
    '😊 元気確認を記録しました'
  );

  speakNow(
    '元気確認を記録しました'
  );

  saveLog(
    '見守り',
    '元気です',
    '山口さん',
    '正常'
  );

}

function pushCare(){

  setResult(
    '気になる状態を記録しました'
  );

  speakNow(
    '気になる状態を記録しました'
  );

  saveLog(
    '見守り',
    '気になる',
    '山口さん',
    '注意'
  );

}

function pushEmergency(){

  setResult(
    '緊急確認を記録しました'
  );

  speakNow(
    '緊急確認を記録しました'
  );

  saveLog(
    '緊急',
    '緊急です',
    '山口さん',
    '緊急'
  );

}

function pushMedicine(){

  setResult(
    '服薬確認を記録しました'
  );

  speakNow(
    '服薬確認を記録しました'
  );

  saveLog(
    '服薬',
    '服薬確認',
    '山口さん',
    '確認済み'
  );

}

function pushHome(){

  setResult(
    '帰宅確認を記録しました'
  );

  speakNow(
    '帰宅確認を記録しました'
  );

  saveLog(
    '帰宅',
    '帰宅しました',
    '山口さん',
    '帰宅'
  );

}

</script>

</body>
</html>

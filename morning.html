<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>見守り確認</title>

<style>

body{
  background:#eef3f8;
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}

button{
  width:90%;
  max-width:420px;
  padding:30px;
  margin:20px auto;
  display:block;
  border:none;
  border-radius:20px;
  color:white;
  font-size:34px;
  font-weight:900;
}

.genki{
  background:#43a047;
}

.kinkyu{
  background:#d32f2f;
}

#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:9999;
}

</style>
</head>

<body>

<h1>見守り確認</h1>

<button
class="genki"
onclick="sendData('正常','😊 元気です')">

😊 元気です

</button>

<button
class="kinkyu"
onclick="sendData('緊急','🚨 緊急です')">

🚨 緊急です

</button>

<div id="loading">

送信中...

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbwcvgu0Qae7mUwNnaWr-XtqkGT8MZCqPKZfaq5RO1waW9_Cy2i5wWCklFIhouqBPF8W/exec';

async function sendData(status,content){

  const loading =
  document.getElementById('loading');

  loading.style.display =
  'flex';

  try{

    const response =
    await fetch(GAS_URL,{

      method:'POST',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify({

        name:'山口さん',

        status:status,

        content:content

      }),

      keepalive:true

    });

    alert('送信しました');

  }catch(error){

    alert('通信エラー');

    console.log(error);

  }finally{

    loading.style.display =
    'none';

  }

}

</script>

</body>
</html>

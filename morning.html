function pushGenki(){

  const now =
  new Date();

  const time =

  now.getHours() +
  ':' +
  String(
    now.getMinutes()
  ).padStart(2,'0');

  const box =
  document.getElementById(
    'completeBox'
  );

  box.style.display =
  'block';

  box.innerHTML =

  '📨 ご家族へ元気確認を送信しました<br><br>' +

  '確認時刻：' +

  time;

  speak(
    '今日も元気確認を送信しました。'
  );

}

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>朝3分DX</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef3f8;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
  color:#223;
}

.top{
  padding:14px;
}

.top-box{
  background:linear-gradient(135deg,#1565c0,#0d47a1);
  border-radius:28px;
  padding:30px 24px;
  color:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.main-title{
  font-size:42px;
  font-weight:900;
  line-height:1.4;
}

.sub{
  margin-top:16px;
  font-size:22px;
  line-height:1.9;
}

.wrap{
  padding:16px 14px 60px;
}

.box{
  background:#fff;
  border-radius:26px;
  padding:24px;
  margin-bottom:24px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);
}

.title{
  font-size:30px;
  font-weight:900;
  color:#1565c0;
  margin-bottom:18px;
}

.item{
  background:#f5f7fb;
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
  font-size:28px;
  line-height:1.9;
  border-left:8px solid #1976d2;
}

.big-btn{
  width:100%;
  border:none;
  border-radius:28px;
  padding:34px 20px;
  font-size:34px;
  font-weight:900;
  color:#fff;
  margin-bottom:22px;
  box-shadow:0 10px 26px rgba(0,0,0,.18);
}

.green{
  background:#43a047;
}

.orange{
  background:#ef6c00;
}

.red{
  background:#d32f2f;
}

.blue{
  background:#1565c0;
}

.brown{
  background:#6d4c41;
}

.result{
  background:#fff3e0;
  border:4px solid #ef6c00;
  border-radius:28px;
  padding:28px;
  font-size:30px;
  line-height:2;
  text-align:center;
  font-weight:900;
  margin-top:24px;
}

.home-btn{
  display:block;
  text-align:center;
  background:#1976d2;
  color:#fff;
  text-decoration:none;
  padding:24px;
  border-radius:24px;
  font-size:28px;
  font-weight:900;
  margin-top:34px;
}

@media(max-width:768px){

.main-title{
  font-size:36px;
}

.sub{
  font-size:20px;
}

.title{
  font-size:28px;
}

.item{
  font-size:24px;
}

.big-btn{
  font-size:28px;
}

.result{
  font-size:26px;
}

.home-btn{
  font-size:24px;
}

}
</style>
</head>

<body>

<div class="top">
  <div class="top-box">
    <div class="main-title">
      朝3分DX
    </div>

    <div class="sub">
      今日の予定・ゴミ・天気・見守りを、
      毎朝わかりやすく確認できます。
    </div>
  </div>
</div>

<div class="wrap">

  <div class="box">
    <div class="title">今日のAI秘書</div>

    <div id="aiBox"></div>
  </div>

  <div class="box">
    <div class="title">今日の予定</div>

    <div id="planBox"></div>
  </div>

  <div class="box">
    <div class="title">今日の天気</div>

    <div id="weatherBox"></div>
  </div>

  <button class="big-btn green" onclick="pushGenki()">
    😊 元気です
  </button>

  <button class="big-btn orange" onclick="pushCare()">
    💬 気になることがあります
  </button>

  <button class="big-btn red" onclick="pushEmergency()">
    🚨 緊急です
  </button>

  <button class="big-btn blue" onclick="pushMedicine()">
    💊 薬を飲みました
  </button>

  <button class="big-btn brown" onclick="pushHome()">
    🏠 帰宅しました
  </button>

  <div class="result" id="resultBox">
    今日の確認はまだありません
  </div>

  <a class="home-btn" href="index.html">
    ← トップへ戻る
  </a>

</div>

<script>

const SHEET_ID = '13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY';

function addItem(target,text){

  const div = document.createElement('div');

  div.className = 'item';

  div.innerHTML = text;

  document.getElementById(target).appendChild(div);

}

window.onload = function(){

  loadMorningDX();

  loadPlans();

};

function loadMorningDX(){

  const url =
  'https://docs.google.com/spreadsheets/d/' +
  SHEET_ID +
  '/gviz/tq?sheet=朝DX&tqx=out:json&callback=handleMorning';

  const script = document.createElement('script');

  script.src = url;

  document.body.appendChild(script);

}

function loadPlans(){

  const url =
  'https://docs.google.com/spreadsheets/d/' +
  SHEET_ID +
  '/gviz/tq?sheet=予定&tqx=out:json&callback=handlePlans';

  const script = document.createElement('script');

  script.src = url;

  document.body.appendChild(script);

}

function handleMorning(json){

  const rows = json.table.rows;

  if(!rows || rows.length === 0)return;

  const row = rows[0];

  const message =
    row.c[1] ? row.c[1].v : '';

  const weather =
    row.c[2] ? row.c[2].v : '';

  const wash =
    row.c[3] ? row.c[3].v : '';

  const notice =
    row.c[4] ? row.c[4].v : '';

  addItem('aiBox',message);

  addItem('weatherBox','☀ ' + weather);

  addItem('weatherBox','👕 ' + wash);

  addItem('weatherBox','⚠ ' + notice);

}

function handlePlans(json){

  const rows = json.table.rows;

  rows.forEach(function(r){

    const time =
      r.c[1] ? r.c[1].v : '';

    const plan =
      r.c[3] ? r.c[3].v : '';

    const item =
      r.c[4] ? r.c[4].v : '';

    addItem(
      'planBox',
      '🕒 ' + time + '<br>' +
      '📌 ' + plan + '<br>' +
      '👜 ' + item
    );

  });

}

function setResult(text){

  document.getElementById('resultBox').innerHTML =
    text + '<br><br>' +
    new Date().toLocaleTimeString();

}

function pushGenki(){

  setResult('😊 元気確認を記録しました');

}

function pushCare(){

  setResult('💬 気になる状態を記録しました');

}

function pushEmergency(){

  setResult('🚨 緊急確認を記録しました');

}

function pushMedicine(){

  setResult('💊 服薬確認を記録しました');

}

function pushHome(){

  setResult('🏠 帰宅確認を記録しました');

}

</script>

</body>
</html>

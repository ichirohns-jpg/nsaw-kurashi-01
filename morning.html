<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>今日の見守り</title>

<style>

body{
  margin:0;
  background:#eef3f8;
  font-family:sans-serif;
  color:#222;
}

.top{
  background:linear-gradient(135deg,#1976d2,#0d47a1);
  color:white;
  padding:28px 20px 34px;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  box-shadow:0 6px 18px rgba(0,0,0,.2);
}

.logo{
  font-size:42px;
  font-weight:900;
  margin-bottom:18px;
}

.date{
  font-size:28px;
  font-weight:900;
  line-height:1.8;
}

.wrap{
  padding:18px;
}

.card{
  background:white;
  border-radius:26px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.schedule-title{
  font-size:26px;
  font-weight:900;
  margin-bottom:14px;
  color:#1565c0;
}

.schedule-item{
  font-size:34px;
  font-weight:900;
  line-height:1.6;
}

button{
  width:100%;
  border:none;
  border-radius:22px;
  padding:26px;
  margin-bottom:18px;
  color:white;
  font-size:34px;
  font-weight:900;
}

.green{
  background:#43a047;
}

.yellow{
  background:#f9a825;
}

.red{
  background:#d32f2f;
}

.blue{
  background:#1565c0;
}

.gray{
  background:#546e7a;
}

#result{
  text-align:center;
  font-size:30px;
  font-weight:900;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="top">

  <div class="logo">
    今日の見守り
  </div>

  <div class="date" id="todayDate"></div>

</div>

<div class="wrap">

  <div class="card">

    <div class="schedule-title">
      📅 今日の予定
    </div>

    <div class="schedule-item">
      14:30 病院
    </div>

  </div>

  <button
  class="blue"
  onclick="sendData('外出','🏥 病院へ出発しました')">

  🏥 病院へ出発しました

  </button>

  <button
  class="green"
  onclick="sendData('正常','😊 元気です')">

  😊 元気です

  </button>

  <button
  class="yellow"
  onclick="sendData('注意','🟡 ちょっと困っています')">

  🟡 ちょっと困っています

  </button>

  <button
  class="blue"
  onclick="sendData('薬','💊 薬を飲みました')">

  💊 薬を飲みました

  </button>

  <button
  class="gray"
  onclick="sendData('帰宅','🏠 帰宅しました')">

  🏠 帰宅しました

  </button>

  <button
  class="red"
  onclick="emergencyAction()">

  🚨 緊急です

  </button>

  <div id="result"></div>

</div>

<script>

const GAS_URL =
'https://script.google.com/macros/s/AKfycbwcvgu0Qae7mUwNnaWr-XtqkGT8MZCqPKZfaq5RO1waW9_Cy2i5wWCklFIhouqBPF8W/exec';

function showToday(){

  const now =
  new Date();

  const week = [
    '日曜日',
    '月曜日',
    '火曜日',
    '水曜日',
    '木曜日',
    '金曜日',
    '土曜日'
  ];

  document.getElementById('todayDate').innerHTML =
    now.getFullYear() + '年 ' +
    (now.getMonth()+1) + '月 ' +
    now.getDate() + '日 ' +
    week[now.getDay()];

}

async function sendData(status,content){

  try{

    await fetch(GAS_URL,{

      method:'POST',

      headers:{
        'Content-Type':'text/plain'
      },

      body:JSON.stringify({

        name:'山口さん',

        status:status,

        content:content

      }),

      keepalive:true

    });

    document.getElementById('result').innerHTML =
    '送信しました';

  }catch(error){

    alert('通信エラー');

    console.log(error);

  }

}

async function emergencyAction(){

  await sendData(
    '緊急',
    '🚨 緊急です'
  );

  if(confirm('家族へ電話しますか？')){

    location.href =
    'tel:09012345678';

  }

}

showToday();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認 管理ページ</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#eef5f2;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#13854a;
  border-radius:30px;
  padding:30px 20px;
  color:#fff;
  text-align:center;
}

.topTitle{
  font-size:44px;
  font-weight:900;
  line-height:1.3;
}

.topText{
  margin-top:18px;
  font-size:24px;
  font-weight:800;
}

.countWrap{
  margin-top:20px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.countBox{
  background:#fff;
  border-radius:24px;
  padding:18px 10px;
  text-align:center;
}

.countNum{
  font-size:56px;
  font-weight:900;
}

.greenNum{color:#16a34a}
.yellowNum{color:#f59e0b}
.redNum{color:#dc2626}

.countLabel{
  margin-top:10px;
  font-size:22px;
  font-weight:900;
  color:#5c7084;
}

.card{
  margin-top:18px;
  background:#fff;
  border-radius:26px;
  padding:22px 18px;
}

.name{
  font-size:48px;
  font-weight:900;
  color:#0f3556;
}

.status{
  margin-top:16px;
  display:inline-block;
  border-radius:18px;
  padding:16px 20px;
  color:#fff;
  font-size:28px;
  font-weight:900;
}

.green{background:#16a34a}
.yellow{background:#f59e0b}
.red{
  background:#dc2626;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.4}
  100%{opacity:1}
}

.date{
  margin-top:20px;
  font-size:28px;
  font-weight:900;
  color:#627487;
}

.mapBtn{
  display:block;
  margin-top:20px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:20px;
  padding:18px 14px;
  font-size:26px;
  font-weight:900;
}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:30px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <div class="topTitle">
      安否確認<br>
      管理ページ
    </div>

    <div class="topText">
      今日ボタンを押した人の一覧
    </div>

  </div>

  <div class="countWrap">

    <div class="countBox">
      <div id="genkiCount" class="countNum greenNum">0</div>
      <div class="countLabel">元気です</div>
    </div>

    <div class="countBox">
      <div id="komariCount" class="countNum yellowNum">0</div>
      <div class="countLabel">困っています</div>
    </div>

    <div class="countBox">
      <div id="kyukyuCount" class="countNum redNum">0</div>
      <div class="countLabel">緊急</div>
    </div>

  </div>

  <div id="app" class="loading">
    読み込み中...
  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"安否ログ";

const app =
document.getElementById("app");

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function statusClass(status){

  if(status.includes("元気")){
    return "green";
  }

  if(status.includes("困")){
    return "yellow";
  }

  return "red";

}

function countStatus(items){

  let g=0;
  let k=0;
  let r=0;

  items.forEach(function(item){

    if(item.status.includes("元気")){
      g++;
    }
    else if(item.status.includes("困")){
      k++;
    }
    else{
      r++;
    }

  });

  document.getElementById("genkiCount").innerText = g;
  document.getElementById("komariCount").innerText = k;
  document.getElementById("kyukyuCount").innerText = r;

}

function render(rows){

  const latestMap = {};

  rows.forEach(function(row){

    const c = row.c || [];

    const item = {
      date : c[0] ? (c[0].f || c[0].v || "") : "",
      name : c[1] ? (c[1].f || c[1].v || "") : "",
      status : c[2] ? (c[2].f || c[2].v || "") : "",
      lat : c[3] ? (c[3].f || c[3].v || "") : "",
      lng : c[4] ? (c[4].f || c[4].v || "") : ""
    };

    if(!item.name){
      return;
    }

    latestMap[item.name] = item;

  });

  const items =
    Object.values(latestMap)
    .reverse();

  countStatus(items);

  app.innerHTML = "";

  items.forEach(function(item){

    const div =
      document.createElement("div");

    div.className = "card";

    let html = "";

    html +=
      '<div class="name">'
      + esc(item.name)
      + '</div>';

    html +=
      '<div class="status '
      + statusClass(item.status)
      + '">'
      + esc(item.status)
      + '</div>';

    html +=
      '<div class="date">'
      + esc(item.date)
      + '</div>';

    if(item.lat && item.lng){

      html +=
        '<a class="mapBtn" target="_blank" href="https://www.google.com/maps?q='
        + item.lat
        + ','
        + item.lng
        + '">📍 地図を見る</a>';

    }

    div.innerHTML = html;

    app.appendChild(div);

  });

}

function handleResponse(response){

  const json =
    JSON.parse(
      response.substr(47).slice(0,-2)
    );

  render(json.table.rows);

}

const script =
document.createElement("script");

script.src =
"https://docs.google.com/spreadsheets/d/"
+ SHEET_ID
+ "/gviz/tq?sheet="
+ encodeURIComponent(SHEET_NAME)
+ "&tqx=out:json";

script.onload = function(){

  const text =
    this.text || this.textContent;

  handleResponse(text);

};

document.body.appendChild(script);

</script>

</body>
</html>

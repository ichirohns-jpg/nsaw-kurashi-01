<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>安否確認 管理ページ</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef8f5;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#14324a;
}

.wrap{
  max-width:720px;
  margin:0 auto;
  padding:14px 12px 50px;
}

.top{
  background:#16864a;
  color:#fff;
  border-radius:24px;
  padding:22px 16px;
  text-align:center;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.top h1{
  margin:0;
  font-size:30px;
  line-height:1.3;
  font-weight:900;
}

.top p{
  margin-top:10px;
  font-size:17px;
  line-height:1.5;
  font-weight:700;
}

.summary{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:16px;
}

.sumBox{
  background:#fff;
  border-radius:18px;
  padding:14px 10px;
  text-align:center;
  box-shadow:0 6px 14px rgba(0,0,0,.08);
}

.sumNum{
  font-size:28px;
  font-weight:900;
  line-height:1;
}

.sumLabel{
  margin-top:8px;
  font-size:14px;
  font-weight:800;
  color:#5c6d7e;
}

.greenText{color:#16a34a}
.yellowText{color:#f59e0b}
.redText{color:#dc2626}

.loading{
  text-align:center;
  padding:40px 0;
  font-size:22px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:16px 14px;
  margin-top:14px;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.name{
  font-size:28px;
  font-weight:900;
  color:#10314a;
  line-height:1.3;
}

.status{
  margin-top:10px;
  display:inline-block;
  border-radius:16px;
  padding:8px 14px;
  font-size:18px;
  font-weight:900;
  color:#fff;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
}

.time{
  margin-top:12px;
  font-size:16px;
  font-weight:700;
  color:#546477;
}

.mapBtn{
  display:block;
  margin-top:14px;
  text-decoration:none;
  background:#2563eb;
  color:#fff;
  border-radius:16px;
  padding:14px 12px;
  text-align:center;
  font-size:18px;
  font-weight:900;
}

.empty{
  background:#fff;
  border-radius:22px;
  padding:36px 20px;
  margin-top:18px;
  text-align:center;
  font-size:22px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <h1>
      安否確認<br>
      管理ページ
    </h1>

    <p>
      今日ボタンを押した人の一覧
    </p>
  </div>

  <div class="summary">

    <div class="sumBox">
      <div id="genkiCount" class="sumNum greenText">
        0
      </div>
      <div class="sumLabel">
        元気です
      </div>
    </div>

    <div class="sumBox">
      <div id="komariCount" class="sumNum yellowText">
        0
      </div>
      <div class="sumLabel">
        困っています
      </div>
    </div>

    <div class="sumBox">
      <div id="kyukyuCount" class="sumNum redText">
        0
      </div>
      <div class="sumLabel">
        緊急
      </div>
    </div>

  </div>

  <div id="app" class="loading">
    読み込み中です...
  </div>

</div>

<script>
const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"安否ログ";

const app =
document.getElementById("app");

function cell(row,index){

  if(!row.c || !row.c[index]) return "";

  return row.c[index].f
    || row.c[index].v
    || "";

}

function esc(str){

  return String(str || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");

}

function statusClass(status){

  status = String(status);

  if(status.includes("元気")){
    return "green";
  }

  if(status.includes("困")){
    return "yellow";
  }

  return "red";

}

function mapUrl(lat,lng){

  if(!lat || !lng) return "";

  return "https://www.google.com/maps?q="
    + lat
    + ","
    + lng;

}

function render(rows){

  app.className = "";
  app.innerHTML = "";

  const today = new Date();

  const yyyy =
    today.getFullYear();

  const mm =
    String(today.getMonth() + 1)
    .padStart(2,"0");

  const dd =
    String(today.getDate())
    .padStart(2,"0");

  const todayText =
    yyyy + "/" + mm + "/" + dd;

  const items = rows.map(function(row,index){

    return {
      rowNo:index,
      time:cell(row,0),
      name:cell(row,1),
      status:cell(row,2),
      lat:cell(row,3),
      lng:cell(row,4)
    };

  })
  .filter(function(item){

    return String(item.time)
      .includes(todayText);

  })
  .reverse();

  let genki = 0;
  let komari = 0;
  let kyukyu = 0;

  items.forEach(function(item){

    const s =
      String(item.status);

    if(s.includes("元気")){
      genki++;
    }else if(s.includes("困")){
      komari++;
    }else{
      kyukyu++;
    }

  });

  document.getElementById("genkiCount").innerText =
    genki;

  document.getElementById("komariCount").innerText =
    komari;

  document.getElementById("kyukyuCount").innerText =
    kyukyu;

  if(!items.length){

    app.innerHTML =
      '<div class="empty">今日のデータはありません</div>';

    return;

  }

  items.forEach(function(item){

    const card =
      document.createElement("div");

    card.className = "card";

    let html = "";

    html +=
      '<div class="name">'
      + esc(item.name)
      + '</div>';

    html +=
      '<div class="status '
      + statusClass(item.status)
      + '">'
      + esc(item.status)
      + '</div>';

    html +=
      '<div class="time">'
      + esc(item.time)
      + '</div>';

    const url =
      mapUrl(item.lat,item.lng);

    if(url){

      html +=
        '<a class="mapBtn" href="'
        + url
        + '" target="_blank">'
        + '📍 地図を見る'
        + '</a>';

    }

    card.innerHTML = html;

    app.appendChild(card);

  });

}

window.handleSheet = function(json){

  render(json.table.rows);

};

function loadSheet(){

  const script =
    document.createElement("script");

  script.src =
    "https://docs.google.com/spreadsheets/d/"
    + SHEET_ID
    + "/gviz/tq?sheet="
    + encodeURIComponent(SHEET_NAME)
    + "&tqx=out:json;responseHandler:handleSheet&v="
    + Date.now();

  document.body.appendChild(script);

}

loadSheet();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認 管理ページ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5f2;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:760px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#13854a;
  border-radius:28px;
  padding:28px 18px;
  color:#fff;
  text-align:center;
}

.topTitle{
  font-size:36px;
  line-height:1.4;
  font-weight:900;
}

.topText{
  margin-top:12px;
  font-size:20px;
  line-height:1.6;
  font-weight:800;
}

.countWrap{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.countBox{
  background:#fff;
  border-radius:22px;
  padding:14px 8px;
  text-align:center;
}

.countNum{
  font-size:40px;
  line-height:1;
  font-weight:900;
}

.greenNum{
  color:#16a34a;
}

.yellowNum{
  color:#f59e0b;
}

.grayNum{
  color:#64748b;
}

.countLabel{
  margin-top:10px;
  font-size:17px;
  font-weight:900;
  color:#64748b;
}

.card{
  margin-top:16px;
  background:#fff;
  border-radius:24px;
  padding:18px 16px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.name{
  font-size:32px;
  line-height:1.4;
  font-weight:900;
  color:#103657;
}

.status{
  margin-top:12px;
  display:inline-block;
  border-radius:18px;
  padding:12px 18px;
  color:#fff;
  font-size:20px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.gray{
  background:#94a3b8;
}

.date{
  margin-top:14px;
  font-size:18px;
  line-height:1.5;
  font-weight:800;
  color:#617387;
}

.mapBtn{
  display:block;
  margin-top:16px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:18px;
  padding:14px 12px;
  font-size:20px;
  font-weight:900;
}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:26px;
  font-weight:900;
}

.error{
  margin-top:20px;
  background:#fff0f0;
  border:3px solid #f0aaaa;
  color:#b00020;
  border-radius:20px;
  padding:20px;
  font-size:22px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <div class="topTitle">
      安否確認 管理ページ
    </div>

    <div
      class="topText"
      id="todayText"
    >
      読み込み中...
    </div>

  </div>

  <div class="countWrap">

    <div class="countBox">
      <div
        id="genkiCount"
        class="countNum greenNum"
      >
        0
      </div>

      <div class="countLabel">
        元気
      </div>
    </div>

    <div class="countBox">
      <div
        id="komariCount"
        class="countNum yellowNum"
      >
        0
      </div>

      <div class="countLabel">
        困り
      </div>
    </div>

    <div class="countBox">
      <div
        id="mikaninCount"
        class="countNum grayNum"
      >
        0
      </div>

      <div class="countLabel">
        未確認
      </div>
    </div>

  </div>

  <div
    id="app"
    class="loading"
  >
    読み込み中...
  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzKgfSyvUtaeDeUNP3Al5xY--qOjvYnqKzYiQMaWxUzgqem4-GvoNzr8xC9y8QwZ5cA/exec";

const app =
document.getElementById("app");

const today =
new Date();

const yyyy =
today.getFullYear();

const mm =
String(
  today.getMonth() + 1
).padStart(2,'0');

const dd =
String(
  today.getDate()
).padStart(2,'0');

document.getElementById(
  "todayText"
).innerText =
yyyy
+ "/"
+ mm
+ "/"
+ dd
+ " の安否確認";

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function statusClass(status){

  status =
    String(status || "");

  if(status.includes("元気")){
    return "green";
  }

  if(status.includes("困")){
    return "yellow";
  }

  return "gray";

}

function countStatus(items){

  let g = 0;
  let k = 0;
  let m = 0;

  items.forEach(function(item){

    const s =
      String(item.status || "");

    if(s.includes("元気")){
      g++;
    }
    else if(s.includes("困")){
      k++;
    }
    else{
      m++;
    }

  });

  document.getElementById(
    "genkiCount"
  ).innerText = g;

  document.getElementById(
    "komariCount"
  ).innerText = k;

  document.getElementById(
    "mikaninCount"
  ).innerText = m;

}

function render(items){

  app.className = "";
  app.innerHTML = "";

  if(!Array.isArray(items)){

    app.innerHTML =
      '<div class="error">データ取得失敗</div>';

    return;

  }

  countStatus(items);

  items.forEach(function(item){

    const div =
      document.createElement("div");

    div.className = "card";

    const name =
      item.name || "";

    const status =
      item.status || "未確認";

    const date =
      item.date || "";

    const lat =
      item.lat || "";

    const lng =
      item.lng || "";

    let html = "";

    html +=
      '<div class="name">'
      + esc(name)
      + '</div>';

    html +=
      '<div class="status '
      + statusClass(status)
      + '">'
      + esc(status)
      + '</div>';

    if(date){

      html +=
        '<div class="date">'
        + esc(date)
        + '</div>';

    }

    if(lat && lng){

      html +=
        '<a class="mapBtn" target="_blank" href="https://www.google.com/maps?q='
        + encodeURIComponent(lat + "," + lng)
        + '">📍 地図を見る</a>';

    }

    div.innerHTML = html;

    app.appendChild(div);

  });

}

function loadData(){

  const script =
    document.createElement("script");

  script.src =
    GAS_URL
    + "?mode=list&callback=handleData&t="
    + Date.now();

  document.body.appendChild(script);

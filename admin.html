<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認 管理ページ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5f2;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:680px;
  margin:0 auto;
  padding:16px 12px 80px;
}

.top{
  background:#13854a;
  border-radius:24px;
  padding:24px 16px;
  color:#fff;
  text-align:center;
}

.topTitle{
  font-size:30px;
  line-height:1.4;
  font-weight:900;
}

.topText{
  margin-top:10px;
  font-size:18px;
  line-height:1.6;
  font-weight:800;
}

.countWrap{
  margin-top:16px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.countBox{
  background:#fff;
  border-radius:18px;
  padding:12px 6px;
  text-align:center;
}

.countNum{
  font-size:34px;
  line-height:1;
  font-weight:900;
}

.greenNum{
  color:#16a34a;
}

.yellowNum{
  color:#f59e0b;
}

.grayNum{
  color:#64748b;
}

.countLabel{
  margin-top:8px;
  font-size:15px;
  font-weight:900;
  color:#64748b;
}

.card{
  margin-top:12px;
  background:#fff;
  border-radius:20px;
  padding:16px 14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.name{
  font-size:26px;
  line-height:1.4;
  font-weight:900;
  color:#103657;
}

.status{
  margin-top:10px;
  display:inline-block;
  border-radius:16px;
  padding:10px 14px;
  color:#fff;
  font-size:17px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.gray{
  background:#94a3b8;
}

.date{
  margin-top:12px;
  font-size:15px;
  line-height:1.5;
  font-weight:700;
  color:#617387;
}

.loading{
  margin-top:30px;
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.error{
  margin-top:18px;
  background:#fff0f0;
  border:2px solid #f0aaaa;
  color:#b00020;
  border-radius:18px;
  padding:18px;
  font-size:18px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <div class="topTitle">
      安否確認 管理ページ
    </div>

    <div
      class="topText"
      id="todayText"
    >
      読み込み中...
    </div>

  </div>

  <div class="countWrap">

    <div class="countBox">

      <div
        id="genkiCount"
        class="countNum greenNum"
      >
        0
      </div>

      <div class="countLabel">
        元気
      </div>

    </div>

    <div class="countBox">

      <div
        id="komariCount"
        class="countNum yellowNum"
      >
        0
      </div>

      <div class="countLabel">
        困り
      </div>

    </div>

    <div class="countBox">

      <div
        id="mikaninCount"
        class="countNum grayNum"
      >
        0
      </div>

      <div class="countLabel">
        未確認
      </div>

    </div>

  </div>

  <div
    id="app"
    class="loading"
  >
    読み込み中...
  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzKgfSyvUtaeDeUNP3Al5xY--qOjvYnqKzYiQMaWxUzgqem4-GvoNzr8xC9y8QwZ5cA/exec";

const app =
document.getElementById("app");

const today =
new Date();

const yyyy =
today.getFullYear();

const mm =
String(
  today.getMonth() + 1
).padStart(2,'0');

const dd =
String(
  today.getDate()
).padStart(2,'0');

document.getElementById(
  "todayText"
).innerText =
yyyy
+ "/"
+ mm
+ "/"
+ dd
+ " の安否確認";

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function statusClass(status){

  status =
    String(status || "");

  if(status.includes("元気")){
    return "green";
  }

  if(status.includes("困")){
    return "yellow";
  }

  return "gray";

}

function countStatus(items){

  let g = 0;
  let k = 0;
  let m = 0;

  items.forEach(function(item){

    const s =
      String(item.status || "");

    if(s.includes("元気")){
      g++;
    }
    else if(s.includes("困")){
      k++;
    }
    else{
      m++;
    }

  });

  document.getElementById(
    "genkiCount"
  ).innerText = g;

  document.getElementById(
    "komariCount"
  ).innerText = k;

  document.getElementById(
    "mikaninCount"
  ).innerText = m;

}

function render(items){

  app.className = "";
  app.innerHTML = "";

  if(!Array.isArray(items)){

    app.innerHTML =
      '<div class="error">データ取得失敗</div>';

    return;

  }

  countStatus(items);

  items.forEach(function(item){

    const div =
      document.createElement("div");

    div.className = "card";

    div.innerHTML =
      '<div class="name">'
      + esc(item.name || '')
      + '</div>'
      +
      '<div class="status '
      + statusClass(item.status || '')
      + '">'
      + esc(item.status || '')
      + '</div>'
      +
      (
        item.date
        ? '<div class="date">'
          + esc(item.date)
          + '</div>'
        : ''
      );

    app.appendChild(div);

  });

}

fetch(
  GAS_URL
  + "?mode=list&t="
  + Date.now()
)
.then(function(res){

  return res.json();

})
.then(function(data){

  render(data);

})
.catch(function(){

  app.className = "";

  app.innerHTML =
    '<div class="error">読み込み失敗</div>';

});

</script>

</body>
</html>

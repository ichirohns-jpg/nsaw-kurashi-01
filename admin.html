<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安否確認 管理ページ</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#eef5f2;
  font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
  color:#17324d;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#13854a;
  border-radius:30px;
  padding:28px 18px;
  color:#fff;
  text-align:center;
}

.topTitle{
  font-size:38px;
  line-height:1.3;
  font-weight:900;
}

.topText{
  margin-top:14px;
  font-size:20px;
  line-height:1.6;
  font-weight:800;
}

.countWrap{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.countBox{
  background:#fff;
  border-radius:22px;
  padding:14px 8px;
  text-align:center;
}

.countNum{
  font-size:44px;
  font-weight:900;
  line-height:1;
}

.greenNum{color:#16a34a}
.yellowNum{color:#f59e0b}
.redNum{color:#dc2626}

.countLabel{
  margin-top:10px;
  font-size:17px;
  font-weight:900;
  color:#5d7287;
}

.card{
  margin-top:16px;
  background:#fff;
  border-radius:24px;
  padding:18px 16px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.name{
  font-size:34px;
  line-height:1.3;
  font-weight:900;
  color:#103657;
}

.status{
  margin-top:12px;
  display:inline-block;
  border-radius:18px;
  padding:12px 18px;
  color:#fff;
  font-size:22px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
  animation:blink 1s infinite;
}

.gray{
  background:#94a3b8;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.45}
  100%{opacity:1}
}

.date{
  margin-top:14px;
  font-size:20px;
  line-height:1.5;
  font-weight:800;
  color:#617387;
}

.mapBtn{
  display:block;
  margin-top:16px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:18px;
  padding:16px 12px;
  font-size:22px;
  font-weight:900;
}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:28px;
  font-weight:900;
}

.error{
  margin-top:20px;
  background:#fff0f0;
  border:3px solid #f0aaaa;
  color:#b00020;
  border-radius:20px;
  padding:20px;
  font-size:22px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="top">
    <div class="topTitle">
      安否確認<br>
      管理ページ
    </div>

    <div class="topText">
      登録メンバーの最新状態
    </div>
  </div>

  <div class="countWrap">

    <div class="countBox">
      <div id="genkiCount" class="countNum greenNum">0</div>
      <div class="countLabel">元気</div>
    </div>

    <div class="countBox">
      <div id="komariCount" class="countNum yellowNum">0</div>
      <div class="countLabel">困り</div>
    </div>

    <div class="countBox">
      <div id="mikaninCount" class="countNum redNum">0</div>
      <div class="countLabel">未確認</div>
    </div>

  </div>

  <div id="app" class="loading">
    読み込み中...
  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbym0WU_xeLgszLRh5BsPLFsCZW-ihJbtqVyviM9JZeZz1adO_CG8YkxMZ51gB5MpV2d/exec?mode=list";

const app =
document.getElementById("app");

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function statusClass(status){

  status = String(status || "");

  if(status.includes("元気")){
    return "green";
  }

  if(status.includes("困")){
    return "yellow";
  }

  if(status.includes("未確認")){
    return "gray";
  }

  return "red";

}

function countStatus(items){

  let g = 0;
  let k = 0;
  let m = 0;

  items.forEach(function(item){

    const s =
      String(item.status || "");

    if(s.includes("元気")){
      g++;
    }
    else if(s.includes("困")){
      k++;
    }
    else{
      m++;
    }

  });

  document.getElementById(
    "genkiCount"
  ).innerText = g;

  document.getElementById(
    "komariCount"
  ).innerText = k;

  document.getElementById(
    "mikaninCount"
  ).innerText = m;

}

function render(items){

  app.className = "";
  app.innerHTML = "";

  if(
    !Array.isArray(items)
  ){

    app.innerHTML =
      '<div class="error">データ取得失敗</div>';

    return;

  }

  countStatus(items);

  items.forEach(function(item){

    const div =
      document.createElement("div");

    div.className = "card";

    const name =
      item.name || "";

    const status =
      item.status || "未確認";

    const date =
      item.date || "";

    const lat =
      item.lat || "";

    const lng =
      item.lng || "";

    let html = "";

    html +=
      '<div class="name">'
      + esc(name)
      + '</div>';

    html +=
      '<div class="status '
      + statusClass(status)
      + '">'
      + esc(status)
      + '</div>';

    if(date){

      html +=
        '<div class="date">'
        + esc(date)
        + '</div>';

    }

    if(lat && lng){

      html +=
        '<a class="mapBtn" target="_blank" href="https://www.google.com/maps?q='
        + encodeURIComponent(lat + "," + lng)
        + '">📍 地図を見る</a>';

    }

    div.innerHTML = html;

    app.appendChild(div);

  });

}

fetch(
  GAS_URL
  + "&t="
  + Date.now()
)
.then(function(res){

  return res.json();

})
.then(function(data){

  render(data);

})
.catch(function(err){

  app.className = "";

  app.innerHTML =
    '<div class="error">読み込み失敗</div>';

  console.log(err);

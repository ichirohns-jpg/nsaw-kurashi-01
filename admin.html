<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>支援者ページ</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#fff4f4 0%,#fdfdfd 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#c62828,#e53935);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(198,40,40,.25);
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.header p{
font-size:20px;
font-weight:900;
margin-top:12px;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.card{
background:white;
border-radius:30px;
padding:24px;
text-align:center;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.icon{
font-size:62px;
margin-bottom:12px;
}

.title{
font-size:28px;
font-weight:900;
margin-bottom:10px;
}

.desc{
font-size:18px;
line-height:1.7;
color:#607080;
font-weight:700;
margin-bottom:18px;
}

.btn{
display:block;
width:100%;
padding:18px;
color:white;
text-decoration:none;
border-radius:22px;
font-size:22px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.red{background:#d32f2f;}
.green{background:#00897b;}
.blue{background:#1565c0;}
.orange{background:#ef6c00;}
.gray{background:#455a64;}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.header h1{
font-size:36px;
}

}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>🧑‍⚕️ 支援者ページ</h1>
<p>見守り・服薬・利用者管理</p>
</div>

<div class="note">
支援者向けの管理画面です。利用者の状況確認、服薬確認、履歴確認を行います。
</div>

<div class="grid">

<div class="card">
<div class="icon">📊</div>
<div class="title">支援者ダッシュボード</div>
<div class="desc">全体状況を確認</div>
<a class="btn blue" href="dashboard.html">開く</a>
</div>

<div class="card">
<div class="icon">📅</div>
<div class="title">本日の状況</div>
<div class="desc">今日の見守り状況</div>
<a class="btn blue" href="today-board.html">開く</a>
</div>

<div class="card">
<div class="icon">🚨</div>
<div class="title">緊急対応ボード</div>
<div class="desc">助けてください一覧</div>
<a class="btn red" href="alert-board.html">開く</a>
</div>

<div class="card">
<div class="icon">📋</div>
<div class="title">要対応者一覧</div>
<div class="desc">困っています一覧</div>
<a class="btn orange" href="status-board.html">開く</a>
</div>

<div class="card">
<div class="icon">👥</div>
<div class="title">利用者一覧</div>
<div class="desc">利用者管理</div>
<a class="btn blue" href="users.html">開く</a>
</div>

<div class="card">
<div class="icon">📍</div>
<div class="title">利用者位置マップ</div>
<div class="desc">位置と状態確認</div>
<a class="btn blue" href="support-map.html">開く</a>
</div>

<div class="card">
<div class="icon">📋</div>
<div class="title">見守り履歴</div>
<div class="desc">全履歴を見る</div>
<a class="btn orange" href="watch.html">開く</a>
</div>

<div class="card">
<div class="icon">💊</div>
<div class="title">薬履歴</div>
<div class="desc">服薬履歴確認</div>
<a class="btn green" href="medicine-watch.html">開く</a>
</div>

<div class="card">
<div class="icon">💊</div>
<div class="title">薬未確認一覧</div>
<div class="desc">服薬状況確認</div>
<a class="btn green" href="medicine-missing.html">開く</a>
</div>

<div class="card">
<div class="icon">🏠</div>
<div class="title">地域OS入口</div>
<div class="desc">トップへ戻る</div>
<a class="btn gray" href="portal.html">開く</a>
</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認 管理ページ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5f2;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#13854a;
  border-radius:30px;
  padding:30px 20px;
  color:#fff;
  text-align:center;
}

.topTitle{
  font-size:44px;
  line-height:1.3;
  font-weight:900;
}

.topText{
  margin-top:18px;
  font-size:24px;
  line-height:1.6;
  font-weight:800;
}

.countWrap{
  margin-top:20px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
}

.countBox{
  background:#fff;
  border-radius:24px;
  padding:18px 10px;
  text-align:center;
}

.countNum{
  font-size:58px;
  font-weight:900;
}

.greenNum{
  color:#16a34a;
}

.yellowNum{
  color:#f59e0b;
}

.redNum{
  color:#dc2626;
}

.countLabel{
  margin-top:10px;
  font-size:24px;
  font-weight:900;
  color:#5d7287;
}

.card{
  margin-top:18px;
  background:#fff;
  border-radius:28px;
  padding:24px 20px;
}

.name{
  font-size:50px;
  line-height:1.2;
  font-weight:900;
  color:#103657;
}

.status{
  margin-top:18px;
  display:inline-block;
  border-radius:20px;
  padding:16px 22px;
  color:#fff;
  font-size:28px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.45}
  100%{opacity:1}
}

.date{
  margin-top:20px;
  font-size:28px;
  line-height:1.5;
  font-weight:900;
  color:#617387;
}

.mapBtn{
  display:block;
  margin-top:22px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:22px;
  padding:18px 14px;
  font-size:26px;
  font-weight:900;
}

.loading{
  margin-top:50px;
  text-align:center;
  font-size:32px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <div class="topTitle">
      安否確認<br>
      管理ページ
    </div>

    <div class="topText">
      今日ボタンを押した人の一覧
    </div>

  </div>

  <div class="countWrap">

    <div class="countBox">
      <div
        id="genkiCount"
        class="countNum greenNum"
      >
        0
      </div>

      <div class="countLabel">
        元気です
      </div>
    </div>

    <div class="countBox">
      <div
        id="komariCount"
        class="countNum yellowNum"
      >
        0
      </div>

      <div class="countLabel">
        困っています
      </div>
    </div>

    <div class="countBox">
      <div
        id="kyukyuCount"
        class="countNum redNum"
      >
        0
      </div>

      <div class="countLabel">
        緊急
      </div>
    </div>

  </div>

  <div
    id="app"
    class="loading"
  >
    読み込み中...
  </div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxRl_XRANlt2VcRQ_s0u0SLKWSnozvKv3Q8WyfV2P80TTb0KqGJ5LWv0XIUe4BxKCTJ/exec?mode=list";

const app =
document.getElementById("app");

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;");

}

function statusClass(status){

  if(
    String(status).includes("元気")
  ){
    return "green";
  }

  if(
    String(status).includes("困")
  ){
    return "yellow";
  }

  return "red";

}

function countStatus(items){

  let g = 0;
  let k = 0;
  let r = 0;

  items.forEach(function(item){

    if(
      item.status.includes("元気")
    ){
      g++;
    }
    else if(
      item.status.includes("困")
    ){
      k++;
    }
    else{
      r++;
    }

  });

  document.getElementById(
    "genkiCount"
  ).innerText = g;

  document.getElementById(
    "komariCount"
  ).innerText = k;

  document.getElementById(
    "kyukyuCount"
  ).innerText = r;

}

function render(items){

  app.className = "";
  app.innerHTML = "";

  countStatus(items);

  items.forEach(function(item){

    const div =
      document.createElement("div");

    div.className = "card";

    let html = "";

    html +=
    '<div class="name">'
    + esc(item.name)
    + '</div>';

    html +=
    '<div class="status '
    + statusClass(item.status)
    + '">'
    + esc(item.status)
    + '</div>';

    html +=
    '<div class="date">'
    + esc(item.date)
    + '</div>';

    if(
      item.lat &&
      item.lng
    ){

      html +=
      '<a class="mapBtn" target="_blank" href="https://www.google.com/maps?q='
      + item.lat
      + ','
      + item.lng
      + '">'
      + '📍 地図を見る'
      + '</a>';

    }

    div.innerHTML = html;

    app.appendChild(div);

  });

}

fetch(GAS_URL)
.then(function(res){

  return res.json();

})
.then(function(data){

  render(data);

})
.catch(function(){

  app.innerHTML =
  "読み込み失敗";

});

</script>

</body>
</html>

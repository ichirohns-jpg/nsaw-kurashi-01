<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>安否確認 管理ページ</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#eef5f2;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  "Meiryo",
  sans-serif;
  color:#17324d;
}

.wrap{
  max-width:820px;
  margin:0 auto;
  padding:18px 14px 100px;
}

.top{
  background:#13854a;
  border-radius:30px;
  padding:30px 20px;
  color:#fff;
  text-align:center;
  box-shadow:0 10px 24px rgba(0,0,0,.14);
}

.topTitle{
  font-size:44px;
  line-height:1.3;
  font-weight:900;
}

.topText{
  margin-top:18px;
  font-size:24px;
  line-height:1.6;
  font-weight:800;
}

.countWrap{
  margin-top:22px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
}

.countBox{
  background:#fff;
  border-radius:24px;
  padding:18px 10px;
  text-align:center;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.countNum{
  font-size:58px;
  line-height:1;
  font-weight:900;
}

.greenNum{
  color:#16a34a;
}

.yellowNum{
  color:#f59e0b;
}

.redNum{
  color:#dc2626;
}

.countLabel{
  margin-top:12px;
  font-size:24px;
  font-weight:900;
  color:#5b6f82;
}

.card{
  margin-top:20px;
  background:#fff;
  border-radius:28px;
  padding:24px 20px;
  box-shadow:0 10px 24px rgba(0,0,0,.10);
}

.name{
  font-size:52px;
  line-height:1.2;
  font-weight:900;
  color:#0f3556;
}

.status{
  margin-top:18px;
  display:inline-block;
  padding:18px 24px;
  border-radius:20px;
  color:#fff;
  font-size:30px;
  line-height:1.4;
  font-weight:900;
}

.green{
  background:#16a34a;
}

.yellow{
  background:#f59e0b;
}

.red{
  background:#dc2626;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.45}
  100%{opacity:1}
}

.date{
  margin-top:22px;
  font-size:30px;
  line-height:1.5;
  font-weight:900;
  color:#5f7184;
}

.mapBtn{
  display:block;
  width:100%;
  margin-top:24px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  text-align:center;
  border-radius:22px;
  padding:20px 16px;
  font-size:28px;
  line-height:1.5;
  font-weight:900;
}

.footer{
  margin-top:34px;
  text-align:center;
  font-size:18px;
  color:#678;
}

.loading{
  margin-top:40px;
  text-align:center;
  font-size:30px;
  font-weight:900;
}

</style>
</head>

<body>

<div class="wrap">

  <div class="top">

    <div class="topTitle">
      安否確認<br>
      管理ページ
    </div>

    <div class="topText">
      今日ボタンを押した人の一覧
    </div>

  </div>

  <div class="countWrap">

    <div class="countBox">
      <div
        id="genkiCount"
        class="countNum greenNum"
      >
        0
      </div>

      <div class="countLabel">
        元気です
      </div>
    </div>

    <div class="countBox">
      <div
        id="komariCount"
        class="countNum yellowNum"
      >
        0
      </div>

      <div class="countLabel">
        困っています
      </div>
    </div>

    <div class="countBox">
      <div
        id="kyukyuCount"
        class="countNum redNum"
      >
        0
      </div>

      <div class="countLabel">
        緊急
      </div>
    </div>

  </div>

  <div
    id="app"
    class="loading"
  >
    読み込み中...
  </div>

  <div class="footer">
    NSAW 暮らし情報局
  </div>

</div>

<script>

const SHEET_ID =
"13qavSy8Thod2S_UWtHf0C7s-IDVcpYYEMvRNPHpabjY";

const SHEET_NAME =
"安否ログ";

const app =
document.getElementById("app");

function cell(row,index){

  if(
    !row.c ||
    !row.c[index]
  ){
    return "";
  }

  return (
    row.c[index].f ||
    row.c[index].v ||
    ""
  );

}

function esc(str){

  return String(str || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;");

}

function statusClass(status){

  if(
    String(status).includes("元気")
  ){
    return "green";
  }

  if(
    String(status).includes("困")
  ){
    return "yellow";
  }

  return "red";

}

function countStatus(items){

  let genki = 0;
  let komari = 0;
  let kyukyu = 0;

  items.forEach(function(item){

    if(
      item.status.includes("元気")
    ){
      genki++;
    }
    else if(
      item.status.includes("困")
    ){
      komari++;
    }
    else{
      kyukyu++;
    }

  });

  document.getElementById(
    "genkiCount"
  ).innerText = genki;

  document.getElementById(
    "komariCount"
  ).innerText = komari;

  document.getElementById(
    "kyukyuCount"
  ).innerText = kyukyu;

}

function render(rows){

  const latestMap = {};

  rows.forEach(function(row){

    const item = {

      date:cell(row,0),
      name:cell(row,1),
      status:cell(row,2),
      lat:cell(row,3),
      lng:cell(row,4)

    };

    if(!item.name){
      return;
    }

    latestMap[item.name] = item;

  });

  const items =
    Object.values(latestMap)
    .reverse();

  countStatus(items);

  app.className = "";
  app.innerHTML = "";

  items.forEach(function(item){

    const card =
      document.createElement("div");

    card.className = "card";

    let html = "";

    html +=
    '<div class="name">'
    + esc(item.name)
    + '</div>';

    html +=
    '<div class="status '
    + statusClass(item.status)
    + '">'
    + esc(item.status)
    + '</div>';

    html +=
    '<div class="date">'
    + esc(item.date)
    + '</div>';

    if(
      item.lat &&
      item.lng
    ){

      html +=
      '<a class="mapBtn" target="_blank" href="https://www.google.com/maps?q='
      + esc(item.lat)
      + ','
      + esc(item.lng)
      + '">'
      + '📍 地図を見る'
      + '</a>';

    }

    card.innerHTML = html;

    app.appendChild(card);

  });

}

function handleSheet(json){

  render(
    json.table.rows
  );

}

window.handleSheet =
handleSheet;

function loadSheet(){

  const script =
    document.createElement(
      "script"
    );

  script.src =
    "https://docs.google.com/spreadsheets/d/"
    + SHEET_ID
    + "/gviz/tq?sheet="
    + encodeURIComponent(
        SHEET_NAME
      )
    + "&tqx=out:json;responseHandler=handleSheet";

  document.body.appendChild(
    script
  );

}

loadSheet();

</script>

</body>
</html>

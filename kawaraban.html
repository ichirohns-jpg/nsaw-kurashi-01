<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版</title>

<meta property="og:type" content="website">
<meta property="og:title" content="4市瓦版">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の地域情報をまとめた4市瓦版です。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="4市瓦版">
<meta name="twitter:description" content="志木市・新座市・朝霞市・和光市の地域情報をまとめた4市瓦版です。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#43a047;
color:#fff;
padding:28px 18px;
text-align:center;
font-size:40px;
font-weight:900;
line-height:1.3;
}

.wrap{
max-width:1000px;
margin:0 auto;
padding:18px 14px 44px;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
margin-bottom:30px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.card img{
width:100%;
display:block;
}

.date{
display:inline-block;
margin:20px 18px 8px;
padding:12px 20px;
background:#e3f2fd;
color:#0d47a1;
border-radius:999px;
font-size:26px;
font-weight:900;
}

.title{
padding:8px 18px 14px;
font-size:38px;
font-weight:900;
line-height:1.45;
}

.desc{
padding:6px 18px 20px;
font-size:28px;
line-height:1.85;
white-space:pre-wrap;
}

.cityGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:0 18px 22px;
}

.cityGrid a{
display:block;
padding:18px;
border-radius:16px;
color:#fff;
text-decoration:none;
text-align:center;
font-size:22px;
font-weight:900;
}

.shiki{background:#1976d2;}
.niiza{background:#43a047;}
.asaka{background:#fb8c00;}
.wako{background:#8e24aa;}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:18px 18px 24px;
}

.share button{
border:0;
border-radius:16px;
padding:20px 10px;
font-size:22px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2;}
.line{background:#06c755;}
.x{background:#000;}
.copy{background:#ff9800;}

.notice{
background:#fff3cd;
padding:22px;
margin:20px;
border-radius:18px;
font-size:26px;
font-weight:900;
}

@media(max-width:700px){
header{font-size:34px;padding:24px 14px;}
.title{font-size:34px;}
.desc{font-size:26px;}
.cityGrid{grid-template-columns:1fr;}
.share button{font-size:20px;padding:18px 8px;}
}
</style>
</head>

<body>

<header>4市瓦版</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="4市瓦版";

const GVIZ_URL=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="
+encodeURIComponent(SHEET_NAME)
+"&tqx=out:json";

function getCell(row,index){
if(!row || !row.c || !row.c[index]) return "";
const c=row.c[index];
if(c.v!==undefined && c.v!==null) return c.v;
if(c.f!==undefined && c.f!==null) return c.f;
return "";
}

function formatDate(value){
if(!value) return "";
const text=String(value).trim();
let m=text.match(/Date\((\d+),(\d+),(\d+)\)/);
if(m) return m[1]+"年"+(Number(m[2])+1)+"月"+m[3]+"日";
m=text.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
if(m) return m[1]+"年"+Number(m[2])+"月"+Number(m[3])+"日";
return text;
}

function parseGViz(text){
const match=text.match(/\{[\s\S]*\}/);
if(!match) throw new Error("GVizデータを取得できません");
return JSON.parse(match[0]);
}

function makeShareUrl(id){
return "https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-kawaraban.html?id="
+encodeURIComponent(id);
}

function shareFacebook(url){
window.open(
"https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url),
"_blank"
);
}

function shareLine(url){
window.open(
"https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url),
"_blank"
);
}

function shareX(url,text){
window.open(
"https://twitter.com/intent/tweet?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text),
"_blank"
);
}

function copyUrl(url){
navigator.clipboard.writeText(url);
alert("URLをコピーしました");
}

fetch(GVIZ_URL)
.then(function(response){
return response.text();
})
.then(function(text){

const json=parseGViz(text);
const rows=json.table && json.table.rows ? json.table.rows : [];

let items=[];

for(let i=0;i<rows.length;i++){

const row=rows[i];

const date=getCell(row,0);
const image=getCell(row,1);
const title=getCell(row,2);
const desc=getCell(row,3);

const shikiTitle=getCell(row,4);
const shikiUrl=getCell(row,5);

const niizaTitle=getCell(row,6);
const niizaUrl=getCell(row,7);

const asakaTitle=getCell(row,8);
const asakaUrl=getCell(row,9);

const wakoTitle=getCell(row,10);
const wakoUrl=getCell(row,11);

if(
!date && !image && !title && !desc &&
!shikiTitle && !shikiUrl &&
!niizaTitle && !niizaUrl &&
!asakaTitle && !asakaUrl &&
!wakoTitle && !wakoUrl
){
continue;
}

items.push({
id:i+1,
date:formatDate(date),
image:image,
title:title,
desc:desc,
shikiTitle:shikiTitle,
shikiUrl:shikiUrl,
niizaTitle:niizaTitle,
niizaUrl:niizaUrl,
asakaTitle:asakaTitle,
asakaUrl:asakaUrl,
wakoTitle:wakoTitle,
wakoUrl:wakoUrl
});

}

items.reverse();

const params=new URLSearchParams(location.search);
const singleId=params.get("kawaraban");

if(singleId){
items=items.filter(function(item){
return String(item.id)===String(singleId);
});
}

let html="";

items.forEach(function(item){

const shareUrl=makeShareUrl(item.id);
const shareText=item.title || "4市瓦版";

html+=`

<div class="card">

${
item.image
?
`<img src="${item.image}" alt="${item.title}" onerror="this.style.display='none'">`
:
""
}

<div class="date">${item.date}</div>
<div class="title">${item.title}</div>
<div class="desc">${item.desc}</div>

<div class="cityGrid">

${
item.shikiUrl
?
`<a class="shiki" href="${item.shikiUrl}" target="_blank">
${item.shikiTitle || "志木市"}
</a>`
:
""
}

${
item.niizaUrl
?
`<a class="niiza" href="${item.niizaUrl}" target="_blank">
${item.niizaTitle || "新座市"}
</a>`
:
""
}

${
item.asakaUrl
?
`<a class="asaka" href="${item.asakaUrl}" target="_blank">
${item.asakaTitle || "朝霞市"}
</a>`
:
""
}

${
item.wakoUrl
?
`<a class="wako" href="${item.wakoUrl}" target="_blank">
${item.wakoTitle || "和光市"}
</a>`
:
""
}

</div>

<div class="share">

<button class="fb" onclick="shareFacebook('${shareUrl}')">
Facebook
</button>

<button class="line" onclick="shareLine('${shareUrl}')">
LINE
</button>

<button class="x" onclick="shareX('${shareUrl}','${String(shareText).replace(/'/g,"\\'")}')">
X
</button>

<button class="copy" onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>

`;

});

document.getElementById("app").innerHTML=
html || "<div class='notice'>記事がありません</div>";

})
.catch(function(err){
document.getElementById("app").innerHTML=
"<div class='notice'>読み込み失敗<br>"+err+"</div>";
console.error(err);
});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NSAW 地域瓦版</title>

<meta name="description" content="志木・新座・朝霞・和光の地域情報を見やすく届ける地域テレビ型DX">

<meta property="og:title" content="NSAW 地域瓦版">
<meta property="og:description" content="志木・新座・朝霞・和光の地域情報">
<meta property="og:type" content="website">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/ogp.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban.html">

<meta name="twitter:card" content="summary_large_image">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#dde6ef;
  font-family:
  "Hiragino Sans",
  "Yu Gothic",
  sans-serif;
  color:#1b2b39;
}

/* 上部 */

.top-wrap{
  padding:14px;
}

.top-box{
  background:
  linear-gradient(
    135deg,
    #0f4c81,
    #16385b
  );

  border-radius:28px;

  padding:24px;

  color:#fff;

  box-shadow:
  0 12px 30px rgba(0,0,0,.18);
}

.main-title{
  font-size:44px;
  font-weight:900;
  line-height:1.3;
  text-shadow:
  0 3px 6px rgba(0,0,0,.25);
}

.sub-title{
  margin-top:12px;
  font-size:22px;
  line-height:1.8;
  opacity:.95;
}

/* 市ボタン */

.city-row{
  display:flex;
  gap:12px;
  margin-top:24px;
  flex-wrap:wrap;
}

.city-btn{
  flex:1;
  min-width:120px;
  text-decoration:none;
  color:#fff;
  font-size:24px;
  font-weight:900;
  text-align:center;
  padding:20px 10px;
  border-radius:20px;
  box-shadow:
  0 6px 16px rgba(0,0,0,.18);
}

.shiki{
  background:#1976d2;
}

.niiza{
  background:#2e7d32;
}

.asaka{
  background:#ef6c00;
}

.wako{
  background:#c62828;
}

/* コンテナ */

.container{
  padding:0 12px 40px;
}

/* カード */

.card{
  background:#ffffff;
  border-radius:28px;
  margin-bottom:28px;
  overflow:hidden;

  box-shadow:
  0 10px 26px rgba(0,0,0,.12);

  border:
  2px solid #d7e1ea;
}

/* テレビ帯 */

.news-band{
  background:
  linear-gradient(
    90deg,
    #d32f2f,
    #ff7043
  );

  color:#fff;

  font-size:24px;

  font-weight:900;

  padding:14px 18px;

  border-radius:14px;

  margin-bottom:18px;

  letter-spacing:.05em;

  box-shadow:
  0 4px 12px rgba(0,0,0,.15);
}

.card-image{
  width:100%;
  display:block;
}

.card-body{
  padding:20px;
}

.date{
  font-size:22px;
  font-weight:700;
  color:#607080;
  margin-bottom:10px;
}

.title{
  font-size:35px;
  line-height:1.5;
  font-weight:900;
  margin-bottom:18px;
  color:#17324d;
}

.desc{
  font-size:28px;
  line-height:1.9;
  color:#23313f;
}

/* 情報リンク */

.links{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.link-btn{
  display:block;
  background:#f3f7fb;
  border:2px solid #d6e0ea;
  border-radius:18px;
  padding:18px;
  text-decoration:none;
  color:#17324d;
  font-size:24px;
  font-weight:800;
}

/* 動画 */

.video-wrap{
  margin-top:22px;
  background:#000;
  border-radius:24px;
  padding:14px;
  border:4px solid #d32f2f;
}

.video-head{
  color:#fff;
  font-size:26px;
  font-weight:900;
  margin-bottom:12px;
}

.video-title{
  color:#fff;
  font-size:22px;
  line-height:1.7;
  margin-bottom:12px;
}

.video-wrap iframe,
.video-wrap video{
  width:100%;
  border-radius:14px;
}

/* 月別 */

.month-section{
  margin-top:30px;
}

.toggle-btn{
  width:100%;
  border:none;
  background:#17324d;
  color:#fff;
  border-radius:20px;
  padding:20px;
  margin-top:10px;
  font-size:28px;
  font-weight:900;
  box-shadow:
  0 6px 16px rgba(0,0,0,.15);
}

.month-content{
  margin-top:14px;
}

/* スマホ */

@media(max-width:768px){

.main-title{
  font-size:34px;
}

.sub-title{
  font-size:18px;
}

.city-btn{
  font-size:22px;
}

.title{
  font-size:30px;
}

.desc{
  font-size:25px;
}

}

</style>
</head>

<body>

<div class="top-wrap">

  <div class="top-box">

    <div class="main-title">
      NSAW 地域瓦版
    </div>

    <div class="sub-title">
      志木・新座・朝霞・和光の地域情報を、
      高齢者にも見やすく届ける
      地域テレビ型DX
    </div>

    <div class="city-row">

      <a class="city-btn shiki" target="_blank"
      href="https://www.city.shiki.lg.jp/">
      志木市
      </a>

      <a class="city-btn niiza" target="_blank"
      href="https://www.city.niiza.lg.jp/">
      新座市
      </a>

      <a class="city-btn asaka" target="_blank"
      href="https://www.city.asaka.lg.jp/">
      朝霞市
      </a>

      <a class="city-btn wako" target="_blank"
      href="https://www.city.wako.lg.jp/">
      和光市
      </a>

    </div>

  </div>

</div>

<div class="container" id="app">

読み込み中...

</div>

</body>
</html>

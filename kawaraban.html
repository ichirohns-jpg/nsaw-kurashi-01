<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const SHEET_NAME =
'4市瓦版';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(r,i){
return r.c[i]
? (r.c[i].v || r.c[i].f || '')
: '';
}

function makeCard(item){
return `
<div class="newsCard">

<img src="${item.image}" class="newsImage">

<div class="newsDate">${item.date}</div>
<div class="newsTitle">${item.title}</div>
<div class="newsText">${item.text}</div>

</div>
`;
}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json = JSON.parse(text.substring(47).slice(0,-2));
const rows = json.table.rows;

let items = [];

rows.forEach((r, index)=>{
if(
!cell(r,0) &&
!cell(r,1) &&
!cell(r,2) &&
!cell(r,3)
) return;

items.push({
date:cell(r,0),
image:cell(r,1),
title:cell(r,2),
text:cell(r,3),
originalIndex:index
});
});

items.reverse();

// ★URLパラメータ
const kawarabanParam =
new URLSearchParams(location.search)
.get("kawaraban");

// ★1件 or 全件
let target;

if(kawarabanParam){
const targetIndex = parseInt(kawarabanParam, 10) - 1;
target = items.find(item => item.originalIndex === targetIndex);
}

if(kawarabanParam && !target){

document.getElementById('latestArea').innerHTML =
'<div class="newsCard"><div class="newsText">指定された記事が見つかりません</div></div>';

return;

}

// ★表示
document.getElementById('latestArea').innerHTML =
target
? makeCard(target)
: items.map(i=>makeCard(i)).join('');

})
.catch(()=>{

document.getElementById('latestArea').innerHTML =
'<div class="newsCard"><div class="newsText">読み込みに失敗しました</div></div>';

});

</script>

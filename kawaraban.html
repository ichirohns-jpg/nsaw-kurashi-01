<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#1f2d3d;
}

header{
background:#43a047;
color:#fff;
padding:28px;
text-align:center;
font-size:38px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
background:#fff;
border-radius:24px;
overflow:hidden;
margin-bottom:28px;
box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.card img{
width:100%;
display:block;
}

.date{
display:inline-block;
margin:18px;
padding:10px 18px;
background:#e3f2fd;
border-radius:999px;
font-size:22px;
font-weight:900;
}

.title{
padding:0 18px 10px;
font-size:34px;
font-weight:900;
line-height:1.5;
}

.desc{
padding:0 18px 18px;
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
}

.cityGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:18px;
}

.cityGrid a{
display:block;
padding:18px;
border-radius:14px;
color:#fff;
text-decoration:none;
text-align:center;
font-size:24px;
font-weight:900;
}

.shiki{background:#1976d2}
.niiza{background:#43a047}
.asaka{background:#fb8c00}
.wako{background:#8e24aa}

.share{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:18px;
}

.share button{
border:0;
border-radius:14px;
padding:18px;
font-size:22px;
font-weight:900;
color:#fff;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#000}
.copy{background:#ff9800}

.notice{
background:#fff3cd;
padding:20px;
margin:18px;
border-radius:14px;
font-size:24px;
font-weight:900;
}

</style>
</head>

<body>

<header>4市瓦版</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID="149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME="4市瓦版";

const URL=
"https://docs.google.com/spreadsheets/d/"
+SHEET_ID+
"/gviz/tq?sheet="
+encodeURIComponent(SHEET_NAME)
+"&tqx=out:json";

function cell(row,i){
return row?.c?.[i]?.v || row?.c?.[i]?.f || "";
}

function parseGViz(text){
try{
const json=text.match(/\{[\s\S]*\}/);
return JSON.parse(json[0]);
}catch(e){
return {table:{rows:[]}};
}
}

function shareFacebook(url){
window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url));
}

function shareLine(url){
window.open("https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url));
}

function shareX(url){
window.open("https://twitter.com/intent/tweet?url="+encodeURIComponent(url));
}

function copyUrl(url){
navigator.clipboard.writeText(url);
alert("コピーしました");
}

fetch(URL)
.then(r=>r.text())
.then(text=>{

const json=parseGViz(text);
const rows=json.table?.rows || [];

let html="";

for(let i=rows.length-1;i>=0;i--){

const row=rows[i];

const date=cell(row,0);
const image=cell(row,1);
const title=cell(row,2);
const desc=cell(row,3);

const shikiTitle=cell(row,4);
const shikiUrl=cell(row,5);

const niizaTitle=cell(row,6);
const niizaUrl=cell(row,7);

const asakaTitle=cell(row,8);
const asakaUrl=cell(row,9);

const wakoTitle=cell(row,10);
const wakoUrl=cell(row,11);

if(!title) continue;

html+=`
<div class="card">

${image ? `<img src="${image}" onerror="this.style.display='none'">` : ""}

<div class="date">${date}</div>
<div class="title">${title}</div>
<div class="desc">${desc}</div>

<div class="cityGrid">

${shikiUrl ? `<a class="shiki" href="${shikiUrl}" target="_blank">${shikiTitle}</a>` : ""}
${niizaUrl ? `<a class="niiza" href="${niizaUrl}" target="_blank">${niizaTitle}</a>` : ""}
${asakaUrl ? `<a class="asaka" href="${asakaUrl}" target="_blank">${asakaTitle}</a>` : ""}
${wakoUrl ? `<a class="wako" href="${wakoUrl}" target="_blank">${wakoTitle}</a>` : ""}

</div>

<div class="share">

<button class="fb" onclick="shareFacebook(location.href)">Facebook</button>
<button class="line" onclick="shareLine(location.href)">LINE</button>
<button class="x" onclick="shareX(location.href)">X</button>
<button class="copy" onclick="copyUrl(location.href)">URLコピー</button>

</div>

</div>
`;
}

document.getElementById("app").innerHTML =
html || "<div class='notice'>記事なし</div>";

})
.catch(err=>{
document.getElementById("app").innerHTML =
"<div class='notice'>読み込み失敗</div>";
console.log(err);
});

</script>

</body>
</html>

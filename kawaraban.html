<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:#fff;
padding:24px;
border-radius:24px;
text-align:center;
font-size:34px;
font-weight:900;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.card{
background:#fff;
border-radius:24px;
padding:18px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.10);
}

.date{
display:inline-block;
background:#e3f2fd;
color:#1565c0;
padding:8px 16px;
border-radius:999px;
font-size:16px;
font-weight:900;
margin-bottom:12px;
}

.title{
font-size:30px;
font-weight:900;
line-height:1.4;
margin-bottom:14px;
}

.thumb{
width:100%;
border-radius:18px;
display:block;
margin-bottom:16px;
}

.desc{
font-size:21px;
line-height:1.8;
font-weight:700;
white-space:pre-wrap;
margin-top:12px;
}

.citys{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:18px;
}

.citys a{
display:block;
text-decoration:none;
text-align:center;
padding:14px;
border-radius:16px;
font-size:18px;
font-weight:900;
color:white;
}

.shiki{background:#1976d2}
.niiza{background:#43a047}
.asaka{background:#fb8c00}
.wako{background:#8e24aa}

.sns{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.sns button{
border:0;
border-radius:18px;
padding:16px;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#111}
.copy{background:#ff9800}

.archive{
background:#fff;
border-radius:24px;
padding:18px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.archiveTitle{
font-size:28px;
font-weight:900;
margin-bottom:12px;
}

.archive a{
display:block;
padding:14px;
background:#f4f7fb;
border-radius:14px;
margin-bottom:10px;
text-decoration:none;
color:#17324d;
font-size:19px;
font-weight:900;
}

.backBtn{
display:block;
text-align:center;
text-decoration:none;
background:#455a64;
color:#fff;
padding:16px;
border-radius:18px;
font-size:20px;
font-weight:900;
margin-bottom:18px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
4市瓦版
</div>

<div id="app">読み込み中...</div>

</div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='4市瓦版';

const url=
'https://docs.google.com/spreadsheets/d/'+
SHEET_ID+
'/gviz/tq?sheet='+
encodeURIComponent(SHEET_NAME)+
'&tqx=out:json';

function cell(r,i){
return r.c&&r.c[i]
?(r.c[i].f||r.c[i].v||'')
:'';
}

function shareUrl(id){
return 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-kawaraban.html?id='+id;
}

function openShare(type,id){

const s=shareUrl(id);

if(type==='facebook'){
window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(s));
}

if(type==='line'){
window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(s));
}

if(type==='x'){
window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(s));
}
}

function copyUrl(id){
navigator.clipboard.writeText(shareUrl(id));
alert('URLをコピーしました');
}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json=JSON.parse(
t.substring(t.indexOf('{'),t.lastIndexOf('}')+1)
);

let rows=json.table.rows||[];

let items=rows.map((r,i)=>({

id:i+1,
date:cell(r,0),
image:cell(r,1),
title:cell(r,2),
desc:cell(r,3),

shikiTitle:cell(r,4),
shikiUrl:cell(r,5),

niizaTitle:cell(r,6),
niizaUrl:cell(r,7),

asakaTitle:cell(r,8),
asakaUrl:cell(r,9),

wakoTitle:cell(r,10),
wakoUrl:cell(r,11)

}));

items=items.filter(x=>x.title);
items.reverse();

const app=document.getElementById('app');

const params=new URLSearchParams(location.search);
const id=params.get('id');

if(id){

const item=items[Number(id)-1];

app.innerHTML=`

<a class="backBtn" href="kawaraban.html">
一覧へ戻る
</a>

<div class="card">

<div class="date">${item.date}</div>

<div class="title">${item.title}</div>

<img
class="thumb"
src="${item.image}"
onerror="this.src='https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban-ogp.jpg';">

<div class="desc">${item.desc}</div>

<div class="citys">

<a class="shiki" href="${item.shikiUrl}" target="_blank">${item.shikiTitle}</a>

<a class="niiza" href="${item.niizaUrl}" target="_blank">${item.niizaTitle}</a>

<a class="asaka" href="${item.asakaUrl}" target="_blank">${item.asakaTitle}</a>

<a class="wako" href="${item.wakoUrl}" target="_blank">${item.wakoTitle}</a>

</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${id}')">Facebook</button>
<button class="line" onclick="openShare('line','${id}')">LINE</button>
<button class="x" onclick="openShare('x','${id}')">X</button>
<button class="copy" onclick="copyUrl('${id}')">URLコピー</button>
</div>

</div>
`;

return;
}

let html='';

items.slice(0,5).forEach((item,index)=>{

html+=`

<div class="card">

<div class="date">${item.date}</div>

<div class="title">
<a href="kawaraban.html?id=${index+1}" style="text-decoration:none;color:#17324d">
${item.title}
</a>
</div>

<img
class="thumb"
src="${item.image}"
onerror="this.src='https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban-ogp.jpg';">

<div class="desc">
${(item.desc||'').substring(0,150)}...
</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${index+1}')">Facebook</button>
<button class="line" onclick="openShare('line','${index+1}')">LINE</button>
<button class="x" onclick="openShare('x','${index+1}')">X</button>
<button class="copy" onclick="copyUrl('${index+1}')">URLコピー</button>
</div>

</div>
`;

});

if(items.length>5){

html+=`<div class="archive"><div class="archiveTitle">アーカイブ</div>`;

items.slice(5).forEach((item,index)=>{

html+=`
<a href="kawaraban.html?id=${index+6}">
${item.date}　${item.title}
</a>
`;

});

html+=`</div>`;
}

app.innerHTML=html;

})
.catch(()=>{

document.getElementById('app').innerHTML='読み込み失敗';

});

</script>

</body>
</html>

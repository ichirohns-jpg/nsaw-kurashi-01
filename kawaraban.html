<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版</title>

<meta property="og:type" content="website">
<meta property="og:title" content="4市瓦版">
<meta property="og:description" content="志木市・新座市・朝霞市・和光市の地域情報をまとめた4市瓦版です。">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">
<meta property="og:url" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="4市瓦版">
<meta name="twitter:description" content="志木市・新座市・朝霞市・和光市の地域情報をまとめた4市瓦版です。">
<meta name="twitter:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/top.jpg">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic

function formatDate(value){

if(!value){
return "";
}

const text=String(value).trim();

let m=text.match(/Date\((\d+),(\d+),(\d+)\)/);

if(m){

return (
m[1]+"年"+
(Number(m[2])+1)+"月"+
m[3]+"日"
);

}

m=text.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

if(m){

return (
m[1]+"年"+
Number(m[2])+"月"+
Number(m[3])+"日"
);

}

return text;

}

function parseGViz(text){

const match=text.match(/\{[\s\S]*\}/);

if(!match){
throw new Error("GVizデータを取得できません");
}

return JSON.parse(match[0]);

}

function makeShareUrl(id){

const base=location.href.split("?")[0];

return base+"?kawaraban="+encodeURIComponent(id);

}

function shareFacebook(url){

window.open(
"https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(url),
"_blank"
);

}

function shareLine(url){

window.open(
"https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url),
"_blank"
);

}

function shareX(url,text){

window.open(
"https://twitter.com/intent/tweet?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(text),
"_blank"
);

}

function copyUrl(url){

navigator.clipboard.writeText(url);
alert("URLをコピーしました");

}

fetch(GVIZ_URL)

.then(function(response){
return response.text();
})

.then(function(text){

const json=parseGViz(text);
const rows=json.table && json.table.rows ? json.table.rows : [];

let items=[];

for(let i=0;i<rows.length;i++){

const row=rows[i];

const date=getCell(row,0);
const image=getCell(row,1);
const title=getCell(row,2);
const desc=getCell(row,3);

const shikiTitle=getCell(row,4);
const shikiUrl=getCell(row,5);

const niizaTitle=getCell(row,6);
const niizaUrl=getCell(row,7);

const asakaTitle=getCell(row,8);
const asakaUrl=getCell(row,9);

const wakoTitle=getCell(row,10);
const wakoUrl=getCell(row,11);

if(
!date &&
!image &&
!title &&
!desc &&
!shikiTitle &&
!shikiUrl &&
!niizaTitle &&
!niizaUrl &&
!asakaTitle &&
!asakaUrl &&
!wakoTitle &&
!wakoUrl
){
continue;
}

items.push({
id:i+1,
date:formatDate(date),
image:image,
title:title,
desc:desc,
shikiTitle:shikiTitle,
shikiUrl:shikiUrl,
niizaTitle:niizaTitle,
niizaUrl:niizaUrl,
asakaTitle:asakaTitle,
asakaUrl:asakaUrl,
wakoTitle:wakoTitle,
wakoUrl:wakoUrl
});

}

items.reverse();

const params=new URLSearchParams(location.search);
const singleId=params.get("kawaraban");

if(singleId){

items=items.filter(function(item){
return String(item.id)===String(singleId);
});

}

let html="";

items.forEach(function(item){

const shareUrl=makeShareUrl(item.id);
const shareText=item.title || "4市瓦版";

html+=`

<div class="card">

${
item.image
?
`<img
src="${item.image}"
alt="${item.title}"
onerror="this.style.display='none'">`
:
""
}

<div class="date">
${item.date}
</div>

<div class="title">
${item.title}
</div>

<div class="desc">
${item.desc}
</div>

<div class="cityGrid">

${
item.shikiUrl
?
`<a class="shiki" href="${item.shikiUrl}" target="_blank">
${item.shikiTitle || "志木市"}
</a>`
:
""
}

${
item.niizaUrl
?
`<a class="niiza" href="${item.niizaUrl}" target="_blank">
${item.niizaTitle || "新座市"}
</a>`
:
""
}

${
item.asakaUrl
?
`<a class="asaka" href="${item.asakaUrl}" target="_blank">
${item.asakaTitle || "朝霞市"}
</a>`
:
""
}

${
item.wakoUrl
?
`<a class="wako" href="${item.wakoUrl}" target="_blank">
${item.wakoTitle || "和光市"}
</a>`
:
""
}

</div>

<div class="share">

<button class="fb" onclick="shareFacebook('${shareUrl}')">
Facebook
</button>

<button class="line" onclick="shareLine('${shareUrl}')">
LINE
</button>

<button class="x" onclick="shareX('${shareUrl}','${String(shareText).replace(/'/g,"\\'")}')">
X
</button>

<button class="copy" onclick="copyUrl('${shareUrl}')">
URLコピー
</button>

</div>

</div>

`;

});

document.getElementById("app").innerHTML=
html || "<div class='notice'>記事がありません</div>";

})
.catch(function(err){

document.getElementById("app").innerHTML=
"<div class='notice'>読み込み失敗<br>"+err+"</div>";

console.error(err);

});

</script>

</body>
</html>

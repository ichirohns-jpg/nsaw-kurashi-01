<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>瓦版</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f4f7fb;
color:#1e2a3a;
}

header{
background:#1976d2;
color:#fff;
padding:22px;
text-align:center;
font-size:26px;
font-weight:900;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:#fff;
margin-bottom:16px;
border-radius:14px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

img{
width:100%;
display:block;
}

.date{
padding:6px 10px;
margin:10px;
background:#e3f2fd;
border-radius:999px;
display:inline-block;
font-weight:900;
}

.title{
font-size:20px;
font-weight:900;
padding:10px;
}

.desc{
padding:10px;
font-size:15px;
line-height:1.6;
}
</style>

</head>

<body>

<header>4市瓦版</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID = '149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME = '4市瓦版';

const url =
  'https://docs.google.com/spreadsheets/d/' +
  SHEET_ID +
  '/gviz/tq?sheet=' +
  encodeURIComponent(SHEET_NAME) +
  '&tqx=out:json';

function cell(r, i){
  return r.c && r.c[i] ? (r.c[i].v || '') : '';
}

fetch(url)
.then(res => res.text())
.then(text => {

  const json = JSON.parse(
    text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1)
  );

  let rows = json.table.rows || [];

  let items = rows.map((r, i) => ({
    id: i + 1,
    date: cell(r, 0),
    image: cell(r, 1) || 'https://ichirohns-jpg/nsaw-kurashi-01/noimage.jpg',
    title: cell(r, 2),
    desc: cell(r, 3)
  })).filter(x => x.title).reverse();

  let html = '';

  items.forEach(i => {
    html += `
      <div class="card">
        <img src="${i.image}">
        <div class="date">${i.date}</div>
        <div class="title">${i.title}</div>
        <div class="desc">${i.desc}</div>
      </div>
    `;
  });

  document.getElementById('app').innerHTML = html;

});

</script>

</body>
</html>

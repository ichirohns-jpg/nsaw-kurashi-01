<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
4市瓦版
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:760px;
margin:auto;
padding:14px;
}

.top,.card{

background:#fff;

border-radius:30px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub,.desc{

font-size:24px;

line-height:1.8;

color:#425466;
}

.date{

font-size:20px;

font-weight:900;

color:#607080;

margin-bottom:10px;
}

.news-title{

font-size:34px;

font-weight:900;

margin-bottom:16px;
}

.img{

width:100%;

border-radius:22px;

margin-bottom:18px;
}

.city-btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

padding:16px;

border-radius:18px;

font-size:24px;

font-weight:900;

text-align:center;

margin-top:12px;
}

.share{

display:grid;

grid-template-columns:
1fr 1fr;

gap:12px;

margin-top:20px;
}

.share-btn{

display:flex;

align-items:center;

justify-content:center;

text-decoration:none;

height:60px;

border-radius:18px;

font-size:22px;

font-weight:900;

color:#fff;
}

.fb{
background:#1877f2;
}

.line{
background:#06c755;
}

.x{
background:#111;
}

.copy{
background:#ef6c00;
}

.archive-title{

font-size:34px;

font-weight:900;

margin:40px 0 20px;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.news-title{
font-size:30px;
}

.sub,.desc{
font-size:22px;
}

.city-btn{
font-size:22px;
}

.share-btn{
font-size:20px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
📰 4市瓦版
</div>

<div class="sub">
志木・新座・朝霞・和光の
情報を1枚の瓦版でまとめます
</div>

</div>

<div id="latest"></div>

<div class="archive-title">
📚 アーカイブ
</div>

<div id="archive"></div>

<div class="footer">

NSAW 4市瓦版

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const PAGE_URL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban.html';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=4市瓦版&tqx=out:json';

fetch(url)
.then(res=>res.text())
.then(text=>{

const json=JSON.parse(
text.substring(47).slice(0,-2)
);

const rows=json.table.rows;

rows.reverse();

const latest=
document.getElementById('latest');

const archive=
document.getElementById('archive');

rows.forEach((row,index)=>{

const c=row.c;

const date=c[0]?.v||'';
const img=c[1]?.v||'';
const title=c[2]?.v||'';
const desc=c[3]?.v||'';

const shikiTitle=c[4]?.v||'志木市';
const shikiURL=c[5]?.v||'#';

const niizaTitle=c[6]?.v||'新座市';
const niizaURL=c[7]?.v||'#';

const asakaTitle=c[8]?.v||'朝霞市';
const asakaURL=c[9]?.v||'#';

const wakoTitle=c[10]?.v||'和光市';
const wakoURL=c[11]?.v||'#';

const shareText=
encodeURIComponent(title + ' ' + PAGE_URL);

const html=`

<div class="card">

<div class="date">
${date}
</div>

${img ? `<img class="img" src="${img}">` : ''}

<div class="news-title">
${title}
</div>

<div class="desc">
${desc}
</div>

<a class="city-btn"
href="${shikiURL}"
target="_blank">
志木市：${shikiTitle}
</a>

<a class="city-btn"
href="${niizaURL}"
target="_blank">
新座市：${niizaTitle}
</a>

<a class="city-btn"
href="${asakaURL}"
target="_blank">
朝霞市：${asakaTitle}
</a>

<a class="city-btn"
href="${wakoURL}"
target="_blank">
和光市：${wakoTitle}
</a>

<div class="share">

<a class="share-btn fb"
target="_blank"
href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(PAGE_URL)}">
Facebook
</a>

<a class="share-btn line"
target="_blank"
href="https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(PAGE_URL)}">
LINE
</a>

<a class="share-btn x"
target="_blank"
href="https://twitter.com/intent/tweet?text=${shareText}">
X
</a>

<a class="share-btn copy"
href="#"
onclick="navigator.clipboard.writeText('${PAGE_URL}')">
コピー
</a>

</div>

</div>
`;

if(index<5){

latest.innerHTML+=html;

}else{

archive.innerHTML+=html;

}

});

});

</script>

</body>
</html>

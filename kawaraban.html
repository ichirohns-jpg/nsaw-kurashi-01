<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>4市瓦版</title>

<meta property="og:title" content="4市瓦版">
<meta property="og:description" content="志木・新座・朝霞・和光の地域ニュース">
<meta property="og:image" content="https://ichirohns-jpg.github.io/nsaw-kurashi-01/img/shiki.jpg">
<meta name="twitter:card" content="summary_large_image">

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.topCard{
background:white;
border-radius:34px;
padding:34px 24px;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(0,0,0,.08);
}

.pageTitle{
font-size:42px;
font-weight:900;
margin-bottom:20px;
}

.backBtn{
display:inline-block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px 28px;
border-radius:22px;
font-size:23px;
font-weight:900;
}

.desc{
font-size:21px;
line-height:1.8;
color:#607080;
font-weight:800;
margin-top:24px;
}

.newsCard{
background:white;
border-radius:30px;
padding:24px;
margin-bottom:22px;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.newsImage{
width:100%;
border-radius:24px;
margin-bottom:18px;
}

.newsDate{
font-size:20px;
font-weight:900;
color:#1565c0;
margin-bottom:10px;
}

.newsTitle{
font-size:30px;
font-weight:900;
margin-bottom:14px;
}

.newsText{
font-size:21px;
line-height:1.9;
white-space:pre-wrap;
font-weight:700;
}

</style>

</head>

<body>

<div class="wrap">

<div class="topCard">

<div class="pageTitle">📰 4市瓦版</div>

<a href="portal.html" class="backBtn">⬅ トップへ戻る</a>

<div class="desc">
志木・新座・朝霞・和光の地域ニュース
</div>

</div>

<div id="latestArea">読み込み中...</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const SHEET_NAME =
'4市瓦版';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(r,i){
return r.c[i]
? (r.c[i].v || r.c[i].f || '')
: '';
}

function makeCard(item){
return `
<div class="newsCard">

<img src="${item.image}" class="newsImage">

<div class="newsDate">${item.date}</div>
<div class="newsTitle">${item.title}</div>
<div class="newsText">${item.text}</div>

</div>
`;
}

fetch(url)
.then(res=>res.text())
.then(text=>{

const json = JSON.parse(text.substring(47).slice(0,-2));
const rows = json.table.rows;

let items = [];

rows.forEach(r=>{
items.push({
date:cell(r,0),
image:cell(r,1),
title:cell(r,2),
text:cell(r,3)
});
});

items.reverse();

// ★URLパラメータ
const id =
new URLSearchParams(location.search)
.get("kawaraban");

// ★1件 or 全件
let target;

if(id){
target = items.find((_,i)=> String(i+1) === String(id));
}

// ★表示
document.getElementById('latestArea').innerHTML =
target
? makeCard(target)
: items.map(i=>makeCard(i)).join('');

});

</script>

</body>
</html>

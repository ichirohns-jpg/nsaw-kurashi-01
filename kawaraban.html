<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>瓦版詳細</title>

<style>
body{font-family:sans-serif;margin:0;padding:16px;background:#eef4f8}
.card{background:#fff;padding:20px;border-radius:20px}
.title{font-size:28px;font-weight:900}
.text{font-size:18px;line-height:1.7;white-space:pre-wrap}
img{width:100%;border-radius:16px;margin-top:12px}
</style>
</head>

<body>

<div id="app">読み込み中...</div>

<script>

const id = new URLSearchParams(location.search).get("kawaraban");

const SHEET_ID = "149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc";
const SHEET_NAME = "4市瓦版";

const url =
"https://docs.google.com/spreadsheets/d/"+SHEET_ID+
"/gviz/tq?sheet="+encodeURIComponent(SHEET_NAME)+
"&tqx=out:json";

fetch(url)
.then(res=>res.text())
.then(text=>{

const json = JSON.parse(text.substring(47).slice(0,-2));
const rows = json.table.rows;

let item = null;

for(let r of rows){

const rowId = r.c[0]?.v;

if(String(rowId) == String(id)){
item = {
title:r.c[2]?.v,
text:r.c[3]?.v,
image:r.c[1]?.v
};
break;
}

}

document.getElementById("app").innerHTML =
item
? `
<div class="card">
<div class="title">${item.title}</div>
<div class="text">${item.text}</div>
${item.image ? `<img src="${item.image}">` : ""}
</div>
`
: "記事なし";

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版</title>

<style>
body{margin:0;font-family:"Hiragino Sans";background:#f4f7fb;color:#1e2a3a}
header{background:#1e88e5;color:#fff;padding:24px;text-align:center;font-size:28px;font-weight:900}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{background:#fff;border-radius:16px;margin-bottom:16px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.08)}
img{width:100%;display:block}
.date{margin:10px 12px;padding:6px 12px;background:#e3f2fd;border-radius:999px;font-weight:900;display:inline-block}
.title{font-size:22px;font-weight:900;padding:0 12px}
.desc{padding:12px;font-size:16px}
.city{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.city a{padding:10px;border-radius:10px;text-align:center;color:#fff;text-decoration:none;font-weight:900}
.shiki{background:#1e88e5}
.niiza{background:#43a047}
.asaka{background:#fb8c00}
.wako{background:#8e24aa}
.sns{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
button{border:0;padding:12px;border-radius:10px;color:#fff;font-weight:900}
.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#111}
.copy{background:#ff9800}
</style>

</head>

<body>

<header>4市瓦版</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='4市瓦版';

const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?sheet='+encodeURIComponent(SHEET_NAME)+'&tqx=out:json';

function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || r.c[i].f || '') : '';
}

function safe(img){
return img && !img.includes('drive.google') ? img : 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/noimage.jpg';
}

function shareUrl(id){
return 'https://ichirohns-jpg/nsaw-kurashi-01/share.html?id='+id+'&type=kawaraban';
}

function openShare(t,id){
const u=shareUrl(id);
if(t==='facebook')window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(u));
if(t==='line')window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(u));
if(t==='x')window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(u));
}

function copyUrl(id){
navigator.clipboard.writeText(shareUrl(id));
alert('コピー');
}

fetch(url).then(r=>r.text()).then(t=>{

const json=JSON.parse(t.substring(t.indexOf('{'),t.lastIndexOf('}')+1));

let rows=json.table.rows||[];

let items=rows.map((r,i)=>({
id:i+1,
date:cell(r,0),
image:safe(cell(r,1)),
title:cell(r,2),
desc:cell(r,3),
shikiTitle:cell(r,4),
shikiUrl:cell(r,5),
niizaTitle:cell(r,6),
niizaUrl:cell(r,7),
asakaTitle:cell(r,8),
asakaUrl:cell(r,9),
wakoTitle:cell(r,10),
wakoUrl:cell(r,11)
})).filter(x=>x.title).reverse();

const app=document.getElementById('app');
const id=new URLSearchParams(location.search).get('id');

if(id){

const item=items.find(x=>String(x.id)===String(id));

app.innerHTML=`
<div class="card">

<img src="${item.image}">

<div class="date">${item.date}</div>
<div class="title">${item.title}</div>
<div class="desc">${item.desc}</div>

<div class="city">
<a class="shiki" href="${item.shikiUrl}">${item.shikiTitle}</a>
<a class="niiza" href="${item.niizaUrl}">${item.niizaTitle}</a>
<a class="asaka" href="${item.asakaUrl}">${item.asakaTitle}</a>
<a class="wako" href="${item.wakoUrl}">${item.wakoTitle}</a>
</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${id}')">Facebook</button>
<button class="line" onclick="openShare('line','${id}')">LINE</button>
<button class="x" onclick="openShare('x','${id}')">X</button>
<button class="copy" onclick="copyUrl('${id}')">URLコピー</button>
</div>

</div>`;
return;
}

let html='';
items.slice(0,5).forEach(item=>{
html+=`
<div class="card">

<a href="kawaraban.html?id=${item.id}">
<img src="${item.image}">
</a>

<div class="date">${item.date}</div>
<div class="title">${item.title}</div>
<div class="desc">${item.desc}</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${item.id}')">Facebook</button>
<button class="line" onclick="openShare('line','${item.id}')">LINE</button>
<button class="x" onclick="openShare('x','${item.id}')">X</button>
<button class="copy" onclick="copyUrl('${item.id}')">URLコピー</button>
</div>

</div>`;
});

app.innerHTML=html;

});

</script>

</body>
</html>

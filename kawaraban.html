<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4市瓦版｜NSAW暮らし情報局</title>

<style>
body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
background:#eef3f8;
color:#1e2a3a;
}

/* ヘッダー */
header{
background:linear-gradient(135deg,#1e88e5,#42a5f5);
color:#fff;
padding:26px;
text-align:center;
font-size:32px;
font-weight:900;
}

/* コンテナ */
.wrap{
max-width:900px;
margin:auto;
padding:14px;
}

/* カード */
.card{
background:#fff;
border-radius:18px;
overflow:hidden;
margin-bottom:18px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

/* 画像 */
.card img{
width:100%;
display:block;
}

/* 日付 */
.date{
display:inline-block;
margin:12px;
padding:6px 14px;
background:#e3f2fd;
color:#1565c0;
border-radius:999px;
font-weight:900;
font-size:14px;
}

/* タイトル */
.title{
font-size:24px;
font-weight:900;
padding:0 12px;
line-height:1.4;
}

/* 本文 */
.desc{
padding:12px;
font-size:17px;
line-height:1.7;
white-space:pre-wrap;
}

/* 市リンク */
.city{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:12px;
}

.city a{
text-align:center;
padding:12px;
border-radius:12px;
font-weight:900;
color:#fff;
text-decoration:none;
}

.shiki{background:#1e88e5}
.niiza{background:#43a047}
.asaka{background:#fb8c00}
.wako{background:#8e24aa}

/* SNS */
.sns{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:12px;
}

.sns button{
border:0;
padding:12px;
border-radius:12px;
font-weight:900;
color:#fff;
font-size:15px;
}

.fb{background:#1877f2}
.line{background:#06c755}
.x{background:#111}
.copy{background:#ff9800}
</style>

</head>

<body>

<header>
4市瓦版
</header>

<div class="wrap">
<div id="app">読み込み中...</div>
</div>

<script>

const SHEET_ID='149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';
const SHEET_NAME='4市瓦版';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=' +
encodeURIComponent(SHEET_NAME) +
'&tqx=out:json';

function cell(r,i){
return r.c && r.c[i] ? (r.c[i].v || r.c[i].f || '') : '';
}

/* シェアURL */
function shareUrl(id){
return 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/share-kawaraban.html?id='+id;
}

/* SNS */
function openShare(type,id){

const url = shareUrl(id);

if(type==='facebook'){
window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url));
}

if(type==='line'){
window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(url));
}

if(type==='x'){
window.open('https://twitter.com/intent/tweet?url='+encodeURIComponent(url));
}
}

function copyUrl(id){
navigator.clipboard.writeText(shareUrl(id));
alert('URLコピーしました');
}

/* 読み込み */
fetch(url)
.then(r=>r.text())
.then(t=>{

const json=JSON.parse(
t.substring(t.indexOf('{'),t.lastIndexOf('}')+1)
);

let rows=json.table.rows || [];

let items=rows.map((r,i)=>({

id:i+1,
date:cell(r,0),
image:cell(r,1),
title:cell(r,2),
desc:cell(r,3),

shikiTitle:cell(r,4),
shikiUrl:cell(r,5),
niizaTitle:cell(r,6),
niizaUrl:cell(r,7),
asakaTitle:cell(r,8),
asakaUrl:cell(r,9),
wakoTitle:cell(r,10),
wakoUrl:cell(r,11)

}));

items = items.filter(x=>x.title);
items = items.reverse();

const app=document.getElementById('app');
const params=new URLSearchParams(location.search);
const id=params.get('id');

/* 詳細 */
if(id){

const item = items[id-1];

app.innerHTML = `
<div class="card">

<img src="${item.image || 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban-ogp.jpg'}">

<div class="date">${item.date}</div>

<div class="title">${item.title}</div>

<div class="desc">${item.desc}</div>

<div class="city">
<a class="shiki" href="${item.shikiUrl}" target="_blank">${item.shikiTitle}</a>
<a class="niiza" href="${item.niizaUrl}" target="_blank">${item.niizaTitle}</a>
<a class="asaka" href="${item.asakaUrl}" target="_blank">${item.asakaTitle}</a>
<a class="wako" href="${item.wakoUrl}" target="_blank">${item.wakoTitle}</a>
</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${id}')">Facebook</button>
<button class="line" onclick="openShare('line','${id}')">LINE</button>
<button class="x" onclick="openShare('x','${id}')">X</button>
<button class="copy" onclick="copyUrl('${id}')">URLコピー</button>
</div>

</div>
`;

return;
}

/* 一覧 */
let html='';

items.slice(0,5).forEach((item,index)=>{

html+=`
<div class="card">

<a href="kawaraban.html?id=${index+1}">
<img src="${item.image || 'https://ichirohns-jpg.github.io/nsaw-kurashi-01/kawaraban-ogp.jpg'}">
</a>

<div class="date">${item.date}</div>

<div class="title">
<a href="kawaraban.html?id=${index+1}">
${item.title}
</a>
</div>

<div class="desc">${item.desc}</div>

<div class="sns">
<button class="fb" onclick="openShare('facebook','${index+1}')">Facebook</button>
<button class="line" onclick="openShare('line','${index+1}')">LINE</button>
<button class="x" onclick="openShare('x','${index+1}')">X</button>
<button class="copy" onclick="copyUrl('${index+1}')">URLコピー</button>
</div>

</div>
`;
});

app.innerHTML = html;

})
.catch(()=>{
document.getElementById('app').innerHTML='読み込み失敗';
});

</script>

</body>
</html>

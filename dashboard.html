<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>見守りDX ダッシュボード</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

header{
background:#009688;
color:#fff;
padding:30px 18px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
background:#fff;
border-radius:28px;
padding:24px;
margin-bottom:24px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.title{
font-size:34px;
font-weight:900;
margin-bottom:12px;
}

.value{
font-size:42px;
font-weight:900;
margin-bottom:10px;
color:#009688;
}

.desc{
font-size:26px;
line-height:1.8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.btn{
display:block;
padding:22px;
border-radius:18px;
text-align:center;
text-decoration:none;
color:#fff;
font-size:26px;
font-weight:900;
}

.green{
background:#43a047;
}

.blue{
background:#1976d2;
}

.orange{
background:#fb8c00;
}

.purple{
background:#8e24aa;
}

.red{
background:#e53935;
}

.teal{
background:#009688;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

header{
font-size:34px;
}

.title{
font-size:30px;
}

.value{
font-size:34px;
}

.desc{
font-size:24px;
}

.btn{
font-size:23px;
}

}
</style>
</head>

<body>

<header>
見守りDX ダッシュボード
</header>

<div class="wrap">

<div class="card">

<div class="title">
今日の状態
</div>

<div class="value">
正常
</div>

<div class="desc">
最新の確認状況と地域情報をまとめて確認できます。
</div>

</div>

<div class="grid">

<a class="btn green"
href="family-dashboard.html">
家族確認ページ
</a>

<a class="btn blue"
href="support-map.html">
支援マップ
</a>

<a class="btn orange"
href="kawaraban.html">
4市瓦版
</a>

<a class="btn purple"
href="radio.html">
地域ラジオ
</a>

<a class="btn red"
href="fun.html">
お楽しみ動画
</a>

<a class="btn teal"
href="index.html">
トップへ戻る
</a>

</div>

</div>

</body>
</html>

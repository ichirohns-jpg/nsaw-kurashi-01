<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
支援者ページ
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:820px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

.reload{

margin-top:20px;

font-size:22px;

font-weight:900;

color:#1976d2;
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.name{

font-size:34px;

font-weight:900;

margin-bottom:10px;
}

.area{

font-size:22px;

font-weight:900;

color:#607080;

margin-bottom:14px;
}

.status{

font-size:28px;

font-weight:900;

margin-bottom:18px;
}

.alert{

font-size:24px;

font-weight:900;

padding:14px;

border-radius:18px;

margin-bottom:18px;

color:#fff;
}

.alert-orange{
background:#ef6c00;
}

.alert-red{
background:#d32f2f;
}

.info{

font-size:22px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.btn{

display:block;

text-decoration:none;

color:#fff;

text-align:center;

padding:18px;

border-radius:20px;

font-size:24px;

font-weight:900;

margin-top:12px;
}

.tel{
background:#ef6c00;
}

.line{
background:#06c755;
}

.map{
background:#1976d2;
}

.user{
background:#7b1fa2;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.reload{
font-size:20px;
}

.name{
font-size:30px;
}

.status{
font-size:24px;
}

.alert{
font-size:22px;
}

.info{
font-size:20px;
}

.btn{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
👀 支援者ページ
</div>

<div class="sub">
利用者の状態・薬・
最終確認を一覧できます

<br><br>

🔄 10秒ごとに自動更新

<div class="reload"
id="reloadTime">

更新確認中...

</div>

</div>

</div>

<div id="list"></div>

<div class="footer">

NSAW 支援者ページ

</div>

</div>

<script>

const now = new Date();

document
.getElementById('reloadTime')
.innerText =

'最終更新：' +

now.getFullYear() + '/' +
(now.getMonth()+1) + '/' +
now.getDate() + ' ' +
now.getHours() + ':' +
String(now.getMinutes()).padStart(2,'0') + ':' +
String(now.getSeconds()).padStart(2,'0');

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=利用者管理&tqx=out:json';

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

const users = [];

rows.forEach((row)=>{

const c = row.c;

const status =
c[10]?.v || '';

let priority = 3;

if(status.includes('助け')){

priority = 1;

}else if(status.includes('困')){

priority = 2;

}

users.push({

name:c[1]?.v || '',
city:c[2]?.v || '',
area:c[3]?.v || '',
chome:c[4]?.v || '',
tel:c[5]?.v || '',
line:c[6]?.v || '',
status:status,
urlid:c[11]?.v || '',
last:c[13]?.v || '',
lat:c[14]?.v || '',
lng:c[15]?.v || '',
morning:c[17]?.v || '',
noon:c[18]?.v || '',
night:c[19]?.v || '',
meal:c[20]?.v || '',
sleep:c[21]?.v || '',
condition:c[22]?.v || '',
memo:c[23]?.v || '',
priority:priority

});

});

users.sort((a,b)=>{

if(a.priority !== b.priority){

return a.priority - b.priority;

}

return String(a.last)
.localeCompare(String(b.last));

});

const list =
document.getElementById('list');

users.forEach((u)=>{

let color = '#43a047';

if(u.status.includes('困')){

color = '#ef6c00';

}

if(u.status.includes('助け')){

color = '#d32f2f';

}

let alertHtml = '';

let lastText = '';

if(String(u.last).includes('Date(')){

const nums =
String(u.last)
.match(/\d+/g);

const d = new Date(
nums[0],
nums[1],
nums[2],
nums[3],
nums[4],
nums[5]
);

lastText =
d.getFullYear() + '/' +
(d.getMonth()+1) + '/' +
d.getDate() + ' ' +
d.getHours() + ':' +
String(d.getMinutes()).padStart(2,'0');

}else{

lastText = u.last;

}

if(u.last){

const now =
new Date();

let lastDate;

if(String(u.last).includes('Date(')){

const nums =
String(u.last)
.match(/\d+/g);

lastDate = new Date(
nums[0],
nums[1],
nums[2],
nums[3],
nums[4],
nums[5]
);

}else{

lastDate = new Date(u.last);

}

const diffHours =
(now - lastDate)
/1000/60/60;

if(diffHours >= 24){

alertHtml = `
<div class="alert alert-red">
🚨 24時間以上反応がありません
</div>
`;

}else if(diffHours >= 12){

alertHtml = `
<div class="alert alert-orange">
⚠ 12時間以上反応がありません
</div>
`;

}

}

const mapURL =
'https://www.google.com/maps?q=' +
u.lat + ',' + u.lng;

const userURL =
'https://ichirohns-jpg.github.io/nsaw-kurashi-01/mamori.html?id=' +
u.urlid;

const html = `

<div class="card"
style="
border-left:14px solid ${color};
">

<div class="name">
${u.name}
</div>

<div class="area">
${u.city} ${u.area} ${u.chome}
</div>

<div class="status">
現在状態：${u.status}
</div>

${alertHtml}

<div class="info">

🕒 最終確認：${lastText}<br>
💊 朝薬：${u.morning}<br>
💊 昼薬：${u.noon}<br>
💊 夜薬：${u.night}<br>
🍚 食事：${u.meal}<br>
😴 睡眠：${u.sleep}<br>
🩺 体調：${u.condition}<br>
⚠ 要注意：${u.memo}

</div>

<a class="btn tel"
href="tel:${u.tel}">

📞 電話する

</a>

<a class="btn line"
target="_blank"
href="https://line.me/R/ti/p/~${u.line}">

💬 LINEする

</a>

<a class="btn map"
target="_blank"
href="${mapURL}">

📍 現在地を見る

</a>

<a class="btn user"
target="_blank"
href="${userURL}">

👤 本人ページを見る

</a>

</div>

`;

list.innerHTML += html;

});

});

setTimeout(()=>{

location.reload();

},10000);

</script>

</body>
</html>

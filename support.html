<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
支援者ページ
</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef3f8;
font-family:
"Hiragino Sans",
"Yu Gothic",
sans-serif;
color:#17324d;
}

.wrap{
max-width:820px;
margin:auto;
padding:14px;
}

.top{

background:#ffffff;

border-radius:30px;

padding:28px 22px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);

margin-bottom:20px;
}

.title{

font-size:42px;

font-weight:900;

margin-bottom:14px;
}

.sub{

font-size:24px;

line-height:1.8;

color:#425466;
}

.card{

background:#ffffff;

border-radius:28px;

padding:24px;

margin-bottom:20px;

box-shadow:
0 8px 22px rgba(0,0,0,.12);
}

.name{

font-size:34px;

font-weight:900;

margin-bottom:10px;
}

.area{

font-size:22px;

font-weight:900;

color:#607080;

margin-bottom:14px;
}

.status{

font-size:28px;

font-weight:900;

margin-bottom:18px;
}

.info{

font-size:22px;

line-height:1.8;

margin-bottom:20px;

color:#425466;
}

.btn{

display:block;

text-decoration:none;

background:#1976d2;

color:#fff;

text-align:center;

padding:18px;

border-radius:20px;

font-size:24px;

font-weight:900;

margin-top:12px;
}

.line{
background:#06c755;
}

.tel{
background:#ef6c00;
}

.footer{

text-align:center;

padding:24px 10px 60px;

font-size:20px;

line-height:1.8;

color:#607080;
}

@media(max-width:768px){

.title{
font-size:36px;
}

.sub{
font-size:22px;
}

.name{
font-size:30px;
}

.status{
font-size:24px;
}

.info{
font-size:20px;
}

.btn{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="top">

<div class="title">
👀 支援者ページ
</div>

<div class="sub">
利用者の状態・薬・
最終確認を一覧できます
</div>

</div>

<div id="list"></div>

<div class="footer">

NSAW 支援者ページ

</div>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=利用者管理&tqx=out:json';

fetch(url)
.then(res => res.text())
.then(text => {

const json = JSON.parse(
text.substring(47).slice(0,-2)
);

const rows = json.table.rows;

const list =
document.getElementById('list');

rows.forEach((row)=>{

const c = row.c;

const name =
c[1]?.v || '';

const city =
c[2]?.v || '';

const area =
c[3]?.v || '';

const chome =
c[4]?.v || '';

const tel =
c[5]?.v || '';

const line =
c[6]?.v || '';

const status =
c[10]?.v || '';

const last =
c[13]?.v || '';

const morning =
c[17]?.v || '';

const noon =
c[18]?.v || '';

const night =
c[19]?.v || '';

const meal =
c[20]?.v || '';

const sleep =
c[21]?.v || '';

const condition =
c[22]?.v || '';

const memo =
c[23]?.v || '';

let color = '#43a047';

if(status.includes('困')){

color = '#ef6c00';

}

if(status.includes('助け')){

color = '#d32f2f';

}

const html = `

<div class="card"
style="
border-left:14px solid ${color};
">

<div class="name">
${name}
</div>

<div class="area">
${city} ${area} ${chome}
</div>

<div class="status">
現在状態：${status}
</div>

<div class="info">

🕒 最終確認：${last}<br>
💊 朝薬：${morning}<br>
💊 昼薬：${noon}<br>
💊 夜薬：${night}<br>
🍚 食事：${meal}<br>
😴 睡眠：${sleep}<br>
🩺 体調：${condition}<br>
⚠ 要注意：${memo}

</div>

<a class="btn tel"
href="tel:${tel}">

📞 電話する

</a>

<a class="btn line"
target="_blank"
href="https://line.me/R/ti/p/~${line}">

💬 LINEする

</a>

</div>

`;

list.innerHTML += html;

});

});

</script>

</body>
</html>

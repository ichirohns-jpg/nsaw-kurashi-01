<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>今日の地域情報</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
}

header{
background:#00897b;
color:#fff;
padding:30px 18px;
text-align:center;
font-size:40px;
font-weight:900;
}

.wrap{
max-width:1000px;
margin:auto;
padding:18px;
}

.card{
background:#fff;
border-radius:28px;
overflow:hidden;
margin-bottom:24px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.card img{
width:100%;
display:block;
}

.date{
display:inline-block;
margin:20px 18px 8px;
padding:10px 18px;
background:#e3f2fd;
border-radius:999px;
font-size:24px;
font-weight:900;
}

.title{
padding:0 18px 12px;
font-size:36px;
font-weight:900;
line-height:1.45;
}

.desc{
padding:0 18px 20px;
font-size:26px;
line-height:1.8;
white-space:pre-wrap;
}

.linkBtn{
display:block;
margin:0 18px 20px;
padding:18px;
background:#1976d2;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:16px;
font-size:24px;
font-weight:900;
}

.notice{
background:#fff3cd;
padding:22px;
border-radius:18px;
font-size:24px;
font-weight:900;
margin:18px;
}

@media(max-width:700px){

header{
font-size:34px;
}

.title{
font-size:32px;
}

.desc{
font-size:24px;
}

.linkBtn{
font-size:22px;
}

}
</style>
</head>

<body>

<header>
今日の地域情報
</header>

<div class="wrap">

<div class="card">

<img
src="top.jpg"
onerror="this.style.display='none'">

<div class="date">
今日
</div>

<div class="title">
地域の最新情報を確認
</div>

<div class="desc">
地域ラジオ、4市瓦版、支援マップなどの最新情報を確認できます。
</div>

<a class="linkBtn"
href="kawaraban.html">
4市瓦版を見る
</a>

<a class="linkBtn"
href="radio.html">
地域ラジオを見る
</a>

</div>

<div class="notice">
毎日更新される地域情報の入口ページです。
</div>

</div>

</body>
</html>

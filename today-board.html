<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>本日の状況</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#17324d;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.help{
border-left:12px solid #d32f2f;
}

.warn{
border-left:12px solid #ef6c00;
}

.ok{
border-left:12px solid #00897b;
}

.name{
font-size:30px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
}

.btn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>📅 本日の状況</h1>
</div>

<div id="list"></div>

<a class="btn" href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(r,i){
return r.c[i]
? (r.c[i].f || r.c[i].v || '')
: '';
}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json =
JSON.parse(t.substr(47).slice(0,-2));

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const time = cell(row,0);
const name = cell(row,2);
const status = cell(row,3);

if(!name)return;

latest[name] = {
time:time,
name:name,
status:status
};

});

let html='';

Object.values(latest).forEach(row=>{

let cls='ok';
let icon='😊';

if(row.status.includes('助け')){
cls='help';
icon='🚨';
}
else if(row.status.includes('困')){
cls='warn';
icon='😓';
}

html += `

<div class="card ${cls}">

<div class="name">
👤 ${row.name}
</div>

<div class="status">
${icon} ${row.status}
</div>

<div class="time">
${row.time}
</div>

</div>

`;

});

document.getElementById('list').innerHTML =
html || '<div class="card">データがありません</div>';

})
.catch(()=>{

document.getElementById('list').innerHTML =
'<div class="card">読み込みに失敗しました</div>';

});

</script>

</body>
</html>

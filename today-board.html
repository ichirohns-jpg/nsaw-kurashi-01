<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>本日の状況</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:#eef3f8;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.wrap{
max-width:960px;
margin:auto;
padding:16px;
}

.header{
background:#1565c0;
color:white;
padding:30px;
border-radius:30px;
text-align:center;
margin-bottom:24px;
}

.header h1{
margin:0;
font-size:46px;
}

.card{
background:white;
border-radius:24px;
padding:24px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.10);
}

.help{
border-left:12px solid #d32f2f;
}

.warn{
border-left:12px solid #ef6c00;
}

.ok{
border-left:12px solid #00897b;
}

.name{
font-size:32px;
font-weight:900;
margin-bottom:10px;
}

.status{
font-size:24px;
font-weight:900;
margin-bottom:10px;
}

.time{
font-size:18px;
color:#666;
}

.btn{
display:block;
background:#455a64;
color:white;
text-decoration:none;
padding:18px;
border-radius:18px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:24px;
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<h1>📅 本日の状況</h1>
</div>

<div class="card help">
<div class="name">👤 山田 太郎</div>
<div class="status">🚨 助けてください</div>
<div class="time">15:20</div>
</div>

<div class="card warn">
<div class="name">👤 佐藤 花子</div>
<div class="status">😓 困っています</div>
<div class="time">14:35</div>
</div>

<div class="card ok">
<div class="name">👤 鈴木 一郎</div>
<div class="status">😊 元気です</div>
<div class="time">08:12</div>
</div>

<a class="btn" href="admin.html">
⬅ 支援者ページへ戻る
</a>

</div>

</body>
</html>

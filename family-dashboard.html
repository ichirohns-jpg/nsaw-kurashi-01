<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家族見守りダッシュボード</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:#eef4fb;
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#1f2d3d;
-webkit-text-size-adjust:100%;
}

header{
background:#009688;
color:#fff;
padding:30px 18px;
text-align:center;
font-size:40px;
font-weight:900;
line-height:1.35;
}

.wrap{
max-width:1000px;
margin:0 auto;
padding:18px 14px 44px;
}

.card{
background:#fff;
border-radius:28px;
padding:24px 20px;
margin-bottom:24px;
box-shadow:0 8px 22px rgba(0,0,0,.14);
}

.title{
font-size:34px;
font-weight:900;
line-height:1.45;
margin-bottom:12px;
color:#102a43;
}

.value{
font-size:40px;
font-weight:900;
line-height:1.4;
color:#009688;
margin-bottom:10px;
}

.desc{
font-size:26px;
line-height:1.85;
white-space:pre-wrap;
color:#243b53;
font-weight:700;
}

.statusGood{
background:#e8f5e9;
border-left:14px solid #43a047;
}

.statusWarn{
background:#fff8e1;
border-left:14px solid #fb8c00;
}

.statusAlert{
background:#ffebee;
border-left:14px solid #e53935;
}

.linkBtn{
display:block;
margin-top:16px;
padding:20px;
background:#1976d2;
color:#fff;
text-decoration:none;
text-align:center;
border-radius:18px;
font-size:26px;
font-weight:900;
}

.linkBtn.green{
background:#43a047;
}

.linkBtn.purple{
background:#8e24aa;
}

.linkBtn.orange{
background:#fb8c00;
}

.footer{
text-align:center;
font-size:20px;
color:#607d8b;
line-height:1.7;
padding:20px;
font-weight:700;
}

@media(max-width:700px){

header{
font-size:34px;
padding:26px 14px;
}

.title{
font-size:30px;
}

.value{
font-size:34px;
}

.desc{
font-size:24px;
}

.linkBtn{
font-size:23px;
}

}
</style>
</head>

<body>

<header>
家族見守りダッシュボード
</header>

<div class="wrap">

<div class="card statusGood">

<div class="title">
最新状態
</div>

<div class="value">
😊 元気です
</div>

<div class="desc">
最後の確認：2026年6月9日 08:30
</div>

</div>

<div class="card">

<div class="title">
薬の確認
</div>

<div class="desc">
朝：確認済み
昼：未確認
夜：未確認
寝る前：未確認
</div>

</div>

<div class="card statusWarn">

<div class="title">
連続未確認
</div>

<div class="value">
0日
</div>

<div class="desc">
現在は正常です。
いつも通り確認できています。
</div>

</div>

<div class="card">

<div class="title">
家族・支援者向けメニュー
</div>

<div class="desc">
本人の状態確認、薬の確認、支援マップ、地域情報ページへ移動できます。
</div>

<a class="linkBtn"
href="https://ichirohns-jpg.github.io/nsaw-anshin-dx-1/"
target="_blank">
見守りDXを開く
</a>

<a class="linkBtn green"
href="support-map.html">
支援マップを開く
</a>

<a class="linkBtn purple"
href="radio.html">
地域ラジオを開く
</a>

<a class="linkBtn orange"
href="kawaraban.html">
4市瓦版を開く
</a>

</div>

<div class="card statusAlert">

<div class="title">
注意が必要な時
</div>

<div class="desc">
「助けてください」が押された時や、長時間確認がない時は、電話・訪問・近隣確認などを検討してください。
</div>

</div>

<div class="footer">
NSAW 見守りDX・家族確認ページ
</div>

</div>

</body>
</html>

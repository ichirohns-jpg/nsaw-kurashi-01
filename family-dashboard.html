<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>家族ダッシュボード</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(180deg,#eaf4ff 0%,#f7fbff 100%);
font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
color:#17324d;
}

.wrap{
max-width:920px;
margin:auto;
padding:16px 14px 60px;
}

.header{
background:linear-gradient(135deg,#1976d2,#42a5f5);
color:white;
padding:36px 24px;
border-radius:34px;
text-align:center;
margin-bottom:22px;
box-shadow:0 10px 26px rgba(25,118,210,.25);
}

.header h1{
margin:0;
font-size:42px;
line-height:1.3;
}

.note{
background:white;
border-radius:26px;
padding:20px;
font-size:20px;
font-weight:900;
line-height:1.8;
margin-bottom:20px;
box-shadow:0 5px 16px rgba(0,0,0,.08);
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:30px;
padding:24px;
text-align:center;
box-shadow:0 7px 20px rgba(0,0,0,.10);
}

.num{
font-size:58px;
font-weight:900;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:900;
}

.green{color:#00897b}
.orange{color:#ef6c00}
.red{color:#d32f2f}
.blue{color:#1565c0}

.btn{
display:block;
background:#1976d2;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:22px;
font-weight:900;
margin-top:12px;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

.homeBtn{
display:block;
margin-top:24px;
background:#455a64;
color:white;
text-decoration:none;
padding:20px;
border-radius:22px;
text-align:center;
font-size:23px;
font-weight:900;
box-shadow:0 5px 14px rgba(0,0,0,.16);
}

@media(max-width:640px){
.grid{
grid-template-columns:1fr 1fr;
}
.header h1{
font-size:36px;
}
.num{
font-size:50px;
}
}
</style>

</head>

<body>

<div class="wrap">

<div class="header">
<h1>👨‍👩‍👧‍👦 家族ダッシュボード</h1>
</div>

<div class="note">
ご家族の見守り状況を確認するページです。
</div>

<div class="grid">

<div class="card">
<div id="okCount" class="num green">0</div>
<div class="title">😊 元気です</div>
</div>

<div class="card">
<div id="warnCount" class="num orange">0</div>
<div class="title">😓 困っています</div>
</div>

<div class="card">
<div id="helpCount" class="num red">0</div>
<div class="title">🚨 助けてください</div>
</div>

<div class="card">
<div id="userCount" class="num blue">0</div>
<div class="title">👥 登録利用者</div>
</div>

</div>

<a class="btn" href="family-list.html">
👨‍👩‍👧‍👦 家族一覧
</a>

<a class="btn" href="family-ok.html">
😊 元気です一覧
</a>

<a class="btn" href="family-warn.html">
😓 困っています一覧
</a>

<a class="btn" href="family-help.html">
🚨 助けてください一覧
</a>

<a class="homeBtn" href="portal.html">
🏠 地域OSへ戻る
</a>

</div>

<script>

const SHEET_ID =
'149lAFx3oPGjB0UqDpPWZJqt_bBeDWMPd-Rfc6LXQgoc';

const url =
'https://docs.google.com/spreadsheets/d/' +
SHEET_ID +
'/gviz/tq?sheet=見守り&tqx=out:json';

function cell(r,i){
return r.c[i]
? (r.c[i].f || r.c[i].v || '')
: '';
}

fetch(url)
.then(r=>r.text())
.then(t=>{

const json =
JSON.parse(t.substr(47).slice(0,-2));

const rows =
json.table.rows;

let latest = {};

rows.forEach(row=>{

const name = cell(row,2);
const status = cell(row,3);

if(!name)return;

latest[name] = status;

});

let ok = 0;
let warn = 0;
let help = 0;

Object.values(latest).forEach(status=>{

if(status.includes('助け')){
help++;
}
else if(status.includes('困')){
warn++;
}
else{
ok++;
}

});

document.getElementById('okCount').innerText = ok;
document.getElementById('warnCount').innerText = warn;
document.getElementById('helpCount').innerText = help;
document.getElementById('userCount').innerText =
Object.keys(latest).length;

})
.catch(()=>{

document.getElementById('okCount').innerText='-';
document.getElementById('warnCount').innerText='-';
document.getElementById('helpCount').innerText='-';
document.getElementById('userCount').innerText='-';

});

</script>

</body>
</html>
